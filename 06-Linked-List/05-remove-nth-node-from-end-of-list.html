<body>
  <header>
    <div class="h-top">
      <span class="h-num">19.</span>
      <span class="h-title">Remove Nth Node From End of List</span>
      <span class="h-badge">MEDIUM</span>
      <div class="h-right">
        <input type="text" id="listInp" class="inp" placeholder="e.g., 1,2,3,4,5" value="1,2,3,4,5"/>
        <input type="text" id="nInp" class="inp" placeholder="n" value="2" style="width:60px"/>
        <button onclick="app.init()" class="btn btn-g">Reset</button>
      </div>
    </div>
    
    <!-- MODE TOGGLE -->
    <div class="mode-toggle">
      <button class="mode-btn" id="btnIntuitMode" onclick="app.setMode('intuition')">
        💡 Intuition & Thought Process
      </button>
      <button class="mode-btn active" id="btnExecMode" onclick="app.setMode('execution')">
        ▶️ Step-by-Step Execution
      </button>
    </div>
  </header>
  
  <main id="mainContent">
    <!-- Content will be rendered here based on mode -->
  </main>
  
  <script>
    class ListNode {
      constructor(val = 0, next = null) {
        this.val = val;
        this.next = next;
      }
    }
    
    class App {
      constructor() {
        this.mode = 'execution'; // 'execution' or 'intuition'
        this.execCursor = 0;
        this.intuitCursor = 0;
        this.playing = false;
        this.playTimer = null;
        this.execSteps = [];
        
        this.intuitionStages = [
          {
            title: "Stage 1: Understanding the Problem",
            thought: "Hmm, removing from the END... but I can only traverse forward. That's tricky.",
            content: `<p>The challenge here is that linked lists only let us move forward (head → next → next...), but we need to remove a node counting from the <strong>end</strong>.</p>
            
            <p>If we knew the total length, we could calculate: remove the <code>(length - n + 1)</code>th node from the start. But that requires two passes — one to count, one to remove.</p>
            
            <p><strong>Can we do it in one pass?</strong> That would be more elegant.</p>`,
            insight: "The problem isn't just removing a node — it's converting an 'end-based index' to a 'start-based position' WITHOUT knowing the length ahead of time.",
            visualization: "problem"
          },
          {
            title: "Stage 2: The Two-Pointer Breakthrough",
            thought: "Wait! What if I use two pointers with a fixed gap between them? If the gap is n, then when the fast pointer reaches the end...",
            content: `<p>Here's the key insight: if I maintain two pointers that are <strong>exactly n nodes apart</strong>, then when the fast pointer reaches the end (null), the slow pointer will be exactly n nodes from the end!</p>
            
            <ul>
              <li><strong>Fast pointer:</strong> Moves ahead first, creating the gap</li>
              <li><strong>Slow pointer:</strong> Starts moving once gap is established</li>
              <li><strong>Result:</strong> When fast reaches null, slow is at the right position</li>
            </ul>
            
            <p>This is the <strong>two-pointer technique</strong> — a powerful pattern for linked list problems.</p>`,
            insight: "By maintaining a fixed gap of n nodes between two pointers, we automatically locate the nth node from the end when the fast pointer finishes.",
            visualization: "twopointer"
          },
          {
            title: "Stage 3: The Dummy Node Trick",
            thought: "But what if we need to remove the head itself? We'd have to return a different node... Unless we use a dummy!",
            content: `<p>Consider this edge case: <code>list = [1, 2], n = 2</code> (remove the head).</p>
            
            <p>If <code>slow</code> starts at <code>head</code>, it can't access the node <strong>before</strong> the one we want to remove. We need <code>slow</code> to point to the <strong>predecessor</strong> of the target node.</p>
            
            <p><strong>The dummy node solution:</strong></p>
            <ul>
              <li>Create a dummy node pointing to head</li>
              <li>Start both pointers at dummy (not head)</li>
              <li>Move fast <code>n+1</code> steps (extra step to position slow correctly)</li>

      buildExecSteps(vals, n) {
        const steps = [];
        
        // Build linked list
        let head = null;
        let tail = null;
        for (let val of vals) {
          const node = new ListNode(val);
          if (!head) {
            head = node;
            tail = node;
          } else {
            tail.next = node;
            tail = node;
          }
        }
        
        function snap(line, msg, logType, logText, state) {
          const listArr = [];
          let curr = state.dummy || state.head;
          while (curr) {
            listArr.push({
              val: curr.val,
              isDummy: curr === state.dummy,
              isSlow: curr === state.slow,
              isFast: curr === state.fast,
              isToRemove: curr === state.toRemove,
              isRemoved: state.removed && curr === state.toRemove
            });
            curr = curr.next;
          }
          
          steps.push({
            line: line,
            msg: msg,
            log: { type: logType, text: logText },
            listArr: listArr,
            n: n,
            slow: state.slow,
            fast: state.fast,
            done: state.done || false
          });
        }
        
        const dummy = new ListNode(0, head);
        let slow = dummy;
        let fast = dummy;
        
        snap(4, 'Created dummy node pointing to head', 'init', 'Initialize dummy, slow, fast pointers', {
          dummy, head, slow, fast, done: false
        });
        
        for (let i = 0; i <= n; i++) {
          fast = fast.next;
          snap(9, `Moving fast pointer (step ${i+1}/${n+1})`, 'move', `Fast pointer advanced to position ${i+1}`, {
            dummy, head, slow, fast, done: false
          });
        }
        
        snap(9, `Fast pointer is now ${n+1} steps ahead of slow`, 'move', `Gap of ${n} nodes created between slow and fast`, {
          dummy, head, slow, fast, done: false
        });
        
        let moveCount = 0;
        while (fast) {
          slow = slow.next;
          fast = fast.next;
          moveCount++;
          snap(13, `Moving both pointers together (iteration ${moveCount})`, 'move', `Both pointers moved forward`, {
            dummy, head, slow, fast, done: false
          });
        }
        
        const toRemove = slow.next;
        snap(17, 'Slow pointer is just before the node to remove', 'found', `Node with value ${toRemove.val} will be removed`, {
          dummy, head, slow, fast, toRemove, done: false
        });
        
        slow.next = slow.next.next;
        snap(17, 'Removed the nth node from end', 'remove', `Removed node with value ${toRemove.val}`, {
          dummy, head, slow, fast, toRemove, removed: true, done: false
        });
        
        const result = dummy.next;
        snap(19, 'Return modified list', 'complete', 'List modification complete', {
          dummy, head: result, slow, fast, toRemove, removed: true, done: true
        });
        
        return steps;
      }

        const viz = document.getElementById('vizContent');
        
        document.querySelectorAll('.code-line').forEach(line => {
          line.classList.toggle('active', parseInt(line.dataset.line) === step.line);
        });
        
        let html = '';
        
        html += '<div class="list-viz">';
        html += '<div class="list-row">';
        step.listArr.forEach((node, i) => {
          let classes = 'node-box';
          if (node.isDummy) classes += ' dummy';
          if (node.isSlow) classes += ' slow-ptr';
          if (node.isFast) classes += ' fast-ptr';
          if (node.isToRemove) classes += ' to-remove';
          if (node.isRemoved) classes += ' removed';
          
          html += `<div class="${classes}">`;
          html += `<div class="node-val">${node.val}</div>`;
          if (node.isDummy) html += `<div class="node-label">dummy</div>`;
          html += '</div>';
          
          if (i < step.listArr.length - 1) {
            html += '<div class="arrow">→</div>';
          }
        });
        html += '</div>';
        
        html += '<div class="list-row" style="gap:0.5rem;margin-top:0.5rem">';
        if (step.slow) html += '<div class="ptr-label slow">SLOW</div>';
        if (step.fast) html += '<div class="ptr-label fast">FAST</div>';
        html += '</div>';
        html += '</div>';
        
        html += '<div class="vars-grid">';
        html += `<div class="vc"><div class="vn">n (from end)</div><div class="vv">${step.n}</div></div>`;
        html += '</div>';
        
        html += `<div class="msg-box">${step.msg}</div>`;
        
        if (step.done) {
          const resultVals = step.listArr.filter(n => !n.isDummy && !n.isRemoved).map(n => n.val).join(' → ');
          html += '<div class="result-box">';
          html += '<div class="result-title">Modified List</div>';
          html += `<div class="result-val">${resultVals}</div>`;
          html += '</div>';
        }
        
        viz.innerHTML = html;
        
        document.getElementById('stepInfo').textContent = `${idx} / ${this.execSteps.length - 1}`;

            </div>
          </div>
          
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.5rem;">
            <div class="approach-card rejected">
              <div class="approach-title">❌ Without Dummy</div>
              <div class="approach-detail">
                <div>Start at head</div>
                <div>Can't access predecessor</div>
                <div>Special case needed for head removal</div>
              </div>
            </div>
            
            <div class="approach-card chosen">
              <div class="approach-title">✅ With Dummy</div>
              <div class="approach-detail">
                <div>Start at dummy</div>
                <div>Always have predecessor</div>
                <div>Uniform handling of all cases</div>
              </div>
            </div>
          </div>
        `;
      }
      
      renderPositioningViz() {
        return `
          <div class="demo-section">
            <div class="demo-title">Initial Positioning: Why n+1 Steps?</div>
            <div style="margin-bottom: 1rem; color: var(--text);">
              <strong>Example:</strong> [1,2,3,4,5], n=2 (remove 4)
            </div>
            <div class="list-viz">
              <div class="list-row">
                ${[0,1,2,3,4,5].map((v, i) => `
                  <div class="node-box ${i === 0 ? 'dummy slow-ptr' : ''} ${i === 3 ? 'fast-ptr' : ''}">
                    <div class="node-val">${v === 0 ? 'D' : v}</div>
                  </div>
                  ${i < 5 ? '<div class="arrow">→</div>' : ''}
                `).join('')}
              </div>
              <div style="margin-top: 1rem; padding: 1rem; background: var(--card); border-radius: 6px;">
                <div style="margin-bottom: 0.5rem;">
                  <strong>Move fast</strong> n+1 = 3 steps ahead
                </div>
                <div style="color: var(--muted); font-size: 0.9rem;">
                  Gap between slow and fast = 3 nodes<br>
                  When fast reaches end, slow will be at node 3 (before node 4)
                </div>
              </div>
            </div>
          </div>
          
          <div style="margin-top: 1.5rem; padding: 1.25rem; background: rgba(57,217,138,0.08); border: 2px solid var(--green); border-radius: 8px;">
            <strong style="color: var(--green);">💡 Why n+1 instead of n?</strong>
            <div style="margin-top: 0.5rem; color: var(--text);">
              We need slow to stop at the <strong>predecessor</strong> (node before target), not at the target itself. This allows us to do <code>slow.next = slow.next.next</code>.
            </div>
          </div>
        `;
      }
      
      renderMovementViz() {
        return `
          <div class="demo-section">
            <div class="demo-title">Movement Phase: Maintaining the Gap</div>
            <div style="margin-bottom: 1rem; font-family: 'Fira Code', monospace; background: var(--card); padding: 1rem; border-radius: 6px;">
while fast:<br>
&nbsp;&nbsp;&nbsp;&nbsp;slow = slow.next<br>
&nbsp;&nbsp;&nbsp;&nbsp;fast = fast.next
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 1rem;">
              <div>
                <div style="font-weight: 600; margin-bottom: 0.5rem; color: var(--accent);">Iteration 1</div>
                <div class="list-viz">
                  <div class="list-row">
                    ${[0,1,2,3,4,5].map((v, i) => `
                      <div class="node-box ${i === 0 ? 'dummy' : ''} ${i === 1 ? 'slow-ptr' : ''} ${i === 4 ? 'fast-ptr' : ''}">
                        <div class="node-val">${v === 0 ? 'D' : v}</div>
                      </div>
                      ${i < 5 ? '<div class="arrow">→</div>' : ''}
                    `).join('')}
                  </div>
                </div>
              </div>
              
              <div>
                <div style="font-weight: 600; margin-bottom: 0.5rem; color: var(--accent);">Iteration 2</div>
                <div class="list-viz">
                  <div class="list-row">
                    ${[0,1,2,3,4,5].map((v, i) => `
                      <div class="node-box ${i === 0 ? 'dummy' : ''} ${i === 2 ? 'slow-ptr' : ''} ${i === 5 ? 'fast-ptr' : ''}">
                        <div class="node-val">${v === 0 ? 'D' : v}</div>
                      </div>
                      ${i < 5 ? '<div class="arrow">→</div>' : ''}
                    `).join('')}
                  </div>
                </div>
              </div>
              
              <div>
                <div style="font-weight: 600; margin-bottom: 0.5rem; color: var(--green);">Final Position (fast = null)</div>
                <div class="list-viz">
                  <div class="list-row">
                    ${[0,1,2,3,4,5].map((v, i) => `
                      <div class="node-box ${i === 0 ? 'dummy' : ''} ${i === 3 ? 'slow-ptr' : ''} ${i === 4 ? 'to-remove' : ''}">
                        <div class="node-val">${v === 0 ? 'D' : v}</div>
                      </div>
                      ${i < 5 ? '<div class="arrow">→</div>' : ''}
                    `).join('')}
                  </div>
                  <div style="margin-top: 1rem; color: var(--green);">
                    ✅ Slow is at node 3, perfectly positioned before node 4 (target)
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
      }
      
      renderDeletionViz() {
        return `
          <div class="demo-section">
            <div class="demo-title">The Deletion: One Line of Code</div>
            
            <div style="margin-bottom: 1.5rem;">
              <div style="font-weight: 600; margin-bottom: 0.5rem;">Before Deletion</div>
              <div class="list-viz">
                <div class="list-row">
                  ${[0,1,2,3,4,5].map((v, i) => `
                    <div class="node-box ${i === 0 ? 'dummy' : ''} ${i === 3 ? 'slow-ptr' : ''} ${i === 4 ? 'to-remove' : ''}">
                      <div class="node-val">${v === 0 ? 'D' : v}</div>
                    </div>
                    ${i < 5 ? '<div class="arrow">→</div>' : ''}
                  `).join('')}
                </div>
              </div>
            </div>
            
            <div style="background: var(--card); padding: 1rem; border-radius: 6px; margin-bottom: 1.5rem;">
              <div style="font-family: 'Fira Code', monospace; color: var(--yellow);">
                slow.next = slow.next.next
              </div>
              <div style="margin-top: 0.5rem; color: var(--muted); font-size: 0.9rem;">
                Translation: "Point to the node after the one I'm skipping"
              </div>
            </div>
            
            <div>
              <div style="font-weight: 600; margin-bottom: 0.5rem;">After Deletion</div>
              <div class="list-viz">
                <div class="list-row">
                  ${[0,1,2,3,5].map((v, i) => `
                    <div class="node-box ${i === 0 ? 'dummy' : ''} ${i === 3 ? 'slow-ptr' : ''}">
                      <div class="node-val">${v === 0 ? 'D' : v}</div>
                    </div>
                    ${i < 4 ? '<div class="arrow">→</div>' : ''}
                  `).join('')}
                </div>
                <div style="margin-top: 1rem;">
                  <div class="node-box removed" style="display: inline-block;">
                    <div class="node-val">4</div>
                    <div class="node-label">orphaned</div>
                  </div>
                  <div style="margin-top: 0.5rem; color: var(--muted); font-size: 0.9rem;">
                    Node 4 is no longer reachable — effectively deleted
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
      }
      
      renderComplexityViz() {
        return `
          <div class="complexity-grid">
            <div class="complexity-card">
              <div class="complexity-label">Time Complexity</div>
              <div class="complexity-value">O(n)</div>
              <div class="complexity-explain">
                • Traverse list once<br>
                • Fast pointer: ~n steps<br>
                • Both pointers: ~L-n steps<br>
                • Total: O(L) where L = length
              </div>
            </div>
            
            <div class="complexity-card">
              <div class="complexity-label">Space Complexity</div>
              <div class="complexity-value">O(1)</div>
              <div class="complexity-explain">
                • Only 3 pointers (dummy, slow, fast)<br>
                • No auxiliary data structures<br>
                • Constant space regardless of input size
              </div>
            </div>
          </div>
          
          <div style="margin-top: 1.5rem; padding: 1.5rem; background: rgba(57,217,138,0.08); border: 2px solid var(--green); border-radius: 8px;">
            <div style="font-weight: 600; color: var(--green); margin-bottom: 0.75rem;">
              ✅ This Solution Is Optimal
            </div>
            <div style="color: var(--text); line-height: 1.6;">
              <strong>Why?</strong> We must at least touch the node we're removing (O(n) is unavoidable). We can't improve on O(1) space for a pointer-based approach. This solution achieves both theoretical limits.
            </div>
          </div>
          
          <div style="margin-top: 1rem; padding: 1.25rem; background: var(--card); border-radius: 8px;">
            <div style="font-weight: 600; margin-bottom: 0.5rem;">Alternative Approaches</div>
            <div style="color: var(--muted); font-size: 0.9rem; line-height: 1.6;">
              • <strong>Two-pass:</strong> O(n) time, O(1) space — same complexity, but less elegant<br>
              • <strong>Stack-based:</strong> O(n) time, O(n) space — worse space complexity<br>
              • <strong>Recursion:</strong> O(n) time, O(n) space (call stack) — same issue
            </div>
          </div>
        `;
      }
      
      attachIntuitListeners() {
        // Already attached via onclick
      }
    }
    
    // Initialize app
    const app = new App();
    
    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (app.mode === 'execution') {
        if (e.code === 'Space') {
          e.preventDefault();
          app.togglePlay();
        } else if (e.code === 'ArrowRight') {
          e.preventDefault();
          app.stepFwd();
        } else if (e.code === 'ArrowLeft') {
          e.preventDefault();
          app.stepBack();
        }
      } else {
        if (e.code === 'ArrowRight') {
          e.preventDefault();
          app.intuitNext();
        } else if (e.code === 'ArrowLeft') {
          e.preventDefault();
          app.intuitPrev();
        }
      }
    });
  </script>
</body>
</html>
