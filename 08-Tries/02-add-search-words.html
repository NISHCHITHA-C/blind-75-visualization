<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>211. Design Add and Search Words Data Structure - Visualizer</title>
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f3f4f6;
    --bg-tertiary: #e9ecef;
    --text-primary: #111827;
    --text-secondary: #6b7280;
    --border: #e5e7eb;
    --code-bg: #f6f8fa;
    --highlight: #fff8c5;
    --highlight-border: #e3b341;
    --accent: #3b82f6;
    --accent2: #10b981;
    --danger: #ef4444;
    --font-mono: 'Consolas','Monaco','Courier New',monospace;
    --syn-keyword: #d73a49;
    --syn-func: #6f42c1;
    --syn-string: #032f62;
    --syn-comment: #6a737d;
    --syn-type: #005cc5;
    --syn-number: #098658;
    --syn-deco: #6f42c1;
    --syn-self: #e36209;
  }
  [data-theme="dark"] {
    --bg-primary: #1e2130;
    --bg-secondary: #13151f;
    --bg-tertiary: #252840;
    --text-primary: #f8f8f2;
    --text-secondary: #94a3b8;
    --border: #2d3154;
    --code-bg: #0d0f1a;
    --highlight: rgba(241,250,140,0.12);
    --highlight-border: #f1fa8c;
    --accent: #8be9fd;
    --accent2: #50fa7b;
    --danger: #ff5555;
    --syn-keyword: #ff79c6;
    --syn-func: #50fa7b;
    --syn-string: #f1fa8c;
    --syn-comment: #6272a4;
    --syn-type: #8be9fd;
    --syn-number: #bd93f9;
    --syn-deco: #ffb86c;
    --syn-self: #ffb86c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-secondary);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    font-size: 13px;
  }

  /* ── HEADER ── */
  #header {
    background: var(--bg-primary);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px 8px;
    flex-shrink: 0;
  }
  .header-row1 {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .problem-title { font-size: 16px; font-weight: 700; flex: 1; color: var(--text-primary); }
  .badge { padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; background: rgba(239,68,68,0.15); color: #ef4444; }
  .btn-theme { padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text-primary); cursor: pointer; font-size: 12px; }
  .mode-toggle { display: flex; gap: 6px; margin-bottom: 8px; }
  .mode-btn { flex: 1; padding: 6px 12px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--bg-secondary); color: var(--text-secondary); cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; }
  .mode-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── OPERATION INPUT BAR ── */
  #op-bar {
    display: none;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    background: var(--bg-secondary);
    border-radius: 8px;
    padding: 8px 10px;
    border: 1px solid var(--border);
  }
  #op-bar label { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
  #op-bar select, #op-bar input {
    padding: 5px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-primary);
    color: var(--text-primary);
    font-size: 12px;
  }
  #op-bar select { min-width: 100px; }
  #op-bar input { width: 160px; font-family: var(--font-mono); }
  .btn-run { padding: 5px 14px; border-radius: 6px; border: none; background: var(--accent); color: #fff; cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .btn-run:hover { opacity: 0.88; }
  .btn-ghost { padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text-primary); cursor: pointer; font-size: 12px; white-space: nowrap; }
  .btn-ghost:hover { border-color: var(--accent); }

  /* Op queue chips */
  #op-queue-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    flex-wrap: wrap;
    min-width: 0;
  }
  #op-queue-label { font-size: 11px; color: var(--text-secondary); white-space: nowrap; }
  .op-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-family: var(--font-mono);
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all 0.15s;
  }
  .op-chip.add { background: rgba(16,185,129,0.12); color: var(--accent2); border-color: rgba(16,185,129,0.3); }
  .op-chip.search { background: rgba(139,233,253,0.1); color: var(--accent); border-color: rgba(139,233,253,0.3); }
  .op-chip.active { box-shadow: 0 0 0 2px var(--accent); }
  .op-chip .chip-x { cursor: pointer; opacity: 0.6; font-size: 10px; }
  .op-chip .chip-x:hover { opacity: 1; color: var(--danger); }

  /* ── MAIN PANELS ── */
  #main { display: flex; flex: 1; overflow: hidden; }
  .panel { display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border); }
  .panel:last-child { border-right: none; }
  .panel-header { padding: 8px 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-secondary); background: var(--bg-primary); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .panel-body { flex: 1; overflow: auto; }

  /* ── CODE PANEL ── */
  #code-panel { width: 32%; min-width: 220px; }
  .code-wrap { background: var(--code-bg); height: 100%; overflow: auto; }
  pre.code-pre { margin: 0; padding: 12px 0; font-family: var(--font-mono); font-size: 14px; line-height: 0; }
  .code-line { display: flex; align-items: stretch; min-height: 22px; transition: background 0.15s; line-height: 1.55; }
  .code-line.active { background: var(--highlight); border-left: 3px solid var(--highlight-border); }
  .ln { display: inline-flex; align-items: center; min-width: 38px; padding-right: 12px; padding-left: 6px; text-align: right; color: var(--text-secondary); user-select: none; font-size: 12px; flex-shrink: 0; justify-content: flex-end; }
  .code-line.active .ln { color: var(--highlight-border); }
  code.lc { flex: 1; white-space: pre; font-family: var(--font-mono); font-size: 14px; line-height: 1.55; padding-right: 16px; }
  .sk { color: var(--syn-keyword); font-weight: 600; }
  .sf { color: var(--syn-func); }
  .ss { color: var(--syn-string); }
  .sc { color: var(--syn-comment); font-style: italic; }
  .st { color: var(--syn-type); }
  .sn { color: var(--syn-number); }
  .sd { color: var(--syn-deco); }
  .se { color: var(--syn-self); }

  /* ── VIZ PANEL ── */
  #viz-panel { flex: 1; min-width: 0; background: var(--bg-secondary); display: flex; flex-direction: column; }
  #viz-canvas { flex: 1; overflow: auto; padding: 16px; }
  .controls-bar { display: flex; gap: 6px; align-items: center; padding: 8px 12px; background: var(--bg-primary); border-top: 1px solid var(--border); flex-shrink: 0; }
  .ctrl-btn { padding: 5px 11px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text-primary); cursor: pointer; font-size: 14px; transition: background 0.15s; }
  .ctrl-btn:hover { background: var(--bg-tertiary); }
  .ctrl-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .speed-sel { padding: 4px 6px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text-primary); font-size: 12px; }
  .step-counter { margin-left: auto; font-size: 12px; color: var(--text-secondary); font-family: var(--font-mono); }

  /* ── STEP LOG PANEL ── */
  #log-panel { width: 22%; min-width: 180px; }
  .log-desc { padding: 10px 12px; font-size: 12px; color: var(--text-primary); line-height: 1.5; border-bottom: 1px solid var(--border); background: var(--bg-primary); min-height: 60px; }
  .vars-section { padding: 8px 12px; border-bottom: 1px solid var(--border); }
  .vars-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-secondary); margin-bottom: 6px; }
  .var-row { font-family: var(--font-mono); font-size: 11.5px; margin: 3px 0; display: flex; gap: 4px; }
  .var-name { color: var(--accent); }
  .var-val { color: var(--text-primary); word-break: break-all; }
  .history-list { padding: 8px 12px; }
  .hist-item { padding: 4px 8px; border-radius: 4px; font-size: 11px; margin: 2px 0; cursor: pointer; color: var(--text-secondary); }
  .hist-item.current { background: var(--bg-tertiary); color: var(--text-primary); font-weight: 500; }

  /* ── RESULT BADGE ── */
  .result-banner {
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    margin: 8px 12px;
    text-align: center;
  }
  .result-true { background: rgba(16,185,129,0.15); color: var(--accent2); border: 1px solid rgba(16,185,129,0.3); }
  .result-false { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
  .result-add { background: rgba(59,130,246,0.1); color: var(--accent); border: 1px solid rgba(59,130,246,0.2); }

  /* ── INTUITION MODE ── */
  #intuition-container { width: 100%; display: flex; flex-direction: column; overflow: hidden; }
  #intuition-wrap { display: flex; flex: 1; overflow: hidden; }
  .int-left { width: 50%; overflow-y: auto; border-right: 1px solid var(--border); padding: 20px; }
  .int-right { width: 50%; overflow-y: auto; padding: 20px; background: var(--bg-secondary); }
  .stage-card { border-radius: 10px; border: 1.5px solid var(--border); background: var(--bg-primary); padding: 16px 18px; margin-bottom: 14px; transition: opacity 0.3s, border-color 0.3s; }
  .stage-card.active { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
  .stage-card.past { opacity: 0.55; }
  .stage-card.future { opacity: 0.28; }
  .stage-num { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 12px; font-weight: 700; margin-right: 8px; flex-shrink: 0; }
  .stage-title { display: flex; align-items: center; font-size: 14px; font-weight: 700; margin-bottom: 10px; }
  .thought-bubble { background: rgba(59,130,246,0.08); border-left: 3px solid var(--accent); padding: 8px 12px; font-style: italic; font-size: 12.5px; color: var(--text-secondary); border-radius: 0 6px 6px 0; margin-bottom: 10px; }
  .insight-box { background: rgba(16,185,129,0.08); border-left: 3px solid var(--accent2); padding: 8px 12px; font-size: 12px; border-radius: 0 6px 6px 0; margin-top: 10px; }
  .insight-box strong { color: var(--accent2); }
  .stage-content { font-size: 12.5px; line-height: 1.65; color: var(--text-primary); white-space: pre-wrap; }
  .int-controls { display: flex; gap: 8px; align-items: center; padding: 10px 16px; border-top: 1px solid var(--border); background: var(--bg-primary); flex-shrink: 0; }
  .int-viz-title { font-size: 12px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 14px; }
  .approach-card { border-radius: 8px; padding: 14px; margin-bottom: 12px; font-size: 12.5px; line-height: 1.6; }
  .approach-bad { background: rgba(239,68,68,0.08); border-left: 3px solid #ef4444; }
  .approach-good { background: rgba(16,185,129,0.08); border-left: 3px solid #10b981; }
  .approach-card h4 { margin-bottom: 6px; font-size: 13px; }
  .complexity-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 4px; }
  .complexity-card { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-size: 12.5px; }
  .complexity-card h4 { color: var(--accent); margin-bottom: 8px; font-size: 13px; }
  .op-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .op-table th, .op-table td { padding: 6px 10px; border: 1px solid var(--border); text-align: left; }
  .op-table th { background: var(--bg-tertiary); font-weight: 600; }
  .op-table td:first-child { font-family: var(--font-mono); color: var(--accent); }
</style>
</head>
<body data-theme="dark">

<div id="header">
  <div class="header-row1">
    <div class="problem-title">211. Design Add and Search Words Data Structure</div>
    <span class="badge">Medium</span>
    <button class="btn-theme" onclick="toggleTheme()">☀️ Light</button>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-intuition" onclick="setMode('intuition')">💡 Intuition &amp; Thought Process</button>
    <button class="mode-btn" id="btn-execution" onclick="setMode('execution')">▶️ Step-by-Step Execution</button>
  </div>

  <!-- OPERATION INPUT BAR (execution mode only) -->
  <div id="op-bar">
    <label>Operation:</label>
    <select id="op-select" onchange="updateOpInput()">
      <option value="addWord">addWord</option>
      <option value="search">search</option>
    </select>
    <input id="op-arg" type="text" placeholder="word to add" maxlength="30"
           onkeydown="if(event.key==='Enter') queueOperation()" />
    <button class="btn-run" onclick="queueOperation()">+ Add to Queue</button>

    <div id="op-queue-wrap">
      <span id="op-queue-label">Queue: (empty)</span>
    </div>

    <button class="btn-run" id="btn-run-all" onclick="runAll()" style="background:var(--accent2);display:none">▶ Run All</button>
    <button class="btn-ghost" onclick="clearQueue()">Clear Queue</button>
    <button class="btn-ghost" onclick="resetAll()">Reset Trie</button>
  </div>
</div>

<div id="main">
  <!-- ═══ INTUITION MODE ═══ -->
  <div id="intuition-container">
    <div id="intuition-wrap">
      <div class="int-left" id="int-stages"></div>
      <div class="int-right" id="int-viz"></div>
    </div>
    <div class="int-controls">
      <button class="ctrl-btn" onclick="prevStage()">◀ Prev</button>
      <button class="ctrl-btn primary" id="int-play-btn" onclick="toggleIntPlay()">▶ Auto</button>
      <button class="ctrl-btn" onclick="nextStage()">Next ▶</button>
      <span class="step-counter" id="int-counter">Stage 1 / 7</span>
    </div>
  </div>

  <!-- ═══ EXECUTION MODE ═══ -->
  <div id="execution-container" style="width:100%;display:none;overflow:hidden;height:100%;flex-direction:row;">
    <div class="panel" id="code-panel">
      <div class="panel-header">Python Solution</div>
      <div class="panel-body">
        <div class="code-wrap" id="code-wrap"></div>
      </div>
    </div>

    <div class="panel" id="viz-panel">
      <div class="panel-header" id="viz-panel-title">Trie Visualization</div>
      <div id="viz-canvas"></div>
      <div class="controls-bar">
        <button class="ctrl-btn" onclick="resetSteps()" title="Reset to first step">⏮</button>
        <button class="ctrl-btn" onclick="stepBack()" title="Step back">◀</button>
        <button class="ctrl-btn primary" id="play-btn" onclick="togglePlay()">▶</button>
        <button class="ctrl-btn" onclick="stepForward()" title="Step forward">▶|</button>
        <select class="speed-sel" id="speed-sel" onchange="changeSpeed()">
          <option value="2000">0.5×</option>
          <option value="1000" selected>1×</option>
          <option value="500">2×</option>
          <option value="250">4×</option>
        </select>
        <span class="step-counter" id="step-counter">Step 0 / 0</span>
      </div>
    </div>

    <div class="panel" id="log-panel">
      <div class="panel-header">Step Log</div>
      <div class="panel-body" id="log-body">
        <div class="log-desc" id="log-desc">Add words to the queue above, then click "Run All" to trace.</div>
        <div id="result-banner-wrap"></div>
        <div class="vars-section" id="vars-section"></div>
        <div class="history-list" id="history-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   PYTHON SOURCE LINES (syntax-highlighted HTML)
═══════════════════════════════════════════ */
const CODE_LINES = [
  { t: `<span class="sk">class</span> <span class="st">TrieNode</span>:` },
  { t: `    <span class="sd">__slots__</span> = (<span class="ss">'children'</span>, <span class="ss">'is_end'</span>)` },
  { t: `` },
  { t: `    <span class="sk">def</span> <span class="sf">__init__</span>(<span class="se">self</span>):` },
  { t: `        <span class="se">self</span>.children: <span class="st">dict</span>[<span class="st">str</span>, <span class="ss">'TrieNode'</span>] = {}` },
  { t: `        <span class="se">self</span>.is_end: <span class="st">bool</span> = <span class="sk">False</span>` },
  { t: `` },
  { t: `<span class="sk">class</span> <span class="st">WordDictionary</span>:` },
  { t: `    <span class="sk">def</span> <span class="sf">__init__</span>(<span class="se">self</span>):` },
  { t: `        <span class="se">self</span>.root = <span class="sf">TrieNode</span>()` },
  { t: `` },
  { t: `    <span class="sk">def</span> <span class="sf">addWord</span>(<span class="se">self</span>, word: <span class="st">str</span>) -> <span class="sk">None</span>:` },
  { t: `        node = <span class="se">self</span>.root` },
  { t: `        <span class="sk">for</span> ch <span class="sk">in</span> word:` },
  { t: `            <span class="sk">if</span> ch <span class="sk">not in</span> node.children:` },
  { t: `                node.children[ch] = <span class="sf">TrieNode</span>()` },
  { t: `            node = node.children[ch]` },
  { t: `        node.is_end = <span class="sk">True</span>` },
  { t: `` },
  { t: `    <span class="sk">def</span> <span class="sf">search</span>(<span class="se">self</span>, word: <span class="st">str</span>) -> <span class="st">bool</span>:` },
  { t: `        <span class="sk">return</span> <span class="se">self</span>.<span class="sf">_dfs</span>(word, <span class="sn">0</span>, <span class="se">self</span>.root)` },
  { t: `` },
  { t: `    <span class="sk">def</span> <span class="sf">_dfs</span>(<span class="se">self</span>, word: <span class="st">str</span>, idx: <span class="st">int</span>, node: <span class="st">TrieNode</span>) -> <span class="st">bool</span>:` },
  { t: `        <span class="sk">if</span> idx == <span class="sf">len</span>(word):` },
  { t: `            <span class="sk">return</span> node.is_end` },
  { t: `        ch = word[idx]` },
  { t: `        <span class="sk">if</span> ch != <span class="ss">'.'</span>:` },
  { t: `            child = node.children.<span class="sf">get</span>(ch)` },
  { t: `            <span class="sk">return</span> child <span class="sk">is not None</span> <span class="sk">and</span> <span class="se">self</span>.<span class="sf">_dfs</span>(word, idx+<span class="sn">1</span>, child)` },
  { t: `        <span class="sc"># Wildcard: try all children</span>` },
  { t: `        <span class="sk">return</span> <span class="sf">any</span>(<span class="se">self</span>.<span class="sf">_dfs</span>(word, idx+<span class="sn">1</span>, child) <span class="sk">for</span> child <span class="sk">in</span> node.children.<span class="sf">values</span>())` },
];

/* ═══════════════════════════════════════════
   TRIE DATA STRUCTURE
═══════════════════════════════════════════ */
class TrieNode {
  constructor(id) { this.children = {}; this.is_end = false; this.id = id; }
}
let nodeIdCounter = 0;
let root = new TrieNode(nodeIdCounter++);

/* ═══════════════════════════════════════════
   OPERATION QUEUE
═══════════════════════════════════════════ */
// Each item: { op: 'addWord'|'search', arg: string }
let opQueue = [];

function updateOpInput() {
  const op = document.getElementById('op-select').value;
  document.getElementById('op-arg').placeholder = op === 'addWord' ? 'word to add' : 'pattern to search';
}

function queueOperation() {
  const op = document.getElementById('op-select').value;
  const arg = document.getElementById('op-arg').value.trim().toLowerCase();
  if (!arg) { flashInput(); return; }
  opQueue.push({ op, arg });
  document.getElementById('op-arg').value = '';
  document.getElementById('op-arg').focus();
  renderQueue();
}

function flashInput() {
  const inp = document.getElementById('op-arg');
  inp.style.border = '1.5px solid var(--danger)';
  setTimeout(() => inp.style.border = '', 800);
}

function removeFromQueue(idx) {
  opQueue.splice(idx, 1);
  renderQueue();
}

function clearQueue() {
  opQueue = [];
  renderQueue();
}

function renderQueue() {
  const wrap = document.getElementById('op-queue-wrap');
  const runBtn = document.getElementById('btn-run-all');
  if (opQueue.length === 0) {
    wrap.innerHTML = '<span id="op-queue-label" style="font-size:11px;color:var(--text-secondary)">Queue: (empty — add operations above)</span>';
    runBtn.style.display = 'none';
    return;
  }
  let html = '<span id="op-queue-label" style="font-size:11px;color:var(--text-secondary);white-space:nowrap">Queue:</span>';
  opQueue.forEach((item, i) => {
    const cls = item.op === 'addWord' ? 'add' : 'search';
    const label = item.op === 'addWord' ? `add("${item.arg}")` : `search("${item.arg}")`;
    html += `<span class="op-chip ${cls}" title="Click × to remove">
      ${label}
      <span class="chip-x" onclick="removeFromQueue(${i})">✕</span>
    </span>`;
  });
  wrap.innerHTML = html;
  runBtn.style.display = 'inline-block';
}

/* ═══════════════════════════════════════════
   STEP GENERATION — runs ALL queued ops
═══════════════════════════════════════════ */
let allSteps = [];   // flat list of all steps across ops
let currentStep = 0;
let playInterval = null;
let speedMs = 1000;

function snapshotTrie() {
  function cloneNode(n) {
    const c = { id: n.id, is_end: n.is_end, children: {} };
    for (const [k, v] of Object.entries(n.children)) c.children[k] = cloneNode(v);
    return c;
  }
  return cloneNode(root);
}

function generateAddSteps(word) {
  const steps = [];
  let node = root;
  steps.push({ line: 12, desc: `addWord("${word}"): start at root`, vars: { word, node_id: node.id }, trie: snapshotTrie(), highlight: [node.id], result: null, op: 'addWord', opWord: word });
  for (let i = 0; i < word.length; i++) {
    const ch = word[i];
    steps.push({ line: 13, desc: `Loop: ch = '${ch}' (index ${i})`, vars: { ch, idx: i, node_id: node.id }, trie: snapshotTrie(), highlight: [node.id], result: null, op: 'addWord', opWord: word });
    steps.push({ line: 14, desc: `Is '${ch}' in node.children? ${ch in node.children ? '✓ Yes, skip' : '✗ No → create'}`, vars: { ch, exists: ch in node.children }, trie: snapshotTrie(), highlight: [node.id], result: null, op: 'addWord', opWord: word });
    if (!(ch in node.children)) {
      node.children[ch] = new TrieNode(nodeIdCounter++);
      steps.push({ line: 15, desc: `Created new TrieNode for '${ch}' (id=${node.children[ch].id})`, vars: { ch, new_node_id: node.children[ch].id }, trie: snapshotTrie(), highlight: [node.children[ch].id], result: null, op: 'addWord', opWord: word });
    }
    node = node.children[ch];
    steps.push({ line: 16, desc: `Advance node → '${ch}' node (id=${node.id})`, vars: { ch, node_id: node.id }, trie: snapshotTrie(), highlight: [node.id], result: null, op: 'addWord', opWord: word });
  }
  node.is_end = true;
  steps.push({ line: 17, desc: `Mark node id=${node.id} as end-of-word ✓ "${word}" added!`, vars: { node_id: node.id, is_end: true }, trie: snapshotTrie(), highlight: [node.id], result: `"${word}" added to trie`, op: 'addWord', opWord: word });
  return steps;
}

function generateSearchSteps(word) {
  const steps = [];
  steps.push({ line: 20, desc: `search("${word}"): call _dfs(word, 0, root)`, vars: { word, idx: 0 }, trie: snapshotTrie(), highlight: [root.id], result: null, op: 'search', opWord: word });
  const dfsSteps = [];
  let finalResult = false;
  function dfs(node, idx) {
    dfsSteps.push({ line: 23, desc: `_dfs idx=${idx}: ${idx === word.length ? 'reached end → check is_end' : `word[${idx}]='${word[idx]}'`}`, vars: { idx, node_id: node.id, is_end: node.is_end }, trie: snapshotTrie(), highlight: [node.id], result: null, op: 'search', opWord: word });
    if (idx === word.length) {
      dfsSteps.push({ line: 24, desc: `idx == len(word). Return node.is_end = ${node.is_end}`, vars: { is_end: node.is_end, node_id: node.id }, trie: snapshotTrie(), highlight: [node.id], result: null, op: 'search', opWord: word });
      return node.is_end;
    }
    const ch = word[idx];
    dfsSteps.push({ line: 25, desc: `ch = word[${idx}] = '${ch}'`, vars: { idx, ch, node_id: node.id }, trie: snapshotTrie(), highlight: [node.id], result: null, op: 'search', opWord: word });
    if (ch !== '.') {
      dfsSteps.push({ line: 26, desc: `'${ch}' ≠ '.' → exact match. Check children.get('${ch}')`, vars: { ch, has_child: ch in node.children }, trie: snapshotTrie(), highlight: [node.id], result: null, op: 'search', opWord: word });
      const child = node.children[ch];
      dfsSteps.push({ line: 27, desc: child ? `Found child for '${ch}' (id=${child.id}) → recurse` : `No child '${ch}' → return False`, vars: { ch, found: !!child, child_id: child ? child.id : null }, trie: snapshotTrie(), highlight: child ? [child.id] : [node.id], result: null, op: 'search', opWord: word });
      if (!child) return false;
      return dfs(child, idx + 1);
    } else {
      const childKeys = Object.keys(node.children);
      dfsSteps.push({ line: 29, desc: `'.' wildcard! Branch into ${childKeys.length} children: [${childKeys.join(', ')}]`, vars: { wildcard: true, children: childKeys }, trie: snapshotTrie(), highlight: Object.values(node.children).map(c => c.id), result: null, op: 'search', opWord: word });
      for (const [k, child] of Object.entries(node.children)) {
        dfsSteps.push({ line: 30, desc: `Trying branch '${k}' (id=${child.id}) for wildcard...`, vars: { branch: k, child_id: child.id }, trie: snapshotTrie(), highlight: [child.id], result: null, op: 'search', opWord: word });
        if (dfs(child, idx + 1)) return true;
      }
      return false;
    }
  }
  finalResult = dfs(root, 0);
  steps.push(...dfsSteps);
  steps.push({ line: 20, desc: `search("${word}") complete → ${finalResult}`, vars: { word, result: finalResult }, trie: snapshotTrie(), highlight: [], result: finalResult, op: 'search', opWord: word });
  return steps;
}

function runAll() {
  if (opQueue.length === 0) return;
  pausePlay();

  // Reset trie
  nodeIdCounter = 0;
  root = new TrieNode(nodeIdCounter++);

  allSteps = [];
  const ops = [...opQueue];
  ops.forEach(item => {
    if (item.op === 'addWord') allSteps.push(...generateAddSteps(item.arg));
    else allSteps.push(...generateSearchSteps(item.arg));
  });

  currentStep = 0;
  renderStep(currentStep);

  // Highlight active chip
  highlightChip(0);
}

function highlightChip(stepIdx) {
  if (!allSteps.length) return;
  const s = allSteps[stepIdx];
  document.querySelectorAll('.op-chip').forEach((el, i) => {
    el.classList.toggle('active', opQueue[i] && opQueue[i].op === s.op && opQueue[i].arg === s.opWord);
  });
}

function resetAll() {
  pausePlay();
  nodeIdCounter = 0;
  root = new TrieNode(nodeIdCounter++);
  allSteps = [];
  opQueue = [];
  renderQueue();
  document.getElementById('viz-canvas').innerHTML = renderTrie(snapshotTrie(), []);
  document.getElementById('log-desc').textContent = 'Trie reset. Add operations above and click Run All.';
  document.getElementById('result-banner-wrap').innerHTML = '';
  document.getElementById('vars-section').innerHTML = '';
  document.getElementById('history-list').innerHTML = '';
  document.getElementById('step-counter').textContent = 'Step 0 / 0';
  document.getElementById('viz-panel-title').textContent = 'Trie Visualization';
  renderCode(-1);
}

/* ═══════════════════════════════════════════
   TRIE SVG RENDERING
═══════════════════════════════════════════ */
function layoutTrie(trieRoot) {
  const nodeMap = {};
  const edges = [];
  const depthGroups = {};

  function bfs(node, depth, label, parentId) {
    if (!depthGroups[depth]) depthGroups[depth] = [];
    depthGroups[depth].push({ node, label, parentId });
    for (const [k, child] of Object.entries(node.children)) bfs(child, depth + 1, k, node.id);
  }
  bfs(trieRoot, 0, 'ROOT', null);

  const W = 700;
  const levelH = 74;
  for (const [depth, group] of Object.entries(depthGroups)) {
    const d = parseInt(depth);
    const count = group.length;
    const spread = Math.min(60, Math.floor(600 / Math.max(count, 1)));
    const startX = W / 2 - ((count - 1) * spread) / 2;
    group.forEach((item, i) => {
      const x = count === 1 ? W / 2 : startX + i * spread;
      const y = 40 + d * levelH;
      nodeMap[item.node.id] = { x, y, ...item };
    });
  }
  for (const [id, info] of Object.entries(nodeMap)) {
    if (info.parentId !== null) {
      const par = nodeMap[info.parentId];
      if (par) edges.push({ x1: par.x, y1: par.y, x2: info.x, y2: info.y, label: info.label, childId: info.node.id });
    }
  }
  const maxDepth = Math.max(...Object.keys(depthGroups).map(Number));
  return { nodeMap, edges, svgH: 60 + maxDepth * levelH + 50 };
}

function renderTrie(trieSnap, highlightIds) {
  const { nodeMap, edges, svgH } = layoutTrie(trieSnap);
  const hl = new Set(highlightIds || []);
  const isDark = document.body.dataset.theme === 'dark';
  const nodeColor = isDark ? '#252840' : '#e2e8f0';
  const hlColor = isDark ? '#3b82f6' : '#3b82f6';
  const endColor = isDark ? '#10b981' : '#059669';
  const textColor = isDark ? '#f8f8f2' : '#111';
  const edgeColor = isDark ? '#4b5563' : '#9ca3af';
  const hlEdgeColor = isDark ? '#8be9fd' : '#3b82f6';

  let svg = `<svg viewBox="0 0 700 ${svgH}" style="width:100%;max-height:${svgH}px">`;
  svg += `<defs><marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
    <polygon points="0 0,8 3,0 6" fill="${edgeColor}"/></marker></defs>`;

  for (const e of edges) {
    const hlEdge = hl.has(e.childId);
    svg += `<line x1="${e.x1}" y1="${e.y1}" x2="${e.x2}" y2="${e.y2}"
      stroke="${hlEdge ? hlEdgeColor : edgeColor}" stroke-width="${hlEdge ? 2.5 : 1.5}"
      marker-end="url(#arr)"/>`;
    const mx = (e.x1 + e.x2) / 2, my = (e.y1 + e.y2) / 2 - 4;
    svg += `<text x="${mx}" y="${my}" text-anchor="middle" font-size="12" font-family="monospace"
      font-weight="600" fill="${hlEdge ? hlEdgeColor : (isDark ? '#94a3b8' : '#6b7280')}">${e.label}</text>`;
  }
  for (const [id, info] of Object.entries(nodeMap)) {
    const n = info.node;
    const isHL = hl.has(n.id);
    const fill = isHL ? hlColor : (n.is_end ? endColor : nodeColor);
    const stroke = isHL ? hlEdgeColor : (n.is_end ? endColor : (isDark ? '#4b5563' : '#cbd5e1'));
    const displayLabel = info.label === 'ROOT' ? '∅' : info.label;
    svg += `<g>
      <circle cx="${info.x}" cy="${info.y}" r="20" fill="${fill}" stroke="${stroke}" stroke-width="${isHL ? 3 : 1.5}"/>
      <text x="${info.x}" y="${info.y + 1}" text-anchor="middle" dominant-baseline="middle"
        font-size="13" font-weight="700" fill="${isHL || n.is_end ? '#fff' : textColor}">${displayLabel}</text>
      ${n.is_end ? `<text x="${info.x}" y="${info.y + 34}" text-anchor="middle" font-size="9" fill="${endColor}">END</text>` : ''}
    </g>`;
  }
  svg += '</svg>';
  return svg;
}

/* ═══════════════════════════════════════════
   STEP RENDERING
═══════════════════════════════════════════ */
function renderCode(activeLine) {
  const wrap = document.getElementById('code-wrap');
  let html = '<pre class="code-pre">';
  CODE_LINES.forEach((l, i) => {
    const active = activeLine === i ? ' active' : '';
    html += `<div class="code-line${active}"><span class="ln">${i + 1}</span><code class="lc">${l.t || '\u00a0'}</code></div>`;
  });
  html += '</pre>';
  wrap.innerHTML = html;
  const lines = wrap.querySelectorAll('.code-line');
  if (activeLine >= 0 && lines[activeLine]) lines[activeLine].scrollIntoView({ block: 'nearest' });
}

function renderStep(idx) {
  if (!allSteps.length) return;
  const s = allSteps[idx];
  renderCode(s.line);

  // Update panel title
  const opLabel = s.op === 'addWord' ? `addWord("${s.opWord}")` : `search("${s.opWord}")`;
  document.getElementById('viz-panel-title').textContent = `Trie — ${opLabel}`;

  // Trie
  document.getElementById('viz-canvas').innerHTML = renderTrie(s.trie, s.highlight);

  // Step desc
  document.getElementById('log-desc').textContent = s.desc;

  // Result banner (only on final step of each op, or last step)
  const rWrap = document.getElementById('result-banner-wrap');
  if (s.result !== null && s.result !== undefined) {
    let cls = 'result-add', text = `✓ ${s.result}`;
    if (s.op === 'search') {
      cls = s.result === true ? 'result-true' : 'result-false';
      text = s.result === true ? `✓ search("${s.opWord}") → True` : `✗ search("${s.opWord}") → False`;
    }
    rWrap.innerHTML = `<div class="result-banner ${cls}">${text}</div>`;
  } else {
    rWrap.innerHTML = '';
  }

  // Vars
  let vhtml = '<div class="vars-title">Variables</div>';
  for (const [k, v] of Object.entries(s.vars)) {
    const vStr = Array.isArray(v) ? JSON.stringify(v) : String(v);
    vhtml += `<div class="var-row"><span class="var-name">${k}</span><span style="color:var(--text-secondary)"> = </span><span class="var-val">${vStr}</span></div>`;
  }
  document.getElementById('vars-section').innerHTML = vhtml;

  // History
  let hhtml = '<div class="vars-title" style="margin-top:10px">History</div>';
  allSteps.slice(0, idx + 1).forEach((st, i) => {
    hhtml += `<div class="hist-item ${i === idx ? 'current' : ''}" onclick="jumpStep(${i})">${i + 1}. ${st.desc}</div>`;
  });
  document.getElementById('history-list').innerHTML = hhtml;
  const curItem = document.querySelector('.hist-item.current');
  if (curItem) curItem.scrollIntoView({ block: 'nearest' });

  document.getElementById('step-counter').textContent = `Step ${idx + 1} / ${allSteps.length}`;
  highlightChip(idx);
}

function jumpStep(i) { currentStep = i; renderStep(currentStep); }
function stepForward() { if (currentStep < allSteps.length - 1) { currentStep++; renderStep(currentStep); } }
function stepBack() { if (currentStep > 0) { currentStep--; renderStep(currentStep); } }
function resetSteps() { pausePlay(); currentStep = 0; if (allSteps.length) renderStep(0); }

function togglePlay() {
  if (playInterval) { pausePlay(); return; }
  document.getElementById('play-btn').textContent = '⏸';
  playInterval = setInterval(() => {
    if (currentStep < allSteps.length - 1) { currentStep++; renderStep(currentStep); }
    else pausePlay();
  }, speedMs);
}
function pausePlay() {
  clearInterval(playInterval); playInterval = null;
  const btn = document.getElementById('play-btn');
  if (btn) btn.textContent = '▶';
}
function changeSpeed() {
  speedMs = parseInt(document.getElementById('speed-sel').value);
  if (playInterval) { pausePlay(); togglePlay(); }
}

        <line x1="320" y1="118" x2="320" y2="148" stroke="${isDark?'#4b5563':'#9ca3af'}" stroke-width="1.5"/>
        <circle cx="320" cy="160" r="18" fill="${isDark?'#252840':'#e2e8f0'}" stroke="${isDark?'#4b5563':'#cbd5e1'}" stroke-width="1.5"/>

        <line x1="80" y1="178" x2="80" y2="198" stroke="${isDark?'#4b5563':'#9ca3af'}" stroke-width="1.5"/>

        <text x="200" y="211" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#fff">d</text>
        <line x1="320" y1="178" x2="320" y2="198" stroke="${isDark?'#4b5563':'#9ca3af'}" stroke-width="1.5"/>

    case 'dfs_wildcard': return `

        <line x1="216" y1="30" x2="254" y2="30" stroke="${accent}" stroke-width="2"/>

function nextStage() { if (currentStage < INTUITION_STAGES.length - 1) { currentStage++; renderIntuition(); } }
function prevStage() { if (currentStage > 0) { currentStage--; renderIntuition(); } }
function toggleIntPlay() {
  if (intPlayInterval) {
    clearInterval(intPlayInterval); intPlayInterval = null;
    document.getElementById('int-play-btn').textContent = '▶ Auto';
  } else {
    document.getElementById('int-play-btn').textContent = '⏸ Pause';
    intPlayInterval = setInterval(() => {
      if (currentStage < INTUITION_STAGES.length - 1) { currentStage++; renderIntuition(); }
      else { clearInterval(intPlayInterval); intPlayInterval = null; document.getElementById('int-play-btn').textContent = '▶ Auto'; }
    }, 4000);
  }
}

/* ═══════════════════════════════════════════
   MODE / THEME
═══════════════════════════════════════════ */
let currentMode = 'intuition';

function setMode(mode) {
  currentMode = mode;
  pausePlay();
  if (intPlayInterval) { clearInterval(intPlayInterval); intPlayInterval = null; document.getElementById('int-play-btn').textContent = '▶ Auto'; }
  document.getElementById('btn-intuition').classList.toggle('active', mode === 'intuition');
  document.getElementById('btn-execution').classList.toggle('active', mode === 'execution');
  document.getElementById('intuition-container').style.display = mode === 'intuition' ? 'flex' : 'none';
  const execEl = document.getElementById('execution-container');
  execEl.style.display = mode === 'execution' ? 'flex' : 'none';
  document.getElementById('op-bar').style.display = mode === 'execution' ? 'flex' : 'none';

  if (mode === 'execution') {
    renderCode(-1);
    document.getElementById('viz-canvas').innerHTML = renderTrie(snapshotTrie(), []);
    // Pre-populate queue with a default example if empty
    if (opQueue.length === 0 && allSteps.length === 0) {
      opQueue = [
        { op: 'addWord', arg: 'bad' },
        { op: 'addWord', arg: 'dad' },
        { op: 'addWord', arg: 'mad' },
        { op: 'search', arg: 'pad' },
        { op: 'search', arg: 'bad' },
        { op: 'search', arg: '.ad' },
        { op: 'search', arg: 'b..' },
      ];
      renderQueue();
    }
  }
}

function toggleTheme() {
  const isDark = document.body.dataset.theme === 'dark';
  document.body.dataset.theme = isDark ? 'light' : 'dark';
  document.querySelector('.btn-theme').textContent = isDark ? '🌙 Dark' : '☀️ Light';
  if (currentMode === 'intuition') renderIntuition();
  else if (allSteps.length) renderStep(currentStep);
  else document.getElementById('viz-canvas').innerHTML = renderTrie(snapshotTrie(), []);
}

/* ═══════════════════════════════════════════
   KEYBOARD SHORTCUTS
═══════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Space') { e.preventDefault(); currentMode === 'execution' ? togglePlay() : toggleIntPlay(); }
  else if (e.code === 'ArrowRight') { e.preventDefault(); currentMode === 'execution' ? stepForward() : nextStage(); }
  else if (e.code === 'ArrowLeft') { e.preventDefault(); currentMode === 'execution' ? stepBack() : prevStage(); }
});

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
window.onload = () => {
  renderIntuition();
  renderCode(-1);
};
</script>
