<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>572. Subtree of Another Tree — Visualizer</title>
<style>
  :root {
    --bg-primary: #1e1e2e;
    --bg-secondary: #181825;
    --bg-tertiary: #313244;
    --text-primary: #cdd6f4;
    --text-secondary: #a6adc8;
    --text-muted: #6c7086;
    --border: #45475a;
    --accent: #89b4fa;
    --accent2: #cba6f7;
    --highlight-line: rgba(249,226,175,0.10);
    --font-mono: 'Cascadia Code','Fira Code','JetBrains Mono','Consolas','Monaco',monospace;

    /* Syntax – Dark (Catppuccin Mocha) */
    --syn-keyword:  #ff79c6;
    --syn-builtin:  #cba6f7;
    --syn-funcname: #89dceb;
    --syn-string:   #a6e3a1;
    --syn-comment:  #6272a4;
    --syn-number:   #fab387;
    --syn-type:     #f38ba8;
    --syn-self:     #f5c2e7;
    --syn-decorator:#fab387;
    --syn-param:    #cdd6f4;
  }
  [data-theme="light"] {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f5;
    --bg-tertiary: #e8e8e8;
    --text-primary: #24292f;
    --text-secondary: #57606a;
    --text-muted: #8c959f;
    --border: #d0d7de;
    --accent: #0969da;
    --accent2: #8250df;
    --highlight-line: rgba(255,220,0,0.18);

    --syn-keyword:  #d73a49;
    --syn-builtin:  #6f42c1;
    --syn-funcname: #005cc5;
    --syn-string:   #22863a;
    --syn-comment:  #6a737d;
    --syn-number:   #e36209;
    --syn-type:     #e36209;
    --syn-self:     #e36209;
    --syn-decorator:#6f42c1;
    --syn-param:    #24292f;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-secondary);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: background .25s, color .25s;
  }

  /* ── HEADER ── */
  #header {
    flex-shrink: 0;
    background: var(--bg-primary);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .header-row1 {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .problem-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    flex: 1;
    min-width: 0;
  }
  .problem-title span { color: var(--accent); }

  .btn {
    border: 1px solid var(--border);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    border-radius: 6px;
    padding: 5px 11px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: background .15s, border-color .15s;
  }
  .btn:hover { background: var(--border); }
  .btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .btn.ctrl { padding: 5px 9px; font-size: 14px; }

  .mode-row { display: flex; gap: 8px; }
  .mode-btn {
    flex: 1;
    border: 1px solid var(--border);
    background: var(--bg-secondary);
    color: var(--text-secondary);
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all .15s;
  }
  .mode-btn:hover { border-color: var(--accent); color: var(--text-primary); }
  .mode-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .input-row label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .input-row input {
    flex: 1;
    min-width: 160px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 4px 8px;
  }
  .input-row input:focus { outline: none; border-color: var(--accent); }

  /* ── MAIN CONTENT ── */
  #main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  .panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg-primary);
  }
  .panel-header {
    flex-shrink: 0;
    padding: 7px 12px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg-secondary);
  }
  .panel-body {
    flex: 1;
    overflow: auto;
  }

  /* drag handle */
  .divider {
    width: 4px;
    background: var(--border);
    cursor: col-resize;
    flex-shrink: 0;
    transition: background .15s;
  }
  .divider:hover, .divider.dragging { background: var(--accent); }

  /* ── CODE PANEL ── */
  #code-panel {
    min-width: 180px;
  }
  .code-scroller {
    height: 100%;
    overflow: auto;
    background: var(--bg-secondary);
  }
  pre.code-pre {
    margin: 0;
    padding: 12px 0;
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.65;
    white-space: pre;
  }
  .code-line {
    display: flex;
    align-items: stretch;
    min-height: 23px;
    transition: background .15s;
  }
  .code-line.active-line {
    background: var(--highlight-line);
  }
  .line-num {
    flex-shrink: 0;
    min-width: 44px;
    text-align: right;
    padding-right: 16px;
    color: var(--text-muted);
    user-select: none;
    font-size: 12px;
    line-height: inherit;
    padding-top: 1px;
  }
  .line-code {
    flex: 1;
    padding-right: 24px;
    white-space: pre;
    color: var(--text-primary);
  }

  /* syntax token colors */
  .t-kw   { color: var(--syn-keyword); font-weight: 600; }
  .t-bi   { color: var(--syn-builtin); }
  .t-fn   { color: var(--syn-funcname); }
  .t-str  { color: var(--syn-string); }
  .t-cmt  { color: var(--syn-comment); font-style: italic; }
  .t-num  { color: var(--syn-number); }
  .t-typ  { color: var(--syn-type); }
  .t-slf  { color: var(--syn-self); }
  .t-dec  { color: var(--syn-decorator); }
  .t-pm   { color: var(--syn-param); }

  /* ── VIZ PANEL ── */
  #viz-panel { min-width: 200px; }
  .viz-body {
    flex: 1;
    overflow: auto;
    display: flex;
    flex-direction: column;
    align-items: center;

    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-secondary);
    flex-wrap: wrap;
  }

    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-size: 12px;

  .step-badge {
    margin-left: auto;
    font-size: 11px;

  svg.tree-svg { width: 100%; max-width: 780px; }

  /* ── STEP LOG PANEL ── */
  #log-panel { min-width: 160px; }
  .log-body { padding: 12px; }
  .log-desc {
    font-size: 12.5px;
    line-height: 1.55;

  .log-history-item {

  /* ── INTUITION MODE ── */
  #intuition-wrap {
    display: flex;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  .int-left, .int-right {
    flex: 1;
    display: flex;
    flex-direction: column;

  .int-left { border-right: 1px solid var(--border); }

  .int-body { flex: 1; overflow-y: auto; padding: 20px; }

  .stage-block {
    margin-bottom: 22px;
    transition: opacity .3s;

  .stage-block.future { opacity: 0.28; pointer-events: none; }
  .stage-block.past   { opacity: 0.55; }

    background: var(--accent);
    color: #000;
    font-size: 12px;
    font-weight: 800;

    flex-shrink: 0;

  .stage-title { font-size: 13.5px; font-weight: 700; color: var(--text-primary); }

  .thought-bubble {
    background: rgba(137,180,250,0.08);
    border-left: 3px solid var(--accent);

    line-height: 1.5;

    font-size: 13px;
    line-height: 1.65;
    color: var(--text-secondary);
    margin-bottom: 10px;

  .key-insight {
    background: rgba(166,227,161,0.10);
    border-left: 3px solid #a6e3a1;

    border-radius: 0 6px 6px 0;

    color: #a6e3a1;
    line-height: 1.5;

  .int-controls {
    flex-shrink: 0;
    padding: 8px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-secondary);

  .int-stage-badge { margin-left: auto; font-size: 11px; color: var(--text-muted); }

  .int-viz { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

  .viz-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }
  .viz-card h4 {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .approach-box {
    padding: 12px 14px;
    border-radius: 6px;
    margin-bottom: 10px;
    font-size: 12.5px;
    line-height: 1.6;
  }
  .approach-bad  { background: rgba(243,139,168,.08); border-left: 3px solid #f38ba8; }
  .approach-good { background: rgba(166,227,161,.08); border-left: 3px solid #a6e3a1; }
  .approach-box strong { display: block; margin-bottom: 4px; font-size: 13px; }

  .complexity-row {
    display: grid;

  .complexity-cell {
    background: var(--bg-tertiary);
    border-radius: 6px;
    padding: 10px 12px;

  .complexity-cell .c-label { color: var(--text-muted); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
  .complexity-cell .c-val   { font-family: var(--font-mono); font-size: 16px; font-weight: 800; color: var(--accent); }
  .complexity-cell .c-why   { color: var(--text-secondary); font-size: 11.5px; margin-top: 4px; }

  .traversal-compare { display: flex; flex-direction: column; gap: 8px; font-size: 12.5px; }
  .trav-row { display: flex; align-items: center; gap: 8px; background: var(--bg-tertiary); border-radius: 5px; padding: 8px 10px; }
  .trav-row .badge {
    font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 4px;
    background: var(--bg-primary); border: 1px solid var(--border); white-space: nowrap;
  }
  .trav-row .seq { font-family: var(--font-mono); color: var(--accent); font-size: 12px; }
  .trav-row .reason { color: var(--text-muted); font-size: 11.5px; margin-left: auto; }

  .edge-cases-list { display: flex; flex-direction: column; gap: 8px; }
  .ec-item {
    display: flex; gap: 10px; align-items: flex-start;
    font-size: 12.5px; line-height: 1.5;
  }
  .ec-icon { font-size: 16px; flex-shrink: 0; }
  .ec-text strong { display: block; color: var(--text-primary); margin-bottom: 2px; }
  .ec-text span { color: var(--text-secondary); }

  /* result pill */
  .result-pill {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 999px;
    font-size: 12px;

    margin-top: 10px;
  }

  .result-false { background: rgba(243,139,168,.15); color: #f38ba8; }

</div>

<div id="main">
  <!-- Intuition layout -->

        <div class="log-body" id="log-body"></div>
      </div>
    </div>
  </div>

<script>
// ═══════════════════════════════════════════════
//  PYTHON CODE (raw string, highlighted in render)
// ═══════════════════════════════════════════════
const PYTHON_LINES = [
  "from typing import Optional",
  "",
  "class TreeNode:",
  "    def __init__(self, val=0, left=None, right=None):",
  "        self.val = val",
  "        self.left = left",
  "        self.right = right",
  "",
  "class Solution:",
  "    def isSubtree(",
  "        self,",
  "        root: Optional[TreeNode],",
  "        subRoot: Optional[TreeNode]",
  "    ) -> bool:",
  '        """',
  "        Check if subRoot is a subtree of root.",
  "        Strategy: DFS every node; at each node run isSameTree.",
  "        Time: O(m*n)  Space: O(h) where h = height of root",
  '        """',
  "        if not root:",
  "            return False",
  "        if self.isSameTree(root, subRoot):",
  "            return True",
  "        return (",
  "            self.isSubtree(root.left, subRoot) or",
  "            self.isSubtree(root.right, subRoot)",
  "        )",
  "",
  "    def isSameTree(",
  "        self,",
  "        p: Optional[TreeNode],",
  "        q: Optional[TreeNode]",
  "    ) -> bool:",
  '        """Check structural & value equality of two trees."""',
  "        if not p and not q: return True",
  "        if not p or not q: return False",
  "        if p.val != q.val: return False",
  "        return (",
  "            self.isSameTree(p.left, q.left) and",
  "            self.isSameTree(p.right, q.right)",
  "        )"
];

// ═══════════════════════════════════════════════
//  SYNTAX HIGHLIGHTING
// ═══════════════════════════════════════════════
function escapeHtml(str) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}

function highlightPython(rawLine) {
  // Work on the escaped version so we never break HTML
  let line = escapeHtml(rawLine);
  if (!line.trim()) return line;

  // Comment
  const commentIdx = rawLine.indexOf('#');
  if (commentIdx !== -1) {
    const before = escapeHtml(rawLine.slice(0, commentIdx));
    const comment = escapeHtml(rawLine.slice(commentIdx));
    return before + `<span class="t-cmt">${comment}</span>`;
  }

  // Docstring lines (triple-quoted, simplified: lines that are only """)
  const trimmed = rawLine.trim();
  if (trimmed === '"""' || trimmed.startsWith('"""')) {
    return `<span class="t-str">${line}</span>`;
  }

  // Decorators
  if (trimmed.startsWith('@')) {
    return `<span class="t-dec">${line}</span>`;
  }

  // Strings: replace "..." and '...' patterns on escaped line
  // But we already escaped, so quotes are literal
  line = line.replace(/(&quot;.*?&quot;|&#39;.*?&#39;)/g, '<span class="t-str">$1</span>');

  // Keywords (word boundaries via space/start/end checks)
  const keywords = ['from','import','class','def','return','if','elif','else',
                    'and','or','not','in','True','False','None','while','for','pass','raise'];
  for (const kw of keywords) {
    const re = new RegExp(`(?<![\\w])${kw}(?![\\w])`, 'g');
    line = line.replace(re, `<span class="t-kw">${kw}</span>`);
  }

  // Type hints (Optional, bool, int, str, list, dict)
  line = line.replace(/\b(Optional|bool|int|str|list|dict|List|Dict|Tuple)\b/g, '<span class="t-typ">$1</span>');

  // self keyword
  line = line.replace(/\bself\b/g, '<span class="t-slf">self</span>');

  // Function definitions — highlight name after def
  line = line.replace(/(<span class="t-kw">def<\/span>\s+)(\w+)/g, '$1<span class="t-fn">$2</span>');

  // Built-in calls
  line = line.replace(/\b(print|len|range|enumerate|zip|map|filter|sorted|list|dict|set|tuple|type|isinstance|hasattr|getattr|super)\b(?=\s*\()/g,
    '<span class="t-bi">$1</span>');

  // Numbers
  line = line.replace(/\b(\d+)\b/g, '<span class="t-num">$1</span>');

  return line;
}

// ═══════════════════════════════════════════════
//  TREE DATA STRUCTURES
// ═══════════════════════════════════════════════
let nodeIdCounter = 0;
function makeNode(val) { return { val, left: null, right: null, id: nodeIdCounter++ }; }

function arrayToTree(arr) {
  if (!arr || !arr.length || arr[0] === null) return null;
  nodeIdCounter = 0;
  const root = makeNode(arr[0]);
  const q = [root];
  let i = 1;
  while (i < arr.length && q.length) {
    const node = q.shift();
    if (i < arr.length && arr[i] !== null) { node.left = makeNode(arr[i]); q.push(node.left); }
    i++;
    if (i < arr.length && arr[i] !== null) { node.right = makeNode(arr[i]); q.push(node.right); }
    i++;
  }
  return root;
}

function parseArr(str) {
  try {
    const s = str.trim().replace(/^\[/, '').replace(/\]$/, '');
    if (!s) return [];
    return s.split(',').map(x => x.trim() === 'null' ? null : parseInt(x.trim()));
  } catch(e) { return []; }
}

let rootTree = arrayToTree(parseArr("[3,4,5,1,2]"));
let subTree  = arrayToTree(parseArr("[4,1,2]"));

// ═══════════════════════════════════════════════
//  TREE LAYOUT (Reingold-Tilford simplified)
// ═══════════════════════════════════════════════
function layoutTree(root) {
  if (!root) return { nodes: [], edges: [] };
  const nodes = [];
  const edges = [];

  // BFS to get node depths and assign x positions
  const levels = [];
  const bfs = (node, depth) => {
    if (!node) return;
    if (!levels[depth]) levels[depth] = [];
    levels[depth].push(node);
    bfs(node.left, depth + 1);
    bfs(node.right, depth + 1);
  };
  bfs(root, 0);

  const nodePos = new Map();
  const yStep = 72;
  const baseY = 44;

  // Assign x via DFS in-order counter
  let counter = 0;
  const assignX = (node) => {
    if (!node) return;
    assignX(node.left);
    nodePos.set(node.id, counter++);
    assignX(node.right);
  };
  assignX(root);

  const xScale = 64;
  const xOffset = 40;

  const getXY = (node) => {
    let d = 0;
    const find = (n, depth) => {
      if (!n) return;
      if (n.id === node.id) { d = depth; return; }
      find(n.left, depth + 1);
      find(n.right, depth + 1);
    };
    find(root, 0);
    return {
      x: nodePos.get(node.id) * xScale + xOffset,
      y: d * yStep + baseY
    };
  };

  const collectEdges = (node) => {
    if (!node) return;
    if (node.left) {
      const p = getXY(node);
      const c = getXY(node.left);
      edges.push({ x1: p.x, y1: p.y, x2: c.x, y2: c.y, id: node.id + '-' + node.left.id });
      collectEdges(node.left);
    }
    if (node.right) {
      const p = getXY(node);
      const c = getXY(node.right);
      edges.push({ x1: p.x, y1: p.y, x2: c.x, y2: c.y, id: node.id + '-' + node.right.id });
      collectEdges(node.right);
    }
  };
  collectEdges(root);

  const collectNodes = (node) => {
    if (!node) return;
    const pos = getXY(node);
    nodes.push({ ...pos, val: node.val, id: node.id });
    collectNodes(node.left);
    collectNodes(node.right);
  };
  collectNodes(root);

  // compute bounding box
  const maxX = Math.max(...nodes.map(n => n.x)) + 40;
  const maxY = Math.max(...nodes.map(n => n.y)) + 44;

  return { nodes, edges, w: maxX, h: maxY };
}

function renderTreeSVG(root, currentNodeId, matchNodeIds, failNodeIds, label) {
  if (!root) return `<div style="color:var(--text-muted);font-size:13px">Empty tree</div>`;
  const { nodes, edges, w, h } = layoutTree(root);
  const mSet = new Set(matchNodeIds || []);
  const fSet = new Set(failNodeIds || []);

  const edgesSVG = edges.map(e =>
    `<line x1="${e.x1}" y1="${e.y1}" x2="${e.x2}" y2="${e.y2}" stroke="var(--border)" stroke-width="2"/>`
  ).join('');

  const nodesSVG = nodes.map(n => {
    let fill = 'var(--bg-tertiary)';
    let stroke = 'var(--border)';
    let sw = 1.5;
    if (n.id === currentNodeId) { fill = 'var(--accent)'; stroke = 'var(--accent)'; sw = 2.5; }
    else if (mSet.has(n.id))  { fill = '#a6e3a1'; stroke = '#a6e3a1'; sw = 2; }
    else if (fSet.has(n.id))  { fill = '#f38ba8'; stroke = '#f38ba8'; sw = 2; }

    const textColor = (fill !== 'var(--bg-tertiary)') ? '#000' : 'var(--text-primary)';
    return `<g>
      <circle cx="${n.x}" cy="${n.y}" r="22" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>
      <text x="${n.x}" y="${n.y}" text-anchor="middle" dominant-baseline="middle"
            fill="${textColor}" font-size="14" font-weight="600">${n.val}</text>
    </g>`;
  }).join('');

  const labelSVG = label ? `<text x="6" y="16" fill="var(--text-muted)" font-size="11" font-weight="700">${label}</text>` : '';

  return `<svg class="tree-svg" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    ${labelSVG}${edgesSVG}${nodesSVG}
  </svg>`;
}

// ═══════════════════════════════════════════════
//  STEP GENERATION (isSubtree DFS trace)
// ═══════════════════════════════════════════════
function generateSteps(root, sub) {
  const steps = [];
  let stepNum = 0;

  function isSameTree(p, q, pOrigId, depth) {
    if (!p && !q) {
      steps.push({ line: 33, desc: `isSameTree: both null → true`, vars: { p: 'null', q: 'null', depth }, currentNode: pOrigId, sameResult: true });
      return true;
    }
    if (!p || !q) {
      steps.push({ line: 34, desc: `isSameTree: one null, one not → false`, vars: { p: p ? p.val : 'null', q: q ? q.val : 'null', depth }, currentNode: pOrigId, sameResult: false });
      return false;
    }
    steps.push({ line: 35, desc: `isSameTree: compare values ${p.val} == ${q.val} ? ${p.val === q.val}`, vars: { 'p.val': p.val, 'q.val': q.val, equal: p.val === q.val, depth }, currentNode: p.id, sameResult: null });
    if (p.val !== q.val) { return false; }
    const l = isSameTree(p.left, q.left, p.id, depth + 1);
    const r = isSameTree(p.right, q.right, p.id, depth + 1);
    return l && r;
  }

  function isSubtree(node, depth) {
    if (!node) {
      steps.push({ line: 19, desc: `isSubtree: node is null → return False`, vars: { node: 'null', depth }, currentNode: null });
      return false;
    }
    steps.push({ line: 21, desc: `isSubtree: checking isSameTree at node ${node.val}`, vars: { 'node.val': node.val, depth }, currentNode: node.id });
    const same = isSameTree(node, sub, node.id, depth);
    steps.push({ line: 21, desc: `isSameTree(node ${node.val}, subRoot) = ${same}`, vars: { result: same, 'node.val': node.val, depth }, currentNode: node.id, sameResult: same });
    if (same) {
      steps.push({ line: 22, desc: `Match found at node ${node.val}! Return True`, vars: { result: true }, currentNode: node.id, sameResult: true });
      return true;
    }
    steps.push({ line: 24, desc: `No match at ${node.val}. Recurse left subtree`, vars: { 'node.val': node.val, depth }, currentNode: node.id });
    const l = isSubtree(node.left, depth + 1);
    steps.push({ line: 25, desc: `Recurse right subtree of ${node.val}`, vars: { 'node.val': node.val, depth, leftResult: l }, currentNode: node.id });
    const r = isSubtree(node.right, depth + 1);
    return l || r;
  }

  steps.push({ line: 9, desc: 'Start: call isSubtree(root, subRoot)', vars: { 'root.val': root ? root.val : 'null', 'sub.val': sub ? sub.val : 'null' }, currentNode: null });
  const ans = isSubtree(root, 0);
  steps.push({ line: 23, desc: `Final answer: ${ans}`, vars: { answer: ans }, currentNode: null, finalResult: ans });
  return steps;
}

// ═══════════════════════════════════════════════
//  EXECUTION ENGINE
// ═══════════════════════════════════════════════
const exec = (() => {
  let steps = [];
  let cur = 0;
  let playing = false;
  let timer = null;
  let speed = 1000;

  function init(r, s) {
    steps = generateSteps(r, s);
    cur = 0;
    clearInterval(timer);
    playing = false;
    updatePlayBtn();
    render();
  }

  function render() {
    if (!steps.length) return;
    const s = steps[Math.min(cur, steps.length - 1)];
    // code highlight
    highlightLine(s.line);
    // badge
    document.getElementById('step-badge').textContent = `Step ${cur + 1} / ${steps.length}`;
    // viz
    renderExecViz(s);
    // log
    renderLog(s);
  }

  function renderExecViz(s) {
    const vb = document.getElementById('viz-body');
    // result indicator
    const vr = document.getElementById('viz-result');
    if (s.finalResult !== undefined) {
      vr.innerHTML = s.finalResult
        ? `<span class="result-pill result-true">✓ true</span>`
        : `<span class="result-pill result-false">✗ false</span>`;
    } else {
      vr.innerHTML = '';
    }

    let matchIds = [];
    let failIds = [];
    if (s.sameResult === true && s.currentNode !== null && s.currentNode !== undefined) matchIds = [s.currentNode];
    if (s.sameResult === false && s.currentNode !== null && s.currentNode !== undefined) failIds = [s.currentNode];

    vb.innerHTML = `
      <div style="text-align:center;width:100%;max-width:460px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:6px">root</div>
        ${renderTreeSVG(rootTree, s.currentNode, matchIds, failIds, '')}
      </div>
      <div style="text-align:center;width:100%;max-width:320px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:6px">subRoot</div>
        ${renderTreeSVG(subTree, null, [], [], '')}
      </div>
    `;
  }

  function renderLog(s) {
    const lb = document.getElementById('log-body');
    const varsHtml = Object.entries(s.vars || {}).map(([k, v]) =>
      `<div class="log-var"><span class="vname">${escapeHtml(String(k))}</span> = <span class="vval">${escapeHtml(JSON.stringify(v))}</span></div>`
    ).join('');

    const histHtml = steps.slice(0, cur + 1).map((st, i) =>
      `<div class="log-history-item ${i === cur ? 'current' : ''}" onclick="exec.goto(${i})">${i+1}. ${escapeHtml(st.desc)}</div>`
    ).join('');

    lb.innerHTML = `
      <div class="log-desc">${escapeHtml(s.desc)}</div>
      <div class="log-vars-title">Variables</div>
      ${varsHtml}
      <div class="log-history">
        <div class="log-vars-title">History</div>
        ${histHtml}
      </div>
    `;
    // auto-scroll history
    const current = lb.querySelector('.log-history-item.current');
    if (current) current.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  function step(dir) {
    cur = Math.max(0, Math.min(steps.length - 1, cur + dir));
    render();
  }

  function goto(idx) {
    cur = Math.max(0, Math.min(steps.length - 1, idx));
    render();
  }

  function reset() {
    clearInterval(timer);
    playing = false;
    cur = 0;
    updatePlayBtn();
    render();
  }

  function playPause() {
    if (playing) {
      clearInterval(timer);
      playing = false;
    } else {
      playing = true;
      timer = setInterval(() => {
        if (cur >= steps.length - 1) { clearInterval(timer); playing = false; updatePlayBtn(); return; }
        cur++;
        render();
      }, speed);
    }
    updatePlayBtn();
  }

  function setSpeed(v) { speed = parseInt(v); if (playing) { clearInterval(timer); playPause(); } }

  function updatePlayBtn() {
    const b = document.getElementById('play-btn');
    if (b) b.textContent = playing ? '⏸' : '▶';
  }

  return { init, step, goto, reset, playPause, setSpeed };
})();

            <rect x="10" y="10" width="170" height="80" rx="8" fill="rgba(137,180,250,.12)" stroke="var(--accent)" stroke-width="1.5"/>
            <text x="95" y="35" text-anchor="middle" fill="var(--accent)" font-size="13" font-weight="700">isSubtree</text>
            <text x="95" y="55" text-anchor="middle" fill="var(--text-secondary)" font-size="11">1. root null? → False</text>
            <text x="95" y="70" text-anchor="middle" fill="var(--text-secondary)" font-size="11">2. isSameTree? → True</text>
            <text x="95" y="85" text-anchor="middle" fill="var(--text-secondary)" font-size="11">3. recurse left | right</text>

            <!-- isSameTree box -->
            <rect x="200" y="10" width="170" height="80" rx="8" fill="rgba(166,227,161,.10)" stroke="#a6e3a1" stroke-width="1.5"/>
            <text x="285" y="35" text-anchor="middle" fill="#a6e3a1" font-size="13" font-weight="700">isSameTree</text>
            <text x="285" y="55" text-anchor="middle" fill="var(--text-secondary)" font-size="11">1. both null → True</text>
            <text x="285" y="70" text-anchor="middle" fill="var(--text-secondary)" font-size="11">2. one null → False</text>
            <text x="285" y="85" text-anchor="middle" fill="var(--text-secondary)" font-size="11">3. val mismatch → False</text>

            <!-- arrow -->
            <path d="M 180 50 L 198 50" stroke="var(--text-muted)" stroke-width="1.5" marker-end="url(#arr)"/>
            <defs><marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
              <polygon points="0 0, 6 3, 0 6" fill="var(--text-muted)"/>
            </marker></defs>

            <!-- OR / AND labels -->
            <text x="95" y="130" text-anchor="middle" fill="var(--syn-keyword)" font-size="12" font-weight="700">OR</text>
            <text x="95" y="148" text-anchor="middle" fill="var(--text-muted)" font-size="11">(find in either subtree)</text>
            <text x="285" y="130" text-anchor="middle" fill="var(--syn-keyword)" font-size="12" font-weight="700">AND</text>
            <text x="285" y="148" text-anchor="middle" fill="var(--text-muted)" font-size="11">(both halves must match)</text>
          </svg>
        </div>`;
      break;

    case 'complexity':
      viz.innerHTML = `
        <div class="viz-card">
          <h4>Complexity Analysis</h4>
          <div class="complexity-row">
            <div class="complexity-cell">
              <div class="c-label">Time</div>
              <div class="c-val">O(m·n)</div>
              <div class="c-why">m nodes in root × n nodes in subRoot per isSameTree call</div>
            </div>
            <div class="complexity-cell">
              <div class="c-label">Space</div>
              <div class="c-val">O(h)</div>
              <div class="c-why">h = height of root tree, recursion stack depth</div>
            </div>
          </div>
        </div>
        <div class="viz-card">
          <h4>For this example</h4>
          <div style="font-size:12.5px;color:var(--text-secondary);line-height:1.7">
            m = 5 nodes in root, n = 3 in subRoot<br>
            Worst case: 5 × 3 = <strong style="color:var(--accent)">15 comparisons</strong><br>
            Actual: much fewer due to early termination ✓
          </div>
        </div>`;
      break;

    case 'edge_cases':
      viz.innerHTML = `
        <div class="viz-card">
          <h4>Edge Cases Handled</h4>
          <div class="edge-cases-list">
            <div class="ec-item"><span class="ec-icon">✅</span><div class="ec-text"><strong>root = null</strong><span>Line 1: immediately return False. Nothing to search in.</span></div></div>
            <div class="ec-item"><span class="ec-icon">✅</span><div class="ec-text"><strong>subRoot = null</strong><span>isSameTree(x, null) → False unless x also null. Consistent.</span></div></div>
            <div class="ec-item"><span class="ec-icon">✅</span><div class="ec-text"><strong>root == subRoot</strong><span>First isSameTree call at root returns True immediately.</span></div></div>
            <div class="ec-item"><span class="ec-icon">✅</span><div class="ec-text"><strong>subRoot larger than root</strong><span>isSameTree hits null on root side → False. Correct.</span></div></div>
            <div class="ec-item"><span class="ec-icon">✅</span><div class="ec-text"><strong>Same values, different structure</strong><span>e.g. root=[4,1,2,3], sub=[4,1,2] → False because isSameTree checks nulls too.</span></div></div>
          </div>
        </div>`;
      break;

    case 'final':
    default:
      viz.innerHTML = `
        <div class="viz-card">
          <h4>Full Example Trace</h4>
          <div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center">
            <div style="text-align:center">
              <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;font-weight:700">root</div>
              ${renderTreeSVG(rootTree, null, [rootTree ? findNode(rootTree, 4) : null].filter(Boolean).map(n=>n&&n.id), [], '')}
            </div>
            <div style="text-align:center">
              <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;font-weight:700">subRoot</div>

          </div>
          <div style="margin-top:12px;font-size:12.5px;color:var(--text-secondary);text-align:center">
            Node <strong style="color:#a6e3a1">4</strong> (green) in root is an exact match for subRoot.<br>
            <span class="result-pill result-true" style="margin-top:8px">isSubtree → true</span>
          </div>
        </div>
        <div class="viz-card">
          <h4>Pattern Reuse</h4>
          <div style="font-size:12.5px;color:var(--text-secondary);line-height:1.7">
            isSameTree = <strong style="color:var(--accent)">LeetCode #100</strong><br>
            isSubtree = DFS traversal + isSameTree<br><br>
            This "outer traverse + inner validate" pattern applies to many tree problems. 
            Recognize it, and you'll solve dozens of similar questions instantly.
          </div>
        </div>`;
      break;
  }
}

function findNode(root, val) {
  if (!root) return null;
  if (root.val === val) return root;
  return findNode(root.left, val) || findNode(root.right, val);
}

function getPreorder(root) {
  if (!root) return [];
  return [root.val, ...getPreorder(root.left), ...getPreorder(root.right)];
}
function getInorder(root) {
  if (!root) return [];
  return [...getInorder(root.left), root.val, ...getInorder(root.right)];
}

function intStep(dir) {
  intCur = Math.max(0, Math.min(INTUITION_STAGES.length - 1, intCur + dir));
  renderIntuition();
}

function intPlayPause() {
  if (intPlaying) {
    clearInterval(intTimer);
    intPlaying = false;
  } else {
    intPlaying = true;
    intTimer = setInterval(() => {
      if (intCur >= INTUITION_STAGES.length - 1) { clearInterval(intTimer); intPlaying = false; renderIntuition(); return; }
      intCur++;
      renderIntuition();
    }, 4000);
  }
  renderIntuition();
}

// ═══════════════════════════════════════════════
//  MODE SWITCHING
// ═══════════════════════════════════════════════
let currentMode = 'intuition';

function setMode(mode) {
  currentMode = mode;
  clearInterval(intTimer); intPlaying = false;

  document.getElementById('mode-intuition').classList.toggle('active', mode === 'intuition');
  document.getElementById('mode-execution').classList.toggle('active', mode === 'execution');

  const iw = document.getElementById('intuition-wrap');
  const ew = document.getElementById('execution-wrap');
  const ir = document.getElementById('input-row');

  if (mode === 'intuition') {
    iw.style.display = 'flex';
    ew.style.display = 'none';
    ir.style.display = 'none';
    renderIntuition();
  } else {
    iw.style.display = 'none';
    ew.style.display = 'flex';
    ir.style.display = 'flex';
    buildCodePanel();
    exec.init(rootTree, subTree);
  }
}

function reparse() {
  const ra = parseArr(document.getElementById('input-root').value);
  const sa = parseArr(document.getElementById('input-sub').value);
  rootTree = arrayToTree(ra);
  subTree  = arrayToTree(sa);
  exec.init(rootTree, subTree);
}

function toggleTheme() {
  const body = document.body;
  const isDark = body.getAttribute('data-theme') === 'dark';
  body.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = isDark ? '🌙 Dark' : '☀️ Light';
}

// ═══════════════════════════════════════════════
//  RESIZABLE PANELS
// ═══════════════════════════════════════════════
function initResizable() {
  const setupDivider = (dividerId, leftId, rightId) => {
    const div = document.getElementById(dividerId);
    const left = document.getElementById(leftId);
    const right = document.getElementById(rightId);
    if (!div || !left || !right) return;

    let dragging = false;
    let startX, startLeftW, startRightW;

    div.addEventListener('mousedown', e => {
      dragging = true;
      startX = e.clientX;
      startLeftW = left.offsetWidth;
      startRightW = right.offsetWidth;
      div.classList.add('dragging');
      document.body.style.userSelect = 'none';
      document.body.style.cursor = 'col-resize';
    });

    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const dx = e.clientX - startX;
      const newLeft = Math.max(120, startLeftW + dx);
      const newRight = Math.max(120, startRightW - dx);
      left.style.width = newLeft + 'px';
      left.style.flex = 'none';
      right.style.width = newRight + 'px';
      right.style.flex = 'none';
    });

    document.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      div.classList.remove('dragging');
      document.body.style.userSelect = '';
      document.body.style.cursor = '';
    });
  };

  setupDivider('div1', 'code-panel', 'viz-panel');
  setupDivider('div2', 'viz-panel', 'log-panel');
}

// ═══════════════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') {
    e.preventDefault();
    currentMode === 'intuition' ? intPlayPause() : exec.playPause();
  } else if (e.code === 'ArrowRight') {
    e.preventDefault();
    currentMode === 'intuition' ? intStep(1) : exec.step(1);
  } else if (e.code === 'ArrowLeft') {
    e.preventDefault();
    currentMode === 'intuition' ? intStep(-1) : exec.step(-1);
  }
});

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
initResizable();
setMode('intuition');
</script>
