<script>
/* ═══════════════════════════════════════════
   PYTHON SOURCE (for display, with tokens)
═══════════════════════════════════════════ */
const CODE_LINES = [
/* 0 */  { t: `<span class="sk">class</span> <span class="st">TrieNode</span>:` },
/* 1 */  { t: `    <span class="sd">__slots__</span> = (<span class="ss">'children'</span>, <span class="ss">'is_end'</span>)` },
/* 2 */  { t: `` },
/* 3 */  { t: `    <span class="sk">def</span> <span class="sf">__init__</span>(<span class="se">self</span>):` },
/* 4 */  { t: `        <span class="se">self</span>.children: <span class="st">dict</span>[<span class="st">str</span>, <span class="ss">'TrieNode'</span>] = {}` },
/* 5 */  { t: `        <span class="se">self</span>.is_end: <span class="st">bool</span> = <span class="sk">False</span>` },
/* 6 */  { t: `` },
/* 7 */  { t: `<span class="sk">class</span> <span class="st">WordDictionary</span>:` },
/* 8 */  { t: `    <span class="sk">def</span> <span class="sf">__init__</span>(<span class="se">self</span>):` },
/* 9 */  { t: `        <span class="se">self</span>.root = <span class="sf">TrieNode</span>()` },
/* 10 */ { t: `` },
/* 11 */ { t: `    <span class="sk">def</span> <span class="sf">addWord</span>(<span class="se">self</span>, word: <span class="st">str</span>) -> <span class="sk">None</span>:` },
/* 12 */ { t: `        node = <span class="se">self</span>.root` },
/* 13 */ { t: `        <span class="sk">for</span> ch <span class="sk">in</span> word:` },
/* 14 */ { t: `            <span class="sk">if</span> ch <span class="sk">not in</span> node.children:` },
/* 15 */ { t: `                node.children[ch] = <span class="sf">TrieNode</span>()` },
/* 16 */ { t: `            node = node.children[ch]` },
/* 17 */ { t: `        node.is_end = <span class="sk">True</span>` },
/* 18 */ { t: `` },
/* 19 */ { t: `    <span class="sk">def</span> <span class="sf">search</span>(<span class="se">self</span>, word: <span class="st">str</span>) -> <span class="st">bool</span>:` },
/* 20 */ { t: `        <span class="sk">return</span> <span class="se">self</span>.<span class="sf">_dfs</span>(word, <span class="sn">0</span>, <span class="se">self</span>.root)` },
/* 21 */ { t: `` },
/* 22 */ { t: `    <span class="sk">def</span> <span class="sf">_dfs</span>(<span class="se">self</span>, word: <span class="st">str</span>, idx: <span class="st">int</span>, node: <span class="st">TrieNode</span>) -> <span class="st">bool</span>:` },
/* 23 */ { t: `        <span class="sk">if</span> idx == <span class="sf">len</span>(word):` },
/* 24 */ { t: `            <span class="sk">return</span> node.is_end` },
/* 25 */ { t: `        ch = word[idx]` },
/* 26 */ { t: `        <span class="sk">if</span> ch != <span class="ss">'.'</span>:` },
/* 27 */ { t: `            child = node.children.<span class="sf">get</span>(ch)` },
/* 28 */ { t: `            <span class="sk">return</span> child <span class="sk">is not None</span> <span class="sk">and</span> <span class="se">self</span>.<span class="sf">_dfs</span>(word, idx+<span class="sn">1</span>, child)` },
/* 29 */ { t: `        <span class="sc"># Wildcard: try all children</span>` },
/* 30 */ { t: `        <span class="sk">return</span> <span class="sf">any</span>(<span class="se">self</span>.<span class="sf">_dfs</span>(word, idx+<span class="sn">1</span>, child) <span class="sk">for</span> child <span class="sk">in</span> node.children.<span class="sf">values</span>())` },
];

/* ═══════════════════════════════════════════
   TRIE DATA STRUCTURE (in-memory simulation)
═══════════════════════════════════════════ */
class TrieNode {
  constructor(id) { this.children = {}; this.is_end = false; this.id = id; }
}

let nodeIdCounter = 0;
let root = new TrieNode(nodeIdCounter++);
let trieWords = []; // words added so far

/* ═══════════════════════════════════════════
   STEP GENERATION
═══════════════════════════════════════════ */
let steps = [];
let currentStep = 0;
let playInterval = null;
let speedMs = 1000;

function snapshotTrie() {
  // Deep clone the trie for snapshot
  function cloneNode(n) {
    const c = { id: n.id, is_end: n.is_end, children: {} };
    for (const [k, v] of Object.entries(n.children)) c.children[k] = cloneNode(v);
    return c;
  }
  return cloneNode(root);
}

function generateAddSteps(word) {
  steps = [];
  let node = root;
  steps.push({
    line: 12,
    desc: `addWord("${word}"): start at root node`,
    vars: { word, node_id: node.id, char_idx: '-' },
    trie: snapshotTrie(),
    highlight: [node.id],
    result: null,
  });
  for (let i = 0; i < word.length; i++) {
    const ch = word[i];
    steps.push({
      line: 13,
      desc: `Iterating: ch = '${ch}' (index ${i})`,
      vars: { word, ch, idx: i, node_id: node.id },
      trie: snapshotTrie(),
      highlight: [node.id],
      result: null,
    });
    steps.push({
      line: 14,
      desc: `Is '${ch}' in node.children? ${ch in node.children ? 'Yes, skip create' : 'No, create new node'}`,
      vars: { ch, exists: ch in node.children },
      trie: snapshotTrie(),
      highlight: [node.id],
      result: null,
    });
    if (!(ch in node.children)) {
      node.children[ch] = new TrieNode(nodeIdCounter++);
      steps.push({
        line: 15,
        desc: `Created new TrieNode for '${ch}' (id=${node.children[ch].id})`,
        vars: { ch, new_node_id: node.children[ch].id },
        trie: snapshotTrie(),
        highlight: [node.children[ch].id],
        result: null,
      });
    }
    node = node.children[ch];
    steps.push({
      line: 16,
      desc: `Move to node for '${ch}' (id=${node.id})`,
      vars: { ch, node_id: node.id, is_end: node.is_end },
      trie: snapshotTrie(),
      highlight: [node.id],
      result: null,
    });
  }
  node.is_end = true;
  trieWords.push(word);
  steps.push({
    line: 17,
    desc: `Mark node id=${node.id} as end-of-word ✓ Word "${word}" added!`,
    vars: { node_id: node.id, is_end: true },
    trie: snapshotTrie(),
    highlight: [node.id],
    result: `"${word}" added`,
  });
  currentStep = 0;
}

function generateSearchSteps(word) {
  steps = [];
  steps.push({
    line: 20,
    desc: `search("${word}"): call _dfs(word, 0, root)`,
    vars: { word, idx: 0 },
    trie: snapshotTrie(),
    highlight: [root.id],
    result: null,
  });

  let finalResult = false;
  const dfsSteps = [];
  function dfs(node, idx, path) {
    dfsSteps.push({
      line: 23,
      desc: `_dfs: idx=${idx}, len(word)=${word.length}. ${idx === word.length ? 'At end — check is_end' : 'Not at end yet'}`,
      vars: { idx, word: word.slice(0, idx), node_id: node.id, is_end: node.is_end },
      trie: snapshotTrie(),
      highlight: [node.id],
      result: null,
    });
    if (idx === word.length) {
      dfsSteps.push({
        line: 24,
        desc: `idx == len(word). Return node.is_end = ${node.is_end}`,
        vars: { is_end: node.is_end, node_id: node.id },
        trie: snapshotTrie(),
        highlight: [node.id],
        result: null,
      });
      return node.is_end;
    }
    const ch = word[idx];
    dfsSteps.push({
      line: 25,
      desc: `ch = word[${idx}] = '${ch}'`,
      vars: { idx, ch, node_id: node.id },
      trie: snapshotTrie(),
      highlight: [node.id],
      result: null,
    });
    if (ch !== '.') {
      dfsSteps.push({
        line: 26,
        desc: `'${ch}' is not a wildcard. Check node.children.get('${ch}')`,
        vars: { ch, has_child: ch in node.children },
        trie: snapshotTrie(),
        highlight: [node.id],
        result: null,
      });
      const child = node.children[ch];
      dfsSteps.push({
        line: 27,
        desc: child
          ? `Found child for '${ch}' (id=${child.id}). Recurse.`
          : `No child for '${ch}'. Return False.`,
        vars: { ch, child_found: !!child, child_id: child ? child.id : null },
        trie: snapshotTrie(),
        highlight: child ? [child.id] : [node.id],
        result: null,
      });
      if (!child) return false;
      return dfs(child, idx + 1, path + ch);
    } else {
      dfsSteps.push({
        line: 29,
        desc: `'.' wildcard! Try all ${Object.keys(node.children).length} children: [${Object.keys(node.children).join(', ')}]`,
        vars: { ch: '.', children: Object.keys(node.children) },
        trie: snapshotTrie(),
        highlight: Object.values(node.children).map(c => c.id),
        result: null,
      });
      for (const [k, child] of Object.entries(node.children)) {
        dfsSteps.push({
          line: 30,
          desc: `Trying wildcard branch '${k}' (id=${child.id})…`,
          vars: { trying: k, child_id: child.id },
          trie: snapshotTrie(),
          highlight: [child.id],
          result: null,
        });
        if (dfs(child, idx + 1, path + k)) return true;
      }
      return false;
    }
  }
  finalResult = dfs(root, 0, '');
  steps.push(...dfsSteps);
  steps.push({
    line: 20,
    desc: `search("${word}") → ${finalResult} ✓`,
    vars: { result: finalResult },
    trie: snapshotTrie(),
    highlight: [],
    result: String(finalResult),
  });
  currentStep = 0;
}

// Layout trie nodes for SVG
function layoutTrie(trieRoot) {
  const nodes = [];
  const edges = [];
  // BFS to assign positions
  const queue = [{ node: trieRoot, x: 0, depth: 0, label: 'root' }];
  const depthGroups = {};
  const visited = [];

  function collect(node, depth, label, parentId) {
    if (!depthGroups[depth]) depthGroups[depth] = [];
    depthGroups[depth].push({ node, label, parentId });
  }

  function bfs(node, depth, label, parentId) {
    collect(node, depth, label, parentId);
    for (const [k, child] of Object.entries(node.children)) {
      bfs(child, depth + 1, k, node.id);
    }
  }
  bfs(trieRoot, 0, 'ROOT', null);

  const W = 700;
  const levelH = 70;

  const nodeMap = {};
  for (const [depth, group] of Object.entries(depthGroups)) {
    const d = parseInt(depth);
    const count = group.length;
    const startX = W / 2 - ((count - 1) * 60) / 2;
    group.forEach((item, i) => {
      const x = count === 1 ? W / 2 : startX + i * 60;
      const y = 40 + d * levelH;
      nodeMap[item.node.id] = { x, y, ...item };
    });
  }

  for (const [id, info] of Object.entries(nodeMap)) {
    if (info.parentId !== null) {
      const par = nodeMap[info.parentId];
      if (par) edges.push({ x1: par.x, y1: par.y, x2: info.x, y2: info.y, label: info.label, childId: info.node.id });
    }
    nodes.push({ x: info.x, y: info.y, id: info.node.id, label: info.label, is_end: info.node.is_end });
  }
  const maxDepth = Math.max(...Object.keys(depthGroups).map(Number));
  const svgH = 60 + maxDepth * levelH + 40;
  return { nodes, edges, svgH };
}

function renderTrie(trieSnap, highlightIds) {
  const { nodes, edges, svgH } = layoutTrie(trieSnap);
  const hl = new Set(highlightIds || []);
  const isDark = document.body.dataset.theme === 'dark';
  const nodeColor = isDark ? '#252840' : '#e2e8f0';
  const hlColor = isDark ? '#3b82f6' : '#3b82f6';
  const endColor = isDark ? '#10b981' : '#059669';
  const textColor = isDark ? '#f8f8f2' : '#111';
  const edgeColor = isDark ? '#4b5563' : '#9ca3af';
  const hlEdgeColor = isDark ? '#8be9fd' : '#3b82f6';

  let svg = `<svg class="trie-svg" viewBox="0 0 700 ${svgH}" style="max-height:${svgH}px">`;
  // defs arrowhead
  svg += `<defs><marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
    <polygon points="0 0,8 3,0 6" fill="${edgeColor}"/></marker></defs>`;

  // edges
  for (const e of edges) {
    const hlEdge = hl.has(e.childId);
    svg += `<line class="trie-edge" x1="${e.x1}" y1="${e.y1}" x2="${e.x2}" y2="${e.y2}"
      stroke="${hlEdge ? hlEdgeColor : edgeColor}" stroke-width="${hlEdge ? 2.5 : 1.5}"
      marker-end="url(#arr)"/>`;
    // edge label
    const mx = (e.x1 + e.x2) / 2;
    const my = (e.y1 + e.y2) / 2 - 4;
    svg += `<text x="${mx}" y="${my}" text-anchor="middle" font-size="12" font-family="monospace"
      font-weight="600" fill="${hlEdge ? hlEdgeColor : (isDark ? '#94a3b8' : '#6b7280')}">${e.label}</text>`;
  }

  // nodes
  for (const n of nodes) {
    const isHL = hl.has(n.id);
    const fill = isHL ? hlColor : (n.is_end ? endColor : nodeColor);
    const strokeW = isHL ? 3 : 1.5;
    const stroke = isHL ? hlEdgeColor : (n.is_end ? endColor : (isDark ? '#4b5563' : '#cbd5e1'));
    const displayLabel = n.label === 'ROOT' ? '∅' : n.label;
    svg += `<g class="trie-node">
      <circle cx="${n.x}" cy="${n.y}" r="20" fill="${fill}" stroke="${stroke}" stroke-width="${strokeW}"/>
      <text x="${n.x}" y="${n.y + 1}" text-anchor="middle" dominant-baseline="middle"
        font-size="13" font-weight="700" fill="${isHL ? '#fff' : textColor}">${displayLabel}</text>
      ${n.is_end ? `<text x="${n.x}" y="${n.y + 32}" text-anchor="middle" font-size="9" fill="${endColor}">END</text>` : ''}
    </g>`;
  }
  svg += '</svg>';
  return svg;
}

function renderStep(idx) {
  if (!steps.length) return;
  const s = steps[idx];
  renderCode(s.line);

  // Trie viz
  document.getElementById('viz-canvas').innerHTML = renderTrie(s.trie, s.highlight);

  // Log
  document.getElementById('log-desc').textContent = s.desc;
  // Vars
  let vhtml = '<div class="vars-title">Variables</div>';
  for (const [k, v] of Object.entries(s.vars)) {
    const vStr = Array.isArray(v) ? JSON.stringify(v) : String(v);
    vhtml += `<div class="var-row"><span class="var-name">${k}</span><span style="color:var(--text-secondary)"> = </span><span class="var-val">${vStr}</span></div>`;
  }
  document.getElementById('vars-section').innerHTML = vhtml;
  // History
  let hhtml = '<div class="vars-title" style="margin-top:10px">History</div>';
  steps.slice(0, idx + 1).forEach((st, i) => {
    hhtml += `<div class="hist-item ${i === idx ? 'current' : ''}" onclick="jumpStep(${i})">${i + 1}. ${st.desc}</div>`;
  });
  document.getElementById('history-list').innerHTML = hhtml;
  // Scroll history to current
  const items = document.querySelectorAll('.hist-item.current');
  if (items[0]) items[0].scrollIntoView({ block: 'nearest' });

  document.getElementById('step-counter').textContent = `Step ${idx + 1} / ${steps.length}`;
}

function jumpStep(i) {
  currentStep = i;
  renderStep(currentStep);
}

function stepForward() {
  if (currentStep < steps.length - 1) { currentStep++; renderStep(currentStep); }
}
function stepBack() {
  if (currentStep > 0) { currentStep--; renderStep(currentStep); }
}
function resetSteps() {
  pausePlay();
  currentStep = 0;
  if (steps.length) renderStep(0);
}
function togglePlay() {
  if (playInterval) pausePlay();
  else {
    document.getElementById('play-btn').textContent = '⏸';
    playInterval = setInterval(() => {
      if (currentStep < steps.length - 1) { currentStep++; renderStep(currentStep); }
      else pausePlay();
    }, speedMs);
  }
}
function pausePlay() {
  clearInterval(playInterval); playInterval = null;
  document.getElementById('play-btn').textContent = '▶';
}
function changeSpeed() {
  speedMs = parseInt(document.getElementById('speed-sel').value);
  if (playInterval) { pausePlay(); togglePlay(); }
}

function runOperation() {
  pausePlay();
  const op = document.getElementById('op-select').value;
  const arg = document.getElementById('op-arg').value.trim();
  if (!arg) return;
  if (op === 'addWord') generateAddSteps(arg);
  else generateSearchSteps(arg);
  renderStep(0);
}

function resetAll() {
  pausePlay();
  nodeIdCounter = 0;
  root = new TrieNode(nodeIdCounter++);
  trieWords = [];
  steps = [];
  document.getElementById('viz-canvas').innerHTML = renderTrie(snapshotTrie(), []);
  document.getElementById('log-desc').textContent = 'Trie reset. Run an operation.';
  document.getElementById('vars-section').innerHTML = '';
  document.getElementById('history-list').innerHTML = '';
  document.getElementById('step-counter').textContent = 'Step 0 / 0';
  renderCode(-1);
}

function updateOpInput() {
  const op = document.getElementById('op-select').value;
  document.getElementById('op-arg').placeholder = op === 'addWord' ? 'word to add' : 'word to search';
}

          <circle cx="320" cy="160" r="18" fill="${isDark?'#252840':'#e2e8f0'}" stroke="${isDark?'#4b5563':'#cbd5e1'}" stroke-width="1.5"/>
          <text x="320" y="161" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="${isDark?'#f8f8f2':'#111'}">a</text>

          <!-- d leaf -->
          <line x1="80" y1="178" x2="80" y2="198" stroke="${isDark?'#4b5563':'#9ca3af'}" stroke-width="1.5"/>
          <text x="87" y="192" font-size="11" font-family="monospace" fill="${isDark?'#94a3b8':'#6b7280'}" font-weight="600">d</text>
          <circle cx="80" cy="210" r="12" fill="${g}" stroke="${g}" stroke-width="1.5"/>
          <text x="80" y="211" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#fff">d</text>

          <line x1="200" y1="178" x2="200" y2="198" stroke="${isDark?'#4b5563':'#9ca3af'}" stroke-width="1.5"/>
          <text x="207" y="192" font-size="11" font-family="monospace" fill="${isDark?'#94a3b8':'#6b7280'}" font-weight="600">d</text>
          <circle cx="200" cy="210" r="12" fill="${g}" stroke="${g}" stroke-width="1.5"/>
          <text x="200" y="211" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#fff">d</text>

          <line x1="320" y1="178" x2="320" y2="198" stroke="${isDark?'#4b5563':'#9ca3af'}" stroke-width="1.5"/>
          <text x="327" y="192" font-size="11" font-family="monospace" fill="${isDark?'#94a3b8':'#6b7280'}" font-weight="600">d</text>
          <circle cx="320" cy="210" r="12" fill="${g}" stroke="${g}" stroke-width="1.5"/>
          <text x="320" y="211" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#fff">d</text>
        </svg>
        <div style="margin-top:8px;font-size:11.5px;color:var(--text-secondary)">
          🟢 Green nodes = end-of-word markers (is_end=True)
        </div>`;
    }
    case 'dfs_wildcard': return `
      <div class="int-viz-title">🔀 Wildcard DFS: search("b.d")</div>
      <svg viewBox="0 0 380 180" style="width:100%;max-height:180px">
        <!-- Root → b (exact) -->
        <circle cx="60" cy="30" r="16" fill="${isDark?'#252840':'#e2e8f0'}" stroke="${accent}" stroke-width="2"/>
        <text x="60" y="31" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="${accent}">∅</text>
        <line x1="76" y1="30" x2="114" y2="30" stroke="${accent}" stroke-width="2"/>
        <text x="95" y="22" font-size="10" font-family="monospace" fill="${accent}" font-weight="700">b</text>
        <circle cx="130" cy="30" r="16" fill="${isDark?'#252840':'#e2e8f0'}" stroke="${accent}" stroke-width="2"/>
        <text x="130" y="31" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="${isDark?'#f8f8f2':'#111'}">b</text>
        <!-- b → a (dot, all children) -->
        <line x1="146" y1="30" x2="184" y2="30" stroke="${isDark?'#ff79c6':'#d73a49'}" stroke-width="2" stroke-dasharray="4,3"/>
        <text x="165" y="22" font-size="10" fill="${isDark?'#ff79c6':'#d73a49'}" font-weight="700">.</text>
        <circle cx="200" cy="30" r="16" fill="${isDark?'#252840':'#e2e8f0'}" stroke="${isDark?'#ff79c6':'#d73a49'}" stroke-width="2" stroke-dasharray="4,3"/>
        <text x="200" y="31" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="${isDark?'#ff79c6':'#d73a49'}">?</text>
        <!-- a (matched) → d (exact) -->
        <line x1="216" y1="30" x2="254" y2="30" stroke="${accent}" stroke-width="2"/>
        <text x="235" y="22" font-size="10" font-family="monospace" fill="${accent}" font-weight="700">d</text>
        <circle cx="270" cy="30" r="16" fill="${g}" stroke="${g}" stroke-width="2"/>
        <text x="270" y="31" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#fff">d</text>
        <text x="270" y="55" text-anchor="middle" font-size="9" fill="${g}">END ✓</text>

        <!-- Legend -->
        <rect x="20" y="90" width="340" height="70" rx="8" fill="${isDark?'#252840':'#f1f5f9'}" stroke="${isDark?'#2d3154':'#e2e8f0'}"/>
        <text x="36" y="112" font-size="11" fill="${isDark?'#f8f8f2':'#111'}">Steps:</text>
        <text x="36" y="128" font-size="11" fill="${accent}">1. 'b' → follow exact edge to b-node</text>
        <text x="36" y="144" font-size="11" fill="${isDark?'#ff79c6':'#d73a49'}">2. '.' → branch ALL children (only 'a' exists)</text>
        <text x="36" y="160" font-size="11" fill="${g}">3. 'd' → follow exact edge → is_end=True → True!</text>
      </svg>`;
    case 'code_structure': return `
      <div class="int-viz-title">🏗️ Code Architecture</div>
      <div style="font-size:12.5px;line-height:1.8;font-family:var(--font-mono)">
        <div style="color:var(--syn-keyword)">class <span style="color:var(--syn-type)">TrieNode</span>:</div>
        <div style="padding-left:16px;color:var(--text-secondary)">  children: dict[str, TrieNode]  <span style="color:var(--syn-comment)"># edges</span></div>

        <div style="color:var(--syn-keyword)">class <span style="color:var(--syn-type)">WordDictionary</span>:</div>

        <div style="padding-left:16px;color:var(--syn-func)">  addWord(word)</div>
        <div style="padding-left:32px;color:var(--text-secondary)">→ walk + create nodes → mark is_end</div>
        <div style="padding-left:16px;color:var(--syn-func)">  search(word)  →  _dfs(word, 0, root)</div>
        <div style="padding-left:16px;color:var(--syn-func)">  _dfs(word, idx, node)</div>
        <div style="padding-left:32px;color:var(--text-secondary)">→ base: idx==len → is_end</div>

    case 'complexity': return `
      <div class="int-viz-title">📊 Complexity Breakdown</div>
      <div class="complexity-grid">
        <div class="complexity-card">

          Space: <strong>O(L)</strong><br>
          <span style="color:var(--text-secondary);font-size:11px">One node per new character</span>

        <div class="complexity-card">
          <h4>search(word)</h4>
          Time: <strong>O(26^d × L)</strong><br>
          Space: <strong>O(L)</strong> stack<br>
          <span style="color:var(--text-secondary);font-size:11px">d = number of '.' wildcards</span>
        </div>
        <div class="complexity-card" style="grid-column:1/-1">

          <strong>O(Σ word lengths)</strong> for all insertions<br>
          Shared prefixes save memory vs a hash set of full strings
        </div>
      </div>`;
    case 'final': return `
      <div class="int-viz-title">✅ Edge Cases</div>
      <table class="op-table">
        <tr><th>Query</th><th>Result</th><th>Why</th></tr>
        <tr><td>search("")</td><td>False</td><td>root.is_end = False (never added "")</td></tr>
        <tr><td>search("...")</td><td>True/False</td><td>Explores all 3-char paths</td></tr>
        <tr><td>search("b.d")</td><td>True</td><td>b→a→d matches "bad"</td></tr>
        <tr><td>search("xyz")</td><td>False</td><td>No child 'x' from root → False immediately</td></tr>
        <tr><td>search("b.")</td><td>True</td><td>b→a has is_end=True ("ba" was added)</td></tr>
      </table>
      <div style="margin-top:14px;padding:12px;background:rgba(16,185,129,0.08);border-radius:8px;font-size:12.5px;line-height:1.6;border-left:3px solid #10b981">
        <strong style="color:#10b981">Pattern to remember:</strong><br>
        Trie = prefix-aware storage<br>
        DFS on Trie = wildcard/pattern matching<br>
        This combo appears in: Word Search II, Auto-Complete, Boggle
      </div>`;
    default: return '<div style="color:var(--text-secondary);padding:20px">Select a stage to see visualization.</div>';
  }
}

function nextStage() {
  if (currentStage < INTUITION_STAGES.length - 1) { currentStage++; renderIntuition(); }
}
function prevStage() {
  if (currentStage > 0) { currentStage--; renderIntuition(); }
}
function toggleIntPlay() {
  if (intPlayInterval) {
    clearInterval(intPlayInterval); intPlayInterval = null;
    document.getElementById('int-play-btn').textContent = '▶ Auto';
  } else {
    document.getElementById('int-play-btn').textContent = '⏸ Pause';
    intPlayInterval = setInterval(() => {
      if (currentStage < INTUITION_STAGES.length - 1) { currentStage++; renderIntuition(); }
      else { clearInterval(intPlayInterval); intPlayInterval = null; document.getElementById('int-play-btn').textContent = '▶ Auto'; }
    }, 4000);
  }
}

/* ═══════════════════════════════════════════
   MODE / THEME SWITCHING
═══════════════════════════════════════════ */
let currentMode = 'intuition';

function setMode(mode) {
  currentMode = mode;
  pausePlay();
  if (intPlayInterval) { clearInterval(intPlayInterval); intPlayInterval = null; document.getElementById('int-play-btn').textContent = '▶ Auto'; }

  document.getElementById('btn-intuition').classList.toggle('active', mode === 'intuition');
  document.getElementById('btn-execution').classList.toggle('active', mode === 'execution');
  document.getElementById('intuition-container').style.display = mode === 'intuition' ? 'flex' : 'none';
  document.getElementById('execution-container').style.display = mode === 'execution' ? 'flex' : 'none';
  document.getElementById('exec-input-row').style.display = mode === 'execution' ? 'flex' : 'none';

  if (mode === 'execution') {
    // Init with some default words
    if (trieWords.length === 0) {
      generateAddSteps('bad');
      // Actually run them silently
      nodeIdCounter = 0; root = new TrieNode(nodeIdCounter++);
      ['bad','dad','mad'].forEach(w => {
        let node = root;
        for (const ch of w) { if (!(ch in node.children)) node.children[ch] = new TrieNode(nodeIdCounter++); node = node.children[ch]; }
        node.is_end = true; trieWords.push(w);
      });
      // Generate steps for a search as demo
      generateSearchSteps('b.d');
      renderStep(0);
      renderCode(steps[0].line);
    }
  }
}

function toggleTheme() {
  const isDark = document.body.dataset.theme === 'dark';
  document.body.dataset.theme = isDark ? 'light' : 'dark';
  document.querySelector('.btn-theme').textContent = isDark ? '🌙 Dark' : '☀️ Light';
  // Re-render current state
  if (currentMode === 'intuition') renderIntuition();
  else if (steps.length) renderStep(currentStep);
}

/* ═══════════════════════════════════════════
   KEYBOARD SHORTCUTS
═══════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Space') {
    e.preventDefault();
    currentMode === 'execution' ? togglePlay() : toggleIntPlay();
  } else if (e.code === 'ArrowRight') {
    e.preventDefault();
    currentMode === 'execution' ? stepForward() : nextStage();
  } else if (e.code === 'ArrowLeft') {
    e.preventDefault();
    currentMode === 'execution' ? stepBack() : prevStage();
  }
});

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
window.onload = () => {
  renderIntuition();
  renderCode(-1);
  // Pre-build trie silently for execution mode
  nodeIdCounter = 0; root = new TrieNode(nodeIdCounter++);
};
</script>
