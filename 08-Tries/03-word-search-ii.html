.int-panels{display:flex;width:100%;height:100%}

.tthought{background:rgba(96,165,250,.07);border-left:3px solid var(--acc);padding:7px 11px;font-style:italic;font-size:11px;color:var(--fg2);margin-bottom:8px;border-radius:0 4px 4px 0}

</style>

<body data-theme="dark">
<div id="app"></div>
<script>
// ── PYTHON SOURCE ────────────────────────────────────────
const CODE = [
  "from typing import List",
  "",
  "class TrieNode:",
  "    __slots__ = ('children', 'word', 'count')",
  "",
  "    def __init__(self):",
  "        self.children: dict[str, 'TrieNode'] = {}",
  "        self.word: str | None = None",
  "        self.count: int = 0",
  "",
  "",
  "class Solution:",
  "    def findWords(self, board: List[List[str]], words: List[str]) -> List[str]:",
  "        # ── Build Trie ──────────────────────────────────────",
  "        root = TrieNode()",
  "",
  "        for word in words:",
  "            node = root",
  "            for ch in word:",
  "                if ch not in node.children:",
  "                    node.children[ch] = TrieNode()",
  "                node = node.children[ch]",
  "                node.count += 1",
  "            node.word = word",
  "",
  "        ROWS, COLS = len(board), len(board[0])",
  "        results: list[str] = []",
  "",
  "        # ── DFS + Backtracking ───────────────────────────────",
  "        def dfs(r: int, c: int, node: TrieNode) -> None:",
  "            ch = board[r][c]",
  "",
  "            child = node.children.get(ch)",
  "            if child is None:",
  "                return",
  "",
  "            # ── Found a complete word ─────────────────────────",
  "            if child.word:",
  "                results.append(child.word)",
  "                child.word = None    # avoid duplicates",
  "                child.count -= 1    # decrement word node",
  "",
  "            # ── Mark visited & recurse neighbours ────────────",
  "            board[r][c] = '#'",
  "",
  "            for dr, dc in ((-1,0),(1,0),(0,-1),(0,1)):",
  "                nr, nc = r + dr, c + dc",
  "                if 0 <= nr < ROWS and 0 <= nc < COLS and board[nr][nc] != '#':",
  "                    dfs(nr, nc, child)",
  "",
  "            board[r][c] = ch       # Restore (backtrack)",
  "",
  "            # ── Prune dead branch AFTER recursion ────────────",
  "            if child.count == 0:",
  "                del node.children[ch]  # safe to prune now",
  "",
  "        # ── Kick off DFS from every cell ─────────────────────",
  "        for r in range(ROWS):",
  "            for c in range(COLS):",
  "                if board[r][c] in root.children:",
  "                    dfs(r, c, root)",
  "",
  "        return results",
];

// ── SYNTAX HIGHLIGHTER ──────────────────────────────────
function hlLine(raw){
  if(!raw.trim())return '\u00a0';
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const toks=[];let i=0;
  const KW=new Set(['from','import','class','def','return','if','else','elif','for','in','not','None','True','False','and','or','del','while','pass','raise','with','as','try','except','finally','lambda','yield','global','nonlocal','assert']);
  const TY=new Set(['List','dict','str','int','bool','float','Optional','Union','Tuple','Set','Any','TrieNode']);
  const DC=new Set(['__slots__','__init__','__repr__','__str__','__len__']);
  while(i<raw.length){
    if(raw[i]==='#'){
      const b=raw.slice(0,i);const sq=(b.match(/'/g)||[]).length;const dq=(b.match(/"/g)||[]).length;
      if(sq%2===0&&dq%2===0){toks.push({t:'cm',v:raw.slice(i)});break;}
    }
    if((raw[i]==="'"&&raw.slice(i,i+3)==="'''")||(raw[i]==='"'&&raw.slice(i,i+3)==='"""')){
      const q=raw.slice(i,i+3);const e=raw.indexOf(q,i+3);const f=e===-1?raw.slice(i):raw.slice(i,e+3);
      toks.push({t:'st',v:f});i+=f.length;continue;
    }
    if(raw[i]==="'"||raw[i]==='"'){
      const q=raw[i];let j=i+1;
      while(j<raw.length&&raw[j]!==q){if(raw[j]==='\\')j++;j++;}
      toks.push({t:'st',v:raw.slice(i,j+1)});i=j+1;continue;
    }
    if(/[a-zA-Z_]/.test(raw[i])){
      let j=i;while(j<raw.length&&/[a-zA-Z0-9_]/.test(raw[j]))j++;
      const w=raw.slice(i,j);const after=raw.slice(j).trimStart();const isCall=after.startsWith('(');
      const prevTxt=toks.map(t=>t.v).join('');const isDef=/\bdef\s+$/.test(prevTxt);
      if(w==='self')toks.push({t:'sl',v:w});
      else if(DC.has(w))toks.push({t:'dc',v:w});
      else if(KW.has(w))toks.push({t:'kw',v:w});
      else if(TY.has(w))toks.push({t:'tp',v:w});
      else if(isDef||(isCall&&!KW.has(w)))toks.push({t:'fn',v:w});
      else toks.push({t:'pl',v:w});
      i=j;continue;
    }
    if(/[0-9]/.test(raw[i])){let j=i;while(j<raw.length&&/[0-9.]/.test(raw[j]))j++;toks.push({t:'nm',v:raw.slice(i,j)});i=j;continue;}
    toks.push({t:'pl',v:raw[i]});i++;
  }
  return toks.map(tk=>{
    const t=esc(tk.v);
    switch(tk.t){
      case'cm':return`<span class="cm">${t}</span>`;
      case'st':return`<span class="st">${t}</span>`;
      case'kw':return`<span class="kw">${t}</span>`;
      case'fn':return`<span class="fn">${t}</span>`;
      case'tp':return`<span class="tp">${t}</span>`;
      case'nm':return`<span class="nm">${t}</span>`;
      case'dc':return`<span class="dc">${t}</span>`;
      case'sl':return`<span class="sl">${t}</span>`;
      default:return t;
    }
  }).join('');
}

// ── TEST DATA ────────────────────────────────────────────
const DEF_BOARD=[['o','a','a','n'],['e','t','a','e'],['i','h','k','r'],['i','f','l','v']];
const DEF_WORDS=['oath','pea','eat','rain'];

// ── TRIE JS ──────────────────────────────────────────────
class TrieNode{constructor(){this.children={};this.word=null;this.count=0;}}
function buildTrie(words){
  const root=new TrieNode();
  for(const w of words){let n=root;for(const ch of w){if(!n.children[ch])n.children[ch]=new TrieNode();n=n.children[ch];n.count++;}n.word=w;}
  return root;
}

// ── STEP GENERATOR (now includes trieState snapshot) ─────
function genSteps(board,words){
  const steps=[];
  const ROWS=board.length,COLS=board[0].length;
  const B=board.map(r=>[...r]);
  const root=buildTrie(words);

  // Trie state: for each node we track visited/active/pruned/found
  // We'll represent the trie as a flat path->status map: key = char path e.g. "o","oa","oat","oath"
  const trieStatus={};  // path -> 'idle'|'active'|'found'|'pruned'

  function initTrieStatus(node,path){
    trieStatus[path]=trieStatus[path]||'idle';
    for(const[ch,child] of Object.entries(node.children)){
      initTrieStatus(child,path+ch);
    }
  }
  initTrieStatus(root,'');

  function cloneTrieStatus(){return Object.assign({},trieStatus);}
  function cloneTrie(node){
    const n=new TrieNode();n.word=node.word;n.count=node.count;
    for(const[ch,child] of Object.entries(node.children))n.children[ch]=cloneTrie(child);
    return n;
  }

  const results=[];const path=[];
  // Track current trie path during DFS
  let currentTriePath='';

  steps.push({line:14,desc:`Build Trie from [${words.join(', ')}]`,
    vars:{words:JSON.stringify(words)},
    board:B.map(r=>[...r]),path:[],cur:null,found:[],
    trieStatus:cloneTrieStatus(),activeTriePath:null,tag:'build_trie'});

  steps.push({line:25,desc:`Board ${ROWS}×${COLS}. results = []`,
    vars:{ROWS,COLS,results:'[]'},
    board:B.map(r=>[...r]),path:[],cur:null,found:[],
    trieStatus:cloneTrieStatus(),activeTriePath:null,tag:'init'});

  function dfs(r,c,node,triePath){
    const ch=B[r][c];

    // Mark this trie node as active
    trieStatus[triePath]='active';

    steps.push({line:30,desc:`dfs(${r},${c}) → ch='${ch}'`,
      vars:{r,c,ch,depth:path.length,results:JSON.stringify(results)},
      board:B.map(row=>[...row]),path:[...path],cur:[r,c],found:[...results],
      trieStatus:cloneTrieStatus(),activeTriePath:triePath,tag:'enter'});

    const childPath=triePath+ch;
    const child=node.children[ch];

    steps.push({line:32,desc:`Trie lookup '${ch}' at depth ${triePath.length} → ${child?'MATCH ✓':'NO MATCH ✗'}`,
      vars:{ch,child_exists:!!child,trie_path:childPath||'(root)'},
      board:B.map(row=>[...row]),path:[...path],cur:[r,c],found:[...results],
      trieStatus:cloneTrieStatus(),activeTriePath:child?childPath:triePath,tag:child?'match':'no_match'});

    if(!child){
      trieStatus[triePath]='idle';
      return;
    }

    trieStatus[childPath]='active';

    if(child.word){
      results.push(child.word);
      trieStatus[childPath]='found';
      steps.push({line:38,desc:`🎉 Word found: "${child.word}"`,
        vars:{found_word:child.word,results:JSON.stringify(results)},
        board:B.map(row=>[...row]),path:[...path],cur:[r,c],found:[...results],
        trieStatus:cloneTrieStatus(),activeTriePath:childPath,tag:'found'});
      child.word=null;
      child.count--;
    }

    B[r][c]='#';path.push([r,c]);
    steps.push({line:43,desc:`Mark (${r},${c})='#', path depth ${path.length}`,
      vars:{marked:`(${r},${c})`,path_len:path.length},
      board:B.map(row=>[...row]),path:[...path],cur:[r,c],found:[...results],
      trieStatus:cloneTrieStatus(),activeTriePath:childPath,tag:'mark'});

    for(const[dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&B[nr][nc]!=='#'){
        steps.push({line:45,desc:`Try neighbour (${nr},${nc})='${B[nr][nc]}'`,
          vars:{from:`(${r},${c})`,to:`(${nr},${nc})`,neighbour_ch:B[nr][nc]},
          board:B.map(row=>[...row]),path:[...path],cur:[r,c],found:[...results],
          trieStatus:cloneTrieStatus(),activeTriePath:childPath,tag:'neighbour'});
        dfs(nr,nc,child,childPath);
      }
    }

    B[r][c]=ch;path.pop();
    // On backtrack: reset to idle unless already found/pruned
    if(trieStatus[childPath]==='active')trieStatus[childPath]='idle';

    steps.push({line:49,desc:`Backtrack: restore (${r},${c})='${ch}'`,
      vars:{restored:`(${r},${c})`,ch,path_remaining:path.length},
      board:B.map(row=>[...row]),path:[...path],cur:[r,c],found:[...results],
      trieStatus:cloneTrieStatus(),activeTriePath:triePath,tag:'backtrack'});

    if(child.count===0){
      trieStatus[childPath]='pruned';
      delete node.children[ch];
      steps.push({line:52,desc:`Prune '${ch}' branch (count=0) from trie`,
        vars:{pruned_char:ch,path_pruned:childPath},
        board:B.map(row=>[...row]),path:[...path],cur:null,found:[...results],
        trieStatus:cloneTrieStatus(),activeTriePath:triePath,tag:'prune'});
    }
    if(trieStatus[triePath]==='active')trieStatus[triePath]='idle';
  }

  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(B[r][c] in root.children){
        steps.push({line:57,desc:`Start DFS from (${r},${c})='${B[r][c]}'`,
          vars:{r,c,cell:B[r][c]},
          board:B.map(row=>[...row]),path:[],cur:[r,c],found:[...results],
          trieStatus:cloneTrieStatus(),activeTriePath:'',tag:'start_dfs'});
        dfs(r,c,root,'');
      }
    }
  }
  steps.push({line:60,desc:`Done! Return [${results.join(', ')}]`,
    vars:{results:JSON.stringify(results),count:results.length},
    board:B.map(row=>[...row]),path:[],cur:null,found:[...results],
    trieStatus:cloneTrieStatus(),activeTriePath:null,tag:'done'});
  return steps;
}

// ── TRIE SVG RENDERER ────────────────────────────────────
// Layout trie as a tree, highlight nodes based on trieStatus
function renderTrieSVG(words,trieStatus,activeTriePath){
  // Build layout tree from words
  // We'll do a simple BFS layout based on the original words
  // Nodes = unique prefixes, positioned by level
  const W=480;const nodeR=16;const LH=58;const startY=28;

  // Collect all unique prefixes
  const prefixInfo={};// path -> {char, word, children:[]}
  prefixInfo['']={char:'root',word:null,children:[]};
  for(const w of words){
    for(let i=0;i<=w.length;i++){
      const p=w.slice(0,i);
      if(!prefixInfo[p]){prefixInfo[p]={char:p[p.length-1]||'root',word:null,children:[]};}
      if(i>0){
        const parent=w.slice(0,i-1);
        if(prefixInfo[parent]&&!prefixInfo[parent].children.includes(p)){
          prefixInfo[parent].children.push(p);
        }
      }
      if(i===w.length)prefixInfo[p].word=w;
    }
  }

  // BFS layout
  const levels={};
  const queue=[{path:'',depth:0}];
  const pos={};
  while(queue.length){
    const {path,depth}=queue.shift();
    if(!levels[depth])levels[depth]=[];
    levels[depth].push(path);
    for(const child of prefixInfo[path].children){
      queue.push({path:child,depth:depth+1});
    }
  }
  const maxDepth=Object.keys(levels).length;
  const svgH=maxDepth*LH+60;

  // Assign x positions per level
  for(const [d,nodes] of Object.entries(levels)){
    const n=nodes.length;const step=W/(n+1);
    nodes.forEach((path,i)=>{pos[path]={x:step*(i+1),y:startY+d*LH};});
  }

  // Color mapping
  function nodeColors(path){
    const st=trieStatus[path]||'idle';
    const isActive=activeTriePath===path;
    if(st==='pruned')return{fill:'rgba(248,113,113,0.15)',stroke:'#f87171',textColor:'#f87171',strikethrough:true};
    if(st==='found')return{fill:'rgba(52,211,153,0.2)',stroke:'#34d399',textColor:'#34d399',strikethrough:false};
    if(isActive||st==='active')return{fill:'rgba(251,191,36,0.25)',stroke:'#fbbf24',textColor:'#fbbf24',strikethrough:false};
    return{fill:'rgba(55,65,81,0.7)',stroke:'#4b5563',textColor:'#9ca3af',strikethrough:false};
  }

  let edges='';let nodes2='';
  for(const [path,info] of Object.entries(prefixInfo)){
    const p=pos[path];if(!p)continue;
    for(const childPath of info.children){
      const cp=pos[childPath];if(!cp)continue;
      const cst=trieStatus[childPath]||'idle';
      let ec='#374151';
      if(cst==='active'||activeTriePath===childPath)ec='#fbbf24';
      else if(cst==='found')ec='#34d399';
      else if(cst==='pruned')ec='#f87171';
      const isDash=cst==='pruned'?'stroke-dasharray="4 3"':'';
      edges+=`<line x1="${p.x}" y1="${p.y+nodeR}" x2="${cp.x}" y2="${cp.y-nodeR}" stroke="${ec}" stroke-width="1.5" opacity="0.7" ${isDash}/>`;
    }
  }

  for(const [path,info] of Object.entries(prefixInfo)){
    const p=pos[path];if(!p)continue;
    const {fill,stroke,textColor,strikethrough}=nodeColors(path);
    const label=info.char==='root'?'·':info.char;
    const isWordEnd=!!info.word;
    const wordLabel=info.word&&(trieStatus[path]==='found')?`<text x="${p.x}" y="${p.y+nodeR+14}" text-anchor="middle" font-size="9" fill="#34d399" font-family="monospace">✓${info.word}</text>`
      :info.word?`<text x="${p.x}" y="${p.y+nodeR+14}" text-anchor="middle" font-size="9" fill="#6b7280" font-family="monospace">${info.word}</text>`:'';
    const ring=isWordEnd?`<circle cx="${p.x}" cy="${p.y}" r="${nodeR+4}" fill="none" stroke="${stroke}" stroke-width="1" opacity="0.4" stroke-dasharray="3 2"/>`:'';
    const strike=strikethrough?`<line x1="${p.x-nodeR+4}" y1="${p.y}" x2="${p.x+nodeR-4}" y2="${p.y}" stroke="#f87171" stroke-width="2"/>`:'';
    nodes2+=`${ring}<circle cx="${p.x}" cy="${p.y}" r="${nodeR}" fill="${fill}" stroke="${stroke}" stroke-width="${activeTriePath===path?2.5:1.5}"/>
      <text x="${p.x}" y="${p.y+1}" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="700" font-family="monospace" fill="${textColor}">${label}</text>
      ${strike}${wordLabel}`;
  }

  return `<svg viewBox="0 0 ${W} ${svgH}" width="100%" style="overflow:visible">
    ${edges}${nodes2}
    <text x="${W/2}" y="${svgH-4}" text-anchor="middle" font-size="9" fill="#4b5563" font-family="sans-serif">yellow=active · green=word found · red=pruned</text>
  </svg>`;
}

// ── INTUITION STAGES ─────────────────────────────────────
const INT_STAGES=[
  {title:"Understanding the problem",thought:"Multiple words at once… that's different from Word Search I. I can't just run the same search W times.",
    content:`Grid + word list. Find all words you can trace through adjacent cells (no reuse per word).<br><br>• Multiple words simultaneously<br>• Same cell can start different words<br>• Classic DFS + backtracking — but naively running W separate searches is O(W·M·N·4^L)`,
    insight:"The bottleneck is redundant prefix traversal. 'oath' and 'oat' share 'o','a','t' — why check them separately?",viz:'board'},
  {title:"Why Trie collapses the search",thought:"What if all words share one data structure so DFS checks ALL words in one pass?",
    content:`Insert every word into a <strong>Trie</strong>. During grid DFS, walk the Trie in parallel:<br><br>• Each cell maps to a Trie edge<br>• When <code>.word</code> is set on a node → word found<br>• Dead Trie branch → prune DFS early<br><br>Result: one grid scan, all words matched simultaneously.`,
    insight:"Shared prefixes are free. 'oath' and 'oat' traverse the same 4 Trie nodes before branching. Zero repeated work.",viz:'trie'},
  {title:"DFS + backtracking",thought:"Grid DFS and Trie traversal are the same recursion. One pointer moves through the grid, another through the Trie.",
    content:`At each cell (r,c):<br>1. <code>ch = board[r][c]</code><br>2. Look up <code>ch</code> in current Trie node<br>3. Recurse 4 neighbours with the child node<br>4. Mark <code>'#'</code> before recursing (visited)<br>5. Restore after recursing (backtrack)`,
    insight:"'#' IS the visited set — mutate the board temporarily, restore on backtrack. No extra memory.",viz:'dfs_flow'},
  {title:"The count pruning trick",thought:"Even after finding 'eat', DFS will still explore those Trie branches from other cells… unless I prune them.",
    content:`Each TrieNode stores <code>count</code> = words passing through it.<br><br>On word found: <code>count--</code><br>After backtrack: if <code>count == 0</code> → <code>del node.children[ch]</code><br><br>The Trie shrinks as words are found. Future DFS calls skip dead branches instantly.`,
    insight:"Pruning is what makes this competitive on large inputs. A found word removes its entire ancestor chain from future consideration.",viz:'pruning'},
  {title:"Complexity",thought:"Is this actually better? Let me verify.",
    content:`<strong>Time:</strong> O(M·N · 4 · 3^(L-1)) where L = max word length<br>(4 for first step, 3 for subsequent — no backtrack direction)<br><br><strong>Space:</strong> O(W·L) for Trie (shared prefixes reduce actual nodes)<br><br><strong>vs naive:</strong> O(W · M·N · 4^L) — searches same paths W times`,
    insight:"__slots__ on TrieNode prevents Python's per-instance __dict__, saving ~3x memory when W is large.",viz:'complexity'},
  {title:"Edge cases",thought:"What could go wrong? Duplicates, prefix words, single cells?",
    content:`• <strong>Duplicate words:</strong> <code>child.word = None</code> prevents re-adding<br>• <strong>Word is prefix of another:</strong> Trie handles naturally<br>• <strong>Single-char words:</strong> root's direct child has <code>.word</code> set<br>• <strong>Repeated chars on board:</strong> backtracking lets other words reuse cells`,
    insight:"No special-casing needed. The Trie structure + backtracking encodes all constraints naturally.",viz:'edge_cases'},
  {title:"The elegant whole",thought:"Three ideas, perfectly unified: Trie for multi-word matching, DFS+backtracking for grid traversal, count pruning for efficiency.",
    content:`<strong>1. Trie</strong> → all words searchable in one pass<br><strong>2. DFS + Backtrack</strong> → explore all grid paths<br><strong>3. Count Pruning</strong> → shrink Trie as words found<br><br>Switch to <strong>▶ Step-by-Step</strong> to watch the Trie light up alongside the grid!`,
    insight:"This is Hard because you need to recognise all three techniques and know they compose. The code is only ~30 lines.",viz:'final'}
];

// ── APP ──────────────────────────────────────────────────
class App{
  constructor(){
    this.theme='dark';this.mode='intuition';
    this.board=DEF_BOARD.map(r=>[...r]);this.words=[...DEF_WORDS];
    this.steps=genSteps(this.board,this.words);
    this.cur=0;this.playing=false;this.speed=1;this.timer=null;
    this.intStage=0;this.intPlaying=false;this.intTimer=null;
    this.pw=[28,36];// code%, trie%
    this.iw=50;// intuition left%
    this.render();this.attachKeys();
  }

  attachKeys(){
    document.addEventListener('keydown',e=>{
      if(e.code==='Space'){e.preventDefault();this.togglePlay();}
      if(e.code==='ArrowRight'){e.preventDefault();this.mode==='intuition'?this.nextStage():this.stepFwd();}
      if(e.code==='ArrowLeft'){e.preventDefault();this.mode==='intuition'?this.prevStage():this.stepBack();}
    });
  }

  startResize(e,which){
    e.preventDefault();
    const isInt=which==='int';
    const cont=isInt?document.getElementById('int-panels'):document.getElementById('ex-panels');
    if(!cont)return;
    const startX=e.clientX;const totalW=cont.getBoundingClientRect().width;
    const panels=isInt?[document.getElementById('int-left')]:[document.getElementById('p-code'),document.getElementById('p-trie')];
    const startW=panels.map(p=>p?p.getBoundingClientRect().width:0);
    const rel=e.currentTarget;rel.classList.add('drag');document.body.classList.add('resizing');
    const onMove=mv=>{
      const dx=mv.clientX-startX;
      if(isInt){
        const nw=Math.max(120,Math.min(totalW-120,startW[0]+dx));
        this.iw=(nw/totalW*100);
        const el=document.getElementById('int-left');if(el)el.style.flex=`0 0 ${this.iw.toFixed(1)}%`;
      } else {
        if(which===0){
          const nw=Math.max(100,Math.min(totalW-350,startW[0]+dx));
          this.pw[0]=(nw/totalW*100);
          const p=document.getElementById('p-code');if(p)p.style.flex=`0 0 ${this.pw[0].toFixed(1)}%`;
        } else {
          const nw=Math.max(100,Math.min(totalW-300,startW[1]+dx));
          this.pw[1]=(nw/totalW*100);
          const p=document.getElementById('p-trie');if(p)p.style.flex=`0 0 ${this.pw[1].toFixed(1)}%`;
        }
      }
    };
    const onUp=()=>{rel.classList.remove('drag');document.body.classList.remove('resizing');document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
  }

  toggleTheme(){this.theme=this.theme==='dark'?'light':'dark';document.body.dataset.theme=this.theme;this.render();}
  setMode(m){this.stopAll();this.mode=m;this.render();}
  stopAll(){this.playing=false;clearInterval(this.timer);this.intPlaying=false;clearInterval(this.intTimer);}
  togglePlay(){this.mode==='intuition'?(this.intPlaying?this.stopInt():this.playInt()):(this.playing?this.stopEx():this.startEx());}
  startEx(){if(this.cur>=this.steps.length-1)this.cur=0;this.playing=true;this.timer=setInterval(()=>{if(this.cur<this.steps.length-1){this.cur++;this.render();}else this.stopEx();},600/this.speed);this.render();}
  stopEx(){this.playing=false;clearInterval(this.timer);this.render();}
  stepFwd(){if(this.cur<this.steps.length-1){this.cur++;this.render();}}
  stepBack(){if(this.cur>0){this.cur--;this.render();}}
  resetEx(){this.cur=0;this.stopEx();}
  setSpeed(s){this.speed=parseFloat(s);if(this.playing){this.stopEx();this.startEx();}}
  nextStage(){if(this.intStage<INT_STAGES.length-1){this.intStage++;this.render();}}
  prevStage(){if(this.intStage>0){this.intStage--;this.render();}}
  playInt(){this.intPlaying=true;this.intTimer=setInterval(()=>{if(this.intStage<INT_STAGES.length-1){this.intStage++;this.render();}else this.stopInt();},4000);this.render();}
  stopInt(){this.intPlaying=false;clearInterval(this.intTimer);this.render();}

  parseInput(){
    try{
      const b=JSON.parse(document.getElementById('bi').value);
      const w=JSON.parse(document.getElementById('wi').value);
      if(!Array.isArray(b)||!b.every(Array.isArray))throw new Error();
      if(!Array.isArray(w))throw new Error();
      this.board=b;this.words=w;this.steps=genSteps(b,w);this.cur=0;this.render();
    }catch{alert('Invalid!\nBoard: [["o","a"],["e","t"]]\nWords: ["eat","oath"]');}
  }

  render(){
    document.getElementById('app').innerHTML=this.renderHeader()+this.renderBody();
    if(this.mode==='execution'){
      setTimeout(()=>{const el=document.querySelector('.cl.act');if(el)el.scrollIntoView({block:'center',behavior:'smooth'});},50);
    } else {
      setTimeout(()=>{const el=document.getElementById(`stage-${this.intStage}`);if(el)el.scrollIntoView({block:'start',behavior:'smooth'});},50);
    }
  }

  renderHeader(){
    return`<div class="hdr">
      <div class="hdr-r1">
        <span class="prob-title">212. Word Search II</span>
        <span class="badge">HARD</span>
        <div style="flex:1"></div>
        <button class="btn-sm" onclick="app.toggleTheme()">${this.theme==='dark'?'☀ Light':'🌙 Dark'}</button>
      </div>
      <div class="hdr-r2">
        <button class="mbtn ${this.mode==='intuition'?'on':''}" onclick="app.setMode('intuition')">💡 Intuition</button>
        <button class="mbtn ${this.mode==='execution'?'on':''}" onclick="app.setMode('execution')">▶ Step-by-Step</button>
        ${this.mode==='execution'?`<div class="irow" style="flex:1;margin:0 0 0 8px">
          <label>Board:</label>
          <input id="bi" value='${JSON.stringify(this.board).replace(/'/g,"&#39;")}' style="max-width:200px">
          <label>Words:</label>
          <input id="wi" value='${JSON.stringify(this.words).replace(/'/g,"&#39;")}' style="max-width:150px">
          <button class="btn-run" onclick="app.parseInput()">Run ▶</button>
        </div>`:''}
      </div>
    </div>`;
  }

  renderBody(){return this.mode==='intuition'?this.renderInt():this.renderEx();}

  // ── EXECUTION MODE ──────────────────────────────────────
  renderEx(){
    const step=this.steps[this.cur]||this.steps[0];
    return`<div class="panels" id="ex-panels" style="flex:1;overflow:hidden">
      <div class="panel" id="p-code" style="flex:0 0 ${this.pw[0]}%">${this.renderCode(step)}</div>
      <div class="resizer" id="r0" onmousedown="app.startResize(event,0)"></div>
      <div class="panel" id="p-trie" style="flex:0 0 ${this.pw[1]}%">${this.renderTriePanel(step)}</div>
      <div class="resizer" id="r1" onmousedown="app.startResize(event,1)"></div>
      <div class="panel" id="p-grid" style="flex:1 1 0%">${this.renderGrid(step)}</div>
      <div class="resizer" id="r2" onmousedown="app.startResize(event,2)"></div>
      <div class="panel" id="p-log" style="flex:0 0 14%;min-width:120px">${this.renderLog(step)}</div>
    </div>`;
  }

  renderCode(step){
    const lines=CODE.map((raw,i)=>{
      const act=step&&step.line===i+1;
      return`<div class="cl${act?' act':''}"><span class="ln">${i+1}</span><span class="lc">${hlLine(raw)}</span></div>`;
    }).join('');
    const pct=((this.cur/(this.steps.length-1))*100).toFixed(1);
    return`<div class="ph">Code <span style="font-weight:400;text-transform:none;font-size:9px">Python 3</span></div>
      <div class="pb"><div class="code-wrap" id="code-panel"><pre>${lines}</pre></div></div>
      <div class="ctrl-bar">
        <button class="cb" onclick="app.resetEx()" title="Reset">⏮</button>
        <button class="cb" onclick="app.stepBack()" ${this.cur===0?'disabled':''}>◀</button>
        <button class="cb play" onclick="app.togglePlay()">${this.playing?'⏸':'▶'}</button>
        <button class="cb" onclick="app.stepFwd()" ${this.cur>=this.steps.length-1?'disabled':''}>▶</button>
        <div class="prog"><div class="prog-fill" style="width:${pct}%"></div></div>
        <span class="si">${this.cur+1}/${this.steps.length}</span>
        <select class="spd" onchange="app.setSpeed(this.value)">
          <option value="0.5" ${this.speed==0.5?'selected':''}>0.5x</option>
          <option value="1" ${this.speed==1?'selected':''}>1x</option>
          <option value="2" ${this.speed==2?'selected':''}>2x</option>
          <option value="4" ${this.speed==4?'selected':''}>4x</option>
        </select>
      </div>`;
  }

  renderTriePanel(step){
    const ts=step?step.trieStatus:{};
    const ap=step?step.activeTriePath:null;
    const tag=step?step.tag:'';

    // Status legend with counts
    const active=Object.values(ts).filter(v=>v==='active').length;
    const found=Object.values(ts).filter(v=>v==='found').length;
    const pruned=Object.values(ts).filter(v=>v==='pruned').length;

    const tagColor=tag==='found'?'color:var(--grn)':tag==='prune'?'color:var(--red)':tag==='backtrack'?'color:var(--fg2)':'color:var(--ylw)';

    return`<div class="ph">Trie
      <span style="font-size:9px;font-weight:400;text-transform:none">
        <span style="color:var(--ylw)">●${active} active</span>
        <span style="color:var(--grn);margin-left:4px">●${found} found</span>
        <span style="color:var(--red);margin-left:4px">●${pruned} pruned</span>
      </span>
    </div>
    <div class="pb">
      <div class="trie-panel" style="padding:10px">
        ${step?`<div style="font-size:10px;margin-bottom:8px;padding:5px 8px;background:var(--bg2);border-radius:4px;border:1px solid var(--bdr)">
          <span style="${tagColor}">▸ ${step.desc.slice(0,60)}${step.desc.length>60?'…':''}</span>
        </div>`:''}
        <div class="trie-svg-wrap">
          ${renderTrieSVG(this.words,ts,ap)}
        </div>
        ${ap!==null&&ap!==undefined?`<div style="font-size:10px;color:var(--fg3);margin-top:6px;text-align:center;font-family:var(--mono)">
          Trie cursor: ${ap===''?'(root)':'"'+ap+'"'} ${ap&&ts[ap]?'['+ts[ap]+']':''}
        </div>`:''}
      </div>
    </div>`;
  }

  renderGrid(step){
    const board=step?step.board:this.board;
    const cur=step?step.cur:null;
    const path=step?step.path:[];
    const found=step?step.found:[];
    const tag=step?step.tag:'';
    const COLS=board[0].length;
    const pathSet=new Set(path.map(([r,c])=>`${r},${c}`));

    const cells=board.map((row,r)=>row.map((ch,c)=>{
      const k=`${r},${c}`;
      const isCur=cur&&cur[0]===r&&cur[1]===c;
      const isPth=pathSet.has(k);
      const isVis=ch==='#';
      let cls='n';
      if(isCur&&tag==='found')cls='fnd';
      else if(isCur)cls='cur';
      else if(isPth)cls='pth';
      else if(isVis)cls='vis';
      return`<div class="bc ${cls}">${isVis?'·':ch}</div>`;
    }).join('')).flat().join('');

    const chips=this.words.map(w=>`<div class="chip ${found.includes(w)?'done':''}"> ${w}</div>`).join('');

    const cards=`<div class="info-cards">
      <div class="ic"><div class="lbl">Step</div><div class="val">${this.cur+1}/${this.steps.length}</div></div>
      <div class="ic g"><div class="lbl">Found</div><div class="val">[${found.join(',')||'—'}]</div></div>
      <div class="ic y"><div class="lbl">Depth</div><div class="val">${path.length}</div></div>
      <div class="ic a"><div class="lbl">Action</div><div class="val">${tag||'—'}</div></div>
    </div>`;

    return`<div class="ph">Grid</div>
      <div class="pb">
        <div class="viz-canvas">
          ${cards}
          <div class="chips">${chips}</div>
          <div class="board-grid" style="grid-template-columns:repeat(${COLS},40px)">${cells}</div>
          <div class="legend">
            <div class="leg"><div class="ldot" style="background:rgba(251,191,36,.35);border-color:#f59e0b"></div><span>Current</span></div>
            <div class="leg"><div class="ldot" style="background:rgba(167,139,250,.25);border-color:#a78bfa"></div><span>Path</span></div>
            <div class="leg"><div class="ldot" style="background:rgba(52,211,153,.2);border-color:#34d399"></div><span>Found</span></div>
            <div class="leg"><div class="ldot" style="background:rgba(96,165,250,.15);border-color:#60a5fa"></div><span>Visited #</span></div>
          </div>
          ${step?`<div style="max-width:280px;text-align:center;font-size:11px;color:var(--fg2);line-height:1.5;padding:6px 10px;background:var(--bg);border:1px solid var(--bdr);border-radius:7px">${step.desc}</div>`:''}
        </div>
      </div>`;
  }

  renderLog(step){
    const vars=step?step.vars:{};
    const rows=Object.entries(vars).map(([k,v])=>`<div class="vr"><span class="vn">${k}</span><span class="vv">${String(v)}</span></div>`).join('');
    const hist=this.steps.slice(0,Math.min(this.cur+1,this.steps.length))
      .map((s,i)=>`<div class="hi${i===this.cur?' cur':''}" onclick="app.cur=${i};app.render()">${i+1}. ${s.desc.slice(0,30)}${s.desc.length>30?'…':''}</div>`)
      .reverse().slice(0,25).join('');
    return`<div class="ph">Log</div>
      <div class="pb">
        <div class="log">
          <div class="sdesc">${step?step.desc:'—'}</div>
          <div class="vs"><h4>Variables</h4>${rows||'<div style="color:var(--fg3);font-size:10px">—</div>'}</div>
          <div class="hs"><h4>History</h4>${hist}</div>
        </div>
      </div>`;
  }

  // ── INTUITION MODE ──────────────────────────────────────
  renderInt(){
    const stages=INT_STAGES;
    const list=stages.map((s,i)=>{
      const rel=i===this.intStage?'act':i<this.intStage?'past':'fut';
      return`<div class="sc ${rel}" id="stage-${i}">
        <div class="stit"><span class="snum">${i+1}</span>${s.title}</div>
        ${rel!=='fut'?`<div class="tthought">💭 "${s.thought}"</div>
          <div class="scontent">${s.content}</div>
          <div class="insight"><strong>💡 Key insight:</strong> ${s.insight}</div>`
          :'<div style="font-size:10px;color:var(--fg3);padding:2px 0">—</div>'}
      </div>`;
    }).join('');

    return`<div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div class="int-ctrl">
        <button class="cb" onclick="app.prevStage()" ${this.intStage===0?'disabled':''}>◀ Prev</button>
        <button class="cb play" onclick="app.togglePlay()" style="width:auto;padding:0 10px">${this.intPlaying?'⏸ Pause':'▶ Auto'}</button>
        <button class="cb" onclick="app.nextStage()" ${this.intStage===stages.length-1?'disabled':''}>Next ▶</button>
        <span class="si2" style="margin-left:7px">Stage ${this.intStage+1}/${stages.length}</span>
        <div class="prog" style="max-width:120px;margin-left:6px"><div class="prog-fill" style="width:${(this.intStage/(stages.length-1)*100).toFixed(0)}%"></div></div>
        <span style="font-size:10px;color:var(--fg3);margin-left:auto">← → Arrow keys · Space auto-play</span>
      </div>
      <div class="int-panels" id="int-panels" style="flex:1">
        <div class="int-left" id="int-left" style="flex:0 0 ${this.iw}%">${list}</div>
        <div class="resizer" id="r-int" onmousedown="app.startResize(event,'int')"></div>
        <div class="int-right" id="int-right" style="flex:1 1 0%">${this.renderIntViz(stages[this.intStage])}</div>
      </div>
    </div>`;
  }

  renderIntViz(s){
    const v=s.viz;
    if(v==='board'||v==='dfs_flow'||v==='edge_cases')return this.renderBoardViz(v);
    if(v==='trie')return this.renderTrieViz();
    if(v==='pruning')return this.renderPruningViz();
    if(v==='complexity')return this.renderComplexityViz();
    if(v==='final')return this.renderFinalViz();
    return this.renderBoardViz('board');
  }

  renderBoardViz(type){
    const board=DEF_BOARD;const COLS=board[0].length;
    const pathCells=type==='dfs_flow'?new Set(['1,0','2,1','2,2','1,2']):new Set();
    const foundCells=type==='edge_cases'?new Set(['1,0','1,1','1,2']):new Set();
    const cells=board.map((row,r)=>row.map((ch,c)=>{
      const k=`${r},${c}`;let cls='n';
      if(pathCells.has(k))cls='pth';if(foundCells.has(k))cls='fnd';
      return`<div class="bc ${cls}">${ch}</div>`;
    }).join('')).flat().join('');
    const lbl=type==='dfs_flow'?`<div style="font-size:11px;color:var(--fg2);margin-top:8px;text-align:center">Purple = DFS path being explored</div>`
      :type==='edge_cases'?`<div style="font-size:11px;color:var(--grn);margin-top:8px;text-align:center">Green = cells traced for "eat"</div>`
      :`<div style="font-size:11px;color:var(--fg2);margin-top:8px;text-align:center">4×4 board — finding: [${DEF_WORDS.join(', ')}]</div>`;
    return`<div style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:6px">
      <h3 style="font-size:13px;font-weight:600;align-self:flex-start">Board</h3>
      <div class="board-grid" style="grid-template-columns:repeat(${COLS},40px)">${cells}</div>
      ${lbl}
      <div class="chips">${DEF_WORDS.map(w=>`<div class="chip">${w}</div>`).join('')}</div>
    </div>`;
  }

  renderTrieViz(){
    // Show the trie in its fully-built state (all idle)
    const ts={};
    function markAll(node,path){ts[path]='idle';for(const[ch,child] of Object.entries(node.children))markAll(child,path+ch);}
    const root=buildTrie(DEF_WORDS);markAll(root,'');
    return`<div style="padding:6px">
      <h3 style="font-size:13px;font-weight:600;margin-bottom:10px">Trie structure</h3>
      ${renderTrieSVG(DEF_WORDS,ts,null)}
      <div style="font-size:11px;color:var(--fg2);margin-top:8px;line-height:1.6">
        Each node: <span style="color:var(--acc)">children{}</span>, <span style="color:var(--grn)">.word</span> (if word ends here), <span style="color:var(--ylw)">.count</span> (words through it)
      </div>
    </div>`;
  }

  renderPruningViz(){
    return`<div style="padding:6px;display:flex;flex-direction:column;gap:10px">
      <h3 style="font-size:13px;font-weight:600">Pruning in action</h3>
      <div style="background:var(--bg);border:1px solid var(--bdr);border-radius:7px;padding:12px">
        <div style="font-size:11px;font-weight:600;color:var(--grn);margin-bottom:5px">① Word "eat" found</div>
        <div style="font-size:11px;color:var(--fg2);font-family:var(--mono)">child.word = None<br>child.count -= 1 → 0</div>
      </div>
      <div style="background:var(--bg);border:1px solid var(--bdr);border-radius:7px;padding:12px">
        <div style="font-size:11px;font-weight:600;color:var(--red);margin-bottom:5px">② After backtrack: count == 0</div>
        <div style="font-size:11px;color:var(--fg2);font-family:var(--mono)">del node.children['t']<br>del node.children['a']<br>del root.children['e']</div>
      </div>
      <div style="background:var(--bg);border:1px solid var(--bdr);border-radius:7px;padding:12px">
        <div style="font-size:11px;font-weight:600;color:var(--acc);margin-bottom:5px">③ Any future cell with 'e'</div>
        <div style="font-size:11px;color:var(--fg2)">Trie lookup fails instantly. No DFS needed for that branch.</div>
      </div>
      <div style="background:rgba(52,211,153,.07);border:1px solid var(--grn);border-radius:7px;padding:10px;font-size:11px;color:var(--fg)">
        <strong style="color:var(--grn)">Result:</strong> Trie shrinks as words are found — later DFS calls get progressively faster.
      </div>
    </div>`;
  }

  renderComplexityViz(){
    return`<div style="padding:6px;display:flex;flex-direction:column;gap:10px">
      <h3 style="font-size:13px;font-weight:600">Complexity</h3>
      <div style="background:var(--bg);border:1px solid var(--bdr);border-radius:7px;padding:12px">
        <div style="font-size:12px;font-weight:600;color:var(--acc);margin-bottom:7px">⏱ Time</div>
        <div style="font-family:var(--mono);font-size:12px;color:var(--ylw);margin-bottom:5px">O(M·N · 4 · 3^(L-1))</div>
        <div style="font-size:11px;color:var(--fg2);line-height:1.6">M·N = grid cells<br>4 = first step directions<br>3^(L-1) = subsequent (no backtrack dir)<br><span style="color:var(--grn)">+ pruning reduces this in practice</span></div>
      </div>
      <div style="background:var(--bg);border:1px solid var(--bdr);border-radius:7px;padding:12px">
        <div style="font-size:12px;font-weight:600;color:var(--acc2);margin-bottom:7px">💾 Space</div>
        <div style="font-family:var(--mono);font-size:12px;color:var(--ylw);margin-bottom:5px">O(W·L)</div>
        <div style="font-size:11px;color:var(--fg2);line-height:1.6">W words × L avg length<br>Shared prefixes → actual nodes &lt; W·L<br>__slots__ saves ~3x memory</div>
      </div>
      <div style="background:rgba(248,113,113,.07);border:1px solid var(--red);border-radius:7px;padding:10px">
        <div style="font-size:11px;font-weight:600;color:var(--red);margin-bottom:3px">❌ Naive approach</div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--fg2)">O(W · M·N · 4^L)</div>
      </div>
    </div>`;
  }

  renderFinalViz(){
    return`<div style="padding:6px">
      <h3 style="font-size:13px;font-weight:600;margin-bottom:12px">Three ideas unified</h3>
      <svg viewBox="0 0 360 220" width="100%">
        <circle cx="180" cy="80" r="58" fill="rgba(96,165,250,.08)" stroke="#60a5fa" stroke-width="1.5"/>
        <text x="180" y="52" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="600" font-family="sans-serif">Trie</text>
        <text x="180" y="67" text-anchor="middle" fill="#9ca3af" font-size="10" font-family="sans-serif">multi-word search</text>
        <circle cx="100" cy="160" r="50" fill="rgba(167,139,250,.08)" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="100" y="148" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="600" font-family="sans-serif">DFS +</text>
        <text x="100" y="163" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="600" font-family="sans-serif">Backtrack</text>
        <circle cx="260" cy="160" r="50" fill="rgba(52,211,153,.08)" stroke="#34d399" stroke-width="1.5"/>
        <text x="260" y="148" text-anchor="middle" fill="#34d399" font-size="11" font-weight="600" font-family="sans-serif">Trie</text>
        <text x="260" y="163" text-anchor="middle" fill="#34d399" font-size="11" font-weight="600" font-family="sans-serif">Pruning</text>
        <path d="M145 125 L100 142" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3 2" fill="none"/>
        <path d="M213 127 L260 142" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3 2" fill="none"/>
        <path d="M143 176 L218 176" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3 2" fill="none"/>
        <rect x="130" y="195" width="100" height="22" rx="5" fill="rgba(251,191,36,.12)" stroke="#fbbf24" stroke-width="1"/>
        <text x="180" y="210" text-anchor="middle" fill="#fbbf24" font-size="11" font-family="sans-serif">["eat","oath"]</text>
      </svg>
      <div style="font-size:11px;color:var(--fg2);margin-top:8px;line-height:1.6">
        Switch to <strong style="color:var(--acc)">▶ Step-by-Step</strong> to watch the Trie highlight live alongside the grid — nodes turn yellow (active), green (found), red (pruned).
      </div>
    </div>`;
  }
}

let app;
document.addEventListener('DOMContentLoaded',()=>{app=new App();});
</script>
</body>
</html>
