<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>212. Word Search II - Visualizer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#1f2937;--bg-secondary:#111827;--bg-panel:#16213e;
  --text-primary:#f9fafb;--text-secondary:#9ca3af;--text-muted:#6b7280;
  --border:#374151;--accent:#60a5fa;--accent2:#a78bfa;
  --green:#34d399;--red:#f87171;--yellow:#fbbf24;--pink:#f472b6;--cyan:#22d3ee;
  --highlight-line:rgba(251,191,36,0.15);
  --font-mono:'Cascadia Code','Fira Code','Consolas','Monaco',monospace;
  --syn-keyword:#ff79c6;--syn-func:#50fa7b;--syn-string:#f1fa8c;
  --syn-comment:#6272a4;--syn-type:#8be9fd;--syn-number:#bd93f9;
  --syn-deco:#ffb86c;--syn-self:#ff79c6;--syn-op:#f8f8f2;
}
[data-theme="light"]{
  --bg-primary:#ffffff;--bg-secondary:#f3f4f6;--bg-panel:#f9fafb;
  --text-primary:#111827;--text-secondary:#6b7280;--text-muted:#9ca3af;
  --border:#e5e7eb;--accent:#2563eb;--accent2:#7c3aed;
  --highlight-line:#fef9c3;
  --syn-keyword:#d73a49;--syn-func:#6f42c1;--syn-string:#032f62;
  --syn-comment:#6a737d;--syn-type:#005cc5;--syn-number:#005cc5;
  --syn-deco:#e36209;--syn-self:#d73a49;
}

html,body{height:100%;overflow:hidden;font-family:'Inter',system-ui,sans-serif;background:var(--bg-secondary);color:var(--text-primary);font-size:14px}
#app{display:flex;flex-direction:column;height:100vh}

.header{background:var(--bg-primary);border-bottom:1px solid var(--border);padding:10px 16px;flex-shrink:0}
.header-row1{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.problem-title{font-size:16px;font-weight:700;color:var(--text-primary)}
.problem-badge{background:var(--accent2);color:#fff;font-size:10px;padding:2px 8px;border-radius:12px;font-weight:600}
.btn-theme{background:none;border:1px solid var(--border);color:var(--text-secondary);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px}
.btn-theme:hover{border-color:var(--accent);color:var(--accent)}
.header-row2{display:flex;gap:8px;align-items:center}
.mode-btn{padding:6px 16px;border:1px solid var(--border);background:none;color:var(--text-secondary);border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;transition:all 0.2s}
.mode-btn:hover{border-color:var(--accent);color:var(--accent)}
.mode-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.input-row{display:flex;gap:8px;align-items:center;margin-top:8px}
.input-row label{font-size:11px;color:var(--text-muted);white-space:nowrap}
.input-row input{background:var(--bg-secondary);border:1px solid var(--border);color:var(--text-primary);padding:4px 8px;border-radius:4px;font-size:11px;font-family:var(--font-mono);flex:1}
.btn-parse{background:var(--accent);color:#fff;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px}

.panels{display:flex;flex:1;overflow:hidden}
.panel{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
.panel:last-child{border-right:none}
.panel-header{padding:8px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);background:var(--bg-primary);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;justify-content:space-between;align-items:center}
.panel-body{flex:1;overflow:auto;position:relative}

/* CODE PANEL */
.code-wrap{font-family:var(--font-mono);font-size:14px;background:var(--bg-secondary);height:100%;overflow:auto}
.code-wrap pre{margin:0;padding:12px 0;line-height:0}
.code-line{display:flex;align-items:stretch;min-height:24px;transition:background 0.15s}
.code-line.active{background:var(--highlight-line)}
.line-num{min-width:38px;text-align:right;padding:2px 10px 2px 0;color:var(--text-muted);user-select:none;font-size:12px;line-height:20px;flex-shrink:0;padding-top:3px}
.line-code{flex:1;padding:3px 12px 3px 0;white-space:pre;line-height:20px}

/* Syntax classes */
.kw{color:var(--syn-keyword);font-weight:600}
.fn{color:var(--syn-func)}
.st{color:var(--syn-string)}
.cm{color:var(--syn-comment);font-style:italic}
.tp{color:var(--syn-type)}
.nm{color:var(--syn-number)}
.dc{color:var(--syn-deco)}
.sl{color:var(--syn-self)}

/* VIZ PANEL */
.viz-canvas{flex:1;overflow:auto;padding:16px;display:flex;flex-direction:column;align-items:center;gap:12px}

.board-grid{display:inline-grid;gap:4px}
.board-cell{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:18px;font-weight:700;font-family:var(--font-mono);transition:all 0.2s;border:2px solid transparent}
.board-cell.normal{background:var(--bg-secondary);border-color:var(--border);color:var(--text-primary)}
.board-cell.current{background:var(--yellow);border-color:#f59e0b;color:#000;box-shadow:0 0 12px rgba(251,191,36,0.5)}
.board-cell.visited{background:rgba(96,165,250,0.25);border-color:var(--accent);color:var(--accent)}
.board-cell.found{background:rgba(52,211,153,0.25);border-color:var(--green);color:var(--green)}
.board-cell.path{background:rgba(167,139,250,0.25);border-color:var(--accent2);color:var(--accent2)}

.info-cards{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.info-card{background:var(--bg-primary);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:12px;min-width:100px}
.info-card .label{color:var(--text-muted);font-size:10px;margin-bottom:2px}
.info-card .value{color:var(--text-primary);font-weight:600;font-family:var(--font-mono)}
.info-card.accent .value{color:var(--accent)}
.info-card.green .value{color:var(--green)}
.info-card.yellow .value{color:var(--yellow)}

.word-chips{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.chip{padding:3px 10px;border-radius:12px;font-size:12px;font-family:var(--font-mono);border:1px solid var(--border);background:var(--bg-primary);color:var(--text-secondary);transition:all 0.3s}
.chip.active{background:rgba(96,165,250,0.15);border-color:var(--accent);color:var(--accent)}
.chip.found{background:rgba(52,211,153,0.2);border-color:var(--green);color:var(--green)}

.controls{padding:10px 12px;border-top:1px solid var(--border);background:var(--bg-primary);display:flex;align-items:center;gap:8px;flex-shrink:0}
.ctrl-btn{background:var(--bg-secondary);border:1px solid var(--border);color:var(--text-primary);width:30px;height:30px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.15s}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent)}
.ctrl-btn:disabled{opacity:0.4;cursor:default}
.ctrl-btn.play{background:var(--accent);border-color:var(--accent);color:#fff;width:36px;height:36px}
.progress{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.1s}
.step-info{font-size:11px;color:var(--text-muted);white-space:nowrap}
.speed-sel{background:var(--bg-secondary);border:1px solid var(--border);color:var(--text-primary);padding:4px 6px;border-radius:4px;font-size:11px;cursor:pointer}

.step-log{padding:12px}
.step-desc{background:var(--bg-secondary);border:1px solid var(--border);border-radius:6px;padding:10px;font-size:12px;color:var(--text-primary);line-height:1.5;margin-bottom:12px}
.vars-section h4,.history-section h4{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px;letter-spacing:.5px}
.var-row{font-family:var(--font-mono);font-size:12px;margin:3px 0;display:flex;gap:6px}
.var-name{color:var(--accent);flex-shrink:0}
.var-val{color:var(--text-secondary);word-break:break-all}
.history-section{margin-top:12px}
.history-item{padding:4px 8px;border-radius:4px;font-size:11px;margin:2px 0;cursor:pointer;color:var(--text-muted)}
.history-item.cur{background:var(--bg-secondary);color:var(--text-primary);border:1px solid var(--border)}
.history-item:hover{color:var(--accent)}

.legend{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;font-size:11px}
.leg-item{display:flex;align-items:center;gap:4px}
.leg-dot{width:12px;height:12px;border-radius:3px;border:2px solid}

/* INTUITION */
.intuition-panels{display:flex;width:100%;height:100%}
.intuition-left{width:50%;border-right:1px solid var(--border);overflow:auto}
.intuition-right{width:50%;overflow:auto;padding:16px}
.stage-card{padding:16px 20px;border-bottom:1px solid var(--border);transition:all 0.3s}
.stage-card.active{background:var(--bg-primary)}
.stage-card.past{opacity:0.6}
.stage-card.future{opacity:0.25}
.stage-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:700;margin-right:8px;flex-shrink:0}
.stage-title{font-size:13px;font-weight:600;display:flex;align-items:center;margin-bottom:10px}
.thought-bubble{background:rgba(96,165,250,0.08);border-left:3px solid var(--accent);padding:8px 12px;font-style:italic;font-size:12px;color:var(--text-secondary);margin-bottom:10px;border-radius:0 4px 4px 0}
.stage-content{font-size:12px;color:var(--text-secondary);line-height:1.7;margin-bottom:10px}
.key-insight{background:rgba(52,211,153,0.08);border-left:3px solid var(--green);padding:8px 12px;font-size:12px;color:var(--text-primary);border-radius:0 4px 4px 0}
.key-insight strong{color:var(--green)}
.intuition-controls{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg-primary);flex-shrink:0}
.stage-indicator{font-size:12px;color:var(--text-muted)}
</style>
</head>
<body data-theme="dark">
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════════════
// PYTHON SOURCE LINES (raw strings, no HTML)
// ═══════════════════════════════════════════════════════════
const PYTHON_CODE = [
  "from typing import List",
  "",
  "class TrieNode:",
  "    __slots__ = ('children', 'word', 'count')",
  "",
  "    def __init__(self):",
  "        self.children: dict[str, 'TrieNode'] = {}",
  "        self.word: str | None = None",
  "        self.count: int = 0",
  "",
  "",
  "class Solution:",
  "    def findWords(self, board: List[List[str]], words: List[str]) -> List[str]:",
  "        # ── Build Trie ──────────────────────────────────────",
  "        root = TrieNode()",
  "",
  "        for word in words:",
  "            node = root",
  "            for ch in word:",
  "                if ch not in node.children:",
  "                    node.children[ch] = TrieNode()",
  "                node = node.children[ch]",
  "                node.count += 1",
  "            node.word = word",
  "",
  "        ROWS, COLS = len(board), len(board[0])",
  "        results: list[str] = []",
  "",
  "        # ── DFS + Backtracking ───────────────────────────────",
  "        def dfs(r: int, c: int, node: TrieNode) -> None:",
  "            ch = board[r][c]",
  "",
  "            child = node.children.get(ch)",
  "            if child is None:",
  "                return",
  "",
  "            # ── Found a complete word ─────────────────────────",
  "            if child.word:",
  "                results.append(child.word)",
  "                child.word = None    # avoid duplicates",
  "                child.count -= 1    # decrement word node",
  "",
  "            # ── Mark visited & recurse neighbours ────────────",
  "            board[r][c] = '#'",
  "",
  "            for dr, dc in ((-1,0),(1,0),(0,-1),(0,1)):",
  "                nr, nc = r + dr, c + dc",
  "                if 0 <= nr < ROWS and 0 <= nc < COLS and board[nr][nc] != '#':",
  "                    dfs(nr, nc, child)",
  "",
  "            board[r][c] = ch       # Restore (backtrack)",
  "",
  "            # ── Prune dead branch AFTER recursion ────────────",
  "            if child.count == 0:",
  "                del node.children[ch]  # safe to prune now",
  "",
  "        # ── Kick off DFS from every cell ─────────────────────",
  "        for r in range(ROWS):",
  "            for c in range(COLS):",
  "                if board[r][c] in root.children:",
  "                    dfs(r, c, root)",
  "",
  "        return results",
];

// ═══════════════════════════════════════════════════════════
// SYNTAX HIGHLIGHTER — token-based, no regex-on-HTML
// ═══════════════════════════════════════════════════════════
function highlightLine(rawLine) {
  if (rawLine.trim() === '') return '\u00a0'; // non-breaking space for empty lines

  // Step 1: tokenise the raw line into segments
  // We'll collect tokens: {type, text}
  // Types: 'comment', 'string', 'deco', 'keyword', 'self', 'func', 'type', 'number', 'plain'

  const tokens = [];
  let i = 0;
  const src = rawLine;

  while (i < src.length) {
    // ── Inline comment (# not inside string) ──
    if (src[i] === '#' && tokens.every(t => t.type !== 'string' || t._open === false)) {
      // Make sure we're not inside a string — just check if odd-quotes before this pos
      const before = src.slice(0, i);
      const sq = (before.match(/'/g) || []).length;
      const dq = (before.match(/"/g) || []).length;
      if (sq % 2 === 0 && dq % 2 === 0) {
        tokens.push({ type: 'comment', text: src.slice(i) });
        break;
      }
    }

    // ── Triple-quoted string ──
    if ((src[i] === "'" && src.slice(i, i+3) === "'''") ||
        (src[i] === '"' && src.slice(i, i+3) === '"""')) {
      const q = src.slice(i, i+3);
      const end = src.indexOf(q, i+3);
      const full = end === -1 ? src.slice(i) : src.slice(i, end+3);
      tokens.push({ type: 'string', text: full });
      i += full.length;
      continue;
    }

    // ── Single-quoted string ──
    if (src[i] === "'" || src[i] === '"') {
      const q = src[i];
      let j = i + 1;
      while (j < src.length && src[j] !== q) {
        if (src[j] === '\\') j++; // skip escaped char
        j++;
      }
      tokens.push({ type: 'string', text: src.slice(i, j+1) });
      i = j + 1;
      continue;
    }

    // ── Identifier or keyword ──
    if (/[a-zA-Z_]/.test(src[i])) {
      let j = i;
      while (j < src.length && /[a-zA-Z0-9_]/.test(src[j])) j++;
      const word = src.slice(i, j);
      const KEYWORDS = new Set(['from','import','class','def','return','if','else','elif',
        'for','in','not','None','True','False','and','or','del','while','pass','raise',
        'with','as','try','except','finally','lambda','yield','global','nonlocal','assert']);
      const TYPES = new Set(['List','dict','str','int','bool','float','Optional','Union',
        'Tuple','Set','Any','TrieNode','None']);
      const DECO = new Set(['__slots__','__init__','__repr__','__str__','__len__',
        '__eq__','__hash__','__new__','__del__']);

      // Peek: is the next non-space char '('? → function name
      const after = src.slice(j).trimStart();
      const isCall = after.startsWith('(');
      // Is previous token a 'def '?
      const prevText = tokens.map(t=>t.text).join('');
      const isDefName = /\bdef\s+$/.test(prevText);

      if (word === 'self') {
        tokens.push({ type: 'self', text: word });
      } else if (DECO.has(word)) {
        tokens.push({ type: 'deco', text: word });
      } else if (KEYWORDS.has(word)) {
        tokens.push({ type: 'keyword', text: word });
      } else if (TYPES.has(word)) {
        tokens.push({ type: 'type', text: word });
      } else if (isDefName || (isCall && !KEYWORDS.has(word))) {
        tokens.push({ type: 'func', text: word });
      } else {
        tokens.push({ type: 'plain', text: word });
      }
      i = j;
      continue;
    }

    // ── Number ──
    if (/[0-9]/.test(src[i])) {
      let j = i;
      while (j < src.length && /[0-9.]/.test(src[j])) j++;
      tokens.push({ type: 'number', text: src.slice(i, j) });
      i = j;
      continue;
    }

    // ── Plain character ──
    tokens.push({ type: 'plain', text: src[i] });
    i++;
  }

  // Step 2: render tokens to HTML (escape each token's text)
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  return tokens.map(tok => {
    const t = esc(tok.text);
    switch (tok.type) {
      case 'comment':  return `<span class="cm">${t}</span>`;
      case 'string':   return `<span class="st">${t}</span>`;
      case 'keyword':  return `<span class="kw">${t}</span>`;
      case 'func':     return `<span class="fn">${t}</span>`;
      case 'type':     return `<span class="tp">${t}</span>`;
      case 'number':   return `<span class="nm">${t}</span>`;
      case 'deco':     return `<span class="dc">${t}</span>`;
      case 'self':     return `<span class="sl">${t}</span>`;
      default:         return t;
    }
  }).join('');
}

// ═══════════════════════════════════════════════════════════
// DEFAULT TEST DATA
// ═══════════════════════════════════════════════════════════
const DEFAULT_BOARD = [
  ['o','a','a','n'],
  ['e','t','a','e'],
  ['i','h','k','r'],
  ['i','f','l','v']
];
const DEFAULT_WORDS = ['oath','pea','eat','rain'];

// ═══════════════════════════════════════════════════════════
// TRIE
// ═══════════════════════════════════════════════════════════
class TrieNode {
  constructor() { this.children = {}; this.word = null; this.count = 0; }
}
function buildTrie(words) {
  const root = new TrieNode();
  for (const word of words) {
    let node = root;
    for (const ch of word) {
      if (!node.children[ch]) node.children[ch] = new TrieNode();
      node = node.children[ch];
      node.count++;
    }
    node.word = word;
  }
  return root;
}

// ═══════════════════════════════════════════════════════════
// STEP GENERATOR
// ═══════════════════════════════════════════════════════════
function generateSteps(board, words) {
  const steps = [];
  const ROWS = board.length, COLS = board[0].length;
  const B = board.map(r=>[...r]);
  const root = buildTrie(words);

  steps.push({
    line:14, desc:`Build Trie from ${words.length} words: [${words.join(', ')}]`,
    vars:{words:JSON.stringify(words),trie_words:words.length},
    board:B.map(r=>[...r]),path:[],current:null,foundWords:[],tag:'build_trie'
  });
  steps.push({
    line:25, desc:`Board is ${ROWS}×${COLS}. Initialize results = []`,
    vars:{ROWS,COLS,results:'[]'},
    board:B.map(r=>[...r]),path:[],current:null,foundWords:[],tag:'init'
  });

  const results = [];
  const path = [];

  function dfs(r, c, node) {
    const ch = B[r][c];
    steps.push({
      line:30, desc:`dfs(${r},${c}) — board[${r}][${c}] = '${ch}'`,
      vars:{r,c,ch,path:JSON.stringify(path.map(([a,b])=>`(${a},${b})`)),results:JSON.stringify(results)},
      board:B.map(row=>[...row]),path:[...path],current:[r,c],foundWords:[...results],tag:'enter'
    });

    const child = node.children[ch];
    steps.push({
      line:32, desc:`Look up '${ch}' in trie — ${child?'FOUND child node':'no match → backtrack'}`,
      vars:{ch,child_exists:!!child,child_count:child?.count,child_word:child?.word||'null'},
      board:B.map(row=>[...row]),path:[...path],current:[r,c],foundWords:[...results],tag:child?'match':'no_match'
    });
    if (!child) return;

    if (child.word) {
      results.push(child.word);
      steps.push({
        line:38, desc:`🎉 Found word: "${child.word}" — append to results`,
        vars:{found_word:child.word,results:JSON.stringify(results)},
        board:B.map(row=>[...row]),path:[...path],current:[r,c],foundWords:[...results],tag:'found'
      });
      child.word = null;
      child.count--;
    }

    B[r][c] = '#';
    path.push([r,c]);
    steps.push({
      line:43, desc:`Mark board[${r}][${c}]='#' (visited). Path depth: ${path.length}`,
      vars:{marked:`(${r},${c})`,path_len:path.length},
      board:B.map(row=>[...row]),path:[...path],current:[r,c],foundWords:[...results],tag:'mark'
    });

    for (const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nr=r+dr, nc=c+dc;
      if (nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&B[nr][nc]!=='#') {
        steps.push({
          line:45, desc:`Try neighbour (${nr},${nc})='${B[nr][nc]}'`,
          vars:{from:`(${r},${c})`,to:`(${nr},${nc})`,val:B[nr][nc]},
          board:B.map(row=>[...row]),path:[...path],current:[r,c],foundWords:[...results],tag:'neighbour'
        });
        dfs(nr,nc,child);
      }
    }

    B[r][c] = ch;
    path.pop();
    steps.push({
      line:49, desc:`Backtrack: restore board[${r}][${c}]='${ch}'`,
      vars:{restored:`(${r},${c})`,ch,path_remaining:path.length},
      board:B.map(row=>[...row]),path:[...path],current:[r,c],foundWords:[...results],tag:'backtrack'
    });

    if (child.count===0) {
      delete node.children[ch];
      steps.push({
        line:52, desc:`🌿 Prune: delete '${ch}' from trie (count=0, branch exhausted)`,
        vars:{pruned_char:ch,at:`(${r},${c})`},
        board:B.map(row=>[...row]),path:[...path],current:null,foundWords:[...results],tag:'prune'
      });
    }
  }

  for (let r=0;r<ROWS;r++) {
    for (let c=0;c<COLS;c++) {
      if (B[r][c] in root.children) {
        steps.push({
          line:57, desc:`Start DFS from (${r},${c})='${B[r][c]}' — present in trie`,
          vars:{r,c,cell:B[r][c]},
          board:B.map(row=>[...row]),path:[],current:[r,c],foundWords:[...results],tag:'start_dfs'
        });
        dfs(r,c,root);
      }
    }
  }

  steps.push({
    line:60, desc:`Done! Return results: [${results.join(', ')}]`,
    vars:{results:JSON.stringify(results),count:results.length},
    board:B.map(row=>[...row]),path:[],current:null,foundWords:[...results],tag:'done'
  });
  return steps;
}

const INTUITION_STAGES = [
  {
    title:"Understanding the Problem",
    thought:"Okay, word search on a grid... I need to find multiple words simultaneously. That changes everything.",
    content:`We have an m×n character grid and a list of words. We need to find <em>all</em> words constructable from sequentially adjacent cells, where no cell is reused per word.<br><br>
Key observations:<br>
• Multiple words to find at once (not just one)<br>
• Path constraint: can't revisit a cell within one word<br>
• Same cell can start different words<br>
• Classic DFS + backtracking territory`,
    insight:"Finding multiple words simultaneously is the hard part — naively running Word Search I per word is O(W × M × N × 4^L), unacceptably slow.",
    viz:'board'
  },
  {
    title:"Why Trie is the Key Data Structure",
    thought:"If I search one word at a time, I'm doing redundant work. What if I searched ALL words in one DFS pass?",
    content:`The <strong>Trie</strong> (prefix tree) lets us search all words simultaneously:<br><br>
• Insert all words into a Trie<br>
• During DFS, follow the Trie instead of matching individual words<br>
• At each cell, check: "is this character a valid Trie child?"<br>
• If a Trie node has <code>.word</code> set, we found a complete word<br><br>
This collapses all word searches into ONE grid traversal!`,
    insight:"Shared prefixes cost nothing extra. 'oath' and 'oat' both start with 'o','a','t' — the Trie traverses that path once, branching only where words diverge.",
    viz:'trie'
  },
  {
    title:"DFS + Backtracking on the Grid",
    thought:"Once I have the Trie, the DFS structure is elegant. I walk the grid and the Trie simultaneously.",
    content:`At each cell (r, c):<br>
1. Get <code>ch = board[r][c]</code><br>
2. Check if <code>ch</code> is a child in current Trie node<br>
3. If yes: recurse into 4 neighbours with the child node<br>
4. Mark cell as <code>'#'</code> before recursing (visited)<br>
5. Restore cell after recursing (backtrack)<br><br>
The Trie node tracks our progress in word-matching.`,
    insight:"The '#' marker IS the visited set — we avoid a separate set() by mutating the board temporarily, then restoring on backtrack.",
    viz:'dfs_flow'
  },
  {
    title:"The count Trick for Pruning",
    thought:"If I've already found 'eat', I'll still DFS into those branches... unless I prune them.",
    content:`Each TrieNode tracks <code>count</code> = number of words passing through it.<br><br>
When a word is found:<br>
• Set <code>child.word = None</code> (prevent duplicates)<br>
• Decrement <code>child.count</code><br><br>
When <code>count == 0</code> after recursion:<br>
• Delete the child: <code>del node.children[ch]</code><br>
• Prunes the entire dead Trie branch!<br><br>
Future DFS calls skip pruned branches instantly.`,
    insight:"As words are found, the Trie shrinks — later DFS calls from other cells do progressively less work. Pruning is what makes this solution efficient in practice.",
    viz:'pruning'
  },
  {
    title:"Complexity Analysis",
    thought:"Let me verify this is actually better than naive. Trie construction is cheap; the DFS is the interesting part.",
    content:`<strong>Time:</strong> O(M × N × 4 × 3^(L-1)) where L = max word length<br>
• 4 directions for first step, 3 for subsequent (no backtrack)<br>
• Pruning further reduces this in practice<br><br>
<strong>Space:</strong> O(W × L) for Trie (shared prefixes reduce actual nodes)<br><br>
<strong>vs. Naive O(W × M × N × 4^L):</strong><br>
• Trie: searches all W words in one pass<br>
• Pruning eliminates exhausted branches early`,
    insight:"The Trie + pruning combination is what separates this from naive. __slots__ on TrieNode is a bonus: prevents Python dict per node, ~3x memory reduction.",
    viz:'complexity'
  },
  {
    title:"Edge Cases & Robustness",
    thought:"What breaks this? Duplicate words? All same letters? Very long words?",
    content:`Edge cases handled elegantly:<br>
• <strong>Duplicate words:</strong> <code>child.word = None</code> after finding prevents re-adding<br>
• <strong>Word is prefix of another:</strong> Trie handles naturally — a node can be both word-end and prefix<br>
• <strong>Single-cell words:</strong> Root's direct child has <code>.word</code> set — found immediately<br>
• <strong>Cell reuse across words:</strong> '#' is restored after each DFS, so other words can reuse cells<br>
• <strong>Board with repeated chars:</strong> DFS explores all valid paths`,
    insight:"The solution handles all edge cases without special-casing, because the Trie structure + backtracking naturally encodes the constraints.",
    viz:'edge_cases'
  },
  {
    title:"Final: The Elegant Whole",
    thought:"Beautiful — Trie for multi-word matching, DFS+backtracking for grid traversal, count-based pruning for efficiency. Three ideas, perfectly unified.",
    content:`The solution layers three classic techniques:<br><br>
<strong>1. Trie</strong> → Convert word list into a searchable prefix tree<br>
<strong>2. DFS + Backtracking</strong> → Explore all grid paths, undoing moves<br>
<strong>3. Trie Pruning</strong> → Dynamically shrink Trie as words are found<br><br>
These three reinforce each other: DFS explores, Trie validates all words simultaneously, pruning makes subsequent calls faster.`,
    insight:"This is a Hard problem but the code is ~30 lines because each line does one job. The difficulty is knowing WHICH three ideas to combine.",

  }
];

// APP
// ═══════════════════════════════════════════════════════════
class App {
  constructor() {
    this.theme='dark';
    this.mode='intuition';
    this.board=DEFAULT_BOARD.map(r=>[...r]);
    this.words=[...DEFAULT_WORDS];
    this.steps=[];
    this.currentStep=0;
    this.isPlaying=false;
    this.speed=1;
    this.timer=null;
    this.intuitionStage=0;
    this.intuitionTimer=null;
    this.intuitionPlaying=false;
    this.steps=generateSteps(this.board,this.words);
    this.render();
    this.attachKeys();
  }

  attachKeys() {
    document.addEventListener('keydown',e=>{
      if(e.code==='Space'){e.preventDefault();this.togglePlay();}
      if(e.code==='ArrowRight'){e.preventDefault();this.mode==='intuition'?this.nextStage():this.stepFwd();}
      if(e.code==='ArrowLeft'){e.preventDefault();this.mode==='intuition'?this.prevStage():this.stepBack();}
    });
  }

  toggleTheme(){
    this.theme=this.theme==='dark'?'light':'dark';
    document.body.dataset.theme=this.theme;
    this.render();
  }

  setMode(m){this.stopPlay();this.mode=m;this.render();}

  togglePlay(){
    if(this.mode==='intuition'){this.intuitionPlaying?this.stopIntuition():this.playIntuition();}
    else{this.isPlaying?this.stopPlay():this.startPlay();}
  }

  startPlay(){
    if(this.currentStep>=this.steps.length-1)this.currentStep=0;
    this.isPlaying=true;
    this.timer=setInterval(()=>{
      if(this.currentStep<this.steps.length-1){this.currentStep++;this.render();}
      else{this.stopPlay();}
    },600/this.speed);
    this.render();
  }

  stopPlay(){this.isPlaying=false;clearInterval(this.timer);this.render();}
  stepFwd(){if(this.currentStep<this.steps.length-1){this.currentStep++;this.render();}}
  stepBack(){if(this.currentStep>0){this.currentStep--;this.render();}}
  resetSteps(){this.currentStep=0;this.stopPlay();}
  setSpeed(s){this.speed=parseFloat(s);if(this.isPlaying){this.stopPlay();this.startPlay();}}
  nextStage(){if(this.intuitionStage<INTUITION_STAGES.length-1){this.intuitionStage++;this.render();}}
  prevStage(){if(this.intuitionStage>0){this.intuitionStage--;this.render();}}

  playIntuition(){
    this.intuitionPlaying=true;
    this.intuitionTimer=setInterval(()=>{
      if(this.intuitionStage<INTUITION_STAGES.length-1){this.intuitionStage++;this.render();}
      else{this.stopIntuition();}
    },4000);
    this.render();
  }
  stopIntuition(){this.intuitionPlaying=false;clearInterval(this.intuitionTimer);this.render();}

  parseInput(){
    try{
      const raw=document.getElementById('board-input').value.trim();
      const wordsRaw=document.getElementById('words-input').value.trim();
      const parsed=JSON.parse(raw);
      const wordsParsed=JSON.parse(wordsRaw);
      if(!Array.isArray(parsed)||!parsed.every(Array.isArray))throw new Error('bad board');
      if(!Array.isArray(wordsParsed))throw new Error('bad words');
      this.board=parsed;this.words=wordsParsed;
      this.steps=generateSteps(this.board,this.words);
      this.currentStep=0;this.render();
    }catch(err){alert('Invalid input!\nBoard: [["o","a"],["e","t"]]\nWords: ["eat","oath"]');}
  }

  render(){
    document.getElementById('app').innerHTML=this.renderHeader()+this.renderBody();
    if(this.mode==='execution'){
      setTimeout(()=>{
        const active=document.querySelector('.code-line.active');
        if(active)active.scrollIntoView({block:'center',behavior:'smooth'});
      },50);
    } else {
      setTimeout(()=>{
        const el=document.getElementById(`stage-${this.intuitionStage}`);
        if(el)el.scrollIntoView({block:'start',behavior:'smooth'});
      },50);
    }
  }

  renderHeader(){
    return `<div class="header">
      <div class="header-row1">
        <span class="problem-title">212. Word Search II</span>
        <span class="problem-badge">HARD</span>
        <div style="flex:1"></div>
        <button class="btn-theme" onclick="app.toggleTheme()">${this.theme==='dark'?'☀ Light':'🌙 Dark'}</button>
      </div>
      <div class="header-row2">
        <button class="mode-btn ${this.mode==='intuition'?'active':''}" onclick="app.setMode('intuition')">💡 Intuition</button>
        <button class="mode-btn ${this.mode==='execution'?'active':''}" onclick="app.setMode('execution')">▶ Step-by-Step</button>
        ${this.mode==='execution'?`
        <div class="input-row" style="flex:1;margin:0 0 0 8px">
          <label>Board:</label>
          <input id="board-input" value='${JSON.stringify(this.board).replace(/'/g,"&#39;")}' style="max-width:220px">
          <label>Words:</label>
          <input id="words-input" value='${JSON.stringify(this.words).replace(/'/g,"&#39;")}' style="max-width:160px">
          <button class="btn-parse" onclick="app.parseInput()">Run ▶</button>
        </div>`:''}
      </div>
    </div>`;
  }

  renderBody(){
    if(this.mode==='intuition')return this.renderIntuition();
    return this.renderExecution();
  }

  // ── EXECUTION ─────────────────────────────────────────────
  renderExecution(){
    const step=this.steps[this.currentStep]||this.steps[0];
    return `<div class="panels" style="flex:1;overflow:hidden">
      ${this.renderCodePanel(step)}
      ${this.renderVizPanel(step)}
      ${this.renderLogPanel(step)}
    </div>`;
  }

  renderCodePanel(step){
    const lines=PYTHON_CODE.map((raw,i)=>{
      const active=step&&step.line===i+1;
      return `<div class="code-line${active?' active':''}"><span class="line-num">${i+1}</span><span class="line-code">${highlightLine(raw)}</span></div>`;
    }).join('');
    const pct=((this.currentStep/(this.steps.length-1))*100).toFixed(1);
    return `<div class="panel" style="width:32%;min-width:260px">
      <div class="panel-header">Code <span style="font-weight:400;text-transform:none;font-size:10px">Python 3</span></div>
      <div class="panel-body"><div class="code-wrap" id="code-panel"><pre>${lines}</pre></div></div>
      <div class="controls">
        <button class="ctrl-btn" onclick="app.resetSteps()" title="Reset">⏮</button>
        <button class="ctrl-btn" onclick="app.stepBack()" ${this.currentStep===0?'disabled':''}>◀</button>
        <button class="ctrl-btn play" onclick="app.togglePlay()">${this.isPlaying?'⏸':'▶'}</button>
        <button class="ctrl-btn" onclick="app.stepFwd()" ${this.currentStep>=this.steps.length-1?'disabled':''}>▶</button>
        <div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div>
        <span class="step-info">${this.currentStep+1}/${this.steps.length}</span>
        <select class="speed-sel" onchange="app.setSpeed(this.value)">
          <option value="0.5" ${this.speed==0.5?'selected':''}>0.5x</option>
          <option value="1" ${this.speed==1?'selected':''}>1x</option>
          <option value="2" ${this.speed==2?'selected':''}>2x</option>
          <option value="4" ${this.speed==4?'selected':''}>4x</option>
        </select>
      </div>
    </div>`;
  }

  renderVizPanel(step){
    const board=step?step.board:this.board;
    const current=step?step.current:null;
    const path=step?step.path:[];
    const found=step?step.foundWords:[];
    const tag=step?step.tag:'';
    const COLS=board[0].length;
    const pathSet=new Set(path.map(([r,c])=>`${r},${c}`));

    const cells=board.map((row,r)=>row.map((ch,c)=>{
      const key=`${r},${c}`;
      const isCur=current&&current[0]===r&&current[1]===c;
      const isPath=pathSet.has(key);
      const isVisited=ch==='#';
      let cls='normal';
      if(isCur&&tag==='found')cls='found';
      else if(isCur)cls='current';
      else if(isPath)cls='path';
      else if(isVisited)cls='visited';
      return `<div class="board-cell ${cls}">${isVisited?'·':ch}</div>`;
    }).join('')).flat().join('');

    const chips=this.words.map(w=>`<div class="chip ${found.includes(w)?'found':''}">${w}</div>`).join('');

    const cards=`<div class="info-cards">
      <div class="info-card"><div class="label">Step</div><div class="value">${this.currentStep+1}/${this.steps.length}</div></div>
      <div class="info-card green"><div class="label">Found</div><div class="value">[${found.join(', ')||'—'}]</div></div>
      <div class="info-card yellow"><div class="label">Depth</div><div class="value">${path.length}</div></div>
      <div class="info-card accent"><div class="label">Action</div><div class="value">${tag}</div></div>
    </div>`;

    const legend=`<div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:rgba(251,191,36,.4);border-color:#f59e0b"></div><span>Current</span></div>
      <div class="leg-item"><div class="leg-dot" style="background:rgba(167,139,250,.3);border-color:#a78bfa"></div><span>Path</span></div>
      <div class="leg-item"><div class="leg-dot" style="background:rgba(52,211,153,.25);border-color:#34d399"></div><span>Found</span></div>
      <div class="leg-item"><div class="leg-dot" style="background:rgba(96,165,250,.2);border-color:#60a5fa"></div><span>Visited '#'</span></div>
    </div>`;

    return `<div class="panel" style="flex:1">
      <div class="panel-header">Visualization <span style="font-size:10px;font-weight:400">Grid + Trie DFS</span></div>
      <div class="panel-body">
        <div class="viz-canvas">
          ${cards}
          <div class="word-chips">${chips}</div>
          <div class="board-grid" style="grid-template-columns:repeat(${COLS},44px)">${cells}</div>
          ${legend}
          ${step?`<div style="max-width:420px;text-align:center;font-size:12px;color:var(--text-secondary);line-height:1.5;padding:8px 12px;background:var(--bg-primary);border:1px solid var(--border);border-radius:8px">${step.desc}</div>`:''}
        </div>
      </div>
    </div>`;
  }

  renderLogPanel(step){
    const vars=step?step.vars:{};
    const varRows=Object.entries(vars).map(([k,v])=>
      `<div class="var-row"><span class="var-name">${k}</span><span class="var-val">${String(v)}</span></div>`
    ).join('');
    const history=this.steps.slice(0,Math.min(this.currentStep+1,this.steps.length))
      .map((s,i)=>`<div class="history-item${i===this.currentStep?' cur':''}" onclick="app.currentStep=${i};app.render()">${i+1}. ${s.desc.slice(0,38)}${s.desc.length>38?'…':''}</div>`)
      .reverse().slice(0,30).join('');
    return `<div class="panel" style="width:22%;min-width:180px">
      <div class="panel-header">Step Log</div>
      <div class="panel-body">
        <div class="step-log">
          <div class="step-desc">${step?step.desc:'—'}</div>
          <div class="vars-section"><h4>Variables</h4>${varRows||'<div style="color:var(--text-muted);font-size:11px">—</div>'}</div>
          <div class="history-section"><h4>History</h4>${history}</div>
        </div>
      </div>
    </div>`;
  }

  // ── INTUITION ─────────────────────────────────────────────
  renderIntuition(){
    const stages=INTUITION_STAGES;
    const stageList=stages.map((s,i)=>{
      const rel=i===this.intuitionStage?'active':i<this.intuitionStage?'past':'future';
      return `<div class="stage-card ${rel}" id="stage-${i}">
        <div class="stage-title"><span class="stage-num">${i+1}</span>${s.title}</div>
        ${rel!=='future'?`
          <div class="thought-bubble">💭 "${s.thought}"</div>
          <div class="stage-content">${s.content}</div>
          <div class="key-insight"><strong>💡 Key Insight:</strong> ${s.insight}</div>
        `:'<div style="font-size:11px;color:var(--text-muted);padding:4px 0">—</div>'}
      </div>`;
    }).join('');

    return `<div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div class="intuition-controls">
        <button class="ctrl-btn" onclick="app.prevStage()" ${this.intuitionStage===0?'disabled':''}>◀ Prev</button>
        <button class="ctrl-btn play" onclick="app.togglePlay()" style="width:auto;padding:0 12px">${this.intuitionPlaying?'⏸ Pause':'▶ Auto'}</button>
        <button class="ctrl-btn" onclick="app.nextStage()" ${this.intuitionStage===stages.length-1?'disabled':''}>Next ▶</button>
        <span class="stage-indicator" style="margin-left:8px">Stage ${this.intuitionStage+1} of ${stages.length}</span>
        <div class="progress" style="max-width:160px"><div class="progress-fill" style="width:${(this.intuitionStage/(stages.length-1)*100).toFixed(0)}%"></div></div>
        <span style="font-size:11px;color:var(--text-muted);margin-left:auto">← → Arrow keys · Space to auto-play</span>
      </div>
      <div class="intuition-panels" style="flex:1">
        <div class="intuition-left">${stageList}</div>
        <div class="intuition-right">${this.renderIntuitionViz(stages[this.intuitionStage])}</div>
      </div>
    </div>`;
  }

  renderIntuitionViz(stage){
    const viz=stage.viz;
    if(viz==='board'||viz==='dfs_flow'||viz==='edge_cases')return this.renderBoardViz(viz);
    if(viz==='trie')return this.renderTrieViz();
    if(viz==='pruning')return this.renderPruningViz();
    if(viz==='complexity')return this.renderComplexityViz();
    if(viz==='final')return this.renderFinalViz();
    return this.renderBoardViz('board');
  }

  renderBoardViz(type){
    const board=DEFAULT_BOARD;
    const COLS=board[0].length;
    const pathCells=type==='dfs_flow'?new Set(['1,0','2,1','2,2','1,2']):new Set();
    const foundCells=type==='edge_cases'?new Set(['1,1','1,2','0,2']):new Set();
    const cells=board.map((row,r)=>row.map((ch,c)=>{
      const key=`${r},${c}`;

      return `<div class="board-cell ${cls}">${ch}</div>`;
    }).join('')).flat().join('');
    const label=type==='dfs_flow'
      ?`<div style="font-size:12px;color:var(--text-secondary);margin-top:8px;text-align:center">Purple = DFS path being explored</div>`

      ?`<div style="font-size:12px;color:var(--green);margin-top:8px;text-align:center">Green = cells used for "eat": e(1,0)→a(1,1)→t(1,2)</div>`
      :`<div style="font-size:12px;color:var(--text-secondary);margin-top:8px;text-align:center">4×4 board — finding: [${DEFAULT_WORDS.join(', ')}]</div>`;

      <h3 style="font-size:14px;font-weight:600;color:var(--text-primary);align-self:flex-start">Board Visualization</h3>
      <div class="board-grid" style="grid-template-columns:repeat(${COLS},44px)">${cells}</div>
      ${label}
      <div class="word-chips" style="margin-top:8px">${DEFAULT_WORDS.map(w=>`<div class="chip">${w}</div>`).join('')}</div>
    </div>`;
  }

  renderTrieViz(){

        <circle cx="60" cy="108" r="18" fill="#374151" stroke="#60a5fa" stroke-width="2"/>
        <text x="60" y="113" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="700">o</text>
        <line x1="60" y1="126" x2="60" y2="158" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr)"/>
        <circle cx="60" cy="176" r="18" fill="#374151" stroke="#60a5fa" stroke-width="2"/>
        <text x="60" y="181" text-anchor="middle" fill="#f9fafb" font-size="15" font-weight="700">a</text>
        <line x1="60" y1="194" x2="60" y2="226" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr)"/>
        <circle cx="60" cy="244" r="18" fill="#374151" stroke="#60a5fa" stroke-width="2"/>
        <text x="60" y="249" text-anchor="middle" fill="#f9fafb" font-size="15" font-weight="700">t</text>
