<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>647. Palindromic Substrings - Visualizer</title>
<style>
  :root {
    --bg-primary: #1e1e2e;
    --bg-secondary: #181825;
    --bg-tertiary: #313244;
    --bg-hover: #45475a;
    --text-primary: #cdd6f4;
    --text-secondary: #a6adc8;
    --text-muted: #6c7086;
    --border: #45475a;
    --accent: #89b4fa;
    --accent2: #cba6f7;
    --green: #a6e3a1;
    --yellow: #f9e2af;
    --red: #f38ba8;
    --teal: #94e2d5;
    --peach: #fab387;
    --sky: #89dceb;
    --font-mono: 'JetBrains Mono','Fira Code','Cascadia Code','Consolas','Monaco',monospace;

    /* syntax highlighting - dark dracula */
    --syn-keyword: #ff79c6;
    --syn-function: #50fa7b;
    --syn-string: #f1fa8c;
    --syn-comment: #6272a4;
    --syn-type: #8be9fd;
    --syn-number: #bd93f9;
    --syn-decorator: #ff79c6;
    --syn-builtin: #ffb86c;

    --highlight-line: rgba(249, 226, 175, 0.12);
    --highlight-border: #f9e2af;

    --mode-active-bg: #89b4fa;
    --mode-active-text: #1e1e2e;
    --mode-inactive-bg: #313244;
    --mode-inactive-text: #cdd6f4;

    --panel-header-bg: #181825;
    --panel-header-text: #89b4fa;
    --divider: #45475a;
    --btn-bg: #313244;
    --btn-hover: #45475a;
    --btn-active: #89b4fa;
  }

  [data-theme="light"] {
    --bg-primary: #ffffff;
    --bg-secondary: #f3f4f6;
    --bg-tertiary: #e5e7eb;
    --bg-hover: #d1d5db;
    --text-primary: #111827;
    --text-secondary: #4b5563;
    --text-muted: #9ca3af;
    --border: #d1d5db;
    --accent: #2563eb;
    --accent2: #7c3aed;
    --green: #16a34a;
    --yellow: #ca8a04;
    --red: #dc2626;
    --teal: #0d9488;
    --peach: #ea580c;
    --sky: #0284c7;

    --syn-keyword: #d73a49;
    --syn-function: #6f42c1;
    --syn-string: #032f62;
    --syn-comment: #6a737d;
    --syn-type: #005cc5;
    --syn-number: #e36209;
    --syn-decorator: #e36209;
    --syn-builtin: #005cc5;

    --highlight-line: rgba(253, 230, 138, 0.4);
    --highlight-border: #f59e0b;
    --mode-active-bg: #2563eb;
    --mode-active-text: #ffffff;
    --mode-inactive-bg: #e5e7eb;
    --mode-inactive-text: #374151;
    --panel-header-bg: #e5e7eb;
    --panel-header-text: #1d4ed8;
    --btn-bg: #e5e7eb;
    --btn-hover: #d1d5db;
    --btn-active: #2563eb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-secondary);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    font-size: 14px;
  }

  /* ── HEADER ── */
  #header {
    background: var(--bg-primary);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    flex-shrink: 0;
    z-index: 10;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .header-top h1 {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.3px;
  }
  .header-top h1 span { color: var(--accent); }
  .header-controls { display: flex; gap: 8px; align-items: center; }

  .icon-btn {
    background: var(--btn-bg);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all .15s;
  }
  .icon-btn:hover { background: var(--btn-hover); color: var(--text-primary); }

  .mode-toggle { display: flex; gap: 6px; margin-bottom: 10px; }
  .mode-btn {
    flex: 1;
    padding: 7px 14px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all .15s;
    background: var(--mode-inactive-bg);
    color: var(--mode-inactive-text);
  }
  .mode-btn.active {
    background: var(--mode-active-bg);
    color: var(--mode-active-text);
    box-shadow: 0 2px 8px rgba(137,180,250,0.3);
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .input-row label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .input-row input {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 5px 10px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 13px;
    flex: 1;
    max-width: 200px;
    outline: none;
    transition: border-color .15s;
  }
  .input-row input:focus { border-color: var(--accent); }
  .run-btn {
    background: var(--accent);
    color: var(--bg-secondary);
    border: none;
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    transition: opacity .15s;
  }
  .run-btn:hover { opacity: 0.85; }

  /* ── MAIN CONTENT ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* ── PANELS ── */
  .panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  .panel-header {
    background: var(--panel-header-bg);
    border-bottom: 1px solid var(--border);
    padding: 7px 14px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--panel-header-text);
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .panel-body {
    flex: 1;
    overflow: auto;
    background: var(--bg-primary);
  }

  .divider {
    width: 5px;
    background: var(--bg-secondary);
    cursor: col-resize;
    flex-shrink: 0;
    transition: background .15s;
    position: relative;
    z-index: 5;
  }
  .divider:hover, .divider.dragging { background: var(--accent); }

  /* ── CODE PANEL ── */
  #code-panel { background: var(--bg-primary); }
  .code-inner {
    padding: 12px 0;
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-primary);
  }
  .code-line {
    display: flex;
    align-items: stretch;
    min-height: 22.4px;
    padding: 0;
    transition: background 0.15s;
    border-left: 2px solid transparent;
  }
  .code-line.active {
    background: var(--highlight-line);
    border-left: 2px solid var(--highlight-border);
  }
  .line-num {
    min-width: 44px;
    text-align: right;
    padding-right: 16px;
    color: var(--text-muted);
    user-select: none;
    font-size: 13px;
    flex-shrink: 0;
    padding-top: 1px;
  }
  .code-line.active .line-num { color: var(--yellow); }
  .line-content {
    flex: 1;
    white-space: pre;
    padding-right: 16px;
    padding-top: 1px;
  }

  /* Syntax token colors */
  .tok-kw  { color: var(--syn-keyword); font-weight: 600; }
  .tok-fn  { color: var(--syn-function); }
  .tok-str { color: var(--syn-string); }
  .tok-cmt { color: var(--syn-comment); font-style: italic; }
  .tok-typ { color: var(--syn-type); }
  .tok-num { color: var(--syn-number); }
  .tok-dec { color: var(--syn-decorator); }
  .tok-blt { color: var(--syn-builtin); }
  .tok-op  { color: var(--text-secondary); }
  .tok-pun { color: var(--text-muted); }

  /* ── VIZ PANEL ── */
  #viz-panel { position: relative; }
  .viz-body {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 20px;
    background: var(--bg-primary);
    gap: 20px;
  }

  /* String grid */
  .str-grid {
    display: flex;
    gap: 4px;
    align-items: flex-end;
  }
  .str-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .str-char {
    width: 46px;
    height: 46px;
    border-radius: 8px;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 18px;
    font-weight: 700;
    background: var(--bg-tertiary);
    color: var(--text-primary);
    transition: all 0.2s;
    position: relative;
  }
  .str-char.center  { background: var(--accent); color: var(--bg-secondary); border-color: var(--accent); box-shadow: 0 0 14px rgba(137,180,250,0.4); }
  .str-char.expand  { background: var(--accent2); color: #fff; border-color: var(--accent2); box-shadow: 0 0 14px rgba(203,166,247,0.4); }
  .str-char.matched { background: var(--green); color: var(--bg-secondary); border-color: var(--green); }
  .str-char.mismatch{ background: var(--red); color: #fff; border-color: var(--red); }
  .str-idx { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }

  .pointer-row { display: flex; gap: 4px; margin-top: 4px; }
  .ptr-cell {
    width: 46px;
    text-align: center;
    font-size: 11px;
    font-family: var(--font-mono);
    font-weight: 700;
    height: 16px;
  }
  .ptr-L { color: var(--yellow); }
  .ptr-R { color: var(--teal); }
  .ptr-both { color: var(--peach); }

  /* Palindromes found */
  .found-section { width: 100%; }
  .found-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .found-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .found-pill {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-primary);
    transition: all .2s;
  }
  .found-pill.new {
    background: var(--green);
    color: var(--bg-secondary);
    border-color: var(--green);
    font-weight: 700;
    animation: popIn .3s ease;
  }
  @keyframes popIn {
    0%   { transform: scale(0); opacity: 0; }
    70%  { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Counter badge */
  .count-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 20px;
  }
  .count-label { font-size: 12px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
  .count-val { font-size: 28px; font-weight: 800; font-family: var(--font-mono); color: var(--accent); }

  /* Controls bottom */
  .controls-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .ctrl-btn {
    background: var(--btn-bg);
    border: 1px solid var(--border);
    color: var(--text-primary);
    width: 34px;
    height: 34px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
    flex-shrink: 0;
  }
  .ctrl-btn:hover { background: var(--btn-hover); }
  .ctrl-btn.play-active { background: var(--accent); color: var(--bg-secondary); }
  .ctrl-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .speed-select {
    background: var(--btn-bg);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 5px 8px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    outline: none;
  }
  .step-counter { font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); margin-left: auto; }

  /* ── STEP LOG PANEL ── */
  #log-panel { }
  .log-body { padding: 12px; font-size: 12px; }
  .log-desc {
    background: var(--bg-tertiary);
    border-left: 3px solid var(--accent);
    padding: 10px 12px;
    border-radius: 0 6px 6px 0;
    color: var(--text-primary);
    line-height: 1.5;
    margin-bottom: 14px;
    font-size: 12.5px;
  }
  .vars-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .var-row {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    align-items: baseline;
  }
  .var-name { color: var(--accent); font-family: var(--font-mono); font-size: 12px; }
  .var-val  { color: var(--green); font-family: var(--font-mono); font-size: 12px; text-align: right; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .history-section { margin-top: 14px; }
  .history-item {
    padding: 5px 8px;
    border-radius: 5px;
    font-size: 11.5px;
    color: var(--text-muted);
    transition: all .1s;
    margin-bottom: 2px;
    cursor: pointer;
  }
  .history-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
  .history-item.current {
    background: var(--bg-tertiary);
    color: var(--text-primary);
    font-weight: 600;
    border-left: 2px solid var(--accent);
    padding-left: 6px;
  }

  /* ── INTUITION MODE ── */
  #intuition-main {
    display: flex;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  .int-left {
    width: 50%;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }
  .int-right {
    width: 50%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .int-panel-body {
    flex: 1;
    overflow: auto;
    padding: 20px;
    background: var(--bg-primary);
  }
  .stage-card {
    margin-bottom: 18px;
    padding: 16px 18px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg-secondary);
    transition: all .25s;
    cursor: pointer;
  }
  .stage-card.active {
    border-color: var(--accent);
    background: var(--bg-tertiary);
    box-shadow: 0 0 0 1px var(--accent), 0 4px 16px rgba(137,180,250,0.12);
  }
  .stage-card.past { opacity: 0.6; }
  .stage-card.future { opacity: 0.3; }
  .stage-num {
    display: inline-flex;
    width: 22px; height: 22px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 50%;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    margin-right: 8px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .stage-card.active .stage-num { background: var(--accent); color: var(--bg-secondary); border-color: var(--accent); }
  .stage-title { font-size: 13px; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; margin-bottom: 10px; }
  .thought-bubble {
    background: rgba(137,180,250,0.08);
    border-left: 3px solid var(--accent);
    padding: 9px 12px;
    border-radius: 0 6px 6px 0;
    font-style: italic;
    color: var(--text-secondary);
    font-size: 12.5px;
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .stage-content { font-size: 12.5px; color: var(--text-secondary); line-height: 1.65; margin-bottom: 10px; }
  .key-insight {
    background: rgba(166,227,161,0.08);
    border-left: 3px solid var(--green);
    padding: 8px 12px;
    border-radius: 0 6px 6px 0;
    font-size: 12.5px;
    color: var(--green);
    line-height: 1.5;
  }
  .key-insight strong { color: var(--green); }

  .int-controls {
    flex-shrink: 0;
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    align-items: center;
  }
  .int-stage-badge { font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); margin-left: auto; }

  /* Intuition viz styles */
  .int-viz-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .int-viz-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 12px; }
  .approach-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .approach-bad, .approach-good {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.6;
  }
  .approach-bad { background: rgba(243,139,168,0.1); border: 1px solid rgba(243,139,168,0.4); }
  .approach-bad strong { color: var(--red); }
  .approach-good { background: rgba(166,227,161,0.1); border: 1px solid rgba(166,227,161,0.4); }
  .approach-good strong { color: var(--green); }
  .mini-str { display: flex; gap: 3px; justify-content: center; margin: 10px 0; }
  .mc { width:32px;height:32px; border-radius:6px; border:2px solid var(--border); display:flex;align-items:center;justify-content:center; font-family:var(--font-mono);font-size:14px;font-weight:700; background:var(--bg-tertiary); }
  .mc.hl { background:var(--accent); color:var(--bg-secondary); border-color:var(--accent); }
  .mc.hl2 { background:var(--accent2); color:#fff; border-color:var(--accent2); }
  .mc.ok { background:var(--green); color:var(--bg-secondary); border-color:var(--green); }
  .mc.no { background:var(--red); color:#fff; border-color:var(--red); }
  .complexity-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .cx-card { background:var(--bg-tertiary); border:1px solid var(--border); border-radius:8px; padding:12px; text-align:center; }
  .cx-label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.6px; margin-bottom:4px; }
  .cx-val { font-size:20px; font-weight:800; font-family:var(--font-mono); color:var(--accent); }
  .cx-why { font-size:11px; color:var(--text-secondary); margin-top:4px; }
  .edge-grid { display:flex;flex-direction:column;gap:8px; }
  .edge-item { background:var(--bg-tertiary); border:1px solid var(--border); border-radius:6px; padding:10px 12px; font-size:12px; }
  .edge-label { font-weight:700; color:var(--peach); margin-bottom:3px; font-size:11px; }
  .edge-result { color:var(--green); font-family:var(--font-mono); font-size:12px; }

  /* Expand-center diagram */
  .expand-diagram { margin:10px auto; }
  .expand-step { margin-bottom:12px; }
  .expand-step-label { font-size:11px; color:var(--text-muted); margin-bottom:4px; text-align:center; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<div id="header">
  <div class="header-top">
    <h1><span>647.</span> Palindromic Substrings — Expand from Centre</h1>
    <div class="header-controls">
      <button class="icon-btn" onclick="APP.toggleTheme()">☀️ Theme</button>
    </div>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-intuition" onclick="APP.setMode('intuition')">💡 Intuition &amp; Thought Process</button>
    <button class="mode-btn" id="btn-execution" onclick="APP.setMode('execution')">▶️ Step-by-Step Execution</button>
  </div>
  <div class="input-row" id="exec-input-row" style="display:none">
    <label>Input string s =</label>
    <input id="input-str" value="aaa" maxlength="12" />
    <button class="run-btn" onclick="APP.runInput()">Run ▶</button>
  </div>
</div>

<div id="main"></div>

<script>
// ═══════════════════════════════════════════════════
// SYNTAX HIGHLIGHTER
// ═══════════════════════════════════════════════════
function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function highlightPython(raw) {
  // Safe tokeniser: splits the line into raw-text segments and already-wrapped
  // span segments, only applying regex substitutions to the raw-text parts.
  // This prevents any regex from ever touching text inside an existing <span>.

  const KEYWORDS = new Set(['def','class','return','if','elif','else','while','for',
    'in','and','or','not','True','False','None','import','from','as','pass','break',
    'continue','lambda','yield','with','try','except','finally','raise','global',
    'nonlocal','del','assert','is']);

  const BUILTINS = new Set(['len','range','print','list','dict','set','tuple',
    'isinstance','enumerate','zip','map','filter','sorted','reversed','sum',
    'min','max','abs','round','input','type']);

  const TYPES = new Set(['int','str','bool','float','None','Optional','List','Dict',
    'Set','Tuple','Any','Union']);

  // ── Step 1: split off inline comment (safe: # can't appear inside a token) ──
  let codePart = raw;
  let commentHtml = '';
  // Find # that isn't inside a string
  let inStr = false, strChar = '', ci = -1;
  for (let i = 0; i < raw.length; i++) {
    const c = raw[i];
    if (!inStr && (c === '"' || c === "'")) { inStr = true; strChar = c; }
    else if (inStr && c === strChar && raw[i-1] !== '\\') { inStr = false; }
    else if (!inStr && c === '#') { ci = i; break; }
  }
  if (ci !== -1) {
    commentHtml = `<span class="tok-cmt">${escapeHtml(raw.slice(ci))}</span>`;
    codePart = raw.slice(0, ci);
  }

  // ── Step 2: tokenise codePart into typed tokens ──
  // Tokens: string | number | word | other
  const tokens = [];
  let i = 0;
  while (i < codePart.length) {
    // Triple-quoted strings
    if ((codePart[i] === '"' || codePart[i] === "'") &&
        codePart.slice(i, i+3) === codePart[i].repeat(3)) {
      const q = codePart[i].repeat(3);
      const end = codePart.indexOf(q, i + 3);
      const raw_str = end === -1 ? codePart.slice(i) : codePart.slice(i, end + 3);
      tokens.push({ type: 'string', val: raw_str });
      i += raw_str.length;
      continue;
    }
    // Single-quoted strings
    if (codePart[i] === '"' || codePart[i] === "'") {
      const q = codePart[i];
      let j = i + 1;
      while (j < codePart.length && codePart[j] !== q) {
        if (codePart[j] === '\\') j++;
        j++;
      }
      tokens.push({ type: 'string', val: codePart.slice(i, j + 1) });
      i = j + 1;
      continue;
    }
    // Numbers
    if (/\d/.test(codePart[i]) && (i === 0 || !/\w/.test(codePart[i-1]))) {
      let j = i;
      while (j < codePart.length && /[\d.]/.test(codePart[j])) j++;
      tokens.push({ type: 'number', val: codePart.slice(i, j) });
      i = j;
      continue;
    }
    // Words / identifiers
    if (/[a-zA-Z_]/.test(codePart[i])) {
      let j = i;
      while (j < codePart.length && /\w/.test(codePart[j])) j++;
      const word = codePart.slice(i, j);
      // Peek ahead for '(' to detect calls
      let k = j;
      while (k < codePart.length && codePart[k] === ' ') k++;
      const isCall = codePart[k] === '(';
      tokens.push({ type: 'word', val: word, isCall });
      i = j;
      continue;
    }
    // Everything else (operators, punctuation, spaces)
    tokens.push({ type: 'other', val: codePart[i] });
    i++;
  }

  // ── Step 3: render tokens to HTML ──
  let prevWord = '';
  let html = tokens.map(tok => {
    if (tok.type === 'string') {
      prevWord = '';
      return `<span class="tok-str">${escapeHtml(tok.val)}</span>`;
    }
    if (tok.type === 'number') {
      prevWord = '';
      return `<span class="tok-num">${escapeHtml(tok.val)}</span>`;
    }
    if (tok.type === 'other') {
      prevWord = '';
      return escapeHtml(tok.val);
    }
    // word token
    const w = tok.val;
    let out;
    if (KEYWORDS.has(w)) {
      out = `<span class="tok-kw">${w}</span>`;
    } else if (prevWord === 'def') {
      out = `<span class="tok-fn">${w}</span>`;
    } else if (TYPES.has(w)) {
      out = `<span class="tok-typ">${w}</span>`;
    } else if (BUILTINS.has(w) && tok.isCall) {
      out = `<span class="tok-blt">${w}</span>`;
    } else if (tok.isCall) {
      out = `<span class="tok-fn">${w}</span>`;
    } else {
      out = escapeHtml(w);
    }
    prevWord = KEYWORDS.has(w) ? w : '';
    return out;
  }).join('');

  return html + commentHtml;
}

// ═══════════════════════════════════════════════════
// SOLUTION & STEP GENERATOR
// ═══════════════════════════════════════════════════
const CODE_LINES = [
  'class Solution:',
  '    def countSubstrings(self, s: str) -> int:',
  '        n = len(s)',
  '        count = 0',
  '',
  '        def expand(left: int, right: int) -> int:',
  '            """Expand outward from centre, count valid palindromes."""',
  '            palindromes = 0',
  '            while left >= 0 and right < n and s[left] == s[right]:',
  '                palindromes += 1',
  '                left -= 1',
  '                right += 1',
  '            return palindromes',
  '',
  '        for i in range(n):',
  '            count += expand(i, i)      # Odd-length  centres: "a", "aba"',
  '            count += expand(i, i + 1)  # Even-length centres: "aa", "abba"',
  '        return count',
];

function generateSteps(s) {
  const steps = [];
  const n = s.length;

  const log = (line, desc, vars, extra) =>
    steps.push({ line, desc, vars: { ...vars }, ...extra });

  log(2, `Initialise: n = ${n}, count = 0`,
      { s: `"${s}"`, n, count: 0, i: '-', left: '-', right: '-', palindromes: '-' },
      { left: -1, right: -1, expanding: false, foundThis: null });

  let count = 0;
  const found = [];

  for (let i = 0; i < n; i++) {
    // --- ODD ---
    log(15, `Loop i = ${i}  →  try odd-length centre at '${s[i]}'`,
        { s: `"${s}"`, n, count, i, left: i, right: i, palindromes: '-' },
        { left: i, right: i, expanding: false, center: i, foundThis: null });

    log(15, `Call expand(${i}, ${i})  — odd-length from '${s[i]}'`,
        { s: `"${s}"`, n, count, i, left: i, right: i, palindromes: 0 },
        { left: i, right: i, expanding: true, center: i, foundThis: null });

    let l = i, r = i, pals = 0;
    while (l >= 0 && r < n && s[l] === s[r]) {
      pals++;
      const pal = s.slice(l, r + 1);
      found.push(pal);

      log(9, `s[${l}]='${s[l]}' == s[${r}]='${s[r]}' ✓  palindrome "${pal}" found  (palindromes=${pals})`,
          { s: `"${s}"`, n, count, i, left: l, right: r, palindromes: pals },
          { left: l, right: r, expanding: true, center: i, foundThis: pal, foundList: [...found] });

      l--; r++;

      log(11, `Expand outward → left=${l}, right=${r}`,
          { s: `"${s}"`, n, count, i, left: l, right: r, palindromes: pals },
          { left: l, right: r, expanding: true, center: i, foundThis: null, foundList: [...found] });
    }
    if (l >= 0 && r < n) {
      log(8, `s[${l}]='${s[l]}' ≠ s[${r}]='${s[r]}' ✗  mismatch — stop expanding`,
          { s: `"${s}"`, n, count, i, left: l, right: r, palindromes: pals },
          { left: l, right: r, expanding: true, mismatch: true, center: i, foundThis: null, foundList: [...found] });
    }
    count += pals;
    log(15, `expand(${i},${i}) returned ${pals}  →  count = ${count}`,
        { s: `"${s}"`, n, count, i, left: i, right: i, palindromes: pals },
        { left: -1, right: -1, expanding: false, center: i, foundThis: null, foundList: [...found] });

    // --- EVEN ---
    log(16, `Try even-length centre between '${s[i]}' and '${s[i+1]??'∅'}'`,
        { s: `"${s}"`, n, count, i, left: i, right: i+1, palindromes: '-' },
        { left: i, right: i+1, expanding: false, center: i, foundThis: null, foundList: [...found] });

    log(16, `Call expand(${i}, ${i+1})  — even-length`,
        { s: `"${s}"`, n, count, i, left: i, right: i+1, palindromes: 0 },
        { left: i, right: i+1, expanding: true, center: i, foundThis: null, foundList: [...found] });

    l = i; r = i + 1; pals = 0;
    while (l >= 0 && r < n && s[l] === s[r]) {
      pals++;
      const pal = s.slice(l, r + 1);
      found.push(pal);
      log(9, `s[${l}]='${s[l]}' == s[${r}]='${s[r]}' ✓  palindrome "${pal}" found  (palindromes=${pals})`,
          { s: `"${s}"`, n, count, i, left: l, right: r, palindromes: pals },
          { left: l, right: r, expanding: true, center: i, foundThis: pal, foundList: [...found] });

      l--; r++;
      log(11, `Expand outward → left=${l}, right=${r}`,
          { s: `"${s}"`, n, count, i, left: l, right: r, palindromes: pals },
          { left: l, right: r, expanding: true, center: i, foundThis: null, foundList: [...found] });
    }
    if (l >= 0 && r < n) {
      log(8, `s[${l}]='${s[l]}' ≠ s[${r}]='${s[r]}' ✗  mismatch — stop expanding`,
          { s: `"${s}"`, n, count, i, left: l, right: r, palindromes: pals },
          { left: l, right: r, expanding: true, mismatch: true, center: i, foundThis: null, foundList: [...found] });
    }
    count += pals;
    log(16, `expand(${i},${i+1}) returned ${pals}  →  count = ${count}`,
        { s: `"${s}"`, n, count, i, left: i, right: i+1, palindromes: pals },
        { left: -1, right: -1, expanding: false, center: i, foundThis: null, foundList: [...found] });
  }

  log(17, `All centres checked. Return count = ${count} 🎉`,
      { s: `"${s}"`, n, count, i: 'done', left: '-', right: '-', palindromes: '-' },
      { left: -1, right: -1, expanding: false, foundThis: null, foundList: [...found] });

  return steps;
}

      viz: 'problem_viz'

      <strong>Optimal: Manacher's O(n):</strong> Advanced algorithm. Overkill for interviews — O(n²) is accepted.`,
      insight: "Expand-from-centre is the sweet spot: elegant, O(n²) time, O(1) extra space, and easy to explain in interviews.",
      viz: 'approach_viz'
    },
    {
      title: 'The Key Insight: Expand from Centre',
      thought: "Every palindrome expands symmetrically from its centre. If s[l] == s[r], the substring s[l..r] is a palindrome if and only if s[l+1..r-1] is also a palindrome.",
      content: `For each index <code>i</code>:<br><br>
      1. Try <strong>odd-length</strong> expansion: <code>left=i, right=i</code><br>
         While <code>s[left]==s[right]</code> → count it, expand outward<br><br>
      2. Try <strong>even-length</strong> expansion: <code>left=i, right=i+1</code><br>
         While <code>s[left]==s[right]</code> → count it, expand outward<br><br>
      Both start maximally tight at the centre and grow outward — the moment characters disagree, no larger palindrome is possible from this centre.`,
      insight: "The beauty: once s[left] ≠ s[right], we stop. Any further expansion can only break symmetry. We never re-check substrings.",
      viz: 'expand_viz'
    },
    {
      title: 'Writing the Solution',
      thought: "I'll write a clean helper expand(left, right) → count. The main loop iterates over all n centres calling expand twice each.",

      <code>for i in range(n):</code><br>
      &nbsp;&nbsp;<code>count += expand(i, i)    # odd</code><br>
      &nbsp;&nbsp;<code>count += expand(i, i+1)  # even</code><br><br>
      Clean, readable, and only ~12 lines of code total.`,
      insight: "Separating expand() keeps the logic clear. The while loop inside does all the heavy lifting in O(n) per call, but most calls terminate early.",
      viz: 'code_viz'
    },
    {
      title: 'Complexity Analysis',
      thought: "Two expand calls per index, n indices = 2n calls. Each expand can go at most n/2 steps → O(n²) total. Space is just the call stack, O(1) extra.",
      content: `<strong>Time O(n²):</strong><br>
      n centres × up to n/2 expansions each = O(n²)<br>
      In practice much faster — most centres expand only a few steps<br><br>
      <strong>Space O(1):</strong><br>
      Only a handful of integer variables. No extra arrays. The recursion depth is O(n) worst case but we use iteration inside expand.`,
      insight: "This beats the brute-force O(n³) by an entire order. The key saving: we never check the same palindrome twice.",
      viz: 'complexity_viz'
    },
    {
      title: 'Edge Cases',
      thought: "What if the string has length 1? Only odd-length expansion applies. All same characters? Every expand goes maximum depth. Empty string? Range(0) handles it naturally.",
      content: `• <strong>s = "a"</strong> → 1 palindrome (single char)<br>
      • <strong>s = "aa"</strong> → 3 palindromes: "a","a","aa"<br>
      • <strong>s = "aaa"</strong> → 6 palindromes<br>
      • <strong>s = "abc"</strong> → 3 palindromes (only singles)<br>
      • <strong>s = "abba"</strong> → 6 palindromes<br><br>
      The <code>while left >= 0 and right &lt; n</code> guards handle all boundary conditions automatically.`,
      insight: "Single characters are always palindromes — the odd-length expand(i,i) starts with left==right and immediately satisfies s[left]==s[right], counting +1 before any real expansion.",
      viz: 'edge_viz'
    },
    {
      title: 'Final Synthesis',
      thought: "Elegant! We turn a 2D search problem into n one-dimensional expansion problems. Each centre contributes independently.",
      content: `The algorithm: <br><br>

      2. We enumerate all n odd + n even = 2n centres<br>

      4. Sum all counts<br><br>
      This is a classic "expand from centre" pattern. Once you recognise it, the code writes itself.`,

      <div style="font-size:12px;color:var(--text-secondary);margin-bottom:12px">3 centres × (odd + even) = 6 calls to expand</div>
      ${[0,1,2].map(i=>`
        <div style="margin-bottom:10px;padding:8px 10px;background:var(--bg-tertiary);border-radius:6px;">
          <div style="font-size:11px;color:var(--accent);font-weight:700;margin-bottom:4px">Centre i=${i}</div>
          <div style="display:flex;gap:8px;font-size:12px;font-family:var(--font-mono)">
            <span style="color:var(--green)">odd: expand(${i},${i})</span>
            <span style="color:var(--text-muted)">|</span>
            <span style="color:var(--peach)">even: expand(${i},${i+1})</span>
          </div>
        </div>`).join('')}
      <div style="margin-top:8px;text-align:center;font-size:22px;font-weight:800;font-family:var(--font-mono);color:var(--accent)">
        Total: 6 ✓
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════
// APP CLASS
// ═══════════════════════════════════════════════════
class App {
  constructor() {
    this.mode = 'intuition';
    this.theme = 'dark';
    this.intStage = 0;
    this.intPlaying = false;
    this.intTimer = null;

    this.inputStr = 'aaa';
    this.steps = [];
    this.currentStep = 0;
    this.playing = false;
    this.playTimer = null;
    this.speed = 1;

    this.panelWidths = [30, 50, 20]; // %
    this.dragging = null;

    this.intuitionStages = getIntuitionStages();

    this.init();
  }

  init() {
    this.steps = generateSteps(this.inputStr);
    this.render();
    this.attachKeyboard();
  }

  toggleTheme() {
    this.theme = this.theme === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', this.theme);
  }

  setMode(mode) {
    this.pause();
    this.stopIntPlaying();
    this.mode = mode;
    document.getElementById('btn-intuition').classList.toggle('active', mode==='intuition');
    document.getElementById('btn-execution').classList.toggle('active', mode==='execution');
    document.getElementById('exec-input-row').style.display = mode==='execution' ? 'flex' : 'none';
    this.render();
  }

  runInput() {
    const val = document.getElementById('input-str').value.trim().replace(/[^a-zA-Z]/g,'');
    if (!val || val.length < 1 || val.length > 12) return;
    this.inputStr = val;
    this.steps = generateSteps(this.inputStr);
    this.currentStep = 0;
    this.pause();
    this.renderExecution();
  }

  // ── INTUITION ──
  goIntStage(n) {
    this.intStage = Math.max(0, Math.min(this.intuitionStages.length-1, n));
    this.renderIntuition();
  }

  playIntuition() {
    if (this.intPlaying) { this.stopIntPlaying(); return; }
    if (this.intStage >= this.intuitionStages.length - 1) { this.intStage = 0; }
    this.intPlaying = true;
    this.intTimer = setInterval(() => {
      if (this.intStage >= this.intuitionStages.length - 1) {
        this.stopIntPlaying(); return;
      }
      this.intStage++;
      this.renderIntuition();
    }, 3500);
    this.renderIntuition();
  }

  stopIntPlaying() {
    this.intPlaying = false;
    clearInterval(this.intTimer);
    this.renderIntuition();
  }

  // ── EXECUTION ──
  stepForward() {
    if (this.currentStep < this.steps.length - 1) {
      this.currentStep++;
      this.renderExecution();
    }
  }

  stepBack() {
    if (this.currentStep > 0) {
      this.currentStep--;
      this.renderExecution();
    }
  }

  reset() {
    this.pause();
    this.currentStep = 0;
    this.renderExecution();
  }

  play() {
    if (this.playing) { this.pause(); return; }
    if (this.currentStep >= this.steps.length - 1) this.currentStep = 0;
    this.playing = true;
    const interval = 800 / this.speed;
    this.playTimer = setInterval(() => {
      if (this.currentStep >= this.steps.length - 1) { this.pause(); return; }
      this.currentStep++;
      this.renderExecution();
    }, interval);
    this.renderExecution();
  }

  pause() {
    this.playing = false;
    clearInterval(this.playTimer);
    this.updatePlayBtn();
  }

  setSpeed(v) {
    this.speed = parseFloat(v);
    if (this.playing) { this.pause(); this.play(); }
  }

  updatePlayBtn() {
    const btn = document.getElementById('play-btn');
    if (!btn) return;
    btn.innerHTML = this.playing ? '⏸' : '▶';
    btn.classList.toggle('play-active', this.playing);
  }

  attachKeyboard() {
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;
      if (e.code === 'Space') { e.preventDefault(); this.mode==='execution'?this.play():this.playIntuition(); }
      if (e.code === 'ArrowRight') { e.preventDefault(); this.mode==='execution'?this.stepForward():this.goIntStage(this.intStage+1); }
      if (e.code === 'ArrowLeft') { e.preventDefault(); this.mode==='execution'?this.stepBack():this.goIntStage(this.intStage-1); }
      if (e.code === 'KeyR') { if(this.mode==='execution') this.reset(); }
    });
  }

  // ── RENDER ──
  render() {
    const main = document.getElementById('main');
    if (this.mode === 'intuition') {
      main.innerHTML = this.buildIntuitionHTML();
    } else {
      main.innerHTML = this.buildExecutionHTML();
      this.attachDividers();
      this.renderExecution();
    }
  }

  // ── INTUITION HTML ──
  buildIntuitionHTML() {
    return `<div id="intuition-main">
      <div class="int-left panel">
        <div class="panel-header">
          Senior Engineer's Thought Process
          <span style="font-weight:400;color:var(--text-muted)">Stage ${this.intStage+1}/${this.intuitionStages.length}</span>
        </div>
        <div class="int-panel-body panel-body" id="int-left-body">
          ${this.intuitionStages.map((st, i) => {
            const cls = i===this.intStage?'active':i<this.intStage?'past':'future';
            return `<div class="stage-card ${cls}" onclick="APP.goIntStage(${i})">
              <div class="stage-title"><span class="stage-num">${i+1}</span>${st.title}</div>
              ${cls==='active'||cls==='past' ? `
                <div class="thought-bubble">💭 "${st.thought}"</div>
                <div class="stage-content">${st.content}</div>
                <div class="key-insight"><strong>💡 Key Insight:</strong> ${st.insight}</div>
              ` : `<div style="font-size:12px;color:var(--text-muted)">${st.thought.substring(0,60)}…</div>`}
            </div>`;
          }).join('')}
        </div>
        <div class="int-controls">
          <button class="ctrl-btn" onclick="APP.goIntStage(0)">⏮</button>
          <button class="ctrl-btn" onclick="APP.goIntStage(APP.intStage-1)">◀</button>
          <button class="ctrl-btn ${this.intPlaying?'play-active':''}" onclick="APP.playIntuition()">${this.intPlaying?'⏸':'▶'}</button>
          <button class="ctrl-btn" onclick="APP.goIntStage(APP.intStage+1)">▶</button>
          <button class="ctrl-btn" onclick="APP.goIntStage(APP.intuitionStages.length-1)">⏭</button>
          <span class="int-stage-badge">${this.intStage+1} / ${this.intuitionStages.length}</span>
        </div>
      </div>
      <div class="int-right panel">
        <div class="panel-header">Visual Explanation</div>
        <div class="int-panel-body panel-body" id="int-viz-body">
          ${renderIntuitionViz(this.intStage)}
        </div>
      </div>
    </div>`;
  }

  renderIntuition() {
    if (this.mode !== 'intuition') return;
    const container = document.getElementById('intuition-main');
    if (!container) { this.render(); return; }

    // Update left stages
    const leftBody = document.getElementById('int-left-body');
    const stageHTML = this.intuitionStages.map((st, i) => {
      const cls = i===this.intStage?'active':i<this.intStage?'past':'future';
      return `<div class="stage-card ${cls}" onclick="APP.goIntStage(${i})">
        <div class="stage-title"><span class="stage-num">${i+1}</span>${st.title}</div>
        ${cls==='active'||cls==='past' ? `
          <div class="thought-bubble">💭 "${st.thought}"</div>
          <div class="stage-content">${st.content}</div>
          <div class="key-insight"><strong>💡 Key Insight:</strong> ${st.insight}</div>
        ` : `<div style="font-size:12px;color:var(--text-muted)">${st.thought.substring(0,60)}…</div>`}
      </div>`;
    }).join('');
    if (leftBody) leftBody.innerHTML = stageHTML;

    // Update viz
    const vizBody = document.getElementById('int-viz-body');
    if (vizBody) vizBody.innerHTML = renderIntuitionViz(this.intStage);

    // Update header badge
    const badge = container.querySelector('.panel-header span');
    if (badge) badge.textContent = `Stage ${this.intStage+1}/${this.intuitionStages.length}`;

    // Update play button
    const intCtrl = container.querySelector('.int-controls .ctrl-btn:nth-child(3)');
    if (intCtrl) { intCtrl.innerHTML = this.intPlaying?'⏸':'▶'; intCtrl.classList.toggle('play-active', this.intPlaying); }

    // Scroll active into view
    const activeCard = document.querySelector('.stage-card.active');
    if (activeCard) activeCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // ── EXECUTION HTML SKELETON ──
  buildExecutionHTML() {
    return `
      <div class="panel" id="code-panel" style="width:${this.panelWidths[0]}%">
        <div class="panel-header">Code</div>
        <div class="panel-body" id="code-body">
          <div class="code-inner" id="code-lines"></div>
        </div>
      </div>
      <div class="divider" id="div1"></div>
      <div class="panel" id="viz-panel" style="width:${this.panelWidths[1]}%">
        <div class="panel-header">Visualization <span id="result-badge" style="font-weight:400;color:var(--green)"></span></div>
        <div class="viz-body" id="viz-body"></div>
        <div class="controls-bar">
          <button class="ctrl-btn" onclick="APP.reset()" title="Reset (R)">⏮</button>
          <button class="ctrl-btn" onclick="APP.stepBack()" title="Step Back (←)">◀</button>
          <button class="ctrl-btn" id="play-btn" onclick="APP.play()" title="Play/Pause (Space)">▶</button>
          <button class="ctrl-btn" onclick="APP.stepForward()" title="Step Forward (→)">▶</button>
          <button class="ctrl-btn" onclick="APP.currentStep=APP.steps.length-1;APP.pause();APP.renderExecution()" title="Last Step">⏭</button>
          <select class="speed-select" onchange="APP.setSpeed(this.value)">
            <option value="0.5">0.5×</option>
            <option value="1" selected>1×</option>
            <option value="2">2×</option>
            <option value="4">4×</option>
          </select>
          <span class="step-counter" id="step-counter"></span>
        </div>
      </div>
      <div class="divider" id="div2"></div>
      <div class="panel" id="log-panel" style="width:${this.panelWidths[2]}%">
        <div class="panel-header">Step Log</div>
        <div class="panel-body" id="log-body">
          <div class="log-body" id="log-inner"></div>
        </div>
      </div>`;
  }

  renderExecution() {
    if (this.mode !== 'execution') return;
    const step = this.steps[this.currentStep];
    if (!step) return;

    this.renderCode(step.line);
    this.renderViz(step);
    this.renderLog(step);

    const sc = document.getElementById('step-counter');
    if (sc) sc.textContent = `${this.currentStep+1} / ${this.steps.length}`;
    this.updatePlayBtn();
  }

  renderCode(activeLine) {
    const el = document.getElementById('code-lines');
    if (!el) return;
    el.innerHTML = CODE_LINES.map((line, i) => `
      <div class="code-line ${i===activeLine?'active':''}">
        <span class="line-num">${i+1}</span>
        <span class="line-content">${highlightPython(line)}</span>
      </div>`).join('');

    // Scroll active line into view
    const activeEl = el.querySelector('.code-line.active');
    if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });
  }

  renderViz(step) {
    const body = document.getElementById('viz-body');
    if (!body) return;
    const s = this.inputStr;
    const n = s.length;
    const { left, right, expanding, mismatch, foundThis, foundList, center } = step;
    const found = foundList || [];

    // Build char cells
    let charsHtml = s.split('').map((c, i) => {
      let cls = '';
      if (expanding && left >= 0 && right < n) {
        if (i === left || i === right) cls = mismatch ? 'mismatch' : 'expand';
        else if (i > left && i < right) cls = 'matched';
      }
      if (center !== undefined && i === center && !expanding) cls = 'center';
      return `<div class="str-cell">
        <div class="str-char ${cls}">${c}</div>
        <div class="str-idx">${i}</div>
      </div>`;
    }).join('');

    // Pointer row
    let ptrs = Array(n).fill('');
    if (expanding && left >= 0) {
      if (left === right) ptrs[left] = 'L=R';
      else {
        if (left >= 0 && left < n) ptrs[left] = 'L';
        if (right >= 0 && right < n) ptrs[right] = 'R';
      }
    }
    const ptrHtml = ptrs.map((p, i) => {
      if (!p) return `<div class="ptr-cell"></div>`;
      const cls = p==='L=R'?'ptr-both':p==='L'?'ptr-L':'ptr-R';
      return `<div class="ptr-cell ${cls}">${p}</div>`;
    }).join('');

    // Found palindromes display
    const uniqueFound = [...new Set(found)];
    const pillsHtml = uniqueFound.map(pal =>
      `<div class="found-pill ${pal===foundThis?'new':''}">${pal}</div>`).join('');

    // Count badge
    const count = step.vars.count ?? 0;

    body.innerHTML = `
      <div class="count-badge">
        <span class="count-label">Palindromes Found</span>
        <span class="count-val">${count}</span>
      </div>
      <div>
        <div class="str-grid">${charsHtml}</div>
        <div class="pointer-row" style="margin-top:2px">${ptrHtml}</div>
      </div>
      ${found.length > 0 ? `
        <div class="found-section">
          <div class="found-title">Discovered So Far</div>
          <div class="found-pills">${pillsHtml}</div>
        </div>` : ''}`;

    // Result badge
    const badge = document.getElementById('result-badge');
    if (badge && this.currentStep === this.steps.length - 1) {
      badge.textContent = `→ ${count}`;
    } else if (badge) {
      badge.textContent = '';
    }
  }

  renderLog(step) {
    const el = document.getElementById('log-inner');
    if (!el) return;

    const varsHtml = Object.entries(step.vars).map(([k, v]) =>
      `<div class="var-row"><span class="var-name">${k}</span><span class="var-val">${JSON.stringify(v)}</span></div>`
    ).join('');

    const histLen = Math.min(this.currentStep + 1, this.steps.length);
    const histStart = Math.max(0, this.currentStep - 18);
    const histHtml = this.steps.slice(histStart, this.currentStep + 1).map((s, i) => {
      const idx = histStart + i;
      return `<div class="history-item ${idx===this.currentStep?'current':''}" onclick="APP.jumpTo(${idx})">
        ${idx+1}. ${s.desc.length > 55 ? s.desc.substring(0,55)+'…' : s.desc}
      </div>`;
    }).join('');

    el.innerHTML = `
      <div class="log-desc">${step.desc}</div>
      <div class="vars-title">Variables</div>
      ${varsHtml}
      <div class="history-section">
        <div class="vars-title" style="margin-top:14px">Step History</div>
        ${histHtml}
      </div>`;

    // Scroll current into view
    const cur = el.querySelector('.history-item.current');
    if (cur) cur.scrollIntoView({ block: 'nearest' });
  }

  jumpTo(idx) {
    this.currentStep = idx;
    this.pause();
    this.renderExecution();
  }

  // ── PANEL RESIZING ──
  attachDividers() {
    ['div1','div2'].forEach((id, di) => {
      const d = document.getElementById(id);
      if (!d) return;
      let startX, startW0, startW1, startW2;
      d.addEventListener('mousedown', e => {
        e.preventDefault();
        this.dragging = id;
        startX = e.clientX;
        startW0 = this.panelWidths[0];
        startW1 = this.panelWidths[1];
        startW2 = this.panelWidths[2];
        d.classList.add('dragging');

        const onMove = e => {
          const totalW = document.getElementById('main').offsetWidth;
          const dPct = (e.clientX - startX) / totalW * 100;
          if (di === 0) {
            const nw0 = Math.max(15, Math.min(50, startW0 + dPct));
            const nw1 = Math.max(20, startW1 - (nw0 - startW0));
            this.panelWidths[0] = nw0;
            this.panelWidths[1] = nw1;
          } else {
            const nw1 = Math.max(20, Math.min(60, startW1 + dPct));
            const nw2 = Math.max(12, startW2 - (nw1 - startW1));
            this.panelWidths[1] = nw1;
            this.panelWidths[2] = nw2;
          }
          document.getElementById('code-panel').style.width = this.panelWidths[0] + '%';
          document.getElementById('viz-panel').style.width = this.panelWidths[1] + '%';
          document.getElementById('log-panel').style.width = this.panelWidths[2] + '%';
        };
        const onUp = () => {
          d.classList.remove('dragging');
          this.dragging = null;
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    });
  }
}

// ── BOOT ──
let APP;
document.addEventListener('DOMContentLoaded', () => {
  APP = new App();
  // Start in intuition mode; hide exec input
  document.getElementById('exec-input-row').style.display = 'none';
  // Scroll first stage into view
  setTimeout(() => {
    const active = document.querySelector('.stage-card.active');
    if (active) active.scrollIntoView({ block: 'start' });
  }, 100);
});
</script>
