<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>70. Climbing Stairs</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#07090f;--surface:#0d1117;--card:#111620;--border:#1a2235;
  --curr:#3b82f6;--prev1:#10b981;--prev2:#a78bfa;--result:#f59e0b;
  --text:#e2e8f0;--muted:#475569;--dim:#1e293b;
}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;display:flex;flex-direction:column;}

header{display:flex;align-items:center;gap:14px;padding:8px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.h-num{font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:700;color:#3b82f6;}
.h-title{font-size:.82rem;font-weight:600;color:var(--muted);}
.h-badge{font-family:'JetBrains Mono',monospace;font-size:.62rem;padding:2px 8px;border-radius:3px;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#10b981;}
.h-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.inp{background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.8rem;padding:5px 10px;border-radius:5px;outline:none;transition:border-color .2s;width:100px;}
.inp:focus{border-color:#3b82f6;}
.btn{font-family:'Outfit',sans-serif;font-weight:700;font-size:.74rem;padding:5px 14px;border-radius:5px;border:none;cursor:pointer;transition:all .15s;}
.btn-p{background:#3b82f6;color:#fff;}.btn-p:hover{background:#2563eb;}

main{display:grid;grid-template-columns:330px 1fr 240px;flex:1;overflow:hidden;}

.code-panel{border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;}
.plabel{font-size:.6rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:6px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.code-scroll{overflow-y:auto;flex:1;padding:4px 0;}
.cl{display:flex;align-items:stretch;font-family:'JetBrains Mono',monospace;font-size:.72rem;line-height:1.8;position:relative;transition:background .15s;}
.cl.active{background:rgba(59,130,246,.1);}
.cl.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#3b82f6;border-radius:0 2px 2px 0;}
.ln{width:28px;text-align:right;padding-right:8px;color:var(--muted);font-size:.65rem;flex-shrink:0;user-select:none;line-height:1.8;}
.cl.active .ln{color:#3b82f6;}
.ct{padding-right:14px;white-space:pre;color:#abb2bf;}
.kw{color:#c678dd;}.fn{color:#61afef;}.cm{color:#3d4d60;font-style:italic;}.nm{color:#e5c07b;}

.viz-panel{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.formula{padding:12px 18px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono';font-size:.8rem;color:var(--muted);text-align:center;}
.formula .highlight{color:var(--curr);font-weight:700;}

.dp-viz{flex:1;overflow:auto;padding:20px;}
.dp-array{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:30px;}
.dp-cell{display:flex;flex-direction:column;align-items:center;gap:6px;}
.dp-idx{font-family:'JetBrains Mono';font-size:.65rem;color:var(--muted);}
.dp-box{width:65px;height:65px;border-radius:10px;border:2px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono';font-size:1.1rem;font-weight:700;color:var(--text);transition:all .3s;}
.dp-cell.curr .dp-box{border-color:var(--curr);box-shadow:0 0 14px rgba(59,130,246,.3);color:var(--curr);}
.dp-cell.prev1 .dp-box{border-color:var(--prev1);background:rgba(16,185,129,.06);color:var(--prev1);}
.dp-cell.prev2 .dp-box{border-color:var(--prev2);background:rgba(167,139,250,.06);color:var(--prev2);}
.dp-cell.done .dp-box{border-color:var(--result);background:rgba(245,158,11,.08);color:var(--result);}

.stairs-viz{margin-top:20px;display:flex;justify-content:center;}
.stairs{display:flex;flex-direction:column-reverse;gap:2px;}
.stair{display:flex;align-items:center;gap:2px;}
.step{width:50px;height:30px;background:var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono';font-size:.7rem;color:var(--muted);transition:all .3s;}
.step.active{background:var(--curr);color:#fff;}
.step.path{background:var(--prev1);color:#fff;}

.decision{margin:10px 18px;padding:10px 14px;border-radius:7px;border:1px solid var(--border);background:var(--card);font-family:'JetBrains Mono';font-size:.73rem;color:var(--muted);flex-shrink:0;}
.decision.calc{border-color:rgba(59,130,246,.45);background:rgba(59,130,246,.07);color:var(--curr);}
.decision.done{border-color:rgba(245,158,11,.45);background:rgba(245,158,11,.07);color:var(--result);}

.bot{margin-top:auto;display:flex;align-items:center;gap:8px;padding:8px 18px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--text);}.btn-g:hover{border-color:#3b82f6;color:#3b82f6;}
.btn:disabled{opacity:.3;cursor:not-allowed;}
.step-info{font-family:'JetBrains Mono';font-size:.72rem;color:var(--muted);}
.spd-wrap{display:flex;align-items:center;gap:5px;margin-left:auto;}
.spd-wrap label{font-size:.7rem;color:var(--muted);}
input[type=range]{accent-color:#3b82f6;width:80px;}

.log-panel{border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;}
.log-panel .plabel{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;}
.lc{font-size:.6rem;padding:2px 6px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);border-radius:3px;cursor:pointer;font-family:inherit;}
.lc:hover{color:var(--text);}
.log-scroll{flex:1;overflow-y:auto;padding:5px 7px;display:flex;flex-direction:column;gap:3px;}
.le{font-family:'JetBrains Mono';font-size:.65rem;padding:4px 7px;border-radius:4px;background:var(--card);border:1px solid var(--border);}
.le.calc{border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.05);color:var(--curr);}
.le.done{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.05);color:var(--result);}
.ls{color:var(--muted);margin-right:6px;}
</style>
</head>
<body>
<header>
  <div class="h-num">70</div>
  <div class="h-title">Climbing Stairs</div>
  <div class="h-badge">EASY</div>
  <div class="h-right">
    <input id="nInput" class="inp" placeholder="n = 5"/>
    <button class="btn btn-p" onclick="init()">Reset</button>
  </div>
</header>

<main>
  <div class="code-panel">
    <div class="plabel">Dynamic Programming</div>
    <div class="code-scroll" id="codePanel"></div>
  </div>

  <div class="viz-panel">
    <div class="formula">
      DP Formula: <span class="highlight">dp[i] = dp[i-1] + dp[i-2]</span>
    </div>
    
    <div class="dp-viz">
      <div class="dp-array" id="dpArray"></div>
      <div class="stairs-viz" id="stairsViz"></div>
    </div>
    
    <div id="decision" class="decision">Computing ways to climb stairs...</div>
    
    <div class="bot">
      <button class="btn btn-g" id="btnPrev" onclick="stepBack()">◀ Prev</button>
      <button class="btn btn-p" id="btnPlay" onclick="togglePlay()">▶ Play</button>
      <button class="btn btn-g" id="btnNext" onclick="stepFwd()">Next ▶</button>
      <span class="step-info" id="stepInfo">0 / 0</span>
      <div class="spd-wrap">
        <label>Speed:</label>
        <input type="range" id="speedSlider" min="200" max="1400" value="800"/>
      </div>
    </div>
  </div>

  <div class="log-panel">
    <div class="plabel">
      DP Log
      <button class="lc" onclick="clearLog()">Clear</button>
    </div>
    <div class="log-scroll" id="logScroll"></div>
  </div>
</main>

<script>
const code=[
  {t:'def climbStairs(n):',cm:true},
  {t:'    if n <= 2:',ln:1},
  {t:'        return n',ln:2},
  {t:'    ',ln:3},
  {t:'    # dp[i] = ways to reach step i',cm:true},
  {t:'    dp = [0] * (n + 1)',ln:4},
  {t:'    dp[1] = 1  # 1 way to reach step 1',ln:5},
  {t:'    dp[2] = 2  # 2 ways to reach step 2',ln:6},
  {t:'    ',ln:7},
  {t:'    for i in range(3, n + 1):',ln:8},
  {t:'        # Can reach from (i-1) or (i-2)',cm:true},
  {t:'        dp[i] = dp[i-1] + dp[i-2]',ln:9},
  {t:'    ',ln:10},
  {t:'    return dp[n]',ln:11}
];

let n,steps=[],cursor=0,playing=false,playTimer;

function buildCode(){
  const panel=document.getElementById('codePanel');
  code.forEach((c,i)=>{
    const line=document.createElement('div');
    line.className='cl';
    line.id=`line${c.ln||i}`;
    const ln=document.createElement('div');ln.className='ln';
    ln.textContent=c.ln!==undefined?c.ln:'';
    const ct=document.createElement('div');ct.className='ct';
    if(c.cm){
      ct.innerHTML=`<span class="cm">${c.t}</span>`;
    }else{
      ct.innerHTML=c.t
        .replace(/(def|if|for|in|return|range)/g,'<span class="kw">$1</span>')
        .replace(/(climbStairs)/g,'<span class="fn">$1</span>')
        .replace(/(n|dp|i)/g,'<span class="nm">$1</span>');
    }
    line.appendChild(ln);line.appendChild(ct);panel.appendChild(line);
  });
}

function highlight(ln){
  document.querySelectorAll('.cl').forEach(l=>l.classList.remove('active'));
  if(ln>=0){const el=document.getElementById(`line${ln}`);if(el)el.classList.add('active');}
}

function buildSteps(n){
  const s=[];
  
  if(n<=2){
    s.push({line:2,dp:[],curr:-1,msg:`n=${n}, returning ${n}`,done:true,log:{type:'done',text:`Result: ${n} ways`}});
    return s;
  }
  
  const dp=Array(n+1).fill(0);
  
  s.push({line:4,dp:[...dp],curr:-1,msg:'Initializing DP array',log:{type:'calc',text:'Created DP array'}});
  
  dp[1]=1;
  s.push({line:5,dp:[...dp],curr:1,msg:'Base case: dp[1] = 1 (one way to reach step 1)',log:{type:'calc',text:'dp[1] = 1'}});
  
  dp[2]=2;
  s.push({line:6,dp:[...dp],curr:2,msg:'Base case: dp[2] = 2 (two ways to reach step 2)',log:{type:'calc',text:'dp[2] = 2'}});
  
  for(let i=3;i<=n;i++){
    s.push({line:9,dp:[...dp],curr:i,prev1:i-1,prev2:i-2,msg:`Computing dp[${i}] = dp[${i-1}] + dp[${i-2}] = ${dp[i-1]} + ${dp[i-2]}`,log:{type:'calc',text:`dp[${i}] = ${dp[i-1]} + ${dp[i-2]}`}});
    
    dp[i]=dp[i-1]+dp[i-2];
    
    s.push({line:9,dp:[...dp],curr:i,msg:`dp[${i}] = ${dp[i]}`,log:{type:'calc',text:`dp[${i}] = ${dp[i]}`}});
  }
  
  s.push({line:11,dp:[...dp],curr:n,msg:`Answer: ${dp[n]} ways to climb ${n} stairs`,done:true,log:{type:'done',text:`Result: ${dp[n]} ways`}});
  
  return s;
}

function renderDP(st){
  const arr=document.getElementById('dpArray');
  arr.innerHTML='';
  
  st.dp.forEach((val,i)=>{
    if(i===0)return;
    
    const cell=document.createElement('div');
    cell.className='dp-cell';
    if(i===st.curr)cell.classList.add('curr');
    if(i===st.prev1)cell.classList.add('prev1');
    if(i===st.prev2)cell.classList.add('prev2');
    if(st.done&&i===n)cell.classList.add('done');
    
    const idx=document.createElement('div');
    idx.className='dp-idx';
    idx.textContent=`i=${i}`;
    
    const box=document.createElement('div');
    box.className='dp-box';
    box.textContent=val||'?';
    
    cell.appendChild(idx);
    cell.appendChild(box);
    arr.appendChild(cell);
  });
}

function renderStairs(st){
  const viz=document.getElementById('stairsViz');
  viz.innerHTML='';
  
  const stairs=document.createElement('div');
  stairs.className='stairs';
  
  for(let i=n;i>=1;i--){
    const stair=document.createElement('div');
    stair.className='stair';
    
    for(let j=0;j<i;j++){
      const step=document.createElement('div');
      step.className='step';
      if(i===st.curr)step.classList.add('active');
      if(st.done&&i<=n)step.classList.add('path');
      step.textContent=i===1?i:'';
      stair.appendChild(step);
    }
    
    stairs.appendChild(stair);
  }
  
  viz.appendChild(stairs);
}

function renderDecision(st){
  const d=document.getElementById('decision');
  d.className='decision';
  d.textContent=st.msg;
  if(st.curr>=0&&!st.done)d.classList.add('calc');
  if(st.done)d.classList.add('done');
}

function addLog(idx,log){
  const el=document.getElementById('logScroll');
  const d=document.createElement('div');d.className=`le ${log.type}`;
  d.innerHTML=`<span class="ls">[${idx}]</span>${log.text}`;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}

function clearLog(){document.getElementById('logScroll').innerHTML='';}

function rebuildLog(){clearLog();for(let i=0;i<=cursor;i++)if(steps[i]?.log)addLog(i,steps[i].log);}

function renderStep(idx){
  const st=steps[idx];
  highlight(st.line);
  renderDP(st);
  renderStairs(st);
  renderDecision(st);
  document.getElementById('stepInfo').textContent=`${idx} / ${steps.length-1}`;
  document.getElementById('btnPrev').disabled=idx===0;
  document.getElementById('btnNext').disabled=idx===steps.length-1;
}

function stepFwd(){
  if(cursor<steps.length-1){cursor++;if(steps[cursor]?.log)addLog(cursor,steps[cursor].log);renderStep(cursor);}
}

function stepBack(){if(cursor>0){cursor--;rebuildLog();renderStep(cursor);}}

function togglePlay(){
  playing=!playing;
  document.getElementById('btnPlay').textContent=playing?'⏸ Pause':'▶ Play';
  if(playing)runPlay();else clearTimeout(playTimer);
}

function runPlay(){
  if(!playing)return;
  if(cursor>=steps.length-1){playing=false;document.getElementById('btnPlay').textContent='▶ Play';return;}
  stepFwd();
  const spd=1600-parseInt(document.getElementById('speedSlider').value);
  playTimer=setTimeout(runPlay,spd);
}

function init(){
  clearTimeout(playTimer);playing=false;
  document.getElementById('btnPlay').textContent='▶ Play';
  clearLog();
  
  const rawN=document.getElementById('nInput').value.trim();
  n=rawN?parseInt(rawN):5;
  if(isNaN(n)||n<1)n=5;
  if(n>15)n=15; // Limit for visualization
  
  steps=buildSteps(n);
  
  cursor=0;
  highlight(-1);
  if(steps[0]?.log)addLog(0,steps[0].log);
  renderStep(0);
}

buildCode();
init();
</script>
</body>
</html>
