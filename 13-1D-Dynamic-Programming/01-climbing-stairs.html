<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>70. Climbing Stairs - Visualizer</title>
<style>

    --bg-secondary: #111827;

    --bg-header: #0f172a;

    --text-secondary: #9ca3af;
    --border: #374151;
    --accent: #60a5fa;
    --accent2: #818cf8;
    --highlight-line-bg: rgba(251, 191, 36, 0.13);
    --highlight-line-border: #fbbf24;
    --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', 'Monaco', 'Courier New', monospace;

    /* Dracula-inspired syntax */
    --syn-keyword:  #ff79c6;
    --syn-function: #50fa7b;
    --syn-string:   #f1fa8c;
    --syn-comment:  #6272a4;
    --syn-number:   #bd93f9;
    --syn-type:     #8be9fd;
    --syn-operator: #ff79c6;
    --syn-builtin:  #ffb86c;
    --syn-self:     #ff5555;
    --syn-default:  #f8f8f2;
  }
  [data-theme="light"] {
    --bg-primary: #ffffff;
    --bg-secondary: #f3f4f6;
    --bg-panel: #fafbfc;
    --bg-header: #f0f4ff;
    --text-primary: #111827;
    --text-secondary: #6b7280;
    --border: #e5e7eb;
    --accent: #3b82f6;
    --accent2: #6366f1;
    --highlight-line-bg: #fef9c3;
    --highlight-line-border: #f59e0b;
    /* GitHub-inspired syntax */
    --syn-keyword:  #d73a49;
    --syn-function: #6f42c1;
    --syn-string:   #032f62;
    --syn-comment:  #6a737d;
    --syn-number:   #005cc5;
    --syn-type:     #22863a;
    --syn-operator: #d73a49;
    --syn-builtin:  #e36209;
    --syn-self:     #e36209;
    --syn-default:  #24292e;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-secondary);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  #header {
    background: var(--bg-header);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    flex-shrink: 0;
    display: flex;

    gap: 8px;
  }
  .header-row1 {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .problem-title {

    font-size: 13px;

  .theme-btn:hover { color: var(--text-primary); border-color: var(--accent); }

  /* mode toggle */

  .mode-btn {

  /* ── INTUITION PANELS ── */
  .intuition-left, .intuition-right {

  /* intuition viz area */

  /* intuition controls */
  .intuition-ctrl {
    display: flex;

    justify-content: center;
    gap: 8px;

    background: var(--bg-header);

  /* DP table */
  .dp-table-wrap { overflow-x: auto; }
  table.dp-tbl {
    border-collapse: collapse;
    font-family: var(--font-mono);
    font-size: 13px;
    width: 100%;
  }
  table.dp-tbl th, table.dp-tbl td {
    border: 1px solid var(--border);

  table.dp-tbl th { background: var(--bg-secondary); color: var(--text-secondary); font-size: 11px; }
  table.dp-tbl td { background: var(--bg-panel); color: var(--text-primary); }
  table.dp-tbl td.hi { background: rgba(96,165,250,.2); color: var(--accent); font-weight: 700; }
  table.dp-tbl td.hi2 { background: rgba(251,191,36,.15); color: #fbbf24; font-weight: 700; }

  /* approach box */

  /* recurrence box */

    color: var(--accent2);

  /* fib stairs */
  .stairs-row {
    display: flex;
    align-items: flex-end;

  .cplx-table { width: 100%; border-collapse: collapse; font-size: 13px; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

<body>

<div id="header">
  <div class="header-row1">
    <div class="problem-title">
      <span class="num">70.</span> Climbing Stairs
      <span class="badge">Easy</span>
    </div>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀️ Light</button>
  </div>
  <div class="mode-row">
    <button class="mode-btn active" id="btnIntuition" onclick="setMode('intuition')">💡 Intuition &amp; Thought Process</button>
    <button class="mode-btn"        id="btnExecution" onclick="setMode('execution')">▶️ Step-by-Step Execution</button>
  </div>
  <div class="input-row" id="inputRow" style="display:none">
    <label>n =</label>
    <input type="number" id="nInput" value="6" min="1" max="30"/>
    <button class="run-btn" onclick="rerun()">▶ Run</button>
  </div>
</div>

<div id="main"></div>

<script>
// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let state = {
  theme: 'dark',
  mode: 'intuition',
  n: 6,
  steps: [],
  currentStep: 0,
  isPlaying: false,
  speed: 1,
  playTimer: null,
  iStage: 0,
  iPlaying: false,
  iTimer: null,
};

// ─────────────────────────────────────────────
//  SOLUTION + STEP GENERATION
// ─────────────────────────────────────────────
function generateSteps(n) {
  const steps = [];
  function log(line, vars, desc, extra={}) {
    steps.push({ line, vars: JSON.parse(JSON.stringify(vars)), desc, ...extra });
  }

  const vars = {};
  log(0, {n}, `Start: climbStairs(${n})`);

  if (n <= 2) {
    vars.result = n;
    log(1, {n, result:n}, `Base case: n=${n} ≤ 2, return ${n}`);
    return steps;
  }

  log(1, {n}, `n=${n} > 2, skip base case branch`);

  vars.prev2 = 1; vars.prev1 = 2;
  log(5, {...vars}, `Initialise: prev2=1 (ways for n=1), prev1=2 (ways for n=2)`);

  for (let i = 3; i <= n; i++) {
    log(6, {...vars, i}, `Loop iteration i=${i}: computing ways for stair ${i}`);
    const newPrev1 = vars.prev2 + vars.prev1;
    const newPrev2 = vars.prev1;
    vars.prev2 = newPrev2;
    vars.prev1 = newPrev1;
    log(7, {...vars, i, computed: `${newPrev2} + (${newPrev2}) → prev1=${newPrev1}`},
        `prev2, prev1 = prev1, prev2+prev1  →  prev2=${vars.prev2}, prev1=${vars.prev1}`);
  }

  log(8, {...vars, result: vars.prev1}, `Return prev1 = ${vars.prev1} (ways to climb ${n} stairs)`);
  return steps;
}

// ─────────────────────────────────────────────
//  INTUITION STAGES
// ─────────────────────────────────────────────
const intuitionStages = [
  {
    title: "Understanding the Problem",
    thought: "So I need to count how many distinct ways I can climb n stairs, taking 1 or 2 steps at a time...",
    content: `The problem gives us n stairs and two allowed moves: take 1 step or take 2 steps. We want to count all distinct sequences of moves that get us from step 0 to step n.

For example, with n=3:
  [1,1,1], [1,2], [2,1] → 3 ways`,
    insight: "At every stair, we arrive from either 1 step below or 2 steps below — that duality is the key.",
    viz: "example"
  },
  {
    title: "Spotting the Recursive Structure",
    thought: "How many ways to reach stair i? I must have come from stair i−1 OR stair i−2. So ways(i) = ways(i−1) + ways(i−2). That's Fibonacci!",
    content: `The number of ways to reach stair i is exactly:
  ways(i) = ways(i−1) + ways(i−2)

Because the last step was either +1 from i−1, or +2 from i−2.

Base cases:
  ways(1) = 1  (only one way: a single step)
  ways(2) = 2  ({1+1} or {2})`,
    insight: "This is the Fibonacci sequence in disguise. ways(n) = fib(n+1).",
    viz: "recurrence"
  },
  {
    title: "Naive Recursion vs DP",
    thought: "Naive recursion recalculates the same subproblems exponentially. But I only need the last two values at any point...",
    content: `Naïve recursion: T(n) = T(n-1) + T(n-2) → O(2ⁿ) — too slow!
Memoised recursion: O(n) time, O(n) space — better.
DP table: O(n) time, O(n) space — same complexity.
Space-optimised DP: O(n) time, O(1) space — optimal!

We only ever look back two positions, so we only need two variables.`,
    insight: "Rolling two variables (prev2, prev1) replaces the entire DP array.",
    viz: "comparison"
  },
  {
    title: "The Rolling Variables Trick",
    thought: "Instead of an array dp[0..n], I slide a window of size 2 forward. Each step: prev2, prev1 = prev1, prev2+prev1.",
    content: `Iteration by iteration for n=6:
  Init: prev2=1, prev1=2
  i=3:  prev2=2, prev1=3
  i=4:  prev2=3, prev1=5
  i=5:  prev2=5, prev1=8
  i=6:  prev2=8, prev1=13

Answer = prev1 = 13 ✓`,
    insight: "One tuple assignment per iteration — clean, cache-friendly, and O(1) space.",
    viz: "rolling"
  },
  {
    title: "Complexity Analysis",
    thought: "O(n) time, O(1) space — this is provably optimal for this problem.",
    content: `Time Complexity: O(n)
  • Single loop from 3 to n
  • One addition + one reassignment per step

Space Complexity: O(1)
  • Only prev2 and prev1 are stored
  • No recursion stack, no array

Can we do better? No — we must at least read n, so Ω(n) is a lower bound.`,
    insight: "This solution matches the theoretical lower bound — it's as efficient as possible.",
    viz: "complexity"
  },
  {
    title: "Edge Cases & Testing",
    thought: "What if n=1? n=2? Large n? The base case handles them without entering the loop.",
    content: `n=1 → return 1  (base case, skip loop)
n=2 → return 2  (base case, skip loop)
n=3 → loop runs once: 1+2=3 ✓
n=10 → 89 ways
n=45 → 1,836,311,903 (fits in int32)

The constraint says 1 ≤ n ≤ 45, so no overflow.`,

//  SYNTAX HIGHLIGHTING
// ─────────────────────────────────────────────
const RAW_CODE = [
  'class Solution:',
  '    def climbStairs(self, n: int) -> int:',
  '        if n <= 2:',
  '            return n',
  '        ',
  '        # Space-optimised DP: O(1) space, O(n) time',
  '        # No need for an array — only the last two values matter',
  '        prev2, prev1 = 1, 2',
  '        for _ in range(3, n + 1):',
  '            prev2, prev1 = prev1, prev2 + prev1',
  '        return prev1',
];

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Token-based highlighter: tokenise the RAW string first, then emit HTML.
// Regexes only ever run on plain text — never on already-emitted HTML.
function highlightLine(raw) {
  if (!raw || !raw.trim()) return '&nbsp;';

  const KEYWORDS = new Set(['class','def','return','if','elif','else','for','while',
    'in','and','or','not','import','from','pass','True','False','None',
    'lambda','with','as','yield','raise','try','except','finally','break','continue']);
  const BUILTINS = new Set(['range','len','print','int','str','list','dict','set',
    'tuple','enumerate','zip','map','filter','sorted','reversed','sum',
    'min','max','abs','type','isinstance','hasattr','getattr']);

  // Tokeniser: produces [{type, val}]
  const tokens = [];
  let i = 0;
  const s = raw;

  while (i < s.length) {
    // Inline comment
    if (s[i] === '#') {
      tokens.push({ type: 'comment', val: s.slice(i) });
      break;
    }
    // Triple-quoted string
    if (s.slice(i,i+3) === '"""' || s.slice(i,i+3) === "'''") {
      const q = s.slice(i,i+3);
      let j = i + 3;
      while (j < s.length && s.slice(j,j+3) !== q) j++;
      j += 3;
      tokens.push({ type: 'string', val: s.slice(i, j) });
      i = j; continue;
    }
    // Single-quoted string
    if (s[i] === '"' || s[i] === "'") {
      const q = s[i]; let j = i + 1;
      while (j < s.length && s[j] !== q && s[j] !== '\n') {
        if (s[j] === '\\') j++;
        j++;
      }
      j++;
      tokens.push({ type: 'string', val: s.slice(i, j) });
      i = j; continue;
    }
    // Number
    if (/\d/.test(s[i]) && (i === 0 || /[\W]/.test(s[i-1]))) {
      let j = i;
      while (j < s.length && /[\d.]/.test(s[j])) j++;
      tokens.push({ type: 'number', val: s.slice(i, j) });
      i = j; continue;
    }
    // Identifier or keyword
    if (/[a-zA-Z_]/.test(s[i])) {
      let j = i;
      while (j < s.length && /\w/.test(s[j])) j++;
      const word = s.slice(i, j);
      // peek ahead for '(' to detect function calls
      let k = j;
      while (k < s.length && s[k] === ' ') k++;
      const isCall = s[k] === '(';
      if (word === 'self') {
        tokens.push({ type: 'self', val: word });
      } else if (KEYWORDS.has(word)) {
        tokens.push({ type: 'keyword', val: word });
      } else if (BUILTINS.has(word) && isCall) {
        tokens.push({ type: 'builtin', val: word });
      } else if (isCall) {
        tokens.push({ type: 'function', val: word });
      } else if (/^[A-Z]/.test(word)) {
        tokens.push({ type: 'type', val: word });
      } else {
        tokens.push({ type: 'plain', val: word });
      }
      i = j; continue;
    }
    // Arrow ->
    if (s.slice(i,i+2) === '->') {
      tokens.push({ type: 'operator', val: '->' });
      i += 2; continue;
    }
    // Operators
    if (/[+\-*\/=<>!%^~|&]/.test(s[i])) {
      let j = i;
      while (j < s.length && /[+\-*\/=<>!%^~|&]/.test(s[j])) j++;
      tokens.push({ type: 'operator', val: s.slice(i, j) });
      i = j; continue;
    }
    // Everything else (spaces, punctuation, colons, parens…)
    tokens.push({ type: 'plain', val: s[i] });
    i++;
  }

  // Emit HTML — each token's text is escaped individually
  const CLASS = {
    keyword: 'kw', function: 'fn', string: 'str', comment: 'cmt',
    number: 'num', type: 'typ', operator: 'op', builtin: 'bi',
    self: 'slf', plain: null
  };
  return tokens.map(t => {
    const cls = CLASS[t.type];
    const escaped = esc(t.val);
    return cls ? `<span class="${cls}">${escaped}</span>` : escaped;
  }).join('');
}

function buildCodePanel(currentLine) {

}

function renderExecViz(step) {
  const vars = step.vars || {};
  const n = state.n;
  const dp = computeDP(n);

  // Determine which cells to highlight
  const currentI = vars.i ?? (step.line === 5 ? 2 : (step.line === 8 ? n : -1));

  // We'll highlight prev2 and prev1 positions
  let hi2pos = -1, hi1pos = -1;
  if (vars.prev2 !== undefined && vars.prev1 !== undefined) {
    // find positions in dp array where value matches
    const p1 = vars.prev1, p2 = vars.prev2;
    // reconstruct which index we're at from the iteration i
    if (vars.i !== undefined) {
      hi1pos = vars.i;
      hi2pos = vars.i - 1;
    } else if (step.line === 5) {
      hi1pos = 2; hi2pos = 1;
    } else if (step.line === 8) {
      hi1pos = n; hi2pos = n - 1;
    }
  }

  // Build DP table cells
  const cells = dp.map((v, i) => {
    let cls = '';
    if (i === hi1pos) cls = 'hi';
    else if (i === hi2pos) cls = 'hi2';
    return `<td class="${cls}">${v}</td>`;
  }).join('');

  const headers = dp.map((_, i) => `<th>${i}</th>`).join('');

  // Variable display
  const varBoxes = [];
  if (vars.prev2 !== undefined) varBoxes.push(`<div style="display:inline-flex;flex-direction:column;align-items:center;gap:4px;margin:0 12px"><div style="font-family:var(--font-mono);font-size:22px;font-weight:700;color:#fbbf24">${vars.prev2}</div><div style="font-size:11px;color:var(--text-secondary);font-family:var(--font-mono)">prev2</div></div>`);
  if (vars.prev1 !== undefined) varBoxes.push(`<div style="display:inline-flex;flex-direction:column;align-items:center;gap:4px;margin:0 12px"><div style="font-family:var(--font-mono);font-size:22px;font-weight:700;color:var(--accent)">${vars.prev1}</div><div style="font-size:11px;color:var(--text-secondary);font-family:var(--font-mono)">prev1</div></div>`);

  const varRow = varBoxes.length ? `
    <div style="display:flex;align-items:center;justify-content:center;padding:14px;background:var(--bg-secondary);border-radius:10px;border:1px solid var(--border)">
      ${varBoxes.join('<div style="font-size:24px;color:var(--text-secondary);font-weight:300;margin:0 4px">→</div>')}
    </div>
  ` : '';

  // Stairs SVG
  const stairSvg = buildStairsSVG(n, vars);

  return `
    ${varRow}
    <div style="width:100%">
      <div style="font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">DP Values (index = stair)</div>
      <div class="dp-table-wrap">
        <table class="dp-tbl">
          <tr>${headers}</tr>
          <tr>${cells}</tr>
        </table>
      </div>
    </div>
    ${stairSvg}
  `;
}

function computeDP(n) {
  const dp = [0, 1, 2];
  for (let i = 3; i <= n; i++) dp.push(dp[i-1] + dp[i-2]);
  return dp.slice(0, n + 1);
}

function buildStairsSVG(n, vars) {
  const dp = computeDP(n);
  const maxVal = dp[n];
  const W = 560, H = 180;
  const barW = Math.min(44, (W - 40) / (n + 1));
  const barGap = barW + 4;

  // Determine highlighted index
  let hiIdx = -1;
  if (vars.i !== undefined) hiIdx = vars.i;
  else if (vars.result !== undefined) hiIdx = n;

  const bars = dp.slice(1).map((v, idx) => {
    const i = idx + 1;
    const barH = Math.max(10, (v / maxVal) * (H - 50));
    const x = 20 + idx * barGap;
    const y = H - 20 - barH;
    const fill = i === hiIdx ? '#60a5fa' : (i === n ? '#818cf8' : '#374151');
    return `
      <rect x="${x}" y="${y}" width="${barW}" height="${barH}" fill="${fill}" rx="3" opacity="${i > (vars.i ?? n) && vars.i !== undefined ? 0.4 : 1}"/>
      <text x="${x + barW/2}" y="${y - 4}" text-anchor="middle" font-size="11" fill="${i === hiIdx ? '#60a5fa' : '#9ca3af'}" font-family="var(--font-mono)">${v}</text>
      <text x="${x + barW/2}" y="${H - 4}" text-anchor="middle" font-size="10" fill="#6b7280" font-family="var(--font-mono)">${i}</text>
    `;
  }).join('');

  return `<div style="width:100%">
    <div style="font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px">Ways per Stair</div>
    <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">
      ${bars}
    </svg>
  </div>`;
}

function renderStepLog(step) {

        <tr><td>Space</td><td class="good">O(1)</td><td>Only prev2 &amp; prev1 stored</td></tr>
        <tr><td>Best possible time</td><td>Ω(n)</td><td>Must read n at minimum</td></tr>
        <tr><td>Constraint</td><td>1 ≤ n ≤ 45</td><td>Fits in 32-bit int</td></tr>
      </tbody>
    </table>
    <div style="background:rgba(16,185,129,.08);border-left:3px solid #10b981;padding:12px 14px;border-radius:0 6px 6px 0;font-size:13px;color:var(--text-primary)">
      <strong>Optimal:</strong> Time complexity matches the theoretical lower bound. No further improvement is possible.
    </div>
  `;
}

function vizEdgeCases() {
  const cases = [
    {n:1, ans:1, note:'Base case — single step'},
    {n:2, ans:2, note:'Base case — {1+1} or {2}'},
    {n:3, ans:3, note:'First loop iteration'},
    {n:10,ans:89,note:'Mid-range value'},
    {n:45,ans:1836311903,note:'Maximum input — fits in int32'},
  ];
  return `
    <div style="overflow-x:auto">
      <table class="cplx-table">
        <thead><tr><th>n</th><th>Answer</th><th>Note</th></tr></thead>
        <tbody>${cases.map(c=>`<tr><td style="font-family:var(--font-mono)">${c.n}</td><td style="font-family:var(--font-mono);color:var(--accent)">${c.ans.toLocaleString()}</td><td style="color:var(--text-secondary)">${c.note}</td></tr>`).join('')}</tbody>
      </table>
    </div>
  `;
}

// ─────────────────────────────────────────────
//  INTERACTION
// ─────────────────────────────────────────────
function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', state.theme === 'light' ? 'light' : '');
  document.getElementById('themeBtn').textContent = state.theme === 'dark' ? '☀️ Light' : '🌙 Dark';
}

function setMode(m) {
  stopPlay(); stopIPlay();
  state.mode = m;
  render();
}

function rerun() {
  stopPlay();
  const v = parseInt(document.getElementById('nInput').value);
  if (isNaN(v) || v < 1 || v > 45) return;
  state.n = v;
  state.steps = generateSteps(v);
  state.currentStep = 0;
  render();
}

function stepFwd() {
  if (state.currentStep < state.steps.length - 1) {
    state.currentStep++;
    render();
  } else stopPlay();
}

function stepBack() {
  if (state.currentStep > 0) { state.currentStep--; render(); }
}

function resetSteps() {
  stopPlay();
  state.currentStep = 0;
  render();
}

function togglePlay() {
  if (state.isPlaying) stopPlay();
  else {
    state.isPlaying = true;
    state.playTimer = setInterval(() => {
      if (state.currentStep >= state.steps.length - 1) { stopPlay(); return; }
      state.currentStep++;
      render();
    }, 1000 / state.speed);
    render();
  }
}

function stopPlay() {
  state.isPlaying = false;
  clearInterval(state.playTimer);
  state.playTimer = null;
}

function setSpeed(s) {
  state.speed = s;
  if (state.isPlaying) { stopPlay(); togglePlay(); }
}

function iStepFwd() {
  if (state.iStage < intuitionStages.length - 1) { state.iStage++; render(); }
  else stopIPlay();
}
function iStepBack() {
  if (state.iStage > 0) { state.iStage--; render(); }
}
function iTogglePlay() {
  if (state.iPlaying) stopIPlay();
  else {
    state.iPlaying = true;
    state.iTimer = setInterval(() => {
      if (state.iStage >= intuitionStages.length - 1) { stopIPlay(); return; }
      state.iStage++;
      render();
    }, 3500);
    render();
  }
}
function stopIPlay() {
  state.iPlaying = false;
  clearInterval(state.iTimer);
  state.iTimer = null;
}
function jumpToStage(i) {
  stopIPlay();
  state.iStage = i;
  render();
}

// ─────────────────────────────────────────────
//  DRAG HANDLES
// ─────────────────────────────────────────────
function attachDragHandles() {
  ['dh0','dh1'].forEach((id, idx) => {
    const el = document.getElementById(id);
    if (!el) return;
    let startX, startW0, startW1;
    el.addEventListener('mousedown', e => {
      startX = e.clientX;
      const panels = ['pCode','pViz','pLog'];
      startW0 = document.getElementById(panels[idx]).offsetWidth;
      startW1 = document.getElementById(panels[idx+1]).offsetWidth;
      el.classList.add('dragging');
      const onMove = e2 => {
        const dx = e2.clientX - startX;
        const total = startW0 + startW1;
        const pct0 = Math.max(15, Math.min(65, ((startW0 + dx) / total * 100)));
        const pct1 = 100 - pct0;
        panelW[idx] = pct0;
        panelW[idx+1] = pct1;
        document.getElementById(panels[idx]).style.width = pct0 + '%';
        document.getElementById(panels[idx+1]).style.width = pct1 + '%';
      };
      const onUp = () => {
        el.classList.remove('dragging');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

function scrollLogToStep() {
  requestAnimationFrame(() => {
    const el = document.getElementById(`hist${state.currentStep}`);
    if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  });
}

function scrollCodeToLine(line) {
  requestAnimationFrame(() => {
    const container = document.getElementById('codeContainer');
    if (!container) return;
    const lines = container.querySelectorAll('.code-line');
    if (lines[line]) lines[line].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  });
}

function scrollIntuitionToStage() {
  requestAnimationFrame(() => {
    const el = document.getElementById(`istage${state.iStage}`);
    if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  });
}

// ─────────────────────────────────────────────
//  KEYBOARD
// ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') {
    e.preventDefault();
    if (state.mode === 'execution') togglePlay(); else iTogglePlay();
  } else if (e.code === 'ArrowRight') {
    e.preventDefault();
    if (state.mode === 'execution') stepFwd(); else iStepFwd();
  } else if (e.code === 'ArrowLeft') {
    e.preventDefault();
    if (state.mode === 'execution') stepBack(); else iStepBack();
  }
});

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
state.steps = generateSteps(state.n);
render();
</script>
