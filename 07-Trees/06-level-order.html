<body data-theme="dark">
    <div class="container">
        <div class="header">
            <h1>102. Binary Tree Level Order Traversal</h1>
            <div class="header-controls">
                <div class="input-group">
                    <label>Test Case:</label>
                    <input type="text" id="treeInput" value="[3,9,20,null,null,15,7]" />
                    <button class="btn btn-primary" onclick="parseAndRun()">Run</button>
                </div>
                <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
            </div>
        </div>

        <div class="panels">
            <div class="panel code-panel">
                <div class="panel-header">Solution Code</div>
                <div class="panel-content">
                    <div class="code-content" id="codeContent"></div>
                </div>
            </div>

            <div class="panel viz-panel">
                <div class="panel-header">Visualization</div>
                <div class="panel-content viz-content" id="vizContent">
                    <svg id="treeSvg" viewBox="0 0 800 600"></svg>
                </div>
                <div class="viz-controls">
                    <button class="control-btn" onclick="reset()">⟲ Reset</button>
                    <button class="control-btn" onclick="stepBack()" id="stepBackBtn">◀ Step Back</button>
                    <button class="control-btn" onclick="togglePlay()" id="playBtn">▶ Play</button>
                    <button class="control-btn" onclick="stepForward()" id="stepForwardBtn">Step Forward ▶</button>
                    <div class="speed-selector">
                        <button class="speed-option" onclick="setSpeed(0.5)">0.5x</button>
                        <button class="speed-option active" onclick="setSpeed(1)">1x</button>
                        <button class="speed-option" onclick="setSpeed(2)">2x</button>
                        <button class="speed-option" onclick="setSpeed(4)">4x</button>
                    </div>
                </div>
            </div>

            <div class="panel log-panel">
                <div class="panel-header">Step Log</div>
                <div class="panel-content log-content" id="logContent"></div>
            </div>
        </div>
    </div>

    <script>
        // Global state
        let steps = [];
        let currentStep = 0;
        let isPlaying = false;
        let playInterval = null;
        let speed = 1;
        let tree = null;

        const code = `from collections import deque
class Solution:
    def levelOrder(self, root: Optional[TreeNode]) -> List[List[int]]:
        if not root:
            return []
        
        result = []
        queue = deque([root])
        
        while queue:
            level_size = len(queue)  # Number of nodes at current level
            level_values = []
            
            # Process all nodes at current level
            for _ in range(level_size):
                node = queue.popleft()
                level_values.append(node.val)
                
                # Add children to queue for next level
                if node.left:
                    queue.append(node.left)
                if node.right:
                    queue.append(node.right)
            
            result.append(level_values)
        
        return result`;

        // Tree node structure
        class TreeNode {
            constructor(val, left = null, right = null) {
                this.val = val;
                this.left = left;
                this.right = right;
                this.id = Math.random().toString(36).substr(2, 9);
            }
        }

        // Parse array to tree
        function arrayToTree(arr) {
            if (!arr || arr.length === 0) return null;
            
            const root = new TreeNode(arr[0]);
            const queue = [root];
            let i = 1;
            
            while (queue.length > 0 && i < arr.length) {
                const node = queue.shift();
                
                if (i < arr.length && arr[i] !== null) {
                    node.left = new TreeNode(arr[i]);
                    queue.push(node.left);
                }
                i++;
                
                if (i < arr.length && arr[i] !== null) {
                    node.right = new TreeNode(arr[i]);
                    queue.push(node.right);
                }
                i++;
            }
            
            return root;
        }

        // BFS with step tracking
        function levelOrderWithSteps(root) {
            const steps = [];
            
            if (!root) {
                steps.push({
                    line: 3,
                    description: "Root is null, returning empty array",
                    vars: { root: null, result: [] },
                    queue: [],
                    currentNode: null,
                    result: [],
                    currentLevel: []
                });
                return { result: [], steps };
            }
            
            const result = [];
            const queue = [root];
            
            steps.push({
                line: 6,
                description: "Initialized empty result array",
                vars: { root: root.val, result: [], queue: [root.val] },
                queue: [root],
                currentNode: null,
                result: [],
                currentLevel: []
            });
            
            steps.push({
                line: 7,
                description: "Created queue with root node",
                vars: { root: root.val, result: [], queue: [root.val] },
                queue: [root],
                currentNode: null,
                result: [],
                currentLevel: []
            });
            
            let stepNum = 0;
            while (queue.length > 0) {
                const level_size = queue.length;
                const level_values = [];
                
                steps.push({
                    line: 10,
                    description: `Starting level ${result.length + 1} with ${level_size} node(s)`,
                    vars: { 
                        level_size, 
                        level_values: [], 
                        queue: queue.map(n => n.val),
                        result: JSON.parse(JSON.stringify(result))
                    },
                    queue: [...queue],
                    currentNode: null,
                    result: JSON.parse(JSON.stringify(result)),
                    currentLevel: []
                });
                
                for (let i = 0; i < level_size; i++) {
                    const node = queue.shift();
                    level_values.push(node.val);
                    
                    steps.push({
                        line: 15,
                        description: `Processing node ${node.val}, adding to level_values`,
                        vars: { 
                            node: node.val,
                            level_values: [...level_values],
                            queue: queue.map(n => n.val),
                            result: JSON.parse(JSON.stringify(result))
                        },
                        queue: [...queue],
                        currentNode: node,
                        result: JSON.parse(JSON.stringify(result)),
                        currentLevel: [...level_values]
                    });
                    
                    if (node.left) {
                        queue.push(node.left);
                        steps.push({
                            line: 19,
                            description: `Added left child ${node.left.val} to queue`,
                            vars: { 
                                node: node.val,
                                level_values: [...level_values],
                                queue: queue.map(n => n.val),
                                result: JSON.parse(JSON.stringify(result))
                            },
                            queue: [...queue],
                            currentNode: node,
                            result: JSON.parse(JSON.stringify(result)),
                            currentLevel: [...level_values]
                        });
                    }
                    
                    if (node.right) {
                        queue.push(node.right);
                        steps.push({
                            line: 21,
                            description: `Added right child ${node.right.val} to queue`,
                            vars: { 
                                node: node.val,
                                level_values: [...level_values],
                                queue: queue.map(n => n.val),
                                result: JSON.parse(JSON.stringify(result))
                            },
                            queue: [...queue],
                            currentNode: node,
                            result: JSON.parse(JSON.stringify(result)),
                            currentLevel: [...level_values]
                        });
                    }
                }
                
                result.push(level_values);
                steps.push({
                    line: 24,
                    description: `Completed level ${result.length}, added ${JSON.stringify(level_values)} to result`,
                    vars: { 
                        level_values,
                        queue: queue.map(n => n.val),
                        result: JSON.parse(JSON.stringify(result))
                    },
                    queue: [...queue],
                    currentNode: null,
                    result: JSON.parse(JSON.stringify(result)),
                    currentLevel: level_values
                });
            }
            
            steps.push({
                line: 26,
                description: "All levels processed, returning result",
                vars: { 
                    result: JSON.parse(JSON.stringify(result)),
                    queue: []
                },
                queue: [],
                currentNode: null,
                result: JSON.parse(JSON.stringify(result)),
                currentLevel: []
            });
            
            return { result, steps };
        }

        // Syntax highlighting
        function highlightPythonLine(line) {
            // Escape HTML first
            const div = document.createElement('div');
            div.textContent = line;
            let escaped = div.innerHTML;
            
            // Don't highlight empty lines
            if (!escaped.trim()) {
                return escaped || ' ';
            }
            
            // Comments
            if (escaped.trim().startsWith('#')) {
                return `<span class="comment">${escaped}</span>`;
            }
            
            // Keywords
            const keywords = ['class', 'def', 'if', 'not', 'return', 'while', 'for', 'in', 'import', 'from'];
            keywords.forEach(kw => {
                const regex = new RegExp(`\\b${kw}\\b`, 'g');
                escaped = escaped.replace(regex, `<span class="keyword">${kw}</span>`);
            });
            
            // Types
            const types = ['Optional', 'TreeNode', 'List', 'deque'];
            types.forEach(type => {
                const regex = new RegExp(`\\b${type}\\b`, 'g');
                escaped = escaped.replace(regex, `<span class="type">${type}</span>`);
            });
            
            // Function names
            escaped = escaped.replace(/\b(levelOrder|len|range|append|popleft)\b/g, '<span class="function">$1</span>');
            
            // Strings
            escaped = escaped.replace(/(&quot;[^&]*&quot;|&#39;[^&]*&#39;)/g, '<span class="string">$1</span>');
            
            // Numbers
            escaped = escaped.replace(/\b(\d+)\b/g, '<span class="number">$1</span>');
            
            return escaped || ' ';
        }

        // Render code
        function renderCode() {
            const codeContent = document.getElementById('codeContent');
            const lines = code.split('\n');
            const currentLine = steps[currentStep]?.line || -1;
            
            codeContent.innerHTML = lines.map((line, i) => `
                <div class="code-line ${i === currentLine ? 'active' : ''}">
                    <span class="line-number">${i + 1}</span>
                    <span class="line-content">${highlightPythonLine(line)}</span>
                </div>
            `).join('');
        }

        // Calculate tree layout
        function calculateTreeLayout(root) {
            if (!root) return { nodes: [], edges: [] };
            
            const nodes = [];
            const edges = [];
            const levelWidth = 800;
            const levelHeight = 100;
            
            function traverse(node, depth, position, leftBound, rightBound) {
                if (!node) return;
                
                const x = (leftBound + rightBound) / 2;
                const y = depth * levelHeight + 50;
                
                nodes.push({ ...node, x, y, depth });
                
                if (node.left) {
                    edges.push({
                        from: { x, y },
                        to: { x: (leftBound + x) / 2, y: y + levelHeight },
                        highlighted: false
                    });
                    traverse(node.left, depth + 1, position - Math.pow(2, 3 - depth), leftBound, x);
                }
                
                if (node.right) {
                    edges.push({
                        from: { x, y },
                        to: { x: (x + rightBound) / 2, y: y + levelHeight },
                        highlighted: false
                    });
                    traverse(node.right, depth + 1, position + Math.pow(2, 3 - depth), x, rightBound);
                }
            }
            
            traverse(root, 0, 0, 0, levelWidth);
            return { nodes, edges };
        }

        // Render tree visualization
        function renderVisualization() {
            const svg = document.getElementById('treeSvg');
            const step = steps[currentStep];
            
            if (!tree) {
                svg.innerHTML = '<text x="400" y="300" text-anchor="middle" fill="var(--text-secondary)">No tree to visualize</text>';
                return;
            }
            
            const layout = calculateTreeLayout(tree);
            const currentNodeId = step?.currentNode?.id;
            const queueIds = step?.queue?.map(n => n.id) || [];
            const processedLevel = step?.currentLevel || [];
            
            // Build SVG content
            let svgContent = '<defs><marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><polygon points="0 0, 10 3, 0 6" fill="#6b7280" /></marker></defs>';
            
            // Draw edges
            layout.edges.forEach((edge, i) => {
                svgContent += `<line x1="${edge.from.x}" y1="${edge.from.y}" x2="${edge.to.x}" y2="${edge.to.y}" stroke="#4b5563" stroke-width="2" class="tree-edge" />`;
            });
            
            // Draw nodes
            layout.nodes.forEach((node, i) => {
                const isCurrentNode = node.id === currentNodeId;
                const isInQueue = queueIds.includes(node.id);
                const isProcessed = processedLevel.includes(node.val);
                
                let fill = '#374151';
                let stroke = '#4b5563';
                let strokeWidth = 2;
                
                if (isCurrentNode) {
                    fill = '#3b82f6';
                    stroke = '#60a5fa';
                    strokeWidth = 3;
                } else if (isProcessed) {
                    fill = '#10b981';
                    stroke = '#34d399';
                } else if (isInQueue) {
                    fill = '#f59e0b';
                    stroke = '#fbbf24';
                }
                
                svgContent += `
                    <g class="tree-node">
                        <circle cx="${node.x}" cy="${node.y}" r="24" fill="${fill}" stroke="${stroke}" stroke-width="${strokeWidth}" />
                        <text x="${node.x}" y="${node.y}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="14" font-weight="500">${node.val}</text>
                    </g>
                `;
            });
            
            svg.innerHTML = svgContent;
            
            // Render queue below tree
            const queueContainer = document.createElement('div');
            queueContainer.className = 'queue-container';
            queueContainer.innerHTML = `
                <div class="queue-label">Queue: [${step?.queue?.map(n => n.val).join(', ') || ''}]</div>
                <div class="queue-items">
                    ${(step?.queue || []).map(n => `<div class="queue-item">${n.val}</div>`).join('')}
                </div>
            `;
            
            const resultContainer = document.createElement('div');
            resultContainer.className = 'result-display';
            resultContainer.innerHTML = `
                <div class="result-label">Current Result:</div>
                <div class="result-value">${JSON.stringify(step?.result || [])}</div>
            `;
            
            const vizContent = document.getElementById('vizContent');
            const existingQueue = vizContent.querySelector('.queue-container');
            const existingResult = vizContent.querySelector('.result-display');
            
            if (existingQueue) existingQueue.remove();
            if (existingResult) existingResult.remove();
            
            vizContent.appendChild(queueContainer);
            vizContent.appendChild(resultContainer);
        }

        // Render step log
        function renderLog() {
            const logContent = document.getElementById('logContent');
            const step = steps[currentStep];
            
            if (!step) {
                logContent.innerHTML = '<div class="step-description">No steps available</div>';
                return;
            }
            
            let html = `
                <div class="step-info">
                    <div class="step-title">Step ${currentStep + 1} of ${steps.length}</div>
                    <div class="step-description">${step.description}</div>
                </div>
                
                <div class="variables-section">
                    <div class="section-title">Variables</div>
                    ${Object.entries(step.vars || {}).map(([name, value]) => `
                        <div class="variable-item">
                            <span class="variable-name">${name}</span>: ${typeof value === 'object' ? JSON.stringify(value) : value}
                        </div>
                    `).join('')}
                </div>
                
                <div class="history-section">
                    <div class="section-title">History</div>
                    ${steps.slice(0, currentStep + 1).map((s, i) => `
                        <div class="history-item ${i === currentStep ? 'active' : ''}">
                            ${i + 1}. ${s.description}
                        </div>
                    `).join('')}
                </div>
            `;
            
            logContent.innerHTML = html;
        }

        // Update UI
        function updateUI() {
            renderCode();
            renderVisualization();
            renderLog();
            
            document.getElementById('stepBackBtn').disabled = currentStep === 0;
            document.getElementById('stepForwardBtn').disabled = currentStep === steps.length - 1;
        }

        // Controls
        function stepForward() {
            if (currentStep < steps.length - 1) {
                currentStep++;
                updateUI();
            }
        }

        function stepBack() {
            if (currentStep > 0) {
                currentStep--;
                updateUI();
            }
        }

        function reset() {
            currentStep = 0;
            if (isPlaying) togglePlay();
            updateUI();
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            const playBtn = document.getElementById('playBtn');
            
            if (isPlaying) {
                playBtn.innerHTML = '⏸ Pause';
                playInterval = setInterval(() => {
                    if (currentStep < steps.length - 1) {
                        stepForward();
                    } else {
                        togglePlay();
                    }
                }, 1000 / speed);
            } else {
                playBtn.innerHTML = '▶ Play';
                if (playInterval) {
                    clearInterval(playInterval);
                    playInterval = null;
                }
            }
        }

        function setSpeed(newSpeed) {
            speed = newSpeed;
            document.querySelectorAll('.speed-option').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            if (isPlaying) {
                togglePlay();
                togglePlay();
            }
        }

        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
        }

        function parseAndRun() {
            const input = document.getElementById('treeInput').value;
            try {
                const arr = JSON.parse(input);
                tree = arrayToTree(arr);
                const result = levelOrderWithSteps(tree);
                steps = result.steps;
                currentStep = 0;
                if (isPlaying) togglePlay();
                updateUI();
            } catch (e) {
                alert('Invalid input format. Please use array notation like [3,9,20,null,null,15,7]');
            }
        }

        // Initialize
        parseAndRun();
    </script>
</body>
</html>
