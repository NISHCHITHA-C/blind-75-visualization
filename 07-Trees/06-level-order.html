    <script>
        // Global state
        let currentMode = 'execution';
        let steps = [];
        let currentStep = 0;
        let isPlaying = false;
        let playInterval = null;
        let speed = 1;
        let tree = null;

        // Intuition state
        let currentIntuitionStage = 0;
        let isIntuitionPlaying = false;
        let intuitionInterval = null;
        let intuitionStages = [];

        const code = `from collections import deque
from typing import Optional, List

class Solution:
    def levelOrder(self, root: Optional[TreeNode]) -> List[List[int]]:
        """
        Perform level-order traversal (BFS) on a binary tree.
        Time: O(n), Space: O(n) for the queue and result
        """
        if not root:
            return []
        
        result = []
        queue = deque([root])
        
        while queue:
            level_size = len(queue)  # Number of nodes at current level
            level_values = []
            
            # Process all nodes at current level
            for _ in range(level_size):
                node = queue.popleft()
                level_values.append(node.val)
                
                # Add children to queue for next level
                if node.left:
                    queue.append(node.left)
                if node.right:
                    queue.append(node.right)
            
            result.append(level_values)
        
        return result`;

        // Tree node structure
        class TreeNode {
            constructor(val, left = null, right = null) {
                this.val = val;
                this.left = left;
                this.right = right;
                this.id = Math.random().toString(36).substr(2, 9);
            }
        }

        // Parse array to tree
        function arrayToTree(arr) {
            if (!arr || arr.length === 0) return null;
            
            const root = new TreeNode(arr[0]);
            const queue = [root];
            let i = 1;
            
            while (queue.length > 0 && i < arr.length) {
                const node = queue.shift();
                
                if (i < arr.length && arr[i] !== null) {
                    node.left = new TreeNode(arr[i]);
                    queue.push(node.left);
                }
                i++;
                
                if (i < arr.length && arr[i] !== null) {
                    node.right = new TreeNode(arr[i]);
                    queue.push(node.right);
                }
                i++;
            }
            
            return root;
        }

        // Get traversal orders
        function getPreorder(root) {
            if (!root) return [];
            return [root.val, ...getPreorder(root.left), ...getPreorder(root.right)];
        }

        function getInorder(root) {
            if (!root) return [];
            return [...getInorder(root.left), root.val, ...getInorder(root.right)];
        }

        function getPostorder(root) {
            if (!root) return [];
            return [...getPostorder(root.left), ...getPostorder(root.right), root.val];
        }

        function getLevelOrder(root) {
            if (!root) return [];
            const result = [];
            const queue = [root];
            while (queue.length > 0) {
                const node = queue.shift();
                result.push(node.val);
                if (node.left) queue.push(node.left);
                if (node.right) queue.push(node.right);
            }
            return result;
        }

        // Initialize intuition stages
        function initIntuitionStages() {
            intuitionStages = [
                {
                    title: "Understanding the Problem",
                    thought: "What's this problem really asking? Level-order means I need to visit nodes level by level, left to right...",
                    content: `Let me break this down:
• Input: A binary tree
• Output: A 2D array where each sub-array contains values from one level
• Constraint: Must visit each level completely before moving to the next
• Example: For tree [3,9,20,null,null,15,7], output is [[3],[9,20],[15,7]]

The key here is "level by level" - this screams BFS (Breadth-First Search)!`,
                    insight: "The problem structure itself hints at BFS - we need to process nodes by their depth/level.",
                    visualization: "example_tree"
                },
                {
                    title: "Exploring Approaches",
                    thought: "Hmm, could I use DFS? Or should I use BFS? Let me think through both...",
                    content: `Let's compare:

Approach A: DFS (Depth-First Search)
• Would visit nodes by going deep first
• Would need to track level numbers
• More complex to group by level
• Recursive, uses call stack

Approach B: BFS (Breadth-First Search)
• Naturally processes level by level
• Uses a queue to track nodes
• Easy to group nodes by level
• Iterative, explicit queue`,
                    insight: "BFS is the natural fit because it processes nodes in level-order by design!",
                    visualization: "approach_comparison"
                },
                {
                    title: "The BFS Technique",
                    thought: "Wait! If I use a queue and track the level size, I can process each level as a group...",
                    content: `The key insight: Before processing a level, I know exactly how many nodes are in it!

        // BFS with step tracking
        function levelOrderWithSteps(root) {
            const steps = [];
            
            if (!root) {
                steps.push({
                    line: 8,
                    description: "Root is null, returning empty array",
                    vars: { root: null, result: [] },
                    queue: [],
                    currentNode: null,
                    result: [],
                    currentLevel: []
                });
                return { result: [], steps };
            }
            
            const result = [];
            const queue = [root];
            
            steps.push({
                line: 11,
                description: "Initialized empty result array",
                vars: { root: root.val, result: [], queue: [root.val] },
                queue: [root],
                currentNode: null,
                result: [],
                currentLevel: []
            });
            
            steps.push({
                line: 12,
                description: "Created queue with root node",
                vars: { root: root.val, result: [], queue: [root.val] },
                queue: [root],
                currentNode: null,
                result: [],
                currentLevel: []
            });
            
            while (queue.length > 0) {
                const level_size = queue.length;
                const level_values = [];
                
                steps.push({
                    line: 15,
                    description: `Starting level ${result.length + 1} with ${level_size} node(s)`,
                    vars: { 
                        level_size, 
                        level_values: [], 
                        queue: queue.map(n => n.val),
                        result: JSON.parse(JSON.stringify(result))
                    },
                    queue: [...queue],
                    currentNode: null,
                    result: JSON.parse(JSON.stringify(result)),
                    currentLevel: []
                });
                
                for (let i = 0; i < level_size; i++) {
                    const node = queue.shift();
                    level_values.push(node.val);
                    
                    steps.push({
                        line: 20,
                        description: `Processing node ${node.val}, adding to level_values`,
                        vars: { 
                            node: node.val,
                            level_values: [...level_values],
                            queue: queue.map(n => n.val),
                            result: JSON.parse(JSON.stringify(result))
                        },
                        queue: [...queue],
                        currentNode: node,
                        result: JSON.parse(JSON.stringify(result)),
                        currentLevel: [...level_values]
                    });
                    
                    if (node.left) {
                        queue.push(node.left);
                        steps.push({
                            line: 24,
                            description: `Added left child ${node.left.val} to queue`,
                            vars: { 
                                node: node.val,
                                level_values: [...level_values],
                                queue: queue.map(n => n.val),
                                result: JSON.parse(JSON.stringify(result))
                            },
                            queue: [...queue],
                            currentNode: node,
                            result: JSON.parse(JSON.stringify(result)),
                            currentLevel: [...level_values]
                        });
                    }
                    
                    if (node.right) {
                        queue.push(node.right);
                        steps.push({
                            line: 26,
                            description: `Added right child ${node.right.val} to queue`,
                            vars: { 
                                node: node.val,
                                level_values: [...level_values],
                                queue: queue.map(n => n.val),
                                result: JSON.parse(JSON.stringify(result))
                            },
                            queue: [...queue],
                            currentNode: node,
                            result: JSON.parse(JSON.stringify(result)),
                            currentLevel: [...level_values]
                        });
                    }
                }
                
                result.push(level_values);
                steps.push({
                    line: 29,
                    description: `Completed level ${result.length}, added ${JSON.stringify(level_values)} to result`,
                    vars: { 
                        level_values,
                        queue: queue.map(n => n.val),
                        result: JSON.parse(JSON.stringify(result))
                    },
                    queue: [...queue],
                    currentNode: null,
                    result: JSON.parse(JSON.stringify(result)),
                    currentLevel: level_values
                });
            }
            
            steps.push({
                line: 31,
                description: "All levels processed, returning result",
                vars: { 
                    result: JSON.parse(JSON.stringify(result)),
                    queue: []
                },
                queue: [],
                currentNode: null,
                result: JSON.parse(JSON.stringify(result)),
                currentLevel: []
            });
            
            return { result, steps };
        }

        // Syntax highlighting
        function highlightPythonLine(line) {
            const div = document.createElement('div');
            div.textContent = line;
            let escaped = div.innerHTML;
            
            if (!escaped.trim()) {
                return escaped || ' ';
            }
            
            if (escaped.trim().startsWith('#')) {
                return `<span class="comment">${escaped}</span>`;
            }
            
            const keywords = ['class', 'def', 'if', 'not', 'return', 'while', 'for', 'in', 'import', 'from'];
            keywords.forEach(kw => {
                const regex = new RegExp(`\\b${kw}\\b`, 'g');
                escaped = escaped.replace(regex, `<span class="keyword">${kw}</span>`);
            });
            
            const types = ['Optional', 'TreeNode', 'List', 'deque'];
            types.forEach(type => {
                const regex = new RegExp(`\\b${type}\\b`, 'g');
                escaped = escaped.replace(regex, `<span class="type">${type}</span>`);

            escaped = escaped.replace(/\b(levelOrder|len|range|append|popleft)\b/g, '<span class="function">$1</span>');
            escaped = escaped.replace(/(&quot;[^&]*&quot;|&#39;[^&]*&#39;)/g, '<span class="string">$1</span>');
            escaped = escaped.replace(/\b(\d+)\b/g, '<span class="number">$1</span>');

        // Calculate tree layout
        function calculateTreeLayout(root) {
            if (!root) return { nodes: [], edges: [] };
            
            const nodes = [];
            const edges = [];
            const levelWidth = 800;
            const levelHeight = 100;
            
            function traverse(node, depth, position, leftBound, rightBound) {
                if (!node) return;
                
                const x = (leftBound + rightBound) / 2;
                const y = depth * levelHeight + 50;
                
                nodes.push({ ...node, x, y, depth });
                
                if (node.left) {
                    edges.push({
                        from: { x, y },
                        to: { x: (leftBound + x) / 2, y: y + levelHeight },
                        highlighted: false
                    });
                    traverse(node.left, depth + 1, position - Math.pow(2, 3 - depth), leftBound, x);
                }
                
                if (node.right) {
                    edges.push({
                        from: { x, y },
                        to: { x: (x + rightBound) / 2, y: y + levelHeight },
                        highlighted: false
                    });
                    traverse(node.right, depth + 1, position + Math.pow(2, 3 - depth), x, rightBound);
                }
            }
            
            traverse(root, 0, 0, 0, levelWidth);
            return { nodes, edges };
        }

                    <div style="margin-top: 20px; padding: 16px; background: rgba(16, 185, 129, 0.1); border-radius: 8px; border-left: 3px solid var(--success);">
                        <strong style="color: var(--success);">Notice the structure:</strong>
                        <ul style="margin: 8px 0; padding-left: 24px; font-size: 14px; line-height: 1.7; color: var(--text-secondary);">
                            <li>Outer <code>while</code> = one iteration per level</li>
                            <li>Inner <code>for</code> = one iteration per node in current level</li>
                            <li>This nested structure naturally produces a 2D result!</li>
                        </ul>
                    </div>
                </div>
            `;
        }

        function renderComplexityAnalysis() {
            return `
                <div style="padding: 30px; max-width: 700px;">
                    <div class="complexity-box">
                        <h4>⏱️ Time Complexity: O(n)</h4>
                        <div class="complexity-item">
                            <strong>Analysis:</strong>
                            <div class="complexity-explanation">
                                • We visit each node exactly once<br>
                                • Each node is enqueued once and dequeued once<br>
                                • Queue operations (append, popleft) are O(1)<br>
                                • Total: n nodes × O(1) operations = O(n)
                            </div>
                        </div>
                    </div>
                    
                    <div class="complexity-box" style="margin-top: 16px;">
                        <h4>💾 Space Complexity: O(n)</h4>
                        <div class="complexity-item">
                            <strong>Analysis:</strong>
                            <div class="complexity-explanation">
                                • Queue: At worst, holds one complete level<br>
                                • For a complete binary tree, the last level has ~n/2 nodes<br>
                                • Result array: Stores all n node values<br>
                                • Total: O(n/2) + O(n) = O(n)
                            </div>
                        </div>
                    </div>
                    
                    <div style="margin-top: 24px; padding: 16px; background: rgba(16, 185, 129, 0.1); border-radius: 8px; border-left: 3px solid var(--success);">
                        <strong style="color: var(--success);">✓ This is optimal!</strong>
                        <div style="margin-top: 8px; font-size: 14px; line-height: 1.6; color: var(--text-secondary);">
                            We cannot do better than O(n) time because we must visit every node at least once to build the output. The O(n) space is also necessary to store the result.
                        </div>
                    </div>
                </div>
            `;
        }

        function renderEdgeCases() {
            return `
                <div style="padding: 30px; max-width: 700px;">
                    <h3 style="margin-bottom: 20px; color: var(--accent);">Edge Case Analysis</h3>
                    
                    <div style="display: flex; flex-direction: column; gap: 16px;">
                        <div style="padding: 16px; background: var(--bg-secondary); border-radius: 8px; border-left: 3px solid var(--success);">
                            <strong style="color: var(--text-primary);">✓ Empty Tree (root = null)</strong>
                            <div style="margin-top: 8px; font-size: 13px; color: var(--text-secondary);">
                                Handled by: <code style="font-family: var(--font-mono); color: var(--accent);">if not root: return []</code><br>
                                Result: <code style="font-family: var(--font-mono);">[]</code>
                            </div>
                        </div>
                        
                        <div style="padding: 16px; background: var(--bg-secondary); border-radius: 8px; border-left: 3px solid var(--success);">
                            <strong style="color: var(--text-primary);">✓ Single Node Tree</strong>
                            <div style="margin-top: 8px; font-size: 13px; color: var(--text-secondary);">
                                Input: <code style="font-family: var(--font-mono);">[1]</code><br>
                                Queue progression: [1] → []<br>
                                Result: <code style="font-family: var(--font-mono);">[[1]]</code>
                            </div>
                        </div>
                        
                        <div style="padding: 16px; background: var(--bg-secondary); border-radius: 8px; border-left: 3px solid var(--success);">
                            <strong style="color: var(--text-primary);">✓ Unbalanced Tree (all left/right)</strong>
                            <div style="margin-top: 8px; font-size: 13px; color: var(--text-secondary);">
                                Input: <code style="font-family: var(--font-mono);">[1,2,null,3,null,4]</code><br>
                                BFS naturally handles any shape!<br>
                                Result: <code style="font-family: var(--font-mono);">[[1],[2],[3],[4]]</code>
                            </div>
                        </div>
                        
                        <div style="padding: 16px; background: var(--bg-secondary); border-radius: 8px; border-left: 3px solid var(--success);">
                            <strong style="color: var(--text-primary);">✓ Complete Binary Tree</strong>
                            <div style="margin-top: 8px; font-size: 13px; color: var(--text-secondary);">
                                Ideal case: Demonstrates level-by-level processing clearly<br>
                                Each level has 2^depth nodes (until last level)
                            </div>
                        </div>
                    </div>
                    
                    <div style="margin-top: 24px; padding: 16px; background: rgba(16, 185, 129, 0.1); border-radius: 8px; border-left: 3px solid var(--success);">
                        <strong style="color: var(--success);">Why it's robust:</strong>
                        <div style="margin-top: 8px; font-size: 14px; line-height: 1.6; color: var(--text-secondary);">
                            BFS works for ANY tree structure - balanced, unbalanced, skewed, complete, or sparse. The level-size technique ensures correct grouping regardless of tree shape.
                        </div>
                    </div>
                </div>
            `;
        }

        function renderFinalDemo() {
            if (!tree) return '<div>No tree loaded</div>';
            
            const levelOrderResult = [];
            const queue = [tree];
            while (queue.length > 0) {
                const levelSize = queue.length;
                const levelValues = [];
                for (let i = 0; i < levelSize; i++) {
                    const node = queue.shift();
                    levelValues.push(node.val);
                    if (node.left) queue.push(node.left);
                    if (node.right) queue.push(node.right);
                }
                levelOrderResult.push(levelValues);
            }
            
            return `
                <div style="padding: 30px; max-width: 700px;">
                    <h3 style="margin-bottom: 20px; color: var(--accent);">Complete Solution in Action</h3>
                    
                    <div style="background: var(--bg-secondary); padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                        <strong style="color: var(--text-primary);">Input Tree:</strong> ${document.getElementById('treeInput').value}<br>
                        <strong style="color: var(--text-primary);">Output:</strong> <code style="font-family: var(--font-mono); color: var(--accent);">${JSON.stringify(levelOrderResult)}</code>
                    </div>
                    
                    <div style="background: rgba(16, 185, 129, 0.1); padding: 20px; border-radius: 8px; border-left: 3px solid var(--success); margin-bottom: 20px;">
                        <strong style="color: var(--success); display: block; margin-bottom: 12px;">✓ Why This Solution is Elegant:</strong>
                        <ul style="margin: 0; padding-left: 24px; font-size: 14px; line-height: 1.8; color: var(--text-secondary);">
                            <li><strong>Natural fit:</strong> BFS + queue naturally process by level</li>
                            <li><strong>Clean code:</strong> Simple nested loops, easy to understand</li>
                            <li><strong>Optimal:</strong> O(n) time and space, can't do better</li>
                            <li><strong>Robust:</strong> Handles all edge cases seamlessly</li>
                            <li><strong>Interview-ready:</strong> Easy to explain and code in 5-10 minutes</li>
                        </ul>
                    </div>
                    
                    <div style="background: var(--bg-secondary); padding: 20px; border-radius: 8px;">
                        <strong style="color: var(--text-primary); display: block; margin-bottom: 12px;">Pattern to Remember:</strong>
                        <div style="font-size: 14px; line-height: 1.7; color: var(--text-secondary);">
                            Whenever you see <strong>"level-order"</strong> or <strong>"process by level"</strong> in a tree problem, immediately think:
                            <div style="margin: 12px 0; padding: 12px; background: var(--code-bg); border-radius: 6px; font-family: var(--font-mono); font-size: 13px; color: var(--accent);">
                                BFS + Queue + Level Size Tracking
                            </div>
                            This pattern appears in many LeetCode problems!
                        </div>
                    </div>
                    
                    <div style="margin-top: 20px; padding: 16px; background: rgba(59, 130, 246, 0.1); border-radius: 8px; border-left: 3px solid var(--accent);">
                        <strong style="color: var(--accent);">🎯 Demonstrates Mastery Of:</strong>
                        <div style="margin-top: 8px; font-size: 13px; line-height: 1.6; color: var(--text-secondary);">
                            • Tree traversal techniques (BFS vs DFS)<br>
                            • Queue data structure and operations<br>
                            • Algorithm design (choosing the right approach)<br>
                            • Time/space complexity analysis<br>
                            • Edge case handling
                        </div>
                    </div>
                </div>
            `;
        }

        // Update UI
        function updateUI() {
            renderCode();
            renderVisualization();
            renderLog();
            
            document.getElementById('stepBackBtn').disabled = currentStep === 0;
            document.getElementById('stepForwardBtn').disabled = currentStep === steps.length - 1;
        }

        function updateIntuitionUI() {
            renderIntuitionContent();
            renderIntuitionViz();
            
            document.getElementById('prevStageBtn').disabled = currentIntuitionStage === 0;
            document.getElementById('nextStageBtn').disabled = currentIntuitionStage === intuitionStages.length - 1;
        }

        // Mode switching
        function switchMode(mode) {
            currentMode = mode;
            
            const executionBtn = document.getElementById('executionModeBtn');
            const intuitionBtn = document.getElementById('intuitionModeBtn');
            const executionPanels = document.getElementById('executionPanels');
            const intuitionPanels = document.getElementById('intuitionPanels');
            const inputSection = document.getElementById('inputSection');
            
            if (mode === 'execution') {
                executionBtn.classList.add('active');
                intuitionBtn.classList.remove('active');
                executionPanels.classList.remove('hidden');
                intuitionPanels.classList.add('hidden');
                inputSection.style.display = 'flex';
                
                if (isIntuitionPlaying) toggleIntuitionPlay();
                updateUI();
            } else {
                intuitionBtn.classList.add('active');
                executionBtn.classList.remove('active');
                intuitionPanels.classList.remove('hidden');
                executionPanels.classList.add('hidden');
                inputSection.style.display = 'none';
                
                if (isPlaying) togglePlay();
                updateIntuitionUI();
            }
        }

        // Execution mode controls
        function stepForward() {
            if (currentStep < steps.length - 1) {
                currentStep++;
                updateUI();
            }
        }

        function stepBack() {
            if (currentStep > 0) {
                currentStep--;
                updateUI();
            }
        }

        function reset() {
            currentStep = 0;
            if (isPlaying) togglePlay();
            updateUI();
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            const playBtn = document.getElementById('playBtn');
            
            if (isPlaying) {
                playBtn.innerHTML = '⏸ Pause';
                playInterval = setInterval(() => {
                    if (currentStep < steps.length - 1) {
                        stepForward();
                    } else {
                        togglePlay();
                    }
                }, 1000 / speed);
            } else {
                playBtn.innerHTML = '▶ Play';
                if (playInterval) {
                    clearInterval(playInterval);
                    playInterval = null;
                }
            }
        }

        function setSpeed(newSpeed) {
            speed = newSpeed;
            document.querySelectorAll('.speed-option').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            if (isPlaying) {
                togglePlay();
                togglePlay();
            }
        }

        // Intuition mode controls
        function nextStage() {
            if (currentIntuitionStage < intuitionStages.length - 1) {
                currentIntuitionStage++;
                updateIntuitionUI();
            }
        }

        function prevStage() {
            if (currentIntuitionStage > 0) {
                currentIntuitionStage--;
                updateIntuitionUI();
            }
        }

        function resetIntuition() {
            currentIntuitionStage = 0;
            if (isIntuitionPlaying) toggleIntuitionPlay();
            updateIntuitionUI();
        }

        function toggleIntuitionPlay() {
            isIntuitionPlaying = !isIntuitionPlaying;
            const playBtn = document.getElementById('intuitionPlayBtn');
            
            if (isIntuitionPlaying) {
                playBtn.innerHTML = '⏸ Pause';
                intuitionInterval = setInterval(() => {
                    if (currentIntuitionStage < intuitionStages.length - 1) {
                        nextStage();
                    } else {
                        toggleIntuitionPlay();
                    }
                }, 4000); // 4 seconds per stage
            } else {
                playBtn.innerHTML = '▶ Auto-play';
                if (intuitionInterval) {
                    clearInterval(intuitionInterval);
                    intuitionInterval = null;
                }
            }
        }

        // Theme toggle
        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
        }

        // Parse and run
        function parseAndRun() {
            const input = document.getElementById('treeInput').value;
            try {
                const arr = JSON.parse(input);
                tree = arrayToTree(arr);
                const result = levelOrderWithSteps(tree);
                steps = result.steps;
                currentStep = 0;
                if (isPlaying) togglePlay();
                updateUI();
            } catch (e) {
                alert('Invalid input format. Please use array notation like [3,9,20,null,null,15,7]');
            }
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (currentMode === 'execution') {
                    togglePlay();
                } else {
                    toggleIntuitionPlay();
                }
            } else if (e.code === 'ArrowRight') {
                e.preventDefault();
                if (currentMode === 'execution') {
                    stepForward();
                } else {
                    nextStage();
                }
            } else if (e.code === 'ArrowLeft') {
                e.preventDefault();
                if (currentMode === 'execution') {
                    stepBack();
                } else {
                    prevStage();
                }
            }
        });

        // Initialize
        initIntuitionStages();
        parseAndRun();
        switchMode('intuition'); // Start in intuition mode by default
    </script>
</body>
</html>
