<body>
    <div class="container" id="app"></div>

    <script>
        const pythonCode = `class TreeNode:
    def __init__(self, x):
        self.val = x
        self.left = None
        self.right = None

class Codec:
    """
    Optimized solution using preorder traversal (DFS).
    Time Complexity: O(n) for both serialize and deserialize
    Space Complexity: O(n) for storing the tree + O(h) recursion stack
    """
    def serialize(self, root):
        """Encodes a tree to a single string."""
        def dfs(node):
            if not node:
                result.append('#')
                return
            result.append(str(node.val))
            dfs(node.left)
            dfs(node.right)
        
        result = []
        dfs(root)
        return ','.join(result)
    
    def deserialize(self, data):
        """Decodes your encoded data to tree."""
        def dfs():
            val = next(vals)
            if val == '#':
                return None
            
            node = TreeNode(int(val))
            node.left = dfs()
            node.right = dfs()
            return node
        
        vals = iter(data.split(','))
        return dfs()`;

        // Main App Component
        class App {
            constructor() {
                this.state = {
                    theme: 'dark',
                    currentStep: 0,
                    isPlaying: false,
                    speed: 1,
                    steps: [],
                    panelWidths: [30, 50, 20],
                    inputValue: '[1,2,3,null,null,4,5]',
                    mode: 'execution', // 'execution' or 'intuition'
                    currentIntuitionStage: 0,
                    isIntuitionPlaying: false
                };
                
                this.playInterval = null;
                this.intuitionStages = this.getIntuitionStages();
                this.init();
            }

            getIntuitionStages() {
                return [
                    {
                        title: "Understanding the Problem",
                        thought: "I need to convert a tree to a string and back. The key question is: what traversal order preserves enough information to reconstruct the tree?",
                        content: `Let's think about what makes trees unique:
- Each node has a value, left child, and right child
- We need to know both the VALUES and the STRUCTURE
- If I just save values [1,2,3,4,5], I lose parent-child relationships`,
                        insight: "We need to encode BOTH values AND structure (null nodes) to fully reconstruct the tree.",
                        visualization: "example_tree",
                        codeHighlight: null
                    },
                    {
                        title: "Choosing a Traversal Strategy",
                        thought: "Preorder (root → left → right) is perfect! Why? Because we visit parents BEFORE children, which matches how we construct trees.",
                        content: `Consider three traversal orders:

**Preorder** (Root, Left, Right): [1, 2, #, #, 3, 4, #, #, 5, #, #]
✅ Parent comes first - we can build as we read!

**Inorder** (Left, Root, Right): [#, 2, #, 1, #, 4, #, 3, #, 5, #]
❌ Root in the middle - hard to know when to build

**Postorder** (Left, Right, Root): [#, #, 2, #, #, 4, #, #, 5, 3, 1]
❌ Root comes last - we'd need to look ahead`,
                        insight: "Preorder DFS lets us construct the tree in the same order we read the data - no lookahead needed!",
                        visualization: "traversal_comparison",
                        codeHighlight: null
                    },
                    {
                        title: "Handling Null Nodes",
                        thought: "How do I know when a subtree ends? I need a special marker for null nodes.",
                        content: `Without null markers:
[1, 2, 3, 4, 5] - ambiguous! Where does the left subtree end?

With null markers ('#'):
[1, 2, #, #, 3, 4, #, #, 5, #, #] - crystal clear!

The '#' tells us "this subtree is empty, move on"`,
                        insight: "Using '#' as a null marker is the secret sauce - it tells us exactly when to stop building a subtree.",
                        visualization: "null_markers",
                        codeHighlight: [16, 17, 18]
                    },
                    {
                        title: "Writing the Serialize Function",
                        thought: "DFS recursion makes this elegant. Visit root, append value, recurse left, recurse right. For null nodes, just append '#'.",
                        content: `The pattern is beautiful in its simplicity:

1. Base case: if node is null, append '#' and return
2. Recursive case:
   - Append current node's value
   - Recursively serialize left subtree
   - Recursively serialize right subtree

This naturally gives us preorder traversal!`,
                        insight: "The recursive structure of DFS perfectly mirrors the recursive structure of a tree.",
                        visualization: "serialize_flow",
                        codeHighlight: [15, 16, 17, 18, 19, 20, 21, 22]
                    },
                    {
                        title: "Writing the Deserialize Function",
                        thought: "If we serialize in preorder, we deserialize in preorder! Read values in the same order we wrote them.",
                        content: `The deserialize is the inverse operation:

1. Read next value from iterator
2. If it's '#', return None (base case)
3. Otherwise:
   - Create node with this value
   - Recursively build left subtree
   - Recursively build right subtree
   - Return the node

The recursion handles all the complexity!`,
                        insight: "Using an iterator (next()) automatically advances through the serialized string as we build the tree.",
                        visualization: "deserialize_flow",
                        codeHighlight: [29, 30, 31, 32, 33, 34, 35, 36, 37]
                    },
                    {
                        title: "Time & Space Complexity Analysis",
                        thought: "Let's verify this is optimal. Each node visited exactly once in both serialize and deserialize.",
                        content: `**Serialize:**
- Visit each of n nodes exactly once: O(n)
- Each visit does O(1) work (append to list)
- Final join operation: O(n)
- Total: O(n) time

**Deserialize:**
- Process each of n elements exactly once: O(n)
- Each creates a node (O(1) work)
- Total: O(n) time

**Space:**
- Result array/string: O(n)
- Recursion call stack: O(h) where h = height
- Total: O(n) space`,
                        insight: "This solution is optimal - we can't do better than O(n) since we must visit every node!",
                        visualization: "complexity",
                        codeHighlight: [8, 9, 10, 11]
                    },
                    {
                        title: "Why This Approach Works",
                        thought: "The genius is in the symmetry: serialize and deserialize use the SAME traversal order.",
                        content: `The key insights working together:

1. **Preorder traversal** - parent before children
2. **Null markers** - explicit structure encoding  
3. **Recursive DFS** - elegant and simple
4. **Iterator pattern** - automatic state tracking in deserialize

Example flow:
Serialize: 1 → 2 → # → # → 3 → 4 → # → # → 5 → # → #
Deserialize: Read in same order, build in same order!`,
                        insight: "When serialize and deserialize mirror each other, correctness is guaranteed.",
                        visualization: "final_demo",
                        codeHighlight: null
                    }
                ];
            }

            init() {
                document.documentElement.setAttribute('data-theme', this.state.theme);
                this.render();
                this.attachEventListeners();
                this.runVisualization();
            }

            toggleTheme() {
                this.state.theme = this.state.theme === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', this.state.theme);
                this.render();
            }

            highlightPythonLine(line) {
                // Create a div to safely escape HTML
                const div = document.createElement('div');
                div.textContent = line;
                let html = div.innerHTML;

                // Skip if empty or just whitespace
                if (!html.trim()) {
                    return html || ' ';
                }

                // Handle comments (must be first to preserve them)
                if (html.trim().startsWith('#')) {
                    return `<span class="syn-comment">${html}</span>`;
                }

                // Handle docstrings (triple quotes)
                if (html.includes('"""') || html.includes("'''")) {
                    return `<span class="syn-string">${html}</span>`;
                }

                // Handle strings with proper escaping
                // Single quotes
                html = html.replace(/&#39;((?:(?!&#39;).)*?)&#39;/g, '<span class="syn-string">&#39;$1&#39;</span>');
                // Double quotes
                html = html.replace(/&quot;((?:(?!&quot;).)*?)&quot;/g, '<span class="syn-string">&quot;$1&quot;</span>');

                // Keywords
                const keywords = ['class', 'def', 'if', 'not', 'return', 'None', 'self', 'import', 'from', 'for', 'in', 'while', 'and', 'or'];
                keywords.forEach(kw => {
                    const regex = new RegExp(`\\b${kw}\\b`, 'g');
                    html = html.replace(regex, `<span class="syn-keyword">${kw}</span>`);
                });

                // Built-in functions
                const builtins = ['str', 'int', 'iter', 'next', 'len', 'append', 'split', 'join', 'range'];
                builtins.forEach(fn => {
                    const regex = new RegExp(`\\b${fn}\\b`, 'g');
                    html = html.replace(regex, `<span class="syn-builtin">${fn}</span>`);
                });

                // Types (class names)
                const types = ['TreeNode', 'Codec'];
                types.forEach(type => {
                    const regex = new RegExp(`\\b${type}\\b`, 'g');
                    html = html.replace(regex, `<span class="syn-type">${type}</span>`);
                });

                // Function definitions (after 'def' keyword)
                html = html.replace(/(<span class="syn-keyword">def<\/span>)\s+(\w+)/g, 
                    '$1 <span class="syn-function">$2</span>');

                // Numbers
                html = html.replace(/\b(\d+)\b/g, '<span class="syn-number">$1</span>');

                return html || ' ';
            }

            runVisualization() {
                const steps = [];
                const input = this.state.inputValue;

                try {
                    // Parse input to create tree
                    const root = this.parseTreeFromArray(input);
                    
                    // Run serialize
                    const serializeSteps = this.simulateSerialize(root);
                    steps.push(...serializeSteps);

                    this.state.steps = steps;
                    this.state.currentStep = 0;
                    this.render();
                } catch (error) {
                    console.error('Visualization error:', error);
                }
            }

            parseTreeFromArray(input) {
                try {
                    const arr = JSON.parse(input);
                    if (!arr || arr.length === 0) return null;

                    const root = { val: arr[0], left: null, right: null, id: 0 };
                    const queue = [root];
                    let i = 1;
                    let nodeId = 1;

                    while (queue.length > 0 && i < arr.length) {
                        const node = queue.shift();

                        if (i < arr.length && arr[i] !== null) {
                            node.left = { val: arr[i], left: null, right: null, id: nodeId++ };
                            queue.push(node.left);
                        }
                        i++;

                        if (i < arr.length && arr[i] !== null) {
                            node.right = { val: arr[i], left: null, right: null, id: nodeId++ };
                            queue.push(node.right);
                        }
                        i++;
                    }

                    return root;
                } catch (e) {
                    return null;
                }
            }

            simulateSerialize(root) {
                const steps = [];
                const result = [];
                let stepNum = 0;

                const dfs = (node, depth = 0) => {
                    if (!node) {
                        result.push('#');
                        steps.push({
                            line: 17,
                            description: `Visit null node - append '#' to result`,
                            vars: {
                                result: [...result],
                                depth: depth
                            },
                            tree: this.cloneTree(root),
                            currentNodeId: null,
                            stepNum: stepNum++
                        });
                        return;
                    }

                    result.push(node.val.toString());
                    steps.push({
                        line: 20,
                        description: `Visit node ${node.val} - append '${node.val}' to result`,
                        vars: {
                            node_val: node.val,
                            result: [...result],
                            depth: depth
                        },
                        tree: this.cloneTree(root),
                        currentNodeId: node.id,
                        stepNum: stepNum++
                    });

                    steps.push({
                        line: 21,
                        description: `Explore left subtree of node ${node.val}`,
                        vars: {
                            node_val: node.val,
                            result: [...result],
                            depth: depth
                        },
                        tree: this.cloneTree(root),
                        currentNodeId: node.id,
                        stepNum: stepNum++
                    });

                    dfs(node.left, depth + 1);

                    steps.push({
                        line: 22,
                        description: `Explore right subtree of node ${node.val}`,
                        vars: {
                            node_val: node.val,
                            result: [...result],
                            depth: depth
                        },
                        tree: this.cloneTree(root),
                        currentNodeId: node.id,
                        stepNum: stepNum++
                    });

                    dfs(node.right, depth + 1);
                };

                steps.push({
                    line: 24,
                    description: 'Initialize empty result array',
                    vars: {
                        result: [],
                        root_val: root ? root.val : null
                    },
                    tree: this.cloneTree(root),
                    currentNodeId: null,
                    stepNum: stepNum++
                });

                steps.push({
                    line: 25,
                    description: 'Start DFS traversal from root',
                    vars: {
                        result: [],
                        root_val: root ? root.val : null
                    },
                    tree: this.cloneTree(root),
                    currentNodeId: null,
                    stepNum: stepNum++
                });

                dfs(root);

                const serialized = result.join(',');
                steps.push({
                    line: 26,
                    description: `Serialization complete! Return: "${serialized}"`,
                    vars: {
                        result: result,
                        serialized: serialized
                    },
                    tree: this.cloneTree(root),
                    currentNodeId: null,
                    stepNum: stepNum++
                });

                return steps;
            }

            cloneTree(node) {
                if (!node) return null;
                return {
                    val: node.val,
                    id: node.id,
                    left: this.cloneTree(node.left),
                    right: this.cloneTree(node.right)
                };
            }

            play() {
                if (this.state.isPlaying) {
                    this.pause();
                    return;
                }

                this.state.isPlaying = true;
                this.render();

                const delay = 1000 / this.state.speed;
                this.playInterval = setInterval(() => {
                    if (this.state.currentStep < this.state.steps.length - 1) {
                        this.state.currentStep++;
                        this.render();
                    } else {
                        this.pause();
                    }
                }, delay);
            }

            pause() {
                this.state.isPlaying = false;
                if (this.playInterval) {
                    clearInterval(this.playInterval);
                    this.playInterval = null;
                }
                this.render();
            }

            stepForward() {
                if (this.state.currentStep < this.state.steps.length - 1) {
                    this.state.currentStep++;
                    this.render();
                }
            }

            stepBack() {
                if (this.state.currentStep > 0) {
                    this.state.currentStep--;
                    this.render();
                }
            }

            reset() {
                this.pause();
                this.state.currentStep = 0;
                this.render();
            }

            changeSpeed(speed) {
                this.state.speed = parseFloat(speed);
                if (this.state.isPlaying) {
                    this.pause();
                    this.play();
                }
            }

            toggleMode(mode) {
                this.pause();
                this.state.mode = mode;
                if (mode === 'intuition') {
                    this.state.currentIntuitionStage = 0;
                } else {
                    this.state.currentStep = 0;
                }
                this.render();
            }

            nextIntuitionStage() {
                if (this.state.currentIntuitionStage < this.intuitionStages.length - 1) {
                    this.state.currentIntuitionStage++;
                    this.render();
                }
            }

            prevIntuitionStage() {
                if (this.state.currentIntuitionStage > 0) {
                    this.state.currentIntuitionStage--;
                    this.render();
                }
            }

            playIntuition() {
                if (this.state.isIntuitionPlaying) {
                    this.pauseIntuition();
                    return;
                }

                this.state.isIntuitionPlaying = true;
                this.render();

                const delay = 4000; // 4 seconds per stage
                this.playInterval = setInterval(() => {
                    if (this.state.currentIntuitionStage < this.intuitionStages.length - 1) {
                        this.state.currentIntuitionStage++;
                        this.render();
                    } else {
                        this.pauseIntuition();
                    }
                }, delay);
            }

            pauseIntuition() {
                this.state.isIntuitionPlaying = false;
                if (this.playInterval) {
                    clearInterval(this.playInterval);
                    this.playInterval = null;
                }
                this.render();
            }

            resetIntuition() {
                this.pauseIntuition();
                this.state.currentIntuitionStage = 0;
                this.render();
            }

            render() {

            renderTree(root, currentNodeId) {
                if (!root) return '<p>Empty tree</p>';

                const positions = this.calculateTreeLayout(root);
                const width = 800;
                const height = 500;

                const edgesHTML = positions.edges.map(edge => `
                    <line 
                        x1="${edge.from.x}" y1="${edge.from.y}"
                        x2="${edge.to.x}" y2="${edge.to.y}"
                        stroke="${edge.highlighted ? '#60a5fa' : '#6b7280'}"
                        stroke-width="2"
                        class="tree-edge"
                    />
                `).join('');

                const nodesHTML = positions.nodes.map(node => `
                    <g class="tree-node">
                        <circle
                            cx="${node.x}" cy="${node.y}" r="24"
                            fill="${node.id === currentNodeId ? '#3b82f6' : '#374151'}"
                            stroke="#60a5fa"
                            stroke-width="${node.id === currentNodeId ? 3 : 1}"
                        />
                        <text
                            x="${node.x}" y="${node.y}"
                            text-anchor="middle"
                            dominant-baseline="middle"
                            fill="#fff"
                            font-size="14"
                            font-weight="500"
                        >
                            ${node.val}
                        </text>
                    </g>
                `).join('');

                return `
                    <svg viewBox="0 0 ${width} ${height}" style="width: 100%; height: 100%; max-height: 500px;">
                        ${edgesHTML}
                        ${nodesHTML}
                    </svg>
                `;
            }

            calculateTreeLayout(root) {
                const positions = { nodes: [], edges: [] };
                const width = 800;
                const levelHeight = 80;

                const traverse = (node, x, y, level, horizontalSpacing) => {
                    if (!node) return;

                    positions.nodes.push({ ...node, x, y });

                    const childSpacing = horizontalSpacing / 2;

                    if (node.left) {
                        const leftX = x - childSpacing;
                        const leftY = y + levelHeight;
                        positions.edges.push({
                            from: { x, y },
                            to: { x: leftX, y: leftY },
                            highlighted: false
                        });
                        traverse(node.left, leftX, leftY, level + 1, childSpacing);
                    }

                    if (node.right) {
                        const rightX = x + childSpacing;
                        const rightY = y + levelHeight;
                        positions.edges.push({
                            from: { x, y },
                            to: { x: rightX, y: rightY },
                            highlighted: false
                        });
                        traverse(node.right, rightX, rightY, level + 1, childSpacing);
                    }
                };

                traverse(root, width / 2, 60, 0, width / 4);
                return positions;
            }

            renderDeserializeFlow() {

                    <div style="padding: 24px;">
                        <div style="background: var(--bg-secondary); padding: 20px; border-radius: 8px; text-align: center;">
                            <strong style="display: block; margin-bottom: 16px; font-size: 16px;">Deserialize Process:</strong>

                                <div>1. Read "1" → Create node(1)</div>
                                <div style="padding-left: 20px;">2. Read "2" → Create node(2) as left child</div>
                                <div style="padding-left: 40px;">3. Read "#" → node(2).left = None</div>
                                <div style="padding-left: 40px;">4. Read "#" → node(2).right = None</div>
                                <div style="padding-left: 20px;">5. Read "3" → Create node(3) as right child</div>
                                <div style="padding-left: 40px;">6. Read "4" → Create node(4) as left child</div>
                                <div style="padding-left: 60px;">7. Read "#" → node(4).left = None</div>
                                <div style="padding-left: 60px;">8. Read "#" → node(4).right = None</div>
                                <div style="padding-left: 40px;">9. Read "5" → Create node(5) as right child</div>
                                <div style="padding-left: 60px;">10. Read "#" → node(5).left = None</div>

            renderComplexity() {

                            <div style="font-size: 14px; line-height: 1.8;">
                                <div style="margin-bottom: 12px;">
                                    <strong>Serialize:</strong> O(n)
                                    <div style="color: var(--text-secondary); margin-left: 20px;">• Visit each node exactly once</div>
                                    <div style="color: var(--text-secondary); margin-left: 20px;">• Append operation: O(1)</div>

                                    <div style="color: var(--text-secondary); margin-left: 20px;">• Process each element exactly once</div>

                                    <div style="color: var(--text-secondary); margin-left: 20px;">• Result array: O(n)</div>

            renderFinalDemo(root) {
                const serialized = this.getPreorderWithNull(root).join(',');
                return `
                    <div style="padding: 24px; text-align: center;">
                        <div style="margin-bottom: 32px;">

                        </div>

                            </div>
                        </div>

                            <div style="font-size: 24px; color: var(--accent);">↓</div>
                            <div style="font-weight: 600; margin: 8px 0;">deserialize()</div>
                        </div>

                            <h3 style="margin-bottom: 16px; color: #10b981;">✅ Reconstructed Tree (Identical!)</h3>
                            ${this.renderTree(root, null)}
                        </div>
                    </div>
                `;
            }

            getPreorder(node, result = []) {
                if (!node) return result;
                result.push(node.val);
                this.getPreorder(node.left, result);
                this.getPreorder(node.right, result);
                return result;
            }

            getInorder(node, result = []) {
                if (!node) return result;
                this.getInorder(node.left, result);
                result.push(node.val);
                this.getInorder(node.right, result);
                return result;
            }

            getPostorder(node, result = []) {
                if (!node) return result;
                this.getPostorder(node.left, result);
                this.getPostorder(node.right, result);
                result.push(node.val);
                return result;
            }

            getPreorderWithNull(node, result = []) {
                if (!node) {
                    result.push('#');
                    return result;
                }
                result.push(node.val);
                this.getPreorderWithNull(node.left, result);
                this.getPreorderWithNull(node.right, result);
                return result;
            }
        }

        // Initialize app
        const app = new App();
    </script>
