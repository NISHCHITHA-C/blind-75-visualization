<body>
    <div class="container">
        <div class="header">
            <h1>🧠 Binary Tree Maximum Path Sum - Intuition Builder</h1>
            <p>Watch how a senior engineer thinks through this problem, step by step</p>
        </div>

        <div class="main-content">
            <div class="thought-panel" id="thoughtPanel">
                <!-- Thought process will be injected here -->
            </div>

            <div class="code-panel">
                <div class="code-editor" id="codeEditor">
                    <!-- Code will be built progressively here -->
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="prevBtn" onclick="previousStep()" disabled>← Previous</button>
            <button id="nextBtn" onclick="nextStep()" class="primary">Next Step →</button>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div class="step-indicator" id="stepIndicator">Step 1 of 12</div>
            <button onclick="restart()">↻ Restart</button>
        </div>
    </div>

    <script>
        let currentStepIndex = 0;

        const intuitionSteps = [
            {
                title: "Understanding the Problem",
                content: `
                    <p>Let's start with the problem statement: <strong>find the maximum sum of any path in a binary tree</strong>.</p>
                    <p>A path doesn't have to go through the root. It can be any sequence of nodes connected by edges.</p>
                    <div class="example-box">
                        <div class="example-title">🤔 First Question: What counts as a path?</div>
                        <p style="margin-top: 12px;">A path must be continuous - you can't "teleport" between nodes. You move along edges.</p>
                        <p style="margin-top: 8px;">Examples of valid paths:</p>
                        <ul style="margin-left: 20px; margin-top: 8px; line-height: 1.8;">
                            <li>Single node: <code>[5]</code></li>
                            <li>Parent to child: <code>[5, 3]</code></li>
                            <li>Left-parent-right: <code>[3, 5, 7]</code></li>
                            <li>Going down multiple levels: <code>[5, 3, 2, 1]</code></li>
                        </ul>
                    </div>
                `,
                visualization: () => drawSimplePath(),
                code: null
            },
            {
                title: "Building Intuition with Simple Cases",
                content: `
                    <p>Let's think about the simplest case first: <strong>a tree with just one node</strong>.</p>
                    <div class="example-box">
                        <div class="example-title">Example 1: Single Node</div>
                        <div id="viz1"></div>
                        <p style="margin-top: 16px;">The maximum path sum is just the node's value: <code>5</code></p>
                        <p style="margin-top: 8px; color: var(--text-secondary);">Easy! But what about two nodes?</p>
                    </div>
                `,
                visualization: () => drawSingleNode(),
                code: null
            },
            {
                title: "Two Nodes: The First Decision",
                content: `
                    <p>With two nodes, we have our first <strong>decision point</strong>.</p>
                    <div class="example-box">
                        <div class="example-title">Example 2: Parent and Child</div>
                        <div id="viz2"></div>
                        <p style="margin-top: 16px;">We have three possible paths:</p>
                        <ul style="margin-left: 20px; margin-top: 8px; line-height: 1.8;">
                            <li>Just the parent: <code>5</code></li>
                            <li>Just the child: <code>3</code></li>
                            <li>Both together: <code>5 + 3 = 8</code> ✓ (maximum)</li>
                        </ul>
                    </div>
                    <div class="insight-box">
                        <div class="label">💡 Key Insight #1</div>
                        <p>If a child helps increase the sum, include it. Otherwise, don't!</p>
                        <p style="margin-top: 8px;">This is why we'll use <code>max(0, child_value)</code> later.</p>
                    </div>
                `,
                visualization: () => drawTwoNodes(),
                code: null
            },
            {
                title: "The Negative Child Problem",
                content: `
                    <p>What if the child has a <strong>negative value</strong>?</p>
                    <div class="example-box">
                        <div class="example-title">Example 3: Negative Child</div>
                        <div id="viz3"></div>
                        <p style="margin-top: 16px;">Paths and their sums:</p>
                        <ul style="margin-left: 20px; margin-top: 8px; line-height: 1.8;">
                            <li>Just the parent: <code>5</code> ✓ (maximum)</li>
                            <li>Just the child: <code>-10</code></li>
                            <li>Both together: <code>5 + (-10) = -5</code></li>
                        </ul>
                        <p style="margin-top: 16px; color: var(--warning);">The negative child makes things worse! We should ignore it.</p>
                    </div>
                    <div class="insight-box">
                        <div class="label">💡 Key Insight #2</div>
                        <p><code>max(0, child_contribution)</code> means: "only include the child if it helps"</p>
                    </div>
                `,
                visualization: () => drawNegativeChild(),
                code: null
            },
            {
                title: "Three Nodes: The Critical Realization",
                content: `
                    <p>Now let's add complexity: <strong>a node with BOTH left and right children</strong>.</p>
                    <div class="example-box">
                        <div class="example-title">Example 4: V-Shape Path</div>
                        <div id="viz4"></div>
                        <p style="margin-top: 16px;">This is where it gets interesting! The maximum path is:</p>
                        <p style="margin-top: 8px; text-align: center; font-size: 18px; color: var(--success);">
                            <strong>4 + 5 + 3 = 12</strong>
                        </p>
                        <p style="margin-top: 16px;">This path goes: left child → parent → right child (a "V" shape)</p>
                    </div>
                    <div class="insight-box">
                        <div class="label">💡 Key Insight #3</div>
                        <p>At any node, we can form a path using BOTH children: <code>left + node + right</code></p>
                        <p style="margin-top: 8px;">But there's a catch...</p>
                    </div>
                `,
                visualization: () => drawThreeNodes(),
                code: null
            },
            {
                title: "The Parent's Dilemma",
                content: `
                    <p>Here's the <strong>crucial insight</strong> that makes this problem tricky:</p>
                    <div class="example-box">
                        <div class="example-title">The Two Different Perspectives</div>
                        <p style="margin-top: 12px;"><strong>When we're AT a node:</strong></p>
                        <p style="margin-left: 20px; margin-top: 8px;">We can use BOTH children: <code class="highlight-box">left + node.val + right</code></p>
                        <p style="margin-top: 16px;"><strong>When we RETURN to parent:</strong></p>
                        <p style="margin-left: 20px; margin-top: 8px;">We can only use ONE child: <code class="highlight-box">node.val + max(left, right)</code></p>
                        <div id="viz5" style="margin-top: 20px;"></div>
                        <p style="margin-top: 16px; color: var(--warning);">Why? Because the parent needs a <strong>single branch</strong>, not a V-shape!</p>
                    </div>
                    <div class="insight-box">
                        <div class="label">💡 Key Insight #4</div>
                        <p>Each node calculates TWO things:</p>
                        <p style="margin-top: 8px;">1. <strong>Local maximum</strong> (using both children) - update global max</p>
                        <p>2. <strong>Return value</strong> (using best child) - give to parent</p>
                    </div>
                `,
                visualization: () => drawParentDilemma(),
                code: null
            },
            {
                title: "The Recursive Pattern Emerges",
                content: `
                    <p>Now we can see the <strong>recursive structure</strong>:</p>
                    <div class="example-box">
                        <div class="example-title">What Each Node Must Do</div>
                        <ol style="margin-left: 20px; margin-top: 12px; line-height: 2;">
                            <li><strong>Get contributions from children</strong> (recursive calls)</li>
                            <li><strong>Calculate local maximum</strong> (path through this node)</li>
                            <li><strong>Update global maximum</strong> if local is better</li>
                            <li><strong>Return single branch</strong> to parent</li>
                        </ol>
                    </div>
                    <div class="insight-box">
                        <div class="label">💡 Key Insight #5</div>
                        <p>This is a <strong>post-order DFS</strong> traversal pattern:</p>
                        <p style="margin-top: 8px;">1. Process left subtree</p>
                        <p>2. Process right subtree</p>
                        <p>3. Process current node</p>
                    </div>
                `,
                visualization: () => drawRecursivePattern(),
                code: null
            },
            {
                title: "Let's Start Coding - The Structure",
                content: `
                    <p>Now that we understand the intuition, let's build the solution!</p>
                    <p style="margin-top: 16px;">We'll start with the <strong>basic structure</strong>:</p>
                    <div class="insight-box" style="margin-top: 20px;">
                        <div class="label">🎯 What We Need</div>
                        <p>1. A variable to track the global maximum</p>
                        <p style="margin-top: 4px;">2. A helper function that processes each node</p>
                        <p style="margin-top: 4px;">3. Return the global maximum at the end</p>
                    </div>
                `,
                visualization: null,
                code: `<div class="code-block" data-delay="0">
<span class="keyword">class</span> <span class="type">Solution</span>:
    <span class="keyword">def</span> <span class="function">maxPathSum</span>(<span class="keyword">self</span>, root):
        <span class="comment"># We'll fill this in...</span>
        <span class="keyword">pass</span>
</div>`
            },
            {
                title: "Adding the Global Maximum",
                content: `
                    <p>First, we need to track the <strong>global maximum</strong> across all paths.</p>
                    <p style="margin-top: 16px;">We initialize it to <strong>negative infinity</strong> because:</p>
                    <ul style="margin-left: 20px; margin-top: 12px; line-height: 1.8;">
                        <li>Tree values can be negative</li>
                        <li>We want to ensure any valid path will update it</li>
                    </ul>
                `,
                visualization: null,
                code: `<div class="code-block" data-delay="0">
<span class="keyword">class</span> <span class="type">Solution</span>:
    <span class="keyword">def</span> <span class="function">maxPathSum</span>(<span class="keyword">self</span>, root):
</div>
<div class="code-block" data-delay="500">
        <span class="comment"># Track the maximum path sum found so far</span>
        <span class="keyword">self</span>.max_sum = <span class="function">float</span>(<span class="string">'-inf'</span>)
</div>
<div class="code-annotation" data-delay="1000">
💭 Why -infinity? Because even a single negative node is better than -infinity!
</div>`
            },
            {
                title: "The Helper Function - Base Case",
                content: `
                    <p>Now let's create our <strong>recursive helper function</strong>.</p>
                    <p style="margin-top: 16px;">Every recursion needs a <strong>base case</strong>:</p>
                    <div class="insight-box" style="margin-top: 20px;">
                        <div class="label">🛑 Base Case</div>
                        <p>If the node is None (null), what should we return?</p>
                        <p style="margin-top: 8px; color: var(--success);"><strong>Return 0</strong> - a null node contributes nothing to the path sum!</p>
                    </div>
                `,
                visualization: null,
                code: `<div class="code-block" data-delay="0">
<span class="keyword">class</span> <span class="type">Solution</span>:
    <span class="keyword">def</span> <span class="function">maxPathSum</span>(<span class="keyword">self</span>, root):
        <span class="keyword">self</span>.max_sum = <span class="function">float</span>(<span class="string">'-inf'</span>)
</div>
<div class="code-block" data-delay="500">
        
        <span class="keyword">def</span> <span class="function">max_gain</span>(node):
            <span class="comment"># Base case: empty node contributes 0</span>
</div>
<div class="code-block" data-delay="1000">
            <span class="keyword">if not</span> node:
                <span class="keyword">return</span> <span class="number">0</span>
</div>`
            },
            {
                title: "Getting Child Contributions",
                content: `
                    <p>Now for the <strong>recursive calls</strong>!</p>
                    <p style="margin-top: 16px;">Remember Key Insight #2? We only want to include children if they help:</p>
                    <div class="insight-box" style="margin-top: 20px;">
                        <div class="label">🎯 The max(0, ...) Pattern</div>
                        <p><code>left_gain = max(0, max_gain(node.left))</code></p>
                        <p style="margin-top: 12px;">This means:</p>
                        <p style="margin-top: 8px;">✓ If child returns positive value → use it</p>
                        <p>✓ If child returns negative value → use 0 instead (ignore it)</p>
                    </div>
                `,
                visualization: null,
                code: `<div class="code-block" data-delay="0">
        <span class="keyword">def</span> <span class="function">max_gain</span>(node):
            <span class="keyword">if not</span> node:
                <span class="keyword">return</span> <span class="number">0</span>
</div>
<div class="code-block" data-delay="500">
            
            <span class="comment"># Get max sum from left subtree (or 0 if negative)</span>
</div>
<div class="code-block" data-delay="1000">
            left_gain = <span class="function">max</span>(<span class="number">0</span>, <span class="function">max_gain</span>(node.left))
</div>
<div class="code-block" data-delay="1500">
            
            <span class="comment"># Get max sum from right subtree (or 0 if negative)</span>
</div>
<div class="code-block" data-delay="2000">
            right_gain = <span class="function">max</span>(<span class="number">0</span>, <span class="function">max_gain</span>(node.right))
</div>
<div class="code-annotation" data-delay="2500">
💭 Post-order traversal! We process children before the current node.
</div>`
            },
            {
                title: "Calculating Local Maximum & Returning",
                content: `
                    <p>Finally, the <strong>two critical calculations</strong>:</p>
                    <div class="example-box" style="margin-top: 20px;">
                        <div class="example-title">1. Local Maximum (V-shape path)</div>
                        <p style="margin-top: 12px;"><code>current_path_sum = node.val + left_gain + right_gain</code></p>
                        <p style="margin-top: 8px; color: var(--text-secondary);">This uses BOTH children - the V-shape!</p>
                    </div>
                    <div class="example-box" style="margin-top: 16px;">
                        <div class="example-title">2. Return Value (single branch)</div>
                        <p style="margin-top: 12px;"><code>return node.val + max(left_gain, right_gain)</code></p>
                        <p style="margin-top: 8px; color: var(--text-secondary);">This uses BEST child - what the parent needs!</p>
                    </div>
                `,
                visualization: null,
                code: `<div class="code-block" data-delay="0">
            left_gain = <span class="function">max</span>(<span class="number">0</span>, <span class="function">max_gain</span>(node.left))
            right_gain = <span class="function">max</span>(<span class="number">0</span>, <span class="function">max_gain</span>(node.right))
</div>
<div class="code-block" data-delay="500">
            
            <span class="comment"># Path through current node (can use both children)</span>
</div>
<div class="code-block" data-delay="1000">
            current_path_sum = node.val + left_gain + right_gain
</div>
<div class="code-block" data-delay="1500">
            
            <span class="comment"># Update global maximum</span>
</div>
<div class="code-block" data-delay="2000">
            <span class="keyword">self</span>.max_sum = <span class="function">max</span>(<span class="keyword">self</span>.max_sum, current_path_sum)
</div>
<div class="code-block" data-delay="2500">
            
            <span class="comment"># Return max single branch to parent (can only use one child)</span>
</div>
<div class="code-block" data-delay="3000">
            <span class="keyword">return</span> node.val + <span class="function">max</span>(left_gain, right_gain)
</div>
<div class="code-annotation" data-delay="3500">
💡 Two different values: one for ourselves (both children), one for parent (best child)!
</div>`

        function renderStep(stepIndex) {
            const step = intuitionSteps[stepIndex];
            const thoughtPanel = document.getElementById('thoughtPanel');
            const codeEditor = document.getElementById('codeEditor');

            // Clear previous content
            thoughtPanel.innerHTML = '';
            codeEditor.innerHTML = '';

            // Render thought content
            const section = document.createElement('div');
            section.className = 'thought-section';
            section.innerHTML = `
                <div class="thought-title">
                    <div class="thought-step">${stepIndex + 1}</div>
                    <span>${step.title}</span>
                </div>
                <div class="thought-content">
                    ${step.content}
                </div>
            `;
            thoughtPanel.appendChild(section);

            // Trigger animations
            setTimeout(() => {
                section.classList.add('visible');
                
                // Render visualization if exists
                if (step.visualization) {
                    setTimeout(() => {
                        const vizContainers = thoughtPanel.querySelectorAll('[id^="viz"]');
                        vizContainers.forEach((container, idx) => {
                            const vizFunctions = [
                                drawSingleNode,
                                drawTwoNodes,
                                drawNegativeChild,
                                drawThreeNodes,
                                drawParentDilemma
                            ];
                            if (vizFunctions[idx]) {
                                container.innerHTML = vizFunctions[idx]();
                            }
                        });
                        step.visualization();
                    }, 300);
                }
            }, 100);

            // Render code if exists
            if (step.code) {
                codeEditor.innerHTML = step.code;
                
                // Animate code blocks
                const codeBlocks = codeEditor.querySelectorAll('.code-block');
                codeBlocks.forEach((block, idx) => {
                    const delay = parseInt(block.getAttribute('data-delay') || 0);
                    setTimeout(() => {
                        block.classList.add('visible');
                    }, delay);
                });

                // Animate annotations
                const annotations = codeEditor.querySelectorAll('.code-annotation');
                annotations.forEach((annotation, idx) => {
                    const delay = parseInt(annotation.getAttribute('data-delay') || 0);
                    setTimeout(() => {
                        annotation.classList.add('visible');
                    }, delay);
                });
            }

            // Update controls
            updateControls();
        }

        function updateControls() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const stepIndicator = document.getElementById('stepIndicator');
            const progressFill = document.getElementById('progressFill');

            prevBtn.disabled = currentStepIndex === 0;
            nextBtn.disabled = currentStepIndex === intuitionSteps.length - 1;
            
            if (currentStepIndex === intuitionSteps.length - 1) {
                nextBtn.textContent = '✓ Complete';
            } else {
                nextBtn.textContent = 'Next Step →';
            }

            stepIndicator.textContent = `Step ${currentStepIndex + 1} of ${intuitionSteps.length}`;
            
            const progress = ((currentStepIndex + 1) / intuitionSteps.length) * 100;
            progressFill.style.width = `${progress}%`;
        }

        function nextStep() {
            if (currentStepIndex < intuitionSteps.length - 1) {
                currentStepIndex++;
                renderStep(currentStepIndex);
            }
        }

        function previousStep() {
            if (currentStepIndex > 0) {
                currentStepIndex--;
                renderStep(currentStepIndex);
            }
        }

        function restart() {
            currentStepIndex = 0;
            renderStep(currentStepIndex);
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                nextStep();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                previousStep();
            }
        });

        // Initialize
        renderStep(0);
    </script>
