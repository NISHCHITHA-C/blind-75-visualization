            // Add code lines

            if (currentStep >= steps.length - 1) {
                document.getElementById('nextBtn').disabled = true;

            const thinkingPanel = document.getElementById('thinkingPanel');
            
            const bubble = document.createElement('div');

                    <span class="thought-title">${thought.title}</span>

            thinkingPanel.appendChild(bubble);
            
            setTimeout(() => {
                bubble.classList.add('active');

            // Scroll to bottom
            thinkingPanel.scrollTop = thinkingPanel.scrollHeight;

                    lineDiv.classList.add('active');

                treeDiv.className = 'tree-visual';

            // Scroll to bottom
            setTimeout(() => {

            document.getElementById('progress').textContent = `Step ${currentStep + 1} / ${steps.length}`;
