<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>215. Kth Largest Element in an Array</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#07090f;--surface:#0d1117;--card:#111620;--border:#1a2235;
  --heap:#3b82f6;--kth:#10b981;--remove:#ef4444;--add:#a78bfa;
  --text:#e2e8f0;--muted:#475569;--dim:#1e293b;
}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;display:flex;flex-direction:column;}

header{display:flex;align-items:center;gap:14px;padding:8px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.h-num{font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:700;color:#3b82f6;}
.h-title{font-size:.82rem;font-weight:600;color:var(--muted);}
.h-badge{font-family:'JetBrains Mono',monospace;font-size:.62rem;padding:2px 8px;border-radius:3px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:#f59e0b;}
.h-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.inp{background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.8rem;padding:5px 10px;border-radius:5px;outline:none;transition:border-color .2s;width:180px;}
.inp:focus{border-color:#3b82f6;}
.btn{font-family:'Outfit',sans-serif;font-weight:700;font-size:.74rem;padding:5px 14px;border-radius:5px;border:none;cursor:pointer;transition:all .15s;}
.btn-p{background:#3b82f6;color:#fff;}.btn-p:hover{background:#2563eb;}

main{display:grid;grid-template-columns:330px 1fr 240px;flex:1;overflow:hidden;}

.code-panel{border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;}
.plabel{font-size:.6rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:6px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.code-scroll{overflow-y:auto;flex:1;padding:4px 0;}
.cl{display:flex;align-items:stretch;font-family:'JetBrains Mono',monospace;font-size:.7rem;line-height:1.75;position:relative;transition:background .15s;}
.cl.active{background:rgba(59,130,246,.1);}
.cl.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#3b82f6;border-radius:0 2px 2px 0;}
.ln{width:28px;text-align:right;padding-right:8px;color:var(--muted);font-size:.65rem;flex-shrink:0;user-select:none;line-height:1.75;}
.cl.active .ln{color:#3b82f6;}
.ct{padding-right:14px;white-space:pre;color:#abb2bf;}
.kw{color:#c678dd;}.fn{color:#61afef;}.cm{color:#3d4d60;font-style:italic;}.nm{color:#e5c07b;}

.viz-panel{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.stats{padding:10px 18px;border-bottom:1px solid var(--border);display:flex;gap:20px;}
.stat{display:flex;flex-direction:column;}
.stat-label{font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--heap);}
.stat-val.kth{color:var(--kth);}

.array-section{padding:10px 18px;border-bottom:1px solid var(--border);}
.array-section .plabel{padding:0 0 8px;border:none;}
.arr-row{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.arr-el{width:42px;height:42px;border-radius:6px;border:2px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.9rem;font-weight:700;color:var(--text);transition:all .3s;}
.arr-el.in-heap{border-color:var(--heap);background:rgba(59,130,246,.06);color:var(--heap);}
.arr-el.is-kth{border-color:var(--kth);background:rgba(16,185,129,.08);color:var(--kth);box-shadow:0 0 12px rgba(16,185,129,.3);}

.heap-section{flex:1;overflow:auto;padding:15px;}
.heap-canvas{min-height:250px;position:relative;}

.heap-node{position:absolute;display:flex;flex-direction:column;align-items:center;transition:all .4s;}
.heap-box{width:45px;height:45px;border-radius:50%;border:2px solid var(--heap);background:var(--card);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.95rem;font-weight:700;color:var(--heap);transition:all .3s;}
.heap-node.is-root .heap-box{box-shadow:0 0 14px rgba(59,130,246,.35);}
.heap-node.is-kth .heap-box{border-color:var(--kth);color:var(--kth);background:rgba(16,185,129,.08);box-shadow:0 0 14px rgba(16,185,129,.3);}
.heap-label{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);margin-top:3px;}

.heap-edge{position:absolute;stroke:var(--heap);stroke-width:2;fill:none;opacity:.4;}

.decision{margin:10px 18px;padding:10px 14px;border-radius:7px;border:1px solid var(--border);background:var(--card);font-family:'JetBrains Mono',monospace;font-size:.73rem;color:var(--muted);flex-shrink:0;}
.decision.active{border-color:rgba(59,130,246,.45);background:rgba(59,130,246,.07);color:var(--heap);}
.decision.done{border-color:rgba(16,185,129,.45);background:rgba(16,185,129,.07);color:var(--kth);}

.bot{margin-top:auto;display:flex;align-items:center;gap:8px;padding:8px 18px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--text);}.btn-g:hover{border-color:#3b82f6;color:#3b82f6;}
.btn:disabled{opacity:.3;cursor:not-allowed;}
.step-info{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted);}
.spd-wrap{display:flex;align-items:center;gap:5px;margin-left:auto;}
.spd-wrap label{font-size:.7rem;color:var(--muted);}
input[type=range]{accent-color:#3b82f6;width:80px;}

.log-panel{border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;}
.log-panel .plabel{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;}
.lc{font-size:.6rem;padding:2px 6px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);border-radius:3px;cursor:pointer;font-family:inherit;}
.lc:hover{color:var(--text);}
.log-scroll{flex:1;overflow-y:auto;padding:5px 7px;display:flex;flex-direction:column;gap:3px;}
.le{font-family:'JetBrains Mono',monospace;font-size:.65rem;padding:4px 7px;border-radius:4px;background:var(--card);border:1px solid var(--border);}
.le.heap{border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.05);color:var(--heap);}
.le.kth{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.05);color:var(--kth);}
.ls{color:var(--muted);margin-right:6px;}
</style>
</head>
<body>
<header>
  <div class="h-num">215</div>
  <div class="h-title">Kth Largest Element in an Array</div>
  <div class="h-badge">MEDIUM</div>
  <div class="h-right">
    <input id="arrInput" class="inp" placeholder="e.g., 3,2,1,5,6,4"/>
    <input id="kInput" class="inp" placeholder="k = 2" style="width:80px;"/>
    <button class="btn btn-p" onclick="init()">Reset</button>
  </div>
</header>

<main>
  <div class="code-panel">
    <div class="plabel">Min Heap Approach</div>
    <div class="code-scroll" id="codePanel"></div>
  </div>

  <div class="viz-panel">
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Heap Size</div>
        <div class="stat-val" id="heapSize">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">k Value</div>
        <div class="stat-val" id="kVal">2</div>
      </div>
      <div class="stat">
        <div class="stat-label">Kth Largest</div>
        <div class="stat-val kth" id="kthVal">-</div>
      </div>
    </div>
    
    <div class="array-section">
      <div class="plabel">Input Array</div>
      <div class="arr-row" id="arrayRow"></div>
    </div>
    
    <div class="heap-section">
      <svg id="edgeSvg" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></svg>
      <div id="heapCanvas" class="heap-canvas"></div>
    </div>
    
    <div id="decision" class="decision">Building min-heap of size k...</div>
    
    <div class="bot">
      <button class="btn btn-g" id="btnPrev" onclick="stepBack()">◀ Prev</button>
      <button class="btn btn-p" id="btnPlay" onclick="togglePlay()">▶ Play</button>
      <button class="btn btn-g" id="btnNext" onclick="stepFwd()">Next ▶</button>
      <span class="step-info" id="stepInfo">0 / 0</span>
      <div class="spd-wrap">
        <label>Speed:</label>
        <input type="range" id="speedSlider" min="200" max="1400" value="800"/>
      </div>
    </div>
  </div>

  <div class="log-panel">
    <div class="plabel">
      Operation Log
      <button class="lc" onclick="clearLog()">Clear</button>
    </div>
    <div class="log-scroll" id="logScroll"></div>
  </div>
</main>

<script>
const code=[
  {t:'def findKthLargest(nums, k):',cm:true},
  {t:'    # Use min-heap of size k',cm:true},
  {t:'    import heapq',ln:1},
  {t:'    heap = []',ln:2},
  {t:'    ',ln:3},
  {t:'    for num in nums:',ln:4},
  {t:'        heapq.heappush(heap, num)',ln:5},
  {t:'        if len(heap) > k:',ln:6},
  {t:'            heapq.heappop(heap)',ln:7},
  {t:'    ',ln:8},
  {t:'    return heap[0]  # Min of heap is kth largest',ln:9}
];

let arr,k,steps=[],cursor=0,playing=false,playTimer;

function buildCode(){
  const panel=document.getElementById('codePanel');
  code.forEach((c,i)=>{
    const line=document.createElement('div');
    line.className='cl';
    line.id=`line${c.ln||i}`;
    const ln=document.createElement('div');ln.className='ln';
    ln.textContent=c.ln!==undefined?c.ln:'';
    const ct=document.createElement('div');ct.className='ct';
    if(c.cm){
      ct.innerHTML=`<span class="cm">${c.t}</span>`;
    }else{
      ct.innerHTML=c.t
        .replace(/(def|if|for|in|import|return)/g,'<span class="kw">$1</span>')
        .replace(/(findKthLargest|heappush|heappop|heapq|len)/g,'<span class="fn">$1</span>')
        .replace(/(nums|k|heap|num)/g,'<span class="nm">$1</span>');
    }
    line.appendChild(ln);line.appendChild(ct);panel.appendChild(line);
  });
}

function highlight(ln){
  document.querySelectorAll('.cl').forEach(l=>l.classList.remove('active'));
  if(ln>=0){const el=document.getElementById(`line${ln}`);if(el)el.classList.add('active');}
}

function buildSteps(nums,k){
  const s=[];
  const heap=[];
  
  s.push({line:-1,heap:[],currIdx:-1,msg:'Starting to find kth largest element...',log:{type:'heap',text:'Initializing min-heap approach'}});
  
  s.push({line:2,heap:[],currIdx:-1,msg:'Created empty heap',log:{type:'heap',text:'Created empty min-heap'}});
  
  for(let i=0;i<nums.length;i++){
    s.push({line:5,heap:[...heap],currIdx:i,msg:`Adding ${nums[i]} to heap`,log:{type:'heap',text:`Push ${nums[i]} into heap`}});
    
    heap.push(nums[i]);
    heap.sort((a,b)=>a-b);
    
    s.push({line:5,heap:[...heap],currIdx:i,msg:`Heap after adding ${nums[i]}: [${heap.join(', ')}]`,log:{type:'heap',text:`Heap: [${heap.join(', ')}]`}});
    
    if(heap.length>k){
      const removed=heap.shift();
      s.push({line:7,heap:[...heap],currIdx:i,msg:`Heap size > ${k}, removed smallest element ${removed}`,log:{type:'heap',text:`Removed ${removed}, heap: [${heap.join(', ')}]`}});
    }
  }
  
  s.push({line:9,heap:[...heap],currIdx:-1,msg:`The ${k}th largest element is ${heap[0]}`,done:true,log:{type:'kth',text:`Result: ${k}th largest = ${heap[0]}`}});
  
  return s;
}

function layoutHeap(heap){
  const positions=[];
  const levels=Math.ceil(Math.log2(heap.length+1));
  const baseWidth=600;
  
  heap.forEach((val,i)=>{
    const level=Math.floor(Math.log2(i+1));
    const posInLevel=i-(Math.pow(2,level)-1);
    const nodesInLevel=Math.pow(2,level);
    const spacing=baseWidth/(nodesInLevel+1);
    positions.push({
      x:spacing*(posInLevel+1),
      y:level*80+30
    });
  });
  
  return positions;
}

function renderHeap(st){
  const canvas=document.getElementById('heapCanvas');
  const svg=document.getElementById('edgeSvg');
  canvas.innerHTML='';
  svg.innerHTML='';
  
  if(!st.heap.length)return;
  
  const positions=layoutHeap(st.heap);
  
  // Draw edges
  st.heap.forEach((val,i)=>{
    const leftChild=2*i+1;
    const rightChild=2*i+2;
    const pos=positions[i];
    
    if(leftChild<st.heap.length){
      const childPos=positions[leftChild];
      const line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',pos.x);
      line.setAttribute('y1',pos.y+22);
      line.setAttribute('x2',childPos.x);
      line.setAttribute('y2',childPos.y-22);
      line.classList.add('heap-edge');
      svg.appendChild(line);
    }
    
    if(rightChild<st.heap.length){
      const childPos=positions[rightChild];
      const line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',pos.x);
      line.setAttribute('y1',pos.y+22);
      line.setAttribute('x2',childPos.x);
      line.setAttribute('y2',childPos.y-22);
      line.classList.add('heap-edge');
      svg.appendChild(line);
    }
  });
  
  // Draw nodes
  st.heap.forEach((val,i)=>{
    const pos=positions[i];
    const nodeDiv=document.createElement('div');
    nodeDiv.className='heap-node';
    if(i===0){
      nodeDiv.classList.add('is-root');
      if(st.done)nodeDiv.classList.add('is-kth');
    }
    nodeDiv.style.left=`${pos.x-22.5}px`;
    nodeDiv.style.top=`${pos.y-22.5}px`;
    
    const box=document.createElement('div');
    box.className='heap-box';
    box.textContent=val;
    
    const label=document.createElement('div');
    label.className='heap-label';
    label.textContent=`idx:${i}`;
    
    nodeDiv.appendChild(box);
    nodeDiv.appendChild(label);
    canvas.appendChild(nodeDiv);
  });
}

function renderArray(st){
  const row=document.getElementById('arrayRow');
  row.innerHTML='';
  
  arr.forEach((val,i)=>{
    const el=document.createElement('div');
    el.className='arr-el';
    if(i<=st.currIdx)el.classList.add('in-heap');
    el.textContent=val;
    row.appendChild(el);
  });
}

function renderStats(st){
  document.getElementById('heapSize').textContent=st.heap.length;
  document.getElementById('kVal').textContent=k;
  document.getElementById('kthVal').textContent=st.done?st.heap[0]:'-';
}

function renderDecision(st){
  const d=document.getElementById('decision');
  d.className='decision';
  d.textContent=st.msg;
  if(st.currIdx>=0)d.classList.add('active');
  if(st.done)d.classList.add('done');
}

function addLog(idx,log){
  const el=document.getElementById('logScroll');
  const d=document.createElement('div');d.className=`le ${log.type}`;
  d.innerHTML=`<span class="ls">[${idx}]</span>${log.text}`;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}

function clearLog(){document.getElementById('logScroll').innerHTML='';}

function rebuildLog(){clearLog();for(let i=0;i<=cursor;i++)if(steps[i]?.log)addLog(i,steps[i].log);}

function renderStep(idx){
  const st=steps[idx];
  highlight(st.line);
  renderHeap(st);
  renderArray(st);
  renderStats(st);
  renderDecision(st);
  document.getElementById('stepInfo').textContent=`${idx} / ${steps.length-1}`;
  document.getElementById('btnPrev').disabled=idx===0;
  document.getElementById('btnNext').disabled=idx===steps.length-1;
}

function stepFwd(){
  if(cursor<steps.length-1){cursor++;if(steps[cursor]?.log)addLog(cursor,steps[cursor].log);renderStep(cursor);}
}

function stepBack(){if(cursor>0){cursor--;rebuildLog();renderStep(cursor);}}

function togglePlay(){
  playing=!playing;
  document.getElementById('btnPlay').textContent=playing?'⏸ Pause':'▶ Play';
  if(playing)runPlay();else clearTimeout(playTimer);
}

function runPlay(){
  if(!playing)return;
  if(cursor>=steps.length-1){playing=false;document.getElementById('btnPlay').textContent='▶ Play';return;}
  stepFwd();
  const spd=1600-parseInt(document.getElementById('speedSlider').value);
  playTimer=setTimeout(runPlay,spd);
}

function init(){
  clearTimeout(playTimer);playing=false;
  document.getElementById('btnPlay').textContent='▶ Play';
  clearLog();
  
  const rawArr=document.getElementById('arrInput').value.trim();
  arr=rawArr?rawArr.split(',').map(x=>parseInt(x.trim())).filter(x=>!isNaN(x)):[];
  if(!arr.length)arr=[3,2,1,5,6,4];
  
  const rawK=document.getElementById('kInput').value.trim();
  k=rawK?parseInt(rawK):2;
  if(isNaN(k)||k<1)k=2;
  
  steps=buildSteps(arr,k);
  
  cursor=0;
  highlight(-1);
  if(steps[0]?.log)addLog(0,steps[0].log);
  renderStep(0);
}

buildCode();
init();
</script>
</body>
</html>
