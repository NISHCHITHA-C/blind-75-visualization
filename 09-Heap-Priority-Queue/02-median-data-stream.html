<script>
class MedianFinderVisualizer {
    constructor() {
        this.state = {
            theme: 'dark',
            mode: 'intuition',
            currentStep: 0,
            isPlaying: false,
            speed: 1,
            steps: [],
            currentIntuitionStage: 0,
            isIntuitionPlaying: false,
            inputValue: '[["MedianFinder","addNum","addNum","findMedian","addNum","findMedian"],[[],[1],[2],[],[3],[]]]',
            panelWidths: [30, 50, 20]
        };

        this.problemNumber = "295";
        this.problemTitle = "Find Median from Data Stream";

        this.code = `import heapq

class MedianFinder:
    """
    Maintains running median using two heaps:
    - max_heap: stores smaller half (inverted)
    - min_heap: stores larger half

    Invariants:
    1. max_heap size >= min_heap size
    2. all max_heap elements <= all min_heap elements
    """

    def __init__(self):
        # Max heap for smaller half (negate values)
        self.max_heap = []
        # Min heap for larger half
        self.min_heap = []

    def addNum(self, num: int) -> None:
        """
        Time Complexity: O(log n)
        Space Complexity: O(1) per call
        """
        # Always add to max_heap first
        heapq.heappush(self.max_heap, -num)

        # Ensure max_heap's max <= min_heap's min
        heapq.heappush(self.min_heap,
            -heapq.heappop(self.max_heap))

        # Balance: max_heap >= min_heap size
        if len(self.min_heap) > len(self.max_heap):
            heapq.heappush(self.max_heap,
                -heapq.heappop(self.min_heap))

    def findMedian(self) -> float:
        """
        Time Complexity: O(1)
        Space Complexity: O(1)
        """
        # Odd count: median is max_heap top
        if len(self.max_heap) > len(self.min_heap):
            return -self.max_heap[0]

        # Even count: average of both tops
        return (-self.max_heap[0] + self.min_heap[0]) / 2.0


# obj = MedianFinder()
# obj.addNum(num)
# param_2 = obj.findMedian()`;

        this.intuitionStages = this.getIntuitionStages();
        this.playInterval = null;
        this.intuitionInterval = null;
        this.isDragging = false;
        this.dragHandleIndex = -1;
        this.dragStartX = 0;
        this.dragStartWidths = [];

        this.init();
    }

    init() {
        document.body.setAttribute('data-theme', this.state.theme);
        this.parseInput();
        this.render();
        this.attachEventListeners();
    }

    getIntuitionStages() {
        return [
            {
                title: "Stage 1: Understanding the Problem",
                thought: "So I need to find the median of a stream of numbers... that means I can't sort every time a new number arrives. That would be too slow!",
                content: `What makes this problem unique:\n• Numbers arrive one at a time (streaming data)\n• Need median after EACH number is added\n• Can't afford to sort the entire dataset repeatedly\n• Median = middle element (odd count) or average of two middle elements (even count)\n\nKey constraint: Need O(log n) insertions, not O(n log n) sorting!`,
                insight: "The challenge is maintaining access to the 'middle' of a growing dataset efficiently.",
                visualization: "problem_intro"
            },
            {
                title: "Stage 2: Exploring Approaches",
                thought: "Let me think... I could sort after each add, or use a balanced BST, or... wait, what about heaps?",
                content: `Comparing different strategies:\n\nApproach A: Sort after each add\n• Time: O(n log n) per add → Too slow!\n• Simple but inefficient\n\nApproach B: Balanced BST\n• Time: O(log n) per add, O(log n) to find median\n• Complex to implement, need to track size\n\nApproach C: Two Heaps ✓\n• Time: O(log n) per add, O(1) to find median\n• Elegant and efficient!`,
                insight: "Two heaps can split the data into 'smaller half' and 'larger half', keeping the median at the boundary!",
                visualization: "approach_comparison"
            },
            {
                title: "Stage 3: The Two-Heap Insight",
                thought: "Brilliant! If I use a max-heap for the smaller half and a min-heap for the larger half, the tops of these heaps are always near the median!",
                content: `The key technique:\n\nMax Heap (smaller half):\n• Stores all elements ≤ median\n• Top element = largest of smaller half\n\nMin Heap (larger half):\n• Stores all elements > median\n• Top element = smallest of larger half\n\nThe magic: Keep heaps balanced!\n• If total count is odd → median is max_heap top\n• If total count is even → median is average of both tops`,
                insight: "The median is always at the 'boundary' between the two heaps!",
                visualization: "heap_concept",
                codeHighlight: [14, 15, 16, 17]
            },
            {
                title: "Stage 4: Insertion Strategy",
                thought: "When a new number arrives, where does it go? And how do I keep the heaps balanced?",
                content: `Smart insertion algorithm:\n\n1. Always add to max_heap first (even if number is large)\n2. Pop max from max_heap and push to min_heap\n   → This ensures max_heap's max ≤ min_heap's min\n3. Rebalance if needed:\n   → If min_heap has more elements, move one back to max_heap\n\nWhy this works:\n• Guarantees correct ordering (all small ≤ all large)\n• Maintains size invariant (max_heap size ≥ min_heap size)\n• Only O(log n) heap operations!`,
                insight: "The 'push to max, pop to min, rebalance' pattern ensures both heaps stay valid!",
                visualization: "insertion_demo",
                codeHighlight: [26, 27, 28, 29, 30, 31, 32, 33, 34]
            },
            {
                title: "Stage 5: The Python Heap Trick",
                thought: "Wait, Python only has min heaps... how do I create a max heap?",
                content: `Python's heapq only implements min-heaps!\n\nThe negation trick:\n  # To simulate max-heap behavior:\n  heapq.heappush(max_heap, -num)  # negate on insert\n  max_val = -max_heap[0]           # negate on read\n\nWhy it works:\n• Negating flips the ordering\n• Smallest negative = Largest positive\n• When we pop, we negate back to get the true max\n\nThis is a standard Python interview trick!`,
                insight: "Negating values turns Python's min-heap into a max-heap!",
                visualization: "negation_trick",
                codeHighlight: [27, 30, 44, 48]
            },
            {
                title: "Stage 6: Complexity Analysis",
                thought: "Let me verify this is actually optimal...",
                content: `Time Complexity:\n\naddNum(num): O(log n)\n• heappush: O(log n)\n• heappop: O(log n)\n• Total: 3 heap operations → O(log n)\n\nfindMedian(): O(1)\n• Just peek at heap tops\n• No traversal needed\n\nSpace Complexity: O(n)\n• Store all n elements across both heaps\n\nThis is optimal! Can't do better than O(log n) for insertions into sorted structure.`,
                insight: "O(log n) insert + O(1) query is the best possible for this problem!",
                visualization: "complexity"
            },
            {
                title: "Stage 7: Edge Cases & Robustness",
                thought: "What could break this? Empty stream? Single element? All same values?",
                content: `Edge cases handled:\n\n✓ Empty stream: Both heaps empty, no median yet\n✓ Single element: Goes to max_heap, median = that element\n✓ Two elements: One in each heap, median = average\n✓ All duplicates: Works fine, heaps just have same values\n✓ Increasing sequence: All go to min_heap, rebalancing keeps it valid\n✓ Decreasing sequence: All stay in max_heap\n\nThe algorithm is robust because the invariants always hold!`,
                insight: "The heap balancing property ensures correctness for all input patterns!",
                visualization: "edge_cases"
            }
        ];
    }

    parseInput() {
        try {
            const parsed = JSON.parse(this.state.inputValue.trim());
            this.state.steps = this.simulateExecution(parsed[0], parsed[1]);
        } catch (e) {
            this.state.steps = this.simulateExecution(
                ["MedianFinder","addNum","addNum","findMedian","addNum","findMedian"],
                [[],[1],[2],[],[3],[]]
            );
        }
    }

    simulateExecution(operations, values) {
        const steps = [];
        let stepNum = 0;
        const maxHeap = [];
        const minHeap = [];

        const heappush = (heap, val) => {
            heap.push(val);
            heap.sort((a, b) => a - b);
        };
        const heappop = (heap) => heap.shift();

        steps.push({
            line: 15,
            description: 'Initialize MedianFinder with empty heaps',
            vars: { max_heap: [], min_heap: [], operation: 'MedianFinder()', result: null },
            maxHeap: [], minHeap: [], currentMedian: null, highlightedNum: null, stepNum: stepNum++
        });

        for (let i = 1; i < operations.length; i++) {
            const op = operations[i];
            const val = values[i];

            if (op === "addNum") {
                const num = val[0];

                heappush(maxHeap, -num);
                steps.push({
                    line: 25,
                    description: `Push ${num} to max_heap (stored as ${-num})`,
                    vars: { num, max_heap: [...maxHeap].map(x => -x), min_heap: [...minHeap], operation: `addNum(${num})`, result: null },
                    maxHeap: [...maxHeap].map(x => -x), minHeap: [...minHeap],
                    currentMedian: null, highlightedNum: num, stepNum: stepNum++
                });

                const moved = -heappop(maxHeap);
                heappush(minHeap, moved);
                steps.push({
                    line: 28,
                    description: `Move largest (${moved}) from max_heap → min_heap`,
                    vars: { num, max_heap: [...maxHeap].map(x => -x), min_heap: [...minHeap], operation: `addNum(${num})`, result: null },
                    maxHeap: [...maxHeap].map(x => -x), minHeap: [...minHeap],
                    currentMedian: null, highlightedNum: moved, stepNum: stepNum++
                });

                if (minHeap.length > maxHeap.length) {
                    const rebalanced = heappop(minHeap);
                    heappush(maxHeap, -rebalanced);
                    steps.push({
                        line: 32,
                        description: `Rebalance: move ${rebalanced} from min_heap → max_heap`,
                        vars: { num, max_heap: [...maxHeap].map(x => -x), min_heap: [...minHeap], operation: `addNum(${num})`, result: null },
                        maxHeap: [...maxHeap].map(x => -x), minHeap: [...minHeap],
                        currentMedian: null, highlightedNum: rebalanced, stepNum: stepNum++
                    });
                }

                steps.push({
                    line: 34,
                    description: `Heaps balanced. addNum(${num}) complete.`,
                    vars: { max_heap: [...maxHeap].map(x => -x), min_heap: [...minHeap], operation: `addNum(${num}) done`, result: null },
                    maxHeap: [...maxHeap].map(x => -x), minHeap: [...minHeap],
                    currentMedian: null, highlightedNum: null, stepNum: stepNum++
                });

            } else if (op === "findMedian") {
                let median;
                if (maxHeap.length > minHeap.length) {
                    median = -maxHeap[0];
                    steps.push({
                        line: 41,
                        description: `Odd count: median = max_heap top = ${median}`,
                        vars: { max_heap: [...maxHeap].map(x => -x), min_heap: [...minHeap], operation: 'findMedian()', result: median },
                        maxHeap: [...maxHeap].map(x => -x), minHeap: [...minHeap],
                        currentMedian: median, highlightedNum: null, stepNum: stepNum++
                    });
                } else {
                    median = ((-maxHeap[0]) + minHeap[0]) / 2.0;
                    steps.push({
                        line: 44,
                        description: `Even count: median = (${-maxHeap[0]} + ${minHeap[0]}) / 2 = ${median}`,
                        vars: { max_heap: [...maxHeap].map(x => -x), min_heap: [...minHeap], operation: 'findMedian()', result: median },
                        maxHeap: [...maxHeap].map(x => -x), minHeap: [...minHeap],
                        currentMedian: median, highlightedNum: null, stepNum: stepNum++
                    });
                }
            }
        }
        return steps;
    }

    toggleTheme() {
        this.state.theme = this.state.theme === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', this.state.theme);
        this.render();
    }

    toggleMode(mode) {
        this.pause(); this.pauseIntuition();
        this.state.mode = mode;
        if (mode === 'intuition') this.state.currentIntuitionStage = 0;
        else this.state.currentStep = 0;
        this.render();
    }

    runInput() { this.parseInput(); this.state.currentStep = 0; this.render(); }

    play() {
        if (this.state.isPlaying) { this.pause(); return; }
        this.state.isPlaying = true;
        const delay = 1000 / this.state.speed;
        this.playInterval = setInterval(() => {
            if (this.state.currentStep < this.state.steps.length - 1) {
                this.state.currentStep++;
                this.renderUpdate();
            } else { this.pause(); }
        }, delay);
        this.renderUpdate();
    }

    pause() {
        this.state.isPlaying = false;
        if (this.playInterval) { clearInterval(this.playInterval); this.playInterval = null; }
        this.renderUpdate();
    }

    stepForward() {
        if (this.state.currentStep < this.state.steps.length - 1) {
            this.state.currentStep++;
            this.renderUpdate();
        }
    }

    stepBack() {
        if (this.state.currentStep > 0) { this.state.currentStep--; this.renderUpdate(); }
    }

    reset() { this.pause(); this.state.currentStep = 0; this.renderUpdate(); }

    playIntuition() {
        if (this.state.isIntuitionPlaying) { this.pauseIntuition(); return; }
        this.state.isIntuitionPlaying = true;
        this.intuitionInterval = setInterval(() => {
            if (this.state.currentIntuitionStage < this.intuitionStages.length - 1) {
                this.state.currentIntuitionStage++;
                this.render();
            } else { this.pauseIntuition(); }
        }, 4000);
        this.render();
    }

    pauseIntuition() {
        this.state.isIntuitionPlaying = false;
        if (this.intuitionInterval) { clearInterval(this.intuitionInterval); this.intuitionInterval = null; }
        this.render();
    }

    nextIntuitionStage() {
        if (this.state.currentIntuitionStage < this.intuitionStages.length - 1) {
            this.state.currentIntuitionStage++; this.render();
        }
    }

    prevIntuitionStage() {
        if (this.state.currentIntuitionStage > 0) {
            this.state.currentIntuitionStage--; this.render();
        }
    }

        const backBtn = document.getElementById('back-btn');
        const fwdBtn = document.getElementById('fwd-btn');
        if (resetBtn) resetBtn.disabled = this.state.currentStep === 0;
        if (backBtn) backBtn.disabled = this.state.currentStep === 0;

    // ── Syntax Highlighter ──
    highlightPythonLine(rawLine) {
        if (!rawLine.trim()) return rawLine;

        // Escape HTML first
        const esc = (s) => {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        };

        const trimmed = rawLine.trim();

        // Full-line comment
        if (trimmed.startsWith('#')) {
            return `<span class="cmt">${esc(rawLine)}</span>`;
        }

        // Full-line docstring (triple quote lines)
        if (trimmed.startsWith('"""') || trimmed.startsWith("'''")) {
            return `<span class="str">${esc(rawLine)}</span>`;
        }

        // Tokenize preserving whitespace
        // We'll process char by char for accuracy
        let result = '';
        let i = 0;
        const line = rawLine;
        const len = line.length;

        // Collect leading whitespace
        let indent = '';
        while (i < len && (line[i] === ' ' || line[i] === '\t')) {
            indent += line[i++];
        }
        result += indent;

        while (i < len) {
            // Inline comment
            if (line[i] === '#') {
                result += `<span class="cmt">${esc(line.slice(i))}</span>`;
                break;
            }

            // String literal
            if (line[i] === '"' || line[i] === "'") {
                const quote = line[i];
                const triple = line.slice(i, i + 3) === quote.repeat(3);
                const endQuote = triple ? quote.repeat(3) : quote;
                let j = i + (triple ? 3 : 1);
                while (j < len) {
                    if (line[j] === '\\') { j += 2; continue; }
                    if (line.slice(j, j + endQuote.length) === endQuote) { j += endQuote.length; break; }
                    j++;
                }
                result += `<span class="str">${esc(line.slice(i, j))}</span>`;
                i = j;
                continue;
            }

            // Number
            if (/[0-9]/.test(line[i]) && (i === 0 || !/\w/.test(line[i-1]))) {
                let j = i;
                while (j < len && /[0-9._]/.test(line[j])) j++;
                result += `<span class="num">${esc(line.slice(i, j))}</span>`;
                i = j;
                continue;
            }

            // Identifier or keyword
            if (/[a-zA-Z_]/.test(line[i])) {
                let j = i;
                while (j < len && /\w/.test(line[j])) j++;
                const word = line.slice(i, j);
                const keywords = new Set(['class','def','return','if','elif','else','import','from','self','None','True','False','for','while','in','not','and','or','as','pass','break','continue','lambda','yield','with','raise','try','except','finally','global','nonlocal','del','assert','async','await']);
                const types = new Set(['int','float','str','bool','List','Optional','Dict','Set','Tuple','Any','Union']);

                // Check if next non-space char is '('
                let k = j;
                while (k < len && line[k] === ' ') k++;
                const isCall = line[k] === '(';

                if (keywords.has(word)) result += `<span class="kw">${esc(word)}</span>`;
                else if (types.has(word)) result += `<span class="typ">${esc(word)}</span>`;
                else if (isCall) result += `<span class="fn">${esc(word)}</span>`;
                else result += esc(word);

                i = j;
                continue;
            }

            // Operator highlight (=, ->, :, *, +, -, /, %)
            if (/[=\-><+*\/%!&|^~]/.test(line[i])) {
                result += `<span class="op">${esc(line[i])}</span>`;
                i++;
                continue;
            }

            result += esc(line[i++]);
        }

        return result;
    }

    renderCodePanel() {
        const lines = this.code.split('\n');
        const currentStep = this.state.steps[this.state.currentStep];
        const currentLine = currentStep ? currentStep.line - 1 : -1;

        const linesHTML = lines.map((line, i) => {
            const highlighted = i === currentLine ? 'highlighted' : '';
            const lineHTML = this.highlightPythonLine(line);
            return `<div class="code-line ${highlighted}"><span class="line-number">${i + 1}</span><code class="line-content">${lineHTML || '&nbsp;'}</code></div>`;
        }).join('');

        return `
            <div class="panel" style="width:${this.state.panelWidths[0]}%" id="panel-0">

                <div class="panel-content">
                    <div class="code-display"><pre>${linesHTML}</pre></div>

    }

    buildStepLogHTML() {

            return `<div class="variable-item"><span class="variable-name">${name}</span>: ${display}</div>`;
        }).join('');

        const historyHTML = this.state.steps.slice(0, this.state.currentStep + 1).map((step, i) => {
            const isCurrent = i === this.state.currentStep;
            return `<div class="history-item ${isCurrent ? 'current' : ''}">${i + 1}. ${step.description}</div>`;
        }).join('');

        return `
            <div class="step-log">
                <div class="step-info">
                    <h3>Step ${this.state.currentStep + 1} / ${this.state.steps.length}</h3>
                    <div class="step-description">${currentStep.description}</div>

                    <h4>Variables</h4>${varsHTML}

                               'Decreasing sequence → all stay in max_heap, works correctly'
                              ].map(t => `
                                <div style="background:var(--bg-secondary);padding:12px;border-radius:8px;border-left:4px solid var(--success);font-size:13px;">
                                    ✓ <strong>${t.split('→')[0].trim()}</strong><span style="color:var(--text-secondary)"> → ${t.split('→')[1].trim()}</span>
                                </div>`).join('')}
                        </div>
                    </div>`;
                break;

            default:
                vizContent = this.renderHeapVisualization();
        }

        return `
            <div class="panel" style="width:50%">
                <div class="panel-header">Visual Explanation</div>
                <div class="panel-content"><div class="viz-content">${vizContent}</div></div>
            </div>`;
    }

    renderIntuitionContent() {
        const stages = this.intuitionStages;
        const current = this.state.currentIntuitionStage;

        const stagesHTML = stages.map((stage, i) => {
            const isActive = i === current;
            const opacity = isActive ? '1' : (i < current ? '0.6' : '0.3');
            return `
                <div class="intuition-stage" style="opacity:${opacity}">
                    <h3><span class="stage-number">${i + 1}</span>${stage.title}</h3>
                    ${stage.thought ? `<div class="thought-bubble">💭 "${stage.thought}"</div>` : ''}
                    <div class="stage-content">${stage.content.replace(/\n/g, '<br>')}</div>
                    ${stage.insight ? `<div class="key-insight"><strong>💡 Key Insight:</strong> ${stage.insight}</div>` : ''}
                </div>`;
        }).join('');

        return `
            <div class="panel" style="width:50%">
                <div class="panel-header">
                    Senior Engineer's Thought Process
                    <span>Stage ${current + 1} / ${stages.length}</span>
                </div>
                <div class="panel-content intuition-panel">
                    ${stagesHTML}
                    <div class="viz-controls" style="position:sticky;bottom:0;background:var(--bg-secondary);">
                        <button class="control-btn" onclick="app.prevIntuitionStage()" ${current===0?'disabled':''}>◀ Previous</button>
                        <button class="control-btn play" onclick="app.playIntuition()">${this.state.isIntuitionPlaying?'⏸ Pause':'▶ Auto-Play'}</button>
                        <button class="control-btn" onclick="app.nextIntuitionStage()" ${current>=stages.length-1?'disabled':''}>Next ▶</button>
                    </div>
                </div>
            </div>`;
    }

    render() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="header">
                <div class="header-top">
                    <h1>${this.problemNumber}. ${this.problemTitle}</h1>
                    <button class="theme-toggle" onclick="app.toggleTheme()">
                        ${this.state.theme === 'dark' ? '☀️ Light' : '🌙 Dark'} Mode
                    </button>
                </div>
                <div class="mode-toggle">
                    <button class="mode-btn ${this.state.mode==='intuition'?'active':''}" onclick="app.toggleMode('intuition')">💡 Intuition & Thought Process</button>
                    <button class="mode-btn ${this.state.mode==='execution'?'active':''}" onclick="app.toggleMode('execution')">▶️ Step-by-Step Execution</button>
                </div>
                ${this.state.mode === 'execution' ? `
                    <div class="input-section">
                        <input type="text" id="inputField"
                            value="${this.state.inputValue.replace(/"/g,'&quot;')}"
                            onchange="app.state.inputValue=this.value"
                            placeholder='[["MedianFinder","addNum","findMedian",...],[[],[5],[],...]]'/>
                        <button onclick="app.runInput()">▶ Run</button>
                        <div class="input-help">Format: [[operations], [values]]</div>
                    </div>` : ''}
            </div>
            <div class="main-content" id="main-content">
                ${this.state.mode === 'execution'
                    ? this.renderCodePanel() + this.renderResizeHandle(0) + this.renderVizPanel() + this.renderResizeHandle(1) + this.renderStepPanel()
                    : this.renderIntuitionContent() + this.renderIntuitionViz()}
            </div>`;

        if (this.state.mode === 'execution') this.attachResizeHandles();
    }

    renderResizeHandle(index) {
        return `<div class="resize-handle" data-handle="${index}" id="handle-${index}"></div>`;
    }

    attachResizeHandles() {
        document.querySelectorAll('.resize-handle').forEach(handle => {
            handle.addEventListener('mousedown', (e) => {
                this.isDragging = true;
                this.dragHandleIndex = parseInt(handle.dataset.handle);
                this.dragStartX = e.clientX;
                this.dragStartWidths = [...this.state.panelWidths];
                handle.classList.add('dragging');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
                e.preventDefault();
            });
        });
    }

    attachEventListeners() {
        document.addEventListener('mousemove', (e) => {
            if (!this.isDragging) return;
            const mainContent = document.getElementById('main-content');
            if (!mainContent) return;
            const totalWidth = mainContent.offsetWidth;
            const dx = e.clientX - this.dragStartX;
            const dPercent = (dx / totalWidth) * 100;

            const widths = [...this.dragStartWidths];
            const h = this.dragHandleIndex;

            widths[h] = Math.max(10, this.dragStartWidths[h] + dPercent);
            widths[h + 1] = Math.max(10, this.dragStartWidths[h + 1] - dPercent);

            // Clamp so total stays ~100
            const total = widths.reduce((a, b) => a + b, 0);
            const scale = 100 / total;
            this.state.panelWidths = widths.map(w => w * scale);

            // Update panel widths live without full re-render
            const panels = document.querySelectorAll('.panel');
            panels.forEach((panel, i) => {
                panel.style.width = this.state.panelWidths[i] + '%';
            });
        });

        document.addEventListener('mouseup', (e) => {
            if (!this.isDragging) return;
            this.isDragging = false;
            document.querySelectorAll('.resize-handle').forEach(h => h.classList.remove('dragging'));
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                this.state.mode === 'execution' ? this.play() : this.playIntuition();
            } else if (e.code === 'ArrowRight') {
                e.preventDefault();
                this.state.mode === 'execution' ? this.stepForward() : this.nextIntuitionStage();
            } else if (e.code === 'ArrowLeft') {
                e.preventDefault();
                this.state.mode === 'execution' ? this.stepBack() : this.prevIntuitionStage();
            }
        });
    }
}

const app = new MedianFinderVisualizer();
</script>
</body>
</html>
