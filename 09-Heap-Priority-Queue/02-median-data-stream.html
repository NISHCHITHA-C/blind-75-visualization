                this.problemNumber = "295";
                this.problemTitle = "Find Median from Data Stream";
                
                this.code = `import heapq

class MedianFinder:
    """
    Maintains running median using two heaps:
    - max_heap: stores smaller half (inverted to simulate max heap)
    - min_heap: stores larger half
    
    Invariants:
    1. max_heap size >= min_heap size (difference at most 1)
    2. all elements in max_heap <= all elements in min_heap
    """

    def __init__(self):
        # Max heap for smaller half (negate values for max behavior)
        self.max_heap = []
        # Min heap for larger half
        self.min_heap = []

    def addNum(self, num: int) -> None:
        """
        Time Complexity: O(log n)
        Space Complexity: O(1) per call
        """
        # Always add to max_heap first
        heapq.heappush(self.max_heap, -num)
        
        # Ensure max_heap's max <= min_heap's min
        # Move largest from max_heap to min_heap
        heapq.heappush(self.min_heap, -heapq.heappop(self.max_heap))
        
        # Balance heaps: max_heap should have equal or one more element
        if len(self.min_heap) > len(self.max_heap):
            heapq.heappush(self.max_heap, -heapq.heappop(self.min_heap))

    def findMedian(self) -> float:
        """
        Time Complexity: O(1)
        Space Complexity: O(1)
        """
        # If odd number of elements, median is top of max_heap
        if len(self.max_heap) > len(self.min_heap):
            return -self.max_heap[0]
        
        # If even, median is average of both heap tops
        return (-self.max_heap[0] + self.min_heap[0]) / 2.0

**Approach B: Balanced BST**
• Time: O(log n) per add, O(log n) to find median

**Approach C: Two Heaps** ✓
• Time: O(log n) per add, O(1) to find median
• Elegant and efficient!`,
                        insight: "Two heaps can split the data into 'smaller half' and 'larger half', keeping the median at the boundary!",

**Max Heap (smaller half):**
• Stores all elements ≤ median
• Top element = largest of smaller half

**Min Heap (larger half):**
• Stores all elements > median  
• Top element = smallest of larger half

**The magic:** Keep heaps balanced!
• If total count is odd → median is max_heap top
• If total count is even → median is average of both tops`,

3. **Rebalance if needed:**
   → If min_heap has more elements, move one back to max_heap

Why this works:
• Guarantees correct ordering (all small ≤ all large)
• Maintains size invariant (max_heap size ≥ min_heap size)
• Only O(log n) heap operations!`,

# To simulate max-heap behavior:
heapq.heappush(max_heap, -num)  # negate on insert
max_val = -max_heap[0]           # negate on read
\`\`\`

Why it works:
• Negating flips the ordering
• Smallest negative = largest positive
• When we pop, we negate back to get the true max

                    this.state.steps = this.simulateExecution(operations, values);
                } catch (e) {
                    console.error("Invalid input format", e);
                    // Provide a default example on error
                    this.state.steps = this.simulateExecution(
                        ["MedianFinder","addNum","addNum","findMedian","addNum","findMedian"],
                        [[],[1],[2],[],[3],[]]
                    );
                }
            }
            
            simulateExecution(operations, values) {
                const steps = [];
                let stepNum = 0;
                const maxHeap = [];
                const minHeap = [];
                let result = null;
                
                // Helper functions for heap operations
                const heappush = (heap, val) => {
                    heap.push(val);
                    heap.sort((a, b) => a - b);
                };
                
                const heappop = (heap) => {
                    return heap.shift();
                };
                
                // Initial state
                steps.push({
                    line: 16,
                    description: 'Initialize MedianFinder with empty heaps',
                    vars: { 
                        max_heap: [],
                        min_heap: [],
                        operation: 'MedianFinder()',
                        result: null
                    },
                    maxHeap: [],
                    minHeap: [],
                    currentMedian: null,
                    highlightedNum: null,
                    stepNum: stepNum++
                });
                
                for (let i = 1; i < operations.length; i++) {
                    const op = operations[i];
                    const val = values[i];
                    
                    if (op === "addNum") {
                        const num = val[0];
                        
                        // Step 1: Push to max_heap (negated)
                        heappush(maxHeap, -num);
                        steps.push({
                            line: 27,
                            description: `Add ${num} to max_heap (as ${-num})`,
                            vars: {
                                num: num,
                                max_heap: [...maxHeap].map(x => -x),
                                min_heap: [...minHeap],
                                operation: `addNum(${num})`,
                                result: null
                            },
                            maxHeap: [...maxHeap].map(x => -x),
                            minHeap: [...minHeap],
                            currentMedian: null,
                            highlightedNum: num,
                            stepNum: stepNum++
                        });
                        
                        // Step 2: Move max from max_heap to min_heap
                        const moved = -heappop(maxHeap);
                        heappush(minHeap, moved);
                        steps.push({
                            line: 31,
                            description: `Move largest from max_heap (${moved}) to min_heap`,
                            vars: {
                                num: num,
                                max_heap: [...maxHeap].map(x => -x),
                                min_heap: [...minHeap],
                                operation: `addNum(${num})`,
                                result: null
                            },
                            maxHeap: [...maxHeap].map(x => -x),
                            minHeap: [...minHeap],
                            currentMedian: null,
                            highlightedNum: moved,
                            stepNum: stepNum++
                        });
                        
                        // Step 3: Rebalance if needed
                        if (minHeap.length > maxHeap.length) {
                            const rebalanced = heappop(minHeap);
                            heappush(maxHeap, -rebalanced);
                            steps.push({
                                line: 35,
                                description: `Rebalance: move ${rebalanced} from min_heap to max_heap`,
                                vars: {
                                    num: num,
                                    max_heap: [...maxHeap].map(x => -x),
                                    min_heap: [...minHeap],
                                    operation: `addNum(${num})`,
                                    result: null
                                },
                                maxHeap: [...maxHeap].map(x => -x),
                                minHeap: [...minHeap],
                                currentMedian: null,
                                highlightedNum: rebalanced,
                                stepNum: stepNum++
                            });
                        }
                        
                        // Final state after addNum
                        steps.push({
                            line: 36,
                            description: `Heaps balanced. Ready for next operation.`,
                            vars: {
                                max_heap: [...maxHeap].map(x => -x),
                                min_heap: [...minHeap],
                                operation: `addNum(${num}) complete`,
                                result: null
                            },
                            maxHeap: [...maxHeap].map(x => -x),
                            minHeap: [...minHeap],
                            currentMedian: null,
                            highlightedNum: null,
                            stepNum: stepNum++
                        });
                        
                    } else if (op === "findMedian") {
                        let median;
                        
                        if (maxHeap.length > minHeap.length) {
                            median = -maxHeap[0];
                            steps.push({
                                line: 45,
                                description: `Odd count: median is max_heap top = ${median}`,
                                vars: {
                                    max_heap: [...maxHeap].map(x => -x),
                                    min_heap: [...minHeap],
                                    operation: 'findMedian()',
                                    result: median
                                },
                                maxHeap: [...maxHeap].map(x => -x),
                                minHeap: [...minHeap],
                                currentMedian: median,
                                highlightedNum: null,
                                stepNum: stepNum++
                            });
                        } else {
                            median = ((-maxHeap[0]) + minHeap[0]) / 2.0;
                            steps.push({
                                line: 49,
                                description: `Even count: median = (${-maxHeap[0]} + ${minHeap[0]}) / 2 = ${median}`,
                                vars: {
                                    max_heap: [...maxHeap].map(x => -x),
                                    min_heap: [...minHeap],
                                    operation: 'findMedian()',
                                    result: median
                                },
                                maxHeap: [...maxHeap].map(x => -x),
                                minHeap: [...minHeap],
                                currentMedian: median,
                                highlightedNum: null,
                                stepNum: stepNum++
                            });
                        }
                        
                        result = median;
                    }
                }
                
                return steps;
            }

            highlightPythonLine(line) {
                // Return plain text if empty
                if (!line.trim()) return line;
                
                // Escape HTML
                const div = document.createElement('div');
                div.textContent = line;
                let html = div.innerHTML;
                
                // If it's a comment, highlight and return
                if (line.trim().startsWith('#')) {
                    return `<span class="comment">${html}</span>`;
                }
                
                // If it's a docstring, highlight and return
                if (line.trim().match(/^["']{3}/)) {
                    return `<span class="string">${html}</span>`;
                }
                
                // Create tokens by splitting on word boundaries while preserving spaces
                const tokens = line.split(/(\s+|[(){}[\]:,.])/);
                const keywords = new Set(['class', 'def', 'return', 'if', 'elif', 'else', 'import', 'from', 'self', 'None', 'True', 'False', 'for', 'while', 'in', 'not', 'and', 'or', 'as', 'pass', 'break', 'continue']);
                const types = new Set(['int', 'float', 'str', 'bool', 'List', 'Optional', 'Dict', 'Set', 'Tuple']);
                
                let result = '';
                let inString = false;
                let stringChar = '';
                
                for (let i = 0; i < tokens.length; i++) {
                    const token = tokens[i];
                    
                    // Handle empty tokens
                    if (!token) continue;
                    
                    // Check for string start/end
                    if ((token.startsWith('"') || token.startsWith("'")) && !inString) {
                        inString = true;
                        stringChar = token[0];
                    }
                    
                    // Escape HTML for the token
                    const escaped = document.createElement('div');
                    escaped.textContent = token;
                    const escapedToken = escaped.innerHTML;
                    
                    // Apply syntax highlighting
                    if (inString) {
                        result += `<span class="string">${escapedToken}</span>`;
                        if (token.endsWith(stringChar) && token.length > 1) {
                            inString = false;
                        }
                    } else if (keywords.has(token)) {
                        result += `<span class="keyword">${escapedToken}</span>`;
                    } else if (types.has(token)) {
                        result += `<span class="type">${escapedToken}</span>`;
                    } else if (i + 1 < tokens.length && tokens[i + 1] === '(' && /^[a-zA-Z_]\w*$/.test(token)) {
                        result += `<span class="function">${escapedToken}</span>`;
                    } else {
                        result += escapedToken;
                    }
                }
                
                return result;
            }

                                <div style="background: rgba(16, 185, 129, 0.1); padding: 16px; border-radius: 8px; border-left: 4px solid var(--success); margin-top: 16px;">
                                    <strong style="color: var(--success);">Why 3 steps?</strong>
                                    <div style="margin-top: 8px; color: var(--text-secondary);">
                                        Each step maintains a critical invariant:<br>
                                        1. Add to max_heap → grows the smaller half<br>
                                        2. Move to min_heap → ensures ordering<br>
                                        3. Rebalance → ensures size balance
                                    </div>
                                </div>
                            </div>
                        `;
                        break;
                    
                    case 'negation_trick':
                        vizContent = `
                            <div style="padding: 24px;">
                                <h3 style="text-align: center; margin-bottom: 20px; color: var(--warning);">
                                    ⚠️ Python Heap Limitation
                                </h3>
                                
                                <div style="background: rgba(239, 68, 68, 0.1); padding: 20px; border-radius: 8px; border-left: 4px solid var(--error); margin-bottom: 20px;">
                                    <div style="font-weight: 600; color: var(--error); margin-bottom: 8px;">
                                        Problem: Python only has MIN heaps!
                                    </div>
                                    <div style="color: var(--text-secondary); font-size: 14px;">
                                        heapq module only implements min-heap behavior.<br>
                                        We need a max-heap for the smaller half.
                                    </div>
                                </div>
                                
                                <div style="background: rgba(16, 185, 129, 0.1); padding: 20px; border-radius: 8px; border-left: 4px solid var(--success);">
                                    <div style="font-weight: 600; color: var(--success); margin-bottom: 12px;">
                                        ✅ Solution: The Negation Trick
                                    </div>
                                    
                                    <div style="background: var(--code-bg); padding: 16px; border-radius: 6px; margin: 12px 0; font-family: var(--font-mono); font-size: 13px;">
                                        # On insert: negate<br>
                                        heappush(max_heap, <span style="color: var(--syn-keyword);">-num</span>)<br><br>
                                        
                                        # On read: negate back<br>
                                        max_val = <span style="color: var(--syn-keyword);">-</span>max_heap[0]
                                    </div>
                                    
                                    <div style="color: var(--text-secondary); font-size: 14px; margin-top: 12px;">
                                        <strong>Why it works:</strong><br>
                                        • Smallest negative = Largest positive<br>
                                        • -(-5) = 5 (double negation restores value)<br>
                                        • Turns min-heap into max-heap!
                                    </div>
                                </div>
                                
                                <div style="margin-top: 20px; padding: 16px; background: var(--bg-secondary); border-radius: 8px;">
                                    <div style="font-size: 13px; color: var(--text-secondary);">
                                        <strong>Example:</strong><br>
                                        Values: [5, 3, 7]<br>
                                        Stored as: [-5, -3, -7]<br>
                                        Min of [-7, -5, -3] = -7 → negate → 7 (the max!)
                                    </div>
                                </div>
                            </div>
                        `;
                        break;
                    
                    case 'complexity':
                        vizContent = `
                            <div style="padding: 24px;">
                                <div class="complexity-grid">
                                    <div class="complexity-box">
                                        <h3>⏱️ Time Complexity</h3>
                                        
                                        <div style="margin-top: 16px;">
                                            <strong style="color: var(--text-primary);">addNum(num): O(log n)</strong>
                                            <div class="complexity-item">
                                                • heappush: O(log n)<br>
                                                • heappop: O(log n)<br>
                                                • Total: 3 operations → O(log n)
                                            </div>
                                        </div>
                                        
                                        <div style="margin-top: 16px;">
                                            <strong style="color: var(--text-primary);">findMedian(): O(1)</strong>
                                            <div class="complexity-item">
                                                • Just peek at heap tops<br>
                                                • No traversal needed<br>
                                                • Constant time!
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div class="complexity-box">
                                        <h3>💾 Space Complexity</h3>
                                        
                                        <div style="margin-top: 16px;">
                                            <strong style="color: var(--text-primary);">Overall: O(n)</strong>
                                            <div class="complexity-item">
                                                • Store all n elements<br>
                                                • Split between two heaps<br>
                                                • No extra data structures
                                            </div>
                                        </div>
                                        
                                        <div style="margin-top: 16px;">
                                            <strong style="color: var(--text-primary);">Per Operation: O(1)</strong>
                                            <div class="complexity-item">
                                                • Each add stores 1 element<br>
                                                • No recursion stack<br>
                                                • Constant extra space
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div style="background: rgba(16, 185, 129, 0.1); padding: 20px; border-radius: 8px; border-left: 4px solid var(--success); margin-top: 24px;">
                                    <strong style="color: var(--success);">🎯 This is optimal!</strong>
                                    <div style="margin-top: 8px; color: var(--text-secondary);">
                                        We can't do better than O(log n) insertions into a sorted structure.<br>
                                        The O(1) median query is a huge win over alternatives.
                                    </div>
                                </div>
                            </div>
                        `;
                        break;
                    
                    case 'edge_cases':
                        vizContent = `
                            <div style="padding: 24px;">
                                <h3 style="text-align: center; margin-bottom: 20px; color: var(--accent);">
                                    Edge Cases Handled
                                </h3>
                                
                                <div style="display: grid; gap: 16px;">
                                    <div style="background: var(--bg-secondary); padding: 16px; border-radius: 8px; border-left: 4px solid var(--success);">
                                        <strong>✓ Empty stream</strong>
                                        <div style="color: var(--text-secondary); margin-top: 4px; font-size: 13px;">
                                            Both heaps empty → no median yet
                                        </div>
                                    </div>
                                    
                                    <div style="background: var(--bg-secondary); padding: 16px; border-radius: 8px; border-left: 4px solid var(--success);">
                                        <strong>✓ Single element</strong>
                                        <div style="color: var(--text-secondary); margin-top: 4px; font-size: 13px;">
                                            Goes to max_heap → median = that element
                                        </div>
                                    </div>
                                    
                                    <div style="background: var(--bg-secondary); padding: 16px; border-radius: 8px; border-left: 4px solid var(--success);">
                                        <strong>✓ Two elements</strong>
                                        <div style="color: var(--text-secondary); margin-top: 4px; font-size: 13px;">
                                            One in each heap → median = average
                                        </div>
                                    </div>
                                    
                                    <div style="background: var(--bg-secondary); padding: 16px; border-radius: 8px; border-left: 4px solid var(--success);">
                                        <strong>✓ All duplicates</strong>
                                        <div style="color: var(--text-secondary); margin-top: 4px; font-size: 13px;">
                                            Works fine → heaps just contain same values
                                        </div>
                                    </div>
                                    
                                    <div style="background: var(--bg-secondary); padding: 16px; border-radius: 8px; border-left: 4px solid var(--success);">
                                        <strong>✓ Increasing sequence</strong>
                                        <div style="color: var(--text-secondary); margin-top: 4px; font-size: 13px;">
                                            All go to min_heap initially → rebalancing maintains invariants
                                        </div>
                                    </div>
                                    
                                    <div style="background: var(--bg-secondary); padding: 16px; border-radius: 8px; border-left: 4px solid var(--success);">
                                        <strong>✓ Decreasing sequence</strong>
                                        <div style="color: var(--text-secondary); margin-top: 4px; font-size: 13px;">
                                            All stay in max_heap → works correctly
                                        </div>
                                    </div>
                                </div>
                                
                                <div style="background: rgba(16, 185, 129, 0.1); padding: 20px; border-radius: 8px; border-left: 4px solid var(--success); margin-top: 24px;">
                                    <strong style="color: var(--success);">Why so robust?</strong>
                                    <div style="margin-top: 8px; color: var(--text-secondary);">
                                        The invariants ALWAYS hold after each operation:<br>
                                        1. max_heap's max ≤ min_heap's min (ordering)<br>
                                        2. max_heap.size ≥ min_heap.size (balance)<br><br>
                                        These two rules guarantee correctness for all inputs!
                                    </div>
                                </div>
                            </div>
                        `;
                        break;
                    
                    default:
                        vizContent = this.renderHeapVisualization();
                }
                
                return `
                    <div class="panel" style="width: 50%">
                        <div class="panel-header">Visual Explanation</div>
                        <div class="panel-content">
                            <div class="viz-content">
                                ${vizContent}
                            </div>
                        </div>
                    </div>
                `;
            }
            
            renderIntuitionContent() {
                const stages = this.intuitionStages;
                const currentStage = this.state.currentIntuitionStage;
                
                const stagesHTML = stages.map((stage, i) => {
                    const isActive = i === currentStage;
                    const isPast = i < currentStage;
                    const opacity = isActive ? '1' : (isPast ? '0.6' : '0.3');
                    
                    return `
                        <div class="intuition-stage" style="opacity: ${opacity}">
                            <h3>
                                <span class="stage-number">${i + 1}</span>
                                ${stage.title}
                            </h3>
                            
                            ${stage.thought ? `
                                <div class="thought-bubble">
                                    💭 "${stage.thought}"
                                </div>
                            ` : ''}
                            
                            <div class="stage-content">${stage.content.replace(/\n/g, '<br>')}</div>
                            
                            ${stage.insight ? `
                                <div class="key-insight">
                                    <strong>💡 Key Insight:</strong> ${stage.insight}
                                </div>
                            ` : ''}
                        </div>
                    `;
                }).join('');
                
                return `
                    <div class="panel" style="width: 50%">
                        <div class="panel-header">
                            Senior Engineer's Thought Process
                            <span style="float: right;">
                                Stage ${currentStage + 1} of ${stages.length}
                            </span>
                        </div>
                        <div class="panel-content intuition-panel">
                            ${stagesHTML}
                            
                            <div class="viz-controls" style="position: sticky; bottom: 0; background: var(--bg-secondary);">
                                <button class="control-btn" onclick="app.prevIntuitionStage()" ${currentStage === 0 ? 'disabled' : ''}>
                                    ◀ Previous
                                </button>
                                <button class="control-btn play" onclick="app.playIntuition()">
                                    ${this.state.isIntuitionPlaying ? '⏸ Pause' : '▶ Auto-Play'}
                                </button>
                                <button class="control-btn" onclick="app.nextIntuitionStage()" ${currentStage >= stages.length - 1 ? 'disabled' : ''}>
                                    Next ▶
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            renderExecutionMode() {
                return `
                    ${this.renderCodePanel()}
                    ${this.renderVizPanel()}
                    ${this.renderStepPanel()}
                `;
            }
            
            renderIntuitionMode() {
                return `
                    ${this.renderIntuitionContent()}
                    ${this.renderIntuitionViz()}
                `;
            }
            
            render() {
                const app = document.getElementById('app');
                app.innerHTML = `
                    <div class="header">
                        <div class="header-top">
                            <h1>${this.problemNumber}. ${this.problemTitle}</h1>
                            <button class="theme-toggle" onclick="app.toggleTheme()">
                                ${this.state.theme === 'dark' ? '☀️ Light' : '🌙 Dark'} Mode
                            </button>
                        </div>
                        
                        <div class="mode-toggle">
                            <button class="mode-btn ${this.state.mode === 'intuition' ? 'active' : ''}" 
                                    onclick="app.toggleMode('intuition')">
                                💡 Intuition & Thought Process
                            </button>
                            <button class="mode-btn ${this.state.mode === 'execution' ? 'active' : ''}" 
                                    onclick="app.toggleMode('execution')">
                                ▶️ Step-by-Step Execution
                            </button>
                        </div>
                        
                        ${this.state.mode === 'execution' ? `
                            <div class="input-section">
                                <input 
                                    type="text" 
                                    id="inputField"
                                    value="${this.state.inputValue.replace(/"/g, '&quot;')}"
                                    onchange="app.state.inputValue = this.value"
                                    placeholder='[["MedianFinder","addNum","findMedian"...],[[],[5],[]...]]'
                                />
                                <button onclick="app.runInput()">▶ Run</button>
                                <div class="input-help">
                                    Format: [[operations], [values]] - Example: [["MedianFinder","addNum","findMedian"],[[],[5],[]]]
                                </div>
                            </div>
                        ` : ''}
                    </div>
                    
                    <div class="main-content">
                        ${this.state.mode === 'execution' ? 
                            this.renderExecutionMode() : 
                            this.renderIntuitionMode()}
                    </div>
                `;
            }
            
            attachEventListeners() {
                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space') {
                        e.preventDefault();
                        if (this.state.mode === 'execution') {
                            this.play();
                        } else {
                            this.playIntuition();
                        }
                    } else if (e.code === 'ArrowRight') {
                        e.preventDefault();
                        if (this.state.mode === 'execution') {
                            this.stepForward();
                        } else {
                            this.nextIntuitionStage();
                        }
                    } else if (e.code === 'ArrowLeft') {
                        e.preventDefault();
                        if (this.state.mode === 'execution') {
                            this.stepBack();
                        } else {
                            this.prevIntuitionStage();
                        }
                    }
                });
            }
        }
        
        // Initialize app
        const app = new MedianFinderVisualizer();
    </script>
</body>
</html>
