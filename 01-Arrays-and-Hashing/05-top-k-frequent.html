<script>
/* ═══════════════════════════════════════════
   SYNTAX HIGHLIGHTING
═══════════════════════════════════════════ */
const PYTHON_CODE = `from typing import List
import heapq
from collections import Counter

class Solution:
    def topKFrequent(self, nums: List[int], k: int) -> List[int]:
        count = Counter(nums)
        return heapq.nlargest(k, count.keys(), key=count.get)`;

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function highlightPython(line) {
  if (!line.trim()) return '&nbsp;';
  const raw = line;

  // Comment
  if (raw.trim().startsWith('#')) {
    return `<span class="t-cm">${escapeHtml(raw)}</span>`;
  }

  // Tokenize step by step
  let out = '';
  let i = 0;
  const chars = raw;

  while (i < chars.length) {
    // String literals
    if (chars[i] === '"' || chars[i] === "'") {
      const q = chars[i];
      let j = i + 1;
      while (j < chars.length && chars[j] !== q) {
        if (chars[j] === '\\') j++;
        j++;
      }
      j++;
      out += `<span class="t-str">${escapeHtml(chars.slice(i, j))}</span>`;
      i = j;
      continue;
    }

    // Number
    if (/[0-9]/.test(chars[i]) && (i === 0 || !/[a-zA-Z_]/.test(chars[i-1]))) {
      let j = i;
      while (j < chars.length && /[0-9.]/.test(chars[j])) j++;
      out += `<span class="t-num">${escapeHtml(chars.slice(i, j))}</span>`;
      i = j;
      continue;
    }

    // Identifier or keyword
    if (/[a-zA-Z_]/.test(chars[i])) {
      let j = i;
      while (j < chars.length && /[a-zA-Z0-9_]/.test(chars[j])) j++;
      const word = chars.slice(i, j);
      const kwList = ['from','import','class','def','return','if','else','elif','for','while','in','not','and','or','True','False','None','lambda','with','as','pass','break','continue','raise','try','except','finally','yield','global','nonlocal','del','is'];
      const builtinList = ['print','len','range','list','dict','set','tuple','int','str','float','bool','type','isinstance','hasattr','getattr','sum','min','max','sorted','enumerate','zip','map','filter','open','super','property'];
      const typeList = ['List','Dict','Set','Tuple','Optional','Union','Any','Counter','heapq'];

      if (kwList.includes(word))       out += `<span class="t-kw">${escapeHtml(word)}</span>`;
      else if (typeList.includes(word)) out += `<span class="t-tp">${escapeHtml(word)}</span>`;
      else if (builtinList.includes(word)) out += `<span class="t-bi">${escapeHtml(word)}</span>`;
      else if (chars[j] === '(')       out += `<span class="t-fn">${escapeHtml(word)}</span>`;
      else if (word === word.toUpperCase() && word.length > 1) out += `<span class="t-cls">${escapeHtml(word)}</span>`;
      else                             out += escapeHtml(word);
      i = j;
      continue;
    }

    // Decorator
    if (chars[i] === '@') {
      let j = i + 1;
      while (j < chars.length && /[a-zA-Z_]/.test(chars[j])) j++;
      out += `<span class="t-dec">${escapeHtml(chars.slice(i, j))}</span>`;
      i = j;
      continue;
    }

    // Operators
    if ('=+-*/<>!&|^~%'.includes(chars[i])) {
      out += `<span class="t-op">${escapeHtml(chars[i])}</span>`;
      i++;
      continue;
    }

    out += escapeHtml(chars[i]);
    i++;
  }
  return out;
}

/* ═══════════════════════════════════════════
   SIMULATION ENGINE
═══════════════════════════════════════════ */
function parseNums(s) {
  s = s.trim().replace(/^\[/, '').replace(/\]$/, '');
  return s.split(',').map(x => parseInt(x.trim())).filter(n => !isNaN(n));
}

function buildSteps(nums, k) {
  const steps = [];

  const push = (line, desc, vars, vizState) => {
    steps.push({ line, desc, vars: { ...vars }, vizState: { ...vizState } });
  };

  // Step 0: start
  push(0, 'Import modules and set up the Solution class.', {}, { phase: 'init', nums, k });

  // Step 1: Counter
  const count = {};
  for (const n of nums) count[n] = (count[n] || 0) + 1;

  push(6, 'Call Counter(nums) — count the frequency of each number.', { nums: JSON.stringify(nums), k }, { phase: 'counter', count: { ...count }, nums, k, building: true });

  // Show counter built
  push(6, 'Counter is fully built. We now know how often each element appears.', { count: JSON.stringify(count), k }, { phase: 'counter', count: { ...count }, nums, k, building: false });

  // Step 2: heapq.nlargest
  push(7, 'Call heapq.nlargest(k, count.keys(), key=count.get) to get top-k elements.', { count: JSON.stringify(count), k, 'count.keys()': JSON.stringify(Object.keys(count).map(Number)) }, { phase: 'heap_start', count: { ...count }, nums, k });

  // Simulate nlargest: build a max-heap by frequency
  const keys = Object.keys(count).map(Number);
  // nlargest: sort keys by count descending
  const sorted = [...keys].sort((a, b) => count[b] - count[a]);

  push(7, `Heap processes each key. Internally, it maintains a min-heap of size k using frequencies as keys.`, {
    all_keys: JSON.stringify(keys),
    sorted_by_freq: JSON.stringify(sorted),
    k
  }, { phase: 'heap_building', count: { ...count }, sorted, nums, k, heap: [] });

  const heap = [];
  for (let i = 0; i < Math.min(k, sorted.length); i++) {
    heap.push(sorted[i]);
    push(7, `Add element ${sorted[i]} (freq=${count[sorted[i]]}) to the result heap.`, {
      element: sorted[i],
      freq: count[sorted[i]],
      current_heap: JSON.stringify(heap)
    }, { phase: 'heap_building', count: { ...count }, sorted, nums, k, heap: [...heap], highlight: sorted[i] });
  }

  push(7, `heapq.nlargest returns the top-${k} elements by frequency.`, {
    result: JSON.stringify(heap)
  }, { phase: 'result', count: { ...count }, sorted, nums, k, heap: [...heap], result: heap });

  return steps;
}

            const pct = (c / maxFreq * 100).toFixed(0);
            return `
              <div class="freq-bar-row">
                <div class="freq-label" style="color:${isHL ? 'var(--accent-yellow)' : (inHeap ? 'var(--accent-green)' : 'inherit')};">${el}</div>
                <div class="freq-bar-track" style="border:1px solid ${isHL ? 'var(--accent-yellow)' : (inHeap ? 'rgba(166,227,161,0.3)' : 'transparent')};transition:border 0.2s;">
                  <div class="freq-bar-fill" style="width:${pct}%;background:${isHL ? 'rgba(249,226,175,0.2)' : (inHeap ? 'rgba(166,227,161,0.15)' : col+'18')};color:${isHL ? 'var(--accent-yellow)' : (inHeap ? 'var(--accent-green)' : col)};border-left:3px solid ${isHL ? 'var(--accent-yellow)' : (inHeap ? 'var(--accent-green)' : col)};"></div>
                </div>
                <div class="freq-count" style="color:${isHL ? 'var(--accent-yellow)' : (inHeap ? 'var(--accent-green)' : 'var(--text-muted)')}">${isHL ? '→' : (inHeap ? '✓' : '')} × ${c}</div>
              </div>`;
          }).join('')}
        </div>
        ${hp.length > 0 ? `
          <div class="viz-title">Current Heap Selection</div>
          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
            ${hp.map(n => `
              <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
                <div class="array-box" style="width:44px;height:44px;background:rgba(166,227,161,0.15);border:2px solid var(--accent-green);color:var(--accent-green);">${n}</div>
                <div style="font-size:10px;color:var(--text-muted);font-family:var(--font-mono);">f=${cnt[n]}</div>
              </div>`).join('')}
          </div>` : ''}
      </div>`;
  }

  if (phase === 'result') {
    const res = result || [];
    return `
      <div style="padding:16px 20px;">
        <div class="viz-title">Final Result</div>
        <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;">
          ${res.map(n => `
            <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
              <div class="array-box" style="width:52px;height:52px;background:var(--accent);color:#11111b;border:none;font-size:18px;">${n}</div>
              <div style="font-size:10px;color:var(--text-muted);font-family:var(--font-mono);">freq=${cnt[n]}</div>
            </div>`).join('')}
        </div>
        <div class="info-box green">
          <strong>✅ heapq.nlargest returned: [${res.join(', ')}]</strong><br>
          These are the top-${k} elements by frequency.
        </div>
        <div class="freq-bar-wrap" style="margin-top:16px;">
          ${Object.entries(cnt).sort((a,b)=>b[1]-a[1]).map(([el, c], i) => {
            const inRes = res.includes(parseInt(el));
            const pct = (c / maxFreq * 100).toFixed(0);
            const col = colors.freqBar[i % colors.freqBar.length];
            return `
              <div class="freq-bar-row">
                <div class="freq-label" style="color:${inRes ? 'var(--accent-green)' : 'var(--text-muted)'};">${el}</div>
                <div class="freq-bar-track">
                  <div class="freq-bar-fill" style="width:${pct}%;background:${inRes ? 'rgba(166,227,161,0.18)' : col+'12'};color:${inRes ? 'var(--accent-green)' : 'var(--text-muted)'};border-left:3px solid ${inRes ? 'var(--accent-green)' : 'var(--border)'};">
                  </div>
                </div>
                <div class="freq-count" style="color:${inRes ? 'var(--accent-green)' : 'var(--text-muted)'};">×${c} ${inRes ? '✓' : ''}</div>
              </div>`;
          }).join('')}
        </div>
      </div>`;
  }

  return '<div style="padding:20px;color:var(--text-muted);">—</div>';
}

/* ═══════════════════════════════════════════
   CONTROLS
═══════════════════════════════════════════ */
function setMode(m) {
  stopAll();
  appState.mode = m;
  if (m === 'execution' && appState.steps.length === 0) initExecution();
  render();
}

function toggleTheme() {
  appState.theme = appState.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', appState.theme);
  document.getElementById('theme-btn').textContent = appState.theme === 'dark' ? '☀ Light' : '🌙 Dark';
}

function rerun() {
  try {
    const nums = parseNums(document.getElementById('nums-input').value);
    const k = parseInt(document.getElementById('k-input').value);
    if (!nums.length || isNaN(k) || k < 1) throw new Error();
    appState.nums = nums;
    appState.k = k;
    stopAll();
    initExecution();
    const res = appState.steps[appState.steps.length - 1]?.vizState?.result || [];
    document.getElementById('result-label').textContent = res.length ? `→ [${res.join(', ')}]` : '';
    render();
  } catch(e) {
    document.getElementById('result-label').textContent = '⚠ Invalid input';
  }
}

// Intuition controls
function prevStage() { if(appState.intuitionStage > 0) { appState.intuitionStage--; render(); } }
function nextStage() { if(appState.intuitionStage < INTUITION_STAGES.length - 1) { appState.intuitionStage++; render(); } else stopIntuitionPlay(); }
function jumpStage(i) { appState.intuitionStage = i; render(); }

function toggleIntuitionPlay() {
  if (appState.isIntuitionPlaying) stopIntuitionPlay();
  else startIntuitionPlay();
}
function startIntuitionPlay() {
  appState.isIntuitionPlaying = true;
  appState.intuitionTimer = setInterval(() => {
    if (appState.intuitionStage < INTUITION_STAGES.length - 1) {
      appState.intuitionStage++;
      render();
    } else stopIntuitionPlay();
  }, 3500);
  render();
}
function stopIntuitionPlay() {
  appState.isIntuitionPlaying = false;
  clearInterval(appState.intuitionTimer);
  render();
}

// Execution controls
function execReset() { stopExec(); appState.currentStep = 0; render(); }
function execStepBack() { if(appState.currentStep > 0) { appState.currentStep--; render(); } }
function execStepFwd() { if(appState.currentStep < appState.steps.length - 1) { appState.currentStep++; render(); } else stopExec(); }
function execPlay() {
  if (appState.isPlaying) { stopExec(); render(); return; }
  appState.isPlaying = true;
  const interval = Math.round(900 / appState.speed);
  appState.playTimer = setInterval(() => {
    if (appState.currentStep < appState.steps.length - 1) {
      appState.currentStep++;
      render();
    } else stopExec();
  }, interval);
  render();
}
function stopExec() {
  appState.isPlaying = false;
  clearInterval(appState.playTimer);
}
function setSpeed(v) { appState.speed = parseFloat(v); if(appState.isPlaying) { stopExec(); execPlay(); } }

function stopAll() { stopExec(); stopIntuitionPlay(); }

/* ═══════════════════════════════════════════
   DIVIDER DRAG
═══════════════════════════════════════════ */
function attachDividerDrag() {
  const divL = document.getElementById('div-left');
  const divR = document.getElementById('div-right');
  if (!divL || !divR) return;

  let dragging = null, startX = 0, startLeftW = 0, startRightW = 0;

  const onMouseMove = (e) => {
    if (!dragging) return;
    const main = document.getElementById('main-area');
    const totalW = main.offsetWidth;
    const dx = e.clientX - startX;
    const dxPct = (dx / totalW) * 100;

    if (dragging === 'left') {
      const newLeft = Math.max(15, Math.min(50, startLeftW + dxPct));
      appState.leftW = newLeft;
    } else {
      const newRight = Math.max(15, Math.min(40, startRightW - dxPct));
      appState.rightW = newRight;
    }
    render();
  };

  const onMouseUp = () => {
    dragging = null;
    document.querySelectorAll('.divider').forEach(d => d.classList.remove('dragging'));
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
  };

  divL.addEventListener('mousedown', (e) => {
    dragging = 'left'; startX = e.clientX; startLeftW = appState.leftW;
    divL.classList.add('dragging');
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);
  });

  divR.addEventListener('mousedown', (e) => {
    dragging = 'right'; startX = e.clientX; startRightW = appState.rightW;
    divR.classList.add('dragging');
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);
  });
}

function scrollActiveStage() {
  requestAnimationFrame(() => {
    const el = document.getElementById(`stage-card-${appState.intuitionStage}`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  });
}

function scrollActiveHistory() {
  requestAnimationFrame(() => {
    const el = document.getElementById(`hist-${appState.currentStep}`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });
}

/* ═══════════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════════ */
document.addEventListener('keydown', (e) => {
  if (['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName)) return;
  if (e.code === 'Space') { e.preventDefault(); appState.mode === 'intuition' ? toggleIntuitionPlay() : execPlay(); }
  if (e.code === 'ArrowRight') { e.preventDefault(); appState.mode === 'intuition' ? nextStage() : execStepFwd(); }
  if (e.code === 'ArrowLeft')  { e.preventDefault(); appState.mode === 'intuition' ? prevStage() : execStepBack(); }
});

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
initExecution();
render();
</script>
</body>
</html>
