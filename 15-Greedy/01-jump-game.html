<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>55. Jump Game</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#07090f;--surface:#0d1117;--card:#111620;--border:#1a2235;
  --curr:#3b82f6;--reach:#10b981;--goal:#f59e0b;--unreachable:#ef4444;
  --text:#e2e8f0;--muted:#475569;--dim:#1e293b;
}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;display:flex;flex-direction:column;}

header{display:flex;align-items:center;gap:14px;padding:8px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.h-num{font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:700;color:#3b82f6;}
.h-title{font-size:.82rem;font-weight:600;color:var(--muted);}
.h-badge{font-family:'JetBrains Mono',monospace;font-size:.62rem;padding:2px 8px;border-radius:3px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:#f59e0b;}
.h-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.inp{background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.8rem;padding:5px 10px;border-radius:5px;outline:none;transition:border-color .2s;width:200px;}
.inp:focus{border-color:#3b82f6;}
.btn{font-family:'Outfit',sans-serif;font-weight:700;font-size:.74rem;padding:5px 14px;border-radius:5px;border:none;cursor:pointer;transition:all .15s;}
.btn-p{background:#3b82f6;color:#fff;}.btn-p:hover{background:#2563eb;}

main{display:grid;grid-template-columns:330px 1fr 240px;flex:1;overflow:hidden;}

.code-panel{border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;}
.plabel{font-size:.6rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:6px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.code-scroll{overflow-y:auto;flex:1;padding:4px 0;}
.cl{display:flex;align-items:stretch;font-family:'JetBrains Mono',monospace;font-size:.72rem;line-height:1.8;position:relative;transition:background .15s;}
.cl.active{background:rgba(59,130,246,.1);}
.cl.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#3b82f6;border-radius:0 2px 2px 0;}
.ln{width:28px;text-align:right;padding-right:8px;color:var(--muted);font-size:.65rem;flex-shrink:0;user-select:none;line-height:1.8;}
.cl.active .ln{color:#3b82f6;}
.ct{padding-right:14px;white-space:pre;color:#abb2bf;}
.kw{color:#c678dd;}.fn{color:#61afef;}.cm{color:#3d4d60;font-style:italic;}.nm{color:#e5c07b;}

.viz-panel{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.stats{padding:10px 18px;border-bottom:1px solid var(--border);display:flex;gap:20px;}
.stat{display:flex;flex-direction:column;}
.stat-label{font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--curr);}

.array-viz{flex:1;overflow:auto;padding:30px;}
.arr-container{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:30px;}
.arr-item{display:flex;flex-direction:column;align-items:center;gap:6px;}
.arr-idx{font-family:'JetBrains Mono';font-size:.6rem;color:var(--muted);}
.arr-box{width:60px;height:60px;border-radius:8px;border:2px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono';font-size:1rem;font-weight:700;color:var(--text);transition:all .3s;position:relative;}
.arr-item.curr .arr-box{border-color:var(--curr);box-shadow:0 0 14px rgba(59,130,246,.3);color:var(--curr);}
.arr-item.goal .arr-box{border-color:var(--goal);background:rgba(245,158,11,.1);color:var(--goal);}
.arr-item.reachable .arr-box{border-color:var(--reach);background:rgba(16,185,129,.08);color:var(--reach);}
.arr-item.unreachable .arr-box{border-color:var(--unreachable);background:rgba(239,68,68,.06);color:var(--unreachable);}
.jump-arc{position:absolute;top:-25px;left:50%;transform:translateX(-50%);font-size:.6rem;color:var(--curr);white-space:nowrap;}

.reach-bar{height:8px;margin:0 30px 20px;background:var(--dim);border-radius:4px;position:relative;overflow:hidden;}
.reach-fill{height:100%;background:var(--reach);transition:width .3s;border-radius:4px;}

.decision{margin:10px 18px;padding:10px 14px;border-radius:7px;border:1px solid var(--border);background:var(--card);font-family:'JetBrains Mono';font-size:.73rem;color:var(--muted);flex-shrink:0;}
.decision.check{border-color:rgba(59,130,246,.45);background:rgba(59,130,246,.07);color:var(--curr);}
.decision.success{border-color:rgba(16,185,129,.45);background:rgba(16,185,129,.07);color:var(--reach);}
.decision.fail{border-color:rgba(239,68,68,.45);background:rgba(239,68,68,.07);color:var(--unreachable);}

.bot{margin-top:auto;display:flex;align-items:center;gap:8px;padding:8px 18px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--text);}.btn-g:hover{border-color:#3b82f6;color:#3b82f6;}
.btn:disabled{opacity:.3;cursor:not-allowed;}
.step-info{font-family:'JetBrains Mono';font-size:.72rem;color:var(--muted);}
.spd-wrap{display:flex;align-items:center;gap:5px;margin-left:auto;}
.spd-wrap label{font-size:.7rem;color:var(--muted);}
input[type=range]{accent-color:#3b82f6;width:80px;}

.log-panel{border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;}
.log-panel .plabel{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;}
.lc{font-size:.6rem;padding:2px 6px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);border-radius:3px;cursor:pointer;font-family:inherit;}
.lc:hover{color:var(--text);}
.log-scroll{flex:1;overflow-y:auto;padding:5px 7px;display:flex;flex-direction:column;gap:3px;}
.le{font-family:'JetBrains Mono';font-size:.65rem;padding:4px 7px;border-radius:4px;background:var(--card);border:1px solid var(--border);}
.le.check{border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.05);color:var(--curr);}
.le.success{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.05);color:var(--reach);}
.le.fail{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.05);color:var(--unreachable);}
.ls{color:var(--muted);margin-right:6px;}
</style>
</head>
<body>
<header>
  <div class="h-num">55</div>
  <div class="h-title">Jump Game</div>
  <div class="h-badge">MEDIUM</div>
  <div class="h-right">
    <input id="arrInput" class="inp" placeholder="e.g., 2,3,1,1,4"/>
    <button class="btn btn-p" onclick="init()">Reset</button>
  </div>
</header>

<main>
  <div class="code-panel">
    <div class="plabel">Greedy Algorithm</div>
    <div class="code-scroll" id="codePanel"></div>
  </div>

  <div class="viz-panel">
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Max Reach</div>
        <div class="stat-val" id="maxReach" style="color:var(--reach);">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Goal Index</div>
        <div class="stat-val" id="goalIdx" style="color:var(--goal);">0</div>
      </div>
    </div>
    
    <div class="array-viz">
      <div class="arr-container" id="arrayContainer"></div>
      <div class="reach-bar">
        <div class="reach-fill" id="reachFill" style="width:0%;"></div>
      </div>
    </div>
    
    <div id="decision" class="decision">Checking if we can reach the end...</div>
    
    <div class="bot">
      <button class="btn btn-g" id="btnPrev" onclick="stepBack()">◀ Prev</button>
      <button class="btn btn-p" id="btnPlay" onclick="togglePlay()">▶ Play</button>
      <button class="btn btn-g" id="btnNext" onclick="stepFwd()">Next ▶</button>
      <span class="step-info" id="stepInfo">0 / 0</span>
      <div class="spd-wrap">
        <label>Speed:</label>
        <input type="range" id="speedSlider" min="200" max="1400" value="800"/>
      </div>
    </div>
  </div>

  <div class="log-panel">
    <div class="plabel">
      Greedy Log
      <button class="lc" onclick="clearLog()">Clear</button>
    </div>
    <div class="log-scroll" id="logScroll"></div>
  </div>
</main>

<script>
const code=[
  {t:'def canJump(nums):',cm:true},
  {t:'    max_reach = 0',ln:1},
  {t:'    ',ln:2},
  {t:'    for i in range(len(nums)):',ln:3},
  {t:'        if i > max_reach:',ln:4},
  {t:'            return False  # Cannot reach',ln:5},
  {t:'        ',ln:6},
  {t:'        # Update max reachable position',cm:true},
  {t:'        max_reach = max(max_reach, i + nums[i])',ln:7},
  {t:'        ',ln:8},
  {t:'        if max_reach >= len(nums) - 1:',ln:9},
  {t:'            return True  # Can reach end',ln:10},
  {t:'    ',ln:11},
  {t:'    return False',ln:12}
];

let nums,steps=[],cursor=0,playing=false,playTimer;

function buildCode(){
  const panel=document.getElementById('codePanel');
  code.forEach((c,i)=>{
    const line=document.createElement('div');
    line.className='cl';
    line.id=`line${c.ln||i}`;
    const ln=document.createElement('div');ln.className='ln';
    ln.textContent=c.ln!==undefined?c.ln:'';
    const ct=document.createElement('div');ct.className='ct';
    if(c.cm){
      ct.innerHTML=`<span class="cm">${c.t}</span>`;
    }else{
      ct.innerHTML=c.t
        .replace(/(def|if|for|in|return|range|len|max|True|False)/g,'<span class="kw">$1</span>')
        .replace(/(canJump)/g,'<span class="fn">$1</span>')
        .replace(/(nums|max_reach|i)/g,'<span class="nm">$1</span>');
    }
    line.appendChild(ln);line.appendChild(ct);panel.appendChild(line);
  });
}

function highlight(ln){
  document.querySelectorAll('.cl').forEach(l=>l.classList.remove('active'));
  if(ln>=0){const el=document.getElementById(`line${ln}`);if(el)el.classList.add('active');}
}

function buildSteps(arr){
  const s=[];
  let maxReach=0;
  
  s.push({line:1,curr:-1,maxReach:0,msg:'Starting greedy check...',log:{type:'check',text:'Initialize max_reach = 0'}});
  
  for(let i=0;i<arr.length;i++){
    s.push({line:4,curr:i,maxReach:maxReach,msg:`Checking position ${i}`,log:{type:'check',text:`At index ${i}, max_reach = ${maxReach}`}});
    
    if(i>maxReach){
      s.push({line:5,curr:i,maxReach:maxReach,msg:`Cannot reach position ${i}! Max reach is ${maxReach}`,failed:true,log:{type:'fail',text:`Cannot reach index ${i}`}});
      return s;
    }
    
    const newReach=i+arr[i];
    s.push({line:7,curr:i,maxReach:maxReach,newReach:newReach,msg:`Can jump ${arr[i]} steps from position ${i}, reaching ${newReach}`,log:{type:'check',text:`From ${i}, can reach ${newReach}`}});
    
    maxReach=Math.max(maxReach,newReach);
    s.push({line:7,curr:i,maxReach:maxReach,msg:`Updated max_reach to ${maxReach}`,log:{type:'check',text:`max_reach = ${maxReach}`}});
    
    if(maxReach>=arr.length-1){
      s.push({line:10,curr:i,maxReach:maxReach,msg:`Can reach the end! Max reach ${maxReach} >= goal ${arr.length-1}`,success:true,log:{type:'success',text:`Success! Can reach the end`}});
      return s;
    }
  }
  
  s.push({line:12,curr:arr.length-1,maxReach:maxReach,msg:`Cannot reach the end`,failed:true,log:{type:'fail',text:`Failed to reach the end`}});
  return s;
}

function renderArray(st){
  const container=document.getElementById('arrayContainer');
  container.innerHTML='';
  
  nums.forEach((val,i)=>{
    const item=document.createElement('div');
    item.className='arr-item';
    if(i===st.curr)item.classList.add('curr');
    if(i===nums.length-1)item.classList.add('goal');
    if(i<=st.maxReach&&i!==st.curr)item.classList.add('reachable');
    if(i>st.maxReach)item.classList.add('unreachable');
    
    const idx=document.createElement('div');
    idx.className='arr-idx';
    idx.textContent=`i=${i}`;
    
    const box=document.createElement('div');
    box.className='arr-box';
    box.textContent=val;
    
    if(st.curr===i&&st.newReach){
      const arc=document.createElement('div');
      arc.className='jump-arc';
      arc.textContent=`→ ${st.newReach}`;
      box.appendChild(arc);
    }
    
    item.appendChild(idx);
    item.appendChild(box);
    container.appendChild(item);
  });
  
  const reachPct=Math.min(100,(st.maxReach+1)/(nums.length)*100);
  document.getElementById('reachFill').style.width=`${reachPct}%`;
}

function renderStats(st){
  document.getElementById('maxReach').textContent=st.maxReach;
  document.getElementById('goalIdx').textContent=nums.length-1;
}

function renderDecision(st){
  const d=document.getElementById('decision');
  d.className='decision';
  d.textContent=st.msg;
  if(st.curr>=0&&!st.success&&!st.failed)d.classList.add('check');
  if(st.success)d.classList.add('success');
  if(st.failed)d.classList.add('fail');
}

function addLog(idx,log){
  const el=document.getElementById('logScroll');
  const d=document.createElement('div');d.className=`le ${log.type}`;
  d.innerHTML=`<span class="ls">[${idx}]</span>${log.text}`;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}

function clearLog(){document.getElementById('logScroll').innerHTML='';}

function rebuildLog(){clearLog();for(let i=0;i<=cursor;i++)if(steps[i]?.log)addLog(i,steps[i].log);}

function renderStep(idx){
  const st=steps[idx];
  highlight(st.line);
  renderArray(st);
  renderStats(st);
  renderDecision(st);
  document.getElementById('stepInfo').textContent=`${idx} / ${steps.length-1}`;
  document.getElementById('btnPrev').disabled=idx===0;
  document.getElementById('btnNext').disabled=idx===steps.length-1;
}

function stepFwd(){
  if(cursor<steps.length-1){cursor++;if(steps[cursor]?.log)addLog(cursor,steps[cursor].log);renderStep(cursor);}
}

function stepBack(){if(cursor>0){cursor--;rebuildLog();renderStep(cursor);}}

function togglePlay(){
  playing=!playing;
  document.getElementById('btnPlay').textContent=playing?'⏸ Pause':'▶ Play';
  if(playing)runPlay();else clearTimeout(playTimer);
}

function runPlay(){
  if(!playing)return;
  if(cursor>=steps.length-1){playing=false;document.getElementById('btnPlay').textContent='▶ Play';return;}
  stepFwd();
  const spd=1600-parseInt(document.getElementById('speedSlider').value);
  playTimer=setTimeout(runPlay,spd);
}

function init(){
  clearTimeout(playTimer);playing=false;
  document.getElementById('btnPlay').textContent='▶ Play';
  clearLog();
  
  const rawArr=document.getElementById('arrInput').value.trim();
  nums=rawArr?rawArr.split(',').map(x=>parseInt(x.trim())).filter(x=>!isNaN(x)):[];
  if(!nums.length)nums=[2,3,1,1,4];
  
  steps=buildSteps(nums);
  
  cursor=0;
  highlight(-1);
  if(steps[0]?.log)addLog(0,steps[0].log);
  renderStep(0);
}

buildCode();
init();
</script>
</body>
</html>
