<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>56. Merge Intervals</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#07090f;--surface:#0d1117;--card:#111620;--border:#1a2235;
  --curr:#3b82f6;--merged:#10b981;--overlap:#f59e0b;--new:#a78bfa;
  --text:#e2e8f0;--muted:#475569;--dim:#1e293b;
}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;display:flex;flex-direction:column;}

header{display:flex;align-items:center;gap:14px;padding:8px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.h-num{font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:700;color:#3b82f6;}
.h-title{font-size:.82rem;font-weight:600;color:var(--muted);}
.h-badge{font-family:'JetBrains Mono',monospace;font-size:.62rem;padding:2px 8px;border-radius:3px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:#f59e0b;}
.h-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.inp{background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.8rem;padding:5px 10px;border-radius:5px;outline:none;transition:border-color .2s;width:220px;}
.inp:focus{border-color:#3b82f6;}
.btn{font-family:'Outfit',sans-serif;font-weight:700;font-size:.74rem;padding:5px 14px;border-radius:5px;border:none;cursor:pointer;transition:all .15s;}
.btn-p{background:#3b82f6;color:#fff;}.btn-p:hover{background:#2563eb;}

main{display:grid;grid-template-columns:330px 1fr 240px;flex:1;overflow:hidden;}

.code-panel{border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;}
.plabel{font-size:.6rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:6px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.code-scroll{overflow-y:auto;flex:1;padding:4px 0;}
.cl{display:flex;align-items:stretch;font-family:'JetBrains Mono',monospace;font-size:.72rem;line-height:1.8;position:relative;transition:background .15s;}
.cl.active{background:rgba(59,130,246,.1);}
.cl.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#3b82f6;border-radius:0 2px 2px 0;}
.ln{width:28px;text-align:right;padding-right:8px;color:var(--muted);font-size:.65rem;flex-shrink:0;user-select:none;line-height:1.8;}
.cl.active .ln{color:#3b82f6;}
.ct{padding-right:14px;white-space:pre;color:#abb2bf;}
.kw{color:#c678dd;}.fn{color:#61afef;}.cm{color:#3d4d60;font-style:italic;}.nm{color:#e5c07b;}

.viz-panel{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.timeline-section{padding:15px 20px;border-bottom:1px solid var(--border);}
.timeline-section .plabel{padding:0 0 10px;border:none;}

.timeline{position:relative;height:100px;background:var(--dim);border-radius:4px;margin-top:10px;}
.interval-bar{position:absolute;height:30px;border-radius:6px;top:35px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono';font-size:.7rem;font-weight:700;transition:all .4s;border:2px solid;}
.interval-bar.curr{background:rgba(59,130,246,.2);border-color:var(--curr);color:var(--curr);z-index:10;}
.interval-bar.overlap{background:rgba(245,158,11,.2);border-color:var(--overlap);color:var(--overlap);z-index:5;}
.interval-bar.merged{background:rgba(16,185,129,.2);border-color:var(--merged);color:var(--merged);z-index:3;}
.interval-bar.new{background:rgba(167,139,250,.2);border-color:var(--new);color:var(--new);z-index:3;}

.result-section{flex:1;overflow:auto;padding:15px 20px;}
.result-section .plabel{padding:0 0 10px;border:none;}
.result-list{display:flex;flex-direction:column;gap:6px;}
.result-item{padding:8px 12px;border-radius:6px;background:var(--card);border:2px solid var(--merged);font-family:'JetBrains Mono';font-size:.75rem;color:var(--merged);display:flex;align-items:center;gap:8px;}

.decision{margin:10px 18px;padding:10px 14px;border-radius:7px;border:1px solid var(--border);background:var(--card);font-family:'JetBrains Mono';font-size:.73rem;color:var(--muted);flex-shrink:0;}
.decision.check{border-color:rgba(59,130,246,.45);background:rgba(59,130,246,.07);color:var(--curr);}
.decision.merge{border-color:rgba(245,158,11,.45);background:rgba(245,158,11,.07);color:var(--overlap);}
.decision.done{border-color:rgba(16,185,129,.45);background:rgba(16,185,129,.07);color:var(--merged);}

.bot{margin-top:auto;display:flex;align-items:center;gap:8px;padding:8px 18px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--text);}.btn-g:hover{border-color:#3b82f6;color:#3b82f6;}
.btn:disabled{opacity:.3;cursor:not-allowed;}
.step-info{font-family:'JetBrains Mono';font-size:.72rem;color:var(--muted);}
.spd-wrap{display:flex;align-items:center;gap:5px;margin-left:auto;}
.spd-wrap label{font-size:.7rem;color:var(--muted);}
input[type=range]{accent-color:#3b82f6;width:80px;}

.log-panel{border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;}
.log-panel .plabel{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;}
.lc{font-size:.6rem;padding:2px 6px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);border-radius:3px;cursor:pointer;font-family:inherit;}
.lc:hover{color:var(--text);}
.log-scroll{flex:1;overflow-y:auto;padding:5px 7px;display:flex;flex-direction:column;gap:3px;}
.le{font-family:'JetBrains Mono';font-size:.65rem;padding:4px 7px;border-radius:4px;background:var(--card);border:1px solid var(--border);}
.le.check{border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.05);color:var(--curr);}
.le.merge{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.05);color:var(--overlap);}
.le.done{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.05);color:var(--merged);}
.ls{color:var(--muted);margin-right:6px;}
</style>
</head>
<body>
<header>
  <div class="h-num">56</div>
  <div class="h-title">Merge Intervals</div>
  <div class="h-badge">MEDIUM</div>
  <div class="h-right">
    <input id="intervalsInput" class="inp" placeholder="e.g., [1,3],[2,6],[8,10],[15,18]"/>
    <button class="btn btn-p" onclick="init()">Reset</button>
  </div>
</header>

<main>
  <div class="code-panel">
    <div class="plabel">Merge Algorithm</div>
    <div class="code-scroll" id="codePanel"></div>
  </div>

  <div class="viz-panel">
    <div class="timeline-section">
      <div class="plabel">Timeline Visualization</div>
      <div class="timeline" id="timeline"></div>
    </div>
    
    <div class="result-section">
      <div class="plabel">Merged Intervals</div>
      <div class="result-list" id="resultList"></div>
    </div>
    
    <div id="decision" class="decision">Merging overlapping intervals...</div>
    
    <div class="bot">
      <button class="btn btn-g" id="btnPrev" onclick="stepBack()">◀ Prev</button>
      <button class="btn btn-p" id="btnPlay" onclick="togglePlay()">▶ Play</button>
      <button class="btn btn-g" id="btnNext" onclick="stepFwd()">Next ▶</button>
      <span class="step-info" id="stepInfo">0 / 0</span>
      <div class="spd-wrap">
        <label>Speed:</label>
        <input type="range" id="speedSlider" min="200" max="1400" value="800"/>
      </div>
    </div>
  </div>

  <div class="log-panel">
    <div class="plabel">
      Merge Log
      <button class="lc" onclick="clearLog()">Clear</button>
    </div>
    <div class="log-scroll" id="logScroll"></div>
  </div>
</main>

<script>
const code=[
  {t:'def merge(intervals):',cm:true},
  {t:'    if not intervals:',ln:1},
  {t:'        return []',ln:2},
  {t:'    ',ln:3},
  {t:'    # Sort by start time',cm:true},
  {t:'    intervals.sort(key=lambda x: x[0])',ln:4},
  {t:'    merged = [intervals[0]]',ln:5},
  {t:'    ',ln:6},
  {t:'    for interval in intervals[1:]:',ln:7},
  {t:'        if interval[0] <= merged[-1][1]:',ln:8},
  {t:'            # Overlapping, merge them',cm:true},
  {t:'            merged[-1][1] = max(merged[-1][1], interval[1])',ln:9},
  {t:'        else:',ln:10},
  {t:'            # No overlap, add new interval',cm:true},
  {t:'            merged.append(interval)',ln:11},
  {t:'    ',ln:12},
  {t:'    return merged',ln:13}
];

let intervals,steps=[],cursor=0,playing=false,playTimer,minVal=0,maxVal=20;

function buildCode(){
  const panel=document.getElementById('codePanel');
  code.forEach((c,i)=>{
    const line=document.createElement('div');
    line.className='cl';
    line.id=`line${c.ln||i}`;
    const ln=document.createElement('div');ln.className='ln';
    ln.textContent=c.ln!==undefined?c.ln:'';
    const ct=document.createElement('div');ct.className='ct';
    if(c.cm){
      ct.innerHTML=`<span class="cm">${c.t}</span>`;
    }else{
      ct.innerHTML=c.t
        .replace(/(def|if|not|for|in|return|lambda|else|max)/g,'<span class="kw">$1</span>')
        .replace(/(merge|sort|append)/g,'<span class="fn">$1</span>')
        .replace(/(intervals|merged|interval|x|key)/g,'<span class="nm">$1</span>');
    }
    line.appendChild(ln);line.appendChild(ct);panel.appendChild(line);
  });
}

function highlight(ln){
  document.querySelectorAll('.cl').forEach(l=>l.classList.remove('active'));
  if(ln>=0){const el=document.getElementById(`line${ln}`);if(el)el.classList.add('active');}
}

function buildSteps(ints){
  const s=[];
  
  minVal=Math.min(...ints.map(i=>i[0]));
  maxVal=Math.max(...ints.map(i=>i[1]));
  
  s.push({line:-1,intervals:[...ints],merged:[],currIdx:-1,msg:'Sorting intervals by start time...',log:{type:'check',text:'Sorting intervals'}});
  
  const sorted=[...ints].sort((a,b)=>a[0]-b[0]);
  s.push({line:4,intervals:sorted,merged:[],currIdx:-1,msg:`Sorted: ${JSON.stringify(sorted)}`,log:{type:'check',text:'Intervals sorted'}});
  
  const merged=[[...sorted[0]]];
  s.push({line:5,intervals:sorted,merged:[[...merged[0]]],currIdx:0,msg:`Starting with first interval [${sorted[0]}]`,log:{type:'check',text:`Start: [${sorted[0]}]`}});
  
  for(let i=1;i<sorted.length;i++){
    const curr=sorted[i];
    const last=merged[merged.length-1];
    
    s.push({line:8,intervals:sorted,merged:JSON.parse(JSON.stringify(merged)),currIdx:i,msg:`Checking interval [${curr}] against last merged [${last}]`,log:{type:'check',text:`Check [${curr}] vs [${last}]`}});
    
    if(curr[0]<=last[1]){
      s.push({line:9,intervals:sorted,merged:JSON.parse(JSON.stringify(merged)),currIdx:i,overlapping:true,msg:`Overlapping! [${curr}] overlaps with [${last}]`,log:{type:'merge',text:`Overlap detected, merging`}});
      
      merged[merged.length-1][1]=Math.max(last[1],curr[1]);
      s.push({line:9,intervals:sorted,merged:JSON.parse(JSON.stringify(merged)),currIdx:i,msg:`Merged to [${merged[merged.length-1]}]`,log:{type:'merge',text:`Merged: [${merged[merged.length-1]}]`}});
    }else{
      s.push({line:11,intervals:sorted,merged:JSON.parse(JSON.stringify(merged)),currIdx:i,msg:`No overlap, adding [${curr}] as new interval`,log:{type:'check',text:`No overlap, add new`}});
      
      merged.push([...curr]);
      s.push({line:11,intervals:sorted,merged:JSON.parse(JSON.stringify(merged)),currIdx:i,msg:`Added [${curr}]`,log:{type:'check',text:`Added [${curr}]`}});
    }
  }
  
  s.push({line:13,intervals:sorted,merged:JSON.parse(JSON.stringify(merged)),currIdx:-1,msg:`Merging complete! Result: ${JSON.stringify(merged)}`,done:true,log:{type:'done',text:`Result: ${JSON.stringify(merged)}`}});
  
  return s;
}

function renderTimeline(st){
  const timeline=document.getElementById('timeline');
  timeline.innerHTML='';
  
  const range=maxVal-minVal;
  
  st.intervals.forEach((interval,i)=>{
    const bar=document.createElement('div');
    bar.className='interval-bar';
    const left=((interval[0]-minVal)/range)*100;
    const width=((interval[1]-interval[0])/range)*100;
    bar.style.left=`${left}%`;
    bar.style.width=`${width}%`;
    bar.textContent=`[${interval[0]},${interval[1]}]`;
    
    if(i===st.currIdx)bar.classList.add('curr');
    else if(st.overlapping&&i===st.currIdx)bar.classList.add('overlap');
    else bar.style.opacity='0.3';
    
    timeline.appendChild(bar);
  });
  
  st.merged.forEach(interval=>{
    const bar=document.createElement('div');
    bar.className='interval-bar merged';
    const left=((interval[0]-minVal)/range)*100;
    const width=((interval[1]-interval[0])/range)*100;
    bar.style.left=`${left}%`;
    bar.style.width=`${width}%`;
    bar.style.top='5px';
    bar.textContent=`[${interval[0]},${interval[1]}]`;
    timeline.appendChild(bar);
  });
}

function renderResults(st){
  const list=document.getElementById('resultList');
  list.innerHTML='';
  
  st.merged.forEach(interval=>{
    const item=document.createElement('div');
    item.className='result-item';
    item.textContent=`[${interval[0]}, ${interval[1]}]`;
    list.appendChild(item);
  });
}

function renderDecision(st){
  const d=document.getElementById('decision');
  d.className='decision';
  d.textContent=st.msg;
  if(st.currIdx>=0&&!st.done)d.classList.add('check');
  if(st.overlapping)d.classList.add('merge');
  if(st.done)d.classList.add('done');
}

function addLog(idx,log){
  const el=document.getElementById('logScroll');
  const d=document.createElement('div');d.className=`le ${log.type}`;
  d.innerHTML=`<span class="ls">[${idx}]</span>${log.text}`;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}

function clearLog(){document.getElementById('logScroll').innerHTML='';}

function rebuildLog(){clearLog();for(let i=0;i<=cursor;i++)if(steps[i]?.log)addLog(i,steps[i].log);}

function renderStep(idx){
  const st=steps[idx];
  highlight(st.line);
  renderTimeline(st);
  renderResults(st);
  renderDecision(st);
  document.getElementById('stepInfo').textContent=`${idx} / ${steps.length-1}`;
  document.getElementById('btnPrev').disabled=idx===0;
  document.getElementById('btnNext').disabled=idx===steps.length-1;
}

function stepFwd(){
  if(cursor<steps.length-1){cursor++;if(steps[cursor]?.log)addLog(cursor,steps[cursor].log);renderStep(cursor);}
}

function stepBack(){if(cursor>0){cursor--;rebuildLog();renderStep(cursor);}}

function togglePlay(){
  playing=!playing;
  document.getElementById('btnPlay').textContent=playing?'⏸ Pause':'▶ Play';
  if(playing)runPlay();else clearTimeout(playTimer);
}

function runPlay(){
  if(!playing)return;
  if(cursor>=steps.length-1){playing=false;document.getElementById('btnPlay').textContent='▶ Play';return;}
  stepFwd();
  const spd=1600-parseInt(document.getElementById('speedSlider').value);
  playTimer=setTimeout(runPlay,spd);
}

function init(){
  clearTimeout(playTimer);playing=false;
  document.getElementById('btnPlay').textContent='▶ Play';
  clearLog();
  
  const rawInput=document.getElementById('intervalsInput').value.trim();
  if(rawInput){
    try{
      intervals=JSON.parse(`[${rawInput}]`);
    }catch(e){
      intervals=[[1,3],[2,6],[8,10],[15,18]];
    }
  }else{
    intervals=[[1,3],[2,6],[8,10],[15,18]];
  }
  
  steps=buildSteps(intervals);
  
  cursor=0;
  highlight(-1);
  if(steps[0]?.log)addLog(0,steps[0].log);
  renderStep(0);
}

buildCode();
init();
</script>
</body>
</html>
