<script>
// ══════════════════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════════════════

const CODE_LINES = [
  'from typing import List',
  'from collections import deque',
  '',
  'class Solution:',
  '    def pacificAtlantic(self, heights: List[List[int]]) -> List[List[int]]:',
  '        if not heights or not heights[0]:',
  '            return []',
  '',
  '        m, n = len(heights), len(heights[0])',
  '        DIRS = [(0, 1), (0, -1), (1, 0), (-1, 0)]',
  '',
  '        def bfs(seeds: list[tuple[int, int]]) -> set[tuple[int, int]]:',
  '            visited: set[tuple[int, int]] = set(seeds)',
  '            queue: deque[tuple[int, int]] = deque(seeds)',
  '',
  '            while queue:',
  '                r, c = queue.popleft()',
  '                for dr, dc in DIRS:',
  '                    nr, nc = r + dr, c + dc',
  '                    if (',
  '                        0 <= nr < m',
  '                        and 0 <= nc < n',
  '                        and (nr, nc) not in visited',
  '                        and heights[nr][nc] >= heights[r][c]',
  '                    ):',
  '                        visited.add((nr, nc))',
  '                        queue.append((nr, nc))',
  '',
  '            return visited',
  '',
  '        pacific_seeds  = [(r, 0) for r in range(m)] + \\',
  '                         [(0, c) for c in range(1, n)]',
  '',
  '        atlantic_seeds = [(r, n - 1) for r in range(m)] + \\',
  '                         [(m - 1, c) for c in range(n - 1)]',
  '',
  '        pacific_reach  = bfs(pacific_seeds)',
  '        atlantic_reach = bfs(atlantic_seeds)',
  '',
  '        return [',
  '            [r, c]',
  '            for r, c in pacific_reach & atlantic_reach',
  '        ]',
];

const DEFAULT_INPUT = '[[1,2,2,3,5],[3,2,3,4,4],[2,4,5,3,1],[6,7,1,4,5],[5,1,1,2,4]]';

const INTUITION_STAGES = [
  {
    title: 'Understanding the Problem',
    thought: "So we have a grid of heights, and water flows downhill to its 4 neighbours. Water from the top/left reaches the Pacific. Water from the bottom/right reaches the Atlantic. I need all cells that can drain to both.",
    content: `<b>The grid:</b> An <b>m×n</b> matrix where each cell has a height.<br><br>
<b>Rules:</b> Water moves to adjacent cells with <b>equal or lower</b> height. Pacific borders the top row and left column. Atlantic borders the bottom row and right column.<br><br>
<b>Goal:</b> Find every cell from which water can eventually reach <em>both</em> oceans.`,
    insight: "<b>Key constraint:</b> \"equal or lower\" means a plateau can drain — both heights must be reachable, not just the strictly downhill path.",
    viz: 'problem'
  },
  {
    title: 'Why Naive DFS Is Too Slow',
    thought: "I could do a DFS from every cell, check if it reaches both oceans... but that's O(m·n) cells each doing O(m·n) work. That's O(m²·n²). With a 200×200 grid that's 1.6 billion operations. Not going to work.",
    content: `<b>Brute Force:</b> For each cell, DFS and check reachability to both oceans.<br>

function highlightPython(raw) {
  // Escape HTML first
  const el = document.createElement('span');
  el.textContent = raw;
  let line = el.innerHTML;

  if (line.trim().startsWith('#')) {
    return `<span class="sc">${line}</span>`;
  }

  // Decorators
  line = line.replace(/(@\w+)/g, '<span class="sd">$1</span>');

  // Docstring / triple-quote strings — handle before other strings
  // (single line only since we process line by line)
  line = line.replace(/(&#34;&#34;&#34;.*?&#34;&#34;&#34;|&#39;&#39;&#39;.*?&#39;&#39;&#39;)/g, '<span class="ss">$1</span>');

  // Regular strings
  line = line.replace(/(&#34;(?:[^&#]|&#(?!34;))*?&#34;|&#39;(?:[^&#]|&#(?!39;))*?&#39;)/g, '<span class="ss">$1</span>');

  // Type annotations (after colon or arrow) — common types
  line = line.replace(/\b(List|Dict|Set|Tuple|Optional|Union|Any|int|str|bool|float|None|deque|tuple)\b(?=[^<])/g, (m, p1) => `<span class="st">${p1}</span>`);

  // Keywords
  const keywords = ['def', 'class', 'return', 'if', 'elif', 'else', 'while', 'for', 'in',
                    'not', 'and', 'or', 'import', 'from', 'True', 'False', 'lambda',
                    'yield', 'with', 'as', 'pass', 'break', 'continue', 'raise', 'try', 'except', 'finally'];
  for (const kw of keywords) {
    const re = new RegExp(`(?<![\\w#"])\\b(${kw})\\b(?![\\w"])`, 'g');
    line = line.replace(re, '<span class="sk">$1</span>');
  }

  // Function names (def name)
  line = line.replace(/(<span class="sk">def<\/span>\s+)(\w+)/g, '$1<span class="sf">$2</span>');

  // Built-in functions
  const builtins = ['len', 'range', 'set', 'list', 'deque', 'print', 'enumerate', 'zip', 'map', 'filter', 'sorted', 'min', 'max', 'sum', 'abs'];
  for (const b of builtins) {
    const re = new RegExp(`(?<![\\w.])\\b(${b})\\b(?=\\()`, 'g');
    line = line.replace(re, '<span class="sb">$1</span>');
  }

  // Numbers
  line = line.replace(/(?<![&#\w])\b(\d+)\b(?!;)/g, '<span class="sn">$1</span>');

  return line;
}

// SIMULATION ENGINE
// ══════════════════════════════════════════════════════════════════

function parseGrid(str) {
  try {
    const arr = JSON.parse(str.trim());
    if (!Array.isArray(arr) || !arr.length || !Array.isArray(arr[0])) return null;
    return arr;
  } catch { return null; }
}

function simulateBFS(heights) {
  const steps = [];
  const m = heights.length;
  const n = heights[0].length;
  const DIRS = [[0,1],[0,-1],[1,0],[-1,0]];

  const pacificVisited = new Set();
  const atlanticVisited = new Set();

  const key = (r, c) => `${r},${c}`;

  function doStep(line, desc, vars, phase, pV, aV, currentCell, queueCells) {
    steps.push({
      line,
      description: desc,
      vars,
      phase, // 'init','pacific','atlantic','result'
      pacificVisited: new Set(pV),
      atlanticVisited: new Set(aV),
      currentCell,
      queueCells: [...queueCells]
    });
  }

  // ── init ─────────────────────────────────────────────────────
  doStep(5, 'Check if input is empty.', { m, n, 'heights.length': m }, 'init', new Set(), new Set(), null, []);
  doStep(8, `Grid dimensions resolved.`, { m, n }, 'init', new Set(), new Set(), null, []);
  doStep(9, 'Define 4-directional movement offsets.', { m, n, DIRS: '[(0,1),(0,-1),(1,0),(-1,0)]' }, 'init', new Set(), new Set(), null, []);

  // ── pacific seeds ─────────────────────────────────────────────
  const pacSeeds = [];
  for (let r = 0; r < m; r++) pacSeeds.push([r, 0]);
  for (let c = 1; c < n; c++) pacSeeds.push([0, c]);
  for (const [r, c] of pacSeeds) pacificVisited.add(key(r, c));

  doStep(30, `Build Pacific seeds: left column + top row (${pacSeeds.length} cells).`,
    { pacific_seeds_count: pacSeeds.length, seeds: pacSeeds.map(([r,c]) => `(${r},${c})`).join(', ') },
    'pacific', new Set(pacificVisited), new Set(), null, pacSeeds.map(([r,c]) => key(r,c)));

  // pacific BFS
  const pacQueue = [...pacSeeds];
  let qi = 0;
  doStep(12, 'Initialize Pacific BFS — mark all seed cells as visited, enqueue them.',
    { queue_size: pacQueue.length, visited_size: pacificVisited.size },
    'pacific', new Set(pacificVisited), new Set(), null, pacQueue.map(([r,c]) => key(r,c)));

  while (qi < pacQueue.length) {
    const [r, c] = pacQueue[qi++];
    doStep(16, `Dequeue (${r},${c}) — height=${heights[r][c]}. Checking 4 neighbours.`,
      { r, c, 'heights[r][c]': heights[r][c], queue_remaining: pacQueue.length - qi, visited: pacificVisited.size },
      'pacific', new Set(pacificVisited), new Set(), key(r, c), pacQueue.slice(qi).map(([a,b]) => key(a,b)));

    for (const [dr, dc] of DIRS) {
      const nr = r + dr, nc = c + dc;
      if (nr < 0 || nr >= m || nc < 0 || nc >= n) continue;
      if (pacificVisited.has(key(nr, nc))) continue;
      if (heights[nr][nc] >= heights[r][c]) {
        pacificVisited.add(key(nr, nc));
        pacQueue.push([nr, nc]);
        doStep(23, `(${nr},${nc}) height=${heights[nr][nc]} ≥ ${heights[r][c]} — reachable from Pacific. Added.`,
          { nr, nc, 'heights[nr][nc]': heights[nr][nc], 'heights[r][c]': heights[r][c], uphill_ok: true, pacific_visited: pacificVisited.size },
          'pacific', new Set(pacificVisited), new Set(), key(r, c), pacQueue.slice(qi).map(([a,b]) => key(a,b)));
      }
    }
  }

  doStep(28, `Pacific BFS complete. ${pacificVisited.size} cells can reach the Pacific.`,
    { pacific_reachable: pacificVisited.size },
    'pacific', new Set(pacificVisited), new Set(), null, []);

  // ── atlantic seeds ────────────────────────────────────────────
  const atlSeeds = [];
  for (let r = 0; r < m; r++) atlSeeds.push([r, n-1]);
  for (let c = 0; c < n-1; c++) atlSeeds.push([m-1, c]);
  for (const [r, c] of atlSeeds) atlanticVisited.add(key(r, c));

  doStep(33, `Build Atlantic seeds: right column + bottom row (${atlSeeds.length} cells).`,
    { atlantic_seeds_count: atlSeeds.length, seeds: atlSeeds.map(([r,c]) => `(${r},${c})`).join(', ') },
    'atlantic', new Set(pacificVisited), new Set(atlanticVisited), null, atlSeeds.map(([r,c]) => key(r,c)));

  const atlQueue = [...atlSeeds];
  let ai = 0;
  doStep(12, 'Initialize Atlantic BFS — mark all seed cells as visited, enqueue them.',
    { queue_size: atlQueue.length, visited_size: atlanticVisited.size },
    'atlantic', new Set(pacificVisited), new Set(atlanticVisited), null, atlQueue.map(([r,c]) => key(r,c)));

  while (ai < atlQueue.length) {
    const [r, c] = atlQueue[ai++];
    doStep(16, `Dequeue (${r},${c}) — height=${heights[r][c]}. Checking 4 neighbours.`,
      { r, c, 'heights[r][c]': heights[r][c], queue_remaining: atlQueue.length - ai, visited: atlanticVisited.size },
      'atlantic', new Set(pacificVisited), new Set(atlanticVisited), key(r, c), atlQueue.slice(ai).map(([a,b]) => key(a,b)));

    for (const [dr, dc] of DIRS) {
      const nr = r + dr, nc = c + dc;
      if (nr < 0 || nr >= m || nc < 0 || nc >= n) continue;
      if (atlanticVisited.has(key(nr, nc))) continue;
      if (heights[nr][nc] >= heights[r][c]) {
        atlanticVisited.add(key(nr, nc));
        atlQueue.push([nr, nc]);
        doStep(23, `(${nr},${nc}) height=${heights[nr][nc]} ≥ ${heights[r][c]} — reachable from Atlantic. Added.`,
          { nr, nc, 'heights[nr][nc]': heights[nr][nc], 'heights[r][c]': heights[r][c], uphill_ok: true, atlantic_visited: atlanticVisited.size },
          'atlantic', new Set(pacificVisited), new Set(atlanticVisited), key(r, c), atlQueue.slice(ai).map(([a,b]) => key(a,b)));
      }
    }
  }

  doStep(28, `Atlantic BFS complete. ${atlanticVisited.size} cells can reach the Atlantic.`,
    { atlantic_reachable: atlanticVisited.size },
    'atlantic', new Set(pacificVisited), new Set(atlanticVisited), null, []);

  // result
  const bothSet = new Set([...pacificVisited].filter(k => atlanticVisited.has(k)));
  const result = [...bothSet].map(k => k.split(',').map(Number));

  doStep(39, `Intersection of both sets → ${bothSet.size} cells drain to BOTH oceans.`,
    { result_count: bothSet.size, result: '[' + result.map(([r,c]) => `[${r},${c}]`).join(', ') + ']' },
    'result', new Set(pacificVisited), new Set(atlanticVisited), null, []);

  return steps;
}

          <div class="grid-section-label">Grid</div>
          ${this.buildGrid(m, n, step)}
        </div>
      </div>
    `;
  }

  buildGrid(m, n, step) {
    const key = (r, c) => `${r},${c}`;
    const queueSet = new Set(step.queueCells || []);
    const both = new Set([...step.pacificVisited].filter(k => step.atlanticVisited.has(k)));

    let rows = '';
    for (let r = 0; r < m; r++) {
      let cols = '';
      for (let c = 0; c < n; c++) {
        const k = key(r, c);
        const isCurrent = step.currentCell === k;
        const isQueue = queueSet.has(k);
        const inPac = step.pacificVisited.has(k);
        const inAtl = step.atlanticVisited.has(k);
        let cls = 'cell-default';
        if (inPac && inAtl) cls = 'cell-both';
        else if (inPac) cls = 'cell-pacific';
        else if (inAtl) cls = 'cell-atlantic';
        let extra = '';
        if (isCurrent) extra += ' cell-current';
        if (isQueue && !isCurrent) extra += ' cell-queue';
        cols += `<td class="grid-cell ${cls}${extra}" title="(${r},${c})">${this.heights[r][c]}</td>`;
      }
      rows += `<tr>${cols}</tr>`;
    }
    return `<table class="grid-table"><tbody>${rows}</tbody></table>`;
  }

  buildControls() {
    const total = this.steps.length;
    const pct = total > 1 ? (this.currentStep / (total - 1)) * 100 : 0;
    return `

      <button class="ctrl-btn" onclick="app.goStep(total-1)" title="End">⏭</button>
      <select class="speed-select" onchange="app.setSpeed(this.value)">
        <option value="0.5" ${this.speed==0.5?'selected':''}>0.5×</option>
        <option value="1" ${this.speed==1?'selected':''}>1×</option>
        <option value="2" ${this.speed==2?'selected':''}>2×</option>
        <option value="4" ${this.speed==4?'selected':''}>4×</option>
      </select>
      <div class="progress-bar-wrap" style="cursor:pointer" onclick="app.seekBar(event,this)">
        <div class="progress-bar-fill" style="width:${pct}%"></div>
      </div>
      <span class="step-counter">${this.currentStep+1}/${total}</span>
    `;
  }

  buildStepLog() {
    const step = this.steps[this.currentStep];
    if (!step) return '';
    const vars = Object.entries(step.vars || {}).map(([k, v]) =>
      `<div class="var-row"><span class="var-name">${k}</span><span class="var-val">${typeof v === 'object' ? JSON.stringify(v) : String(v)}</span></div>`

    return `
      <div class="step-desc">${step.description}</div>
      <div class="vars-section">
        <div class="vars-title">Variables</div>
        ${vars}
      </div>
      <div>
        <div class="history-title">History</div>
        <div class="history-list">${history}</div>
      </div>
    `;
  }

  scrollToActiveHistory() {
    requestAnimationFrame(() => {
      const el = document.getElementById(`hi-${this.currentStep}`);
      el?.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    });

  // ── INTUITION ──────────────────────────────────────────────────
  buildIntuitionPanels() {

            <button class="ctrl-btn" onclick="app.iStep(-1)" ${this.intuitionStage===0?'disabled':''}>◀</button>
            <button class="ctrl-btn play" onclick="app.iToggle()">${this.intuitionPlaying?'⏸':'▶'}</button>
            <button class="ctrl-btn" onclick="app.iStep(1)" ${this.intuitionStage>=INTUITION_STAGES.length-1?'disabled':''}>▶</button>
            <div class="progress-bar-wrap">
              <div class="progress-bar-fill" style="width:${(this.intuitionStage/(INTUITION_STAGES.length-1))*100}%"></div>
            </div>
            <span class="step-counter">${this.intuitionStage+1}/${INTUITION_STAGES.length}</span>
          </div>
        </div>
        <div class="panel intuition-viz" style="flex:1;border-left:1px solid var(--border)">
          <div class="panel-header">Visual Explanation</div>
          <div class="panel-body intuition-viz-body">${this.buildIntuitionViz()}</div>
        </div>
      </div>
    `;
  }

  buildStages() {
    return INTUITION_STAGES.map((s, i) => {
      let cls = 'future';
      if (i === this.intuitionStage) cls = 'active';
      else if (i < this.intuitionStage) cls = 'past';
      return `
        <div class="stage-card ${cls}" onclick="app.iGoTo(${i})">
          <div class="stage-header">
            <div class="stage-num">${i+1}</div>
            <div class="stage-title">${s.title}</div>
          </div>
          ${cls === 'active' ? `
          <div class="stage-body">
            <div class="thought-bubble">${s.thought}</div>
            <div class="stage-content">${s.content}</div>
            <div class="key-insight">${s.insight}</div>
          </div>` : ''}
        </div>
      `;
    }).join('');
  }

  buildIntuitionViz() {
    const viz = INTUITION_STAGES[this.intuitionStage]?.viz;
    const h = this.heights;
    if (!h) return '<div style="padding:16px;color:var(--text2)">No grid.</div>';
    const m = h.length, n = h[0].length;
    const key = (r, c) => `${r},${c}`;

    if (viz === 'problem') return this.ivProblem(h, m, n);
    if (viz === 'compare') return this.ivCompare();
    if (viz === 'reverse') return this.ivReverse(h, m, n);
    if (viz === 'seeds') return this.ivSeeds(h, m, n, key);
    if (viz === 'bfs') return this.ivBfs(h, m, n, key);
    if (viz === 'result') return this.ivResult(h, m, n, key);
    if (viz === 'complexity') return this.ivComplexity(m, n);
    return '';
  }

  ivProblem(h, m, n) {
    let rows = '';
    for (let r = 0; r < m; r++) {
      let cols = '';
      for (let c = 0; c < n; c++) {
        const isPacBorder = r === 0 || c === 0;
        const isAtlBorder = r === m-1 || c === n-1;
        let cls = 'cell-default';
        if (isPacBorder && isAtlBorder) cls = 'cell-both';
        else if (isPacBorder) cls = 'cell-seed-pacific';
        else if (isAtlBorder) cls = 'cell-seed-atlantic';
        cols += `<td class="grid-cell ${cls}">${h[r][c]}</td>`;
      }
      rows += `<tr>${cols}</tr>`;
    }
    return `
      <div style="display:flex;flex-direction:column;gap:12px;align-items:center;padding:8px">
        <div class="legend">
          <div class="legend-item"><div class="legend-swatch" style="background:rgba(29,111,165,0.6)"></div> Pacific border</div>
          <div class="legend-item"><div class="legend-swatch" style="background:rgba(176,94,42,0.6)"></div> Atlantic border</div>
        </div>
        <table class="grid-table"><tbody>${rows}</tbody></table>
        <div style="font-size:11px;color:var(--text2);text-align:center;max-width:260px;line-height:1.6">
          Water flows to cells with equal or lower height (4-directional).<br>
          Find cells that can drain to <b style="color:#7cc4f5">Pacific</b> AND <b style="color:#f0a87a">Atlantic</b>.
        </div>
      </div>`;
  }

  ivCompare() {
    return `
      <div style="padding:8px;display:flex;flex-direction:column;gap:12px">
        <div class="approach-card bad">
          <h4>❌ Brute Force DFS Per Cell</h4>
          <p>
            For each of the <b>m×n</b> cells, run a DFS to check if it can reach both oceans.<br>
            Each DFS can visit up to <b>m×n</b> cells.<br>
            <b>Total: O(m² × n²)</b><br>
            On a 200×200 grid: <b>1.6 billion</b> operations. Way too slow.
          </p>
        </div>
        <div class="approach-card good">
          <h4>✅ Reverse Multi-Source BFS</h4>
          <p>
            Seed from each ocean border, expand uphill.<br>
            Each cell is visited <b>at most once per BFS</b>.<br>
            Two BFS passes → <b>O(m × n)</b> total.<br>
            The answer is simply <b>pacific_reach ∩ atlantic_reach</b>.
          </p>
        </div>
        <div style="background:var(--bg2);padding:12px;border-radius:6px;font-size:11px;color:var(--text1);line-height:1.7">
          <b style="color:var(--text0)">Why they're equivalent:</b> A cell X can drain to the Pacific forward iff the Pacific can reach X going uphill backward. Reversing the direction doesn't change which cells are connected — just the traversal direction.
        </div>
      </div>`;
  }

  ivReverse(h, m, n) {
    const key = (r, c) => `${r},${c}`;
    const DIRS = [[0,1],[0,-1],[1,0],[-1,0]];
    // Show a small forward vs reverse arrow diagram using SVG
    return `
      <div style="padding:8px;display:flex;flex-direction:column;gap:14px;align-items:center">
        <svg viewBox="0 0 340 160" width="320" style="font-family:var(--font-mono)">
          <!-- Forward -->
          <text x="10" y="18" font-size="11" fill="var(--text2)" font-family="var(--font-ui)" font-weight="700">FORWARD (downhill)</text>
          <rect x="10" y="28" width="50" height="34" rx="4" fill="rgba(29,111,165,0.3)" stroke="#1d6fa5" stroke-width="1.5"/>
          <text x="35" y="50" text-anchor="middle" font-size="13" fill="#7cc4f5">5</text>
          <rect x="78" y="28" width="50" height="34" rx="4" fill="var(--bg2)" stroke="var(--border)" stroke-width="1.5"/>
          <text x="103" y="50" text-anchor="middle" font-size="13" fill="var(--text0)">4</text>
          <rect x="146" y="28" width="50" height="34" rx="4" fill="var(--bg2)" stroke="var(--border)" stroke-width="1.5"/>
          <text x="171" y="50" text-anchor="middle" font-size="13" fill="var(--text0)">3</text>
          <rect x="214" y="28" width="50" height="34" rx="4" fill="rgba(176,94,42,0.3)" stroke="#b05e2a" stroke-width="1.5"/>
          <text x="239" y="50" text-anchor="middle" font-size="13" fill="#f0a87a">1</text>
          <!-- arrows forward -->
          <line x1="60" y1="45" x2="75" y2="45" stroke="var(--text1)" stroke-width="1.5" marker-end="url(#arr)"/>
          <line x1="128" y1="45" x2="143" y2="45" stroke="var(--text1)" stroke-width="1.5" marker-end="url(#arr)"/>
          <line x1="196" y1="45" x2="211" y2="45" stroke="var(--text1)" stroke-width="1.5" marker-end="url(#arr)"/>
          <text x="10" y="80" font-size="10" fill="var(--text2)">Pacific→</text>
          <text x="225" y="80" font-size="10" fill="var(--text2)">→Atlantic</text>

          <!-- Reverse -->
          <text x="10" y="110" font-size="11" fill="var(--text2)" font-family="var(--font-ui)" font-weight="700">REVERSED (uphill)</text>
          <rect x="10" y="120" width="50" height="34" rx="4" fill="rgba(29,111,165,0.3)" stroke="#1d6fa5" stroke-width="1.5"/>
          <text x="35" y="142" text-anchor="middle" font-size="13" fill="#7cc4f5">5</text>
          <rect x="78" y="120" width="50" height="34" rx="4" fill="var(--bg2)" stroke="var(--border)" stroke-width="1.5"/>
          <text x="103" y="142" text-anchor="middle" font-size="13" fill="var(--text0)">4</text>
          <rect x="146" y="120" width="50" height="34" rx="4" fill="var(--bg2)" stroke="var(--border)" stroke-width="1.5"/>
          <text x="171" y="142" text-anchor="middle" font-size="13" fill="var(--text0)">3</text>
          <rect x="214" y="120" width="50" height="34" rx="4" fill="rgba(176,94,42,0.3)" stroke="#b05e2a" stroke-width="1.5"/>
          <text x="239" y="142" text-anchor="middle" font-size="13" fill="#f0a87a">1</text>
          <!-- arrows reversed -->
          <line x1="75" y1="137" x2="63" y2="137" stroke="var(--accent)" stroke-width="1.5" marker-end="url(#arr2)"/>
          <line x1="143" y1="137" x2="131" y2="137" stroke="var(--accent)" stroke-width="1.5" marker-end="url(#arr2)"/>
          <line x1="211" y1="137" x2="199" y2="137" stroke="var(--accent)" stroke-width="1.5" marker-end="url(#arr2)"/>
          <text x="10" y="158" font-size="10" fill="var(--text2)">← Pacific</text>
          <text x="225" y="158" font-size="10" fill="var(--text2)">Atlantic→</text>

          <defs>
            <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
              <polygon points="0 0,8 3,0 6" fill="var(--text1)"/>
            </marker>
            <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
              <polygon points="0 0,8 3,0 6" fill="var(--accent)"/>
            </marker>
          </defs>
        </svg>
        <div style="font-size:11px;color:var(--text2);text-align:center;max-width:280px;line-height:1.7">
          Uphill constraint: <code style="font-family:var(--font-mono);color:var(--text0)">heights[nr][nc] >= heights[r][c]</code><br>
          (Reversed form of the original downhill rule)
        </div>
      </div>`;
  }

  ivSeeds(h, m, n, key) {
    const pacSeeds = new Set();
    const atlSeeds = new Set();
    for (let r = 0; r < m; r++) pacSeeds.add(key(r, 0));
    for (let c = 1; c < n; c++) pacSeeds.add(key(0, c));
    for (let r = 0; r < m; r++) atlSeeds.add(key(r, n-1));
    for (let c = 0; c < n-1; c++) atlSeeds.add(key(m-1, c));

    let rows = '';
    for (let r = 0; r < m; r++) {
      let cols = '';
      for (let c = 0; c < n; c++) {
        const k = key(r, c);
        let cls = 'cell-default';
        if (pacSeeds.has(k) && atlSeeds.has(k)) cls = 'cell-both';
        else if (pacSeeds.has(k)) cls = 'cell-seed-pacific';
        else if (atlSeeds.has(k)) cls = 'cell-seed-atlantic';
        cols += `<td class="grid-cell ${cls}">${h[r][c]}</td>`;
      }
      rows += `<tr>${cols}</tr>`;
    }
    return `
      <div style="display:flex;flex-direction:column;gap:12px;align-items:center;padding:8px">
        <div class="legend">
          <div class="legend-item"><div class="legend-swatch" style="background:rgba(29,111,165,0.6)"></div> Pacific seeds (${pacSeeds.size})</div>
          <div class="legend-item"><div class="legend-swatch" style="background:rgba(176,94,42,0.6)"></div> Atlantic seeds (${atlSeeds.size})</div>
        </div>
        <table class="grid-table"><tbody>${rows}</tbody></table>
        <div style="font-size:11px;color:var(--text2);text-align:center;max-width:280px;line-height:1.6">
          All border cells are enqueued simultaneously at the start of their respective BFS.
        </div>
      </div>`;
  }

  ivBfs(h, m, n, key) {
    // Show a mid-pacific-BFS snapshot using the actual steps
    const pacStep = this.steps.find(s => s.phase === 'pacific' && s.pacificVisited.size > 4 && s.pacificVisited.size < 10);
    const step = pacStep || this.steps[Math.floor(this.steps.length * 0.3)];
    let rows = '';
    for (let r = 0; r < m; r++) {
      let cols = '';
      for (let c = 0; c < n; c++) {
        const k = key(r, c);
        const isCur = step.currentCell === k;
        const isQ = (step.queueCells||[]).includes(k);
        const inPac = step.pacificVisited.has(k);
        let cls = 'cell-default';
        if (inPac) cls = 'cell-pacific';
        let extra = '';
        if (isCur) extra = ' cell-current';
        else if (isQ) extra = ' cell-queue';
        cols += `<td class="grid-cell ${cls}${extra}">${h[r][c]}</td>`;
      }
      rows += `<tr>${cols}</tr>`;
    }
    return `
      <div style="display:flex;flex-direction:column;gap:12px;align-items:center;padding:8px">
        <div style="font-size:11px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.08em">Pacific BFS — mid-execution snapshot</div>
        <div class="legend">
          <div class="legend-item"><div class="legend-swatch" style="background:rgba(29,111,165,0.35);border:1px solid #1d6fa5"></div> Pacific reachable</div>
          <div class="legend-item"><div class="legend-swatch" style="outline:3px solid var(--yellow);background:var(--bg2)"></div> Current cell</div>
          <div class="legend-item"><div class="legend-swatch" style="outline:2px dashed var(--green);background:var(--bg2)"></div> In queue</div>
        </div>
        <table class="grid-table"><tbody>${rows}</tbody></table>
        <div style="font-size:11px;color:var(--text2);text-align:center;max-width:280px;line-height:1.6">
          Each cell is processed at most once — when dequeued, it tries to expand uphill to 4 neighbours.
        </div>
      </div>`;
  }

  ivResult(h, m, n, key) {
    const DIRS = [[0,1],[0,-1],[1,0],[-1,0]];
    const pacV = new Set(), atlV = new Set();
    for (let r = 0; r < m; r++) pacV.add(key(r, 0));
    for (let c = 1; c < n; c++) pacV.add(key(0, c));
    for (let r = 0; r < m; r++) atlV.add(key(r, n-1));
    for (let c = 0; c < n-1; c++) atlV.add(key(m-1, c));

    const bfsFull = (seeds, visited) => {
      const q = [...seeds.values()].map(k => k.split(',').map(Number));
      let qi = 0;
      while (qi < q.length) {
        const [r, c] = q[qi++];
        for (const [dr, dc] of DIRS) {
          const nr = r+dr, nc = c+dc;
          const nk = key(nr, nc);
          if (nr<0||nr>=m||nc<0||nc>=n||visited.has(nk)) continue;
          if (h[nr][nc] >= h[r][c]) { visited.add(nk); q.push([nr, nc]); }
        }
      }
    };
    bfsFull(pacV, pacV);
    bfsFull(atlV, atlV);

    const both = new Set([...pacV].filter(k => atlV.has(k)));
    let rows = '';
    for (let r = 0; r < m; r++) {
      let cols = '';
      for (let c = 0; c < n; c++) {
        const k = key(r, c);
        let cls = 'cell-default';
        if (both.has(k)) cls = 'cell-both';
        else if (pacV.has(k) && atlV.has(k)) cls = 'cell-both';
        else if (pacV.has(k)) cls = 'cell-pacific';
        else if (atlV.has(k)) cls = 'cell-atlantic';
        cols += `<td class="grid-cell ${cls}">${h[r][c]}</td>`;
      }
      rows += `<tr>${cols}</tr>`;
    }
    return `
      <div style="display:flex;flex-direction:column;gap:12px;align-items:center;padding:8px">
        <div class="legend">
          <div class="legend-item"><div class="legend-swatch" style="background:rgba(29,111,165,0.35);border:1px solid #1d6fa5"></div> Pacific only</div>
          <div class="legend-item"><div class="legend-swatch" style="background:rgba(176,94,42,0.35);border:1px solid #b05e2a"></div> Atlantic only</div>
          <div class="legend-item"><div class="legend-swatch" style="background:rgba(124,58,237,0.45);border:1px solid #7c3aed"></div> Both (answer)</div>
        </div>
        <table class="grid-table"><tbody>${rows}</tbody></table>
        <div style="font-size:11px;color:var(--accent);font-weight:700">Answer: ${both.size} cells</div>
        <div style="font-size:11px;color:var(--text2);text-align:center;max-width:280px;line-height:1.6">
          Purple cells drain to <b>both</b> oceans — they sit on the "watershed" between the two.
        </div>
      </div>`;
  }

  ivComplexity(m, n) {
    return `
      <div style="padding:8px;display:flex;flex-direction:column;gap:14px">
        <table class="complexity-table">
          <thead><tr><th>Operation</th><th>Bound</th><th>Why</th></tr></thead>
          <tbody>
            <tr><td>Pacific BFS</td><td>O(m×n)</td><td>Each cell enqueued ≤ once</td></tr>
            <tr><td>Atlantic BFS</td><td>O(m×n)</td><td>Each cell enqueued ≤ once</td></tr>
            <tr><td>Intersection</td><td>O(m×n)</td><td>Set intersection</td></tr>
            <tr><td><b>Total Time</b></td><td><b>O(m×n)</b></td><td>Two BFS passes</td></tr>
            <tr><td><b>Total Space</b></td><td><b>O(m×n)</b></td><td>Two visited sets + queue</td></tr>
          </tbody>
        </table>
        <div class="edge-case">
          <div class="ec-label">Edge Case: Empty grid</div>
          <div class="ec-desc">Line 5–6: <code style="font-family:var(--font-mono)">if not heights or not heights[0]: return []</code></div>
        </div>
        <div class="edge-case">
          <div class="ec-label">Edge Case: Single cell</div>
          <div class="ec-desc">A 1×1 grid borders all four ocean edges — it's in both seed sets and will appear in the answer.</div>
        </div>
        <div class="edge-case">
          <div class="ec-label">Edge Case: Flat grid (all same height)</div>
          <div class="ec-desc">Uphill constraint (≥) allows equal-height traversal, so BFS expands everywhere — all cells are the answer.</div>
        </div>
      </div>`;
  }

  // ── CONTROLS ───────────────────────────────────────────────────
  goStep(i) {
    this.currentStep = Math.max(0, Math.min(i, this.steps.length - 1));
    this.render();
  }
  stepFwd() { if (this.currentStep < this.steps.length - 1) { this.currentStep++; this.render(); } }
  stepBack() { if (this.currentStep > 0) { this.currentStep--; this.render(); } }
  togglePlay() {
    this.isPlaying = !this.isPlaying;
    if (this.isPlaying) {
      this.playTimer = setInterval(() => {
        if (this.currentStep >= this.steps.length - 1) {
          this.isPlaying = false;
          clearInterval(this.playTimer);
          this.render();
          return;
        }
        this.currentStep++;
        this.render();
      }, 1000 / this.speed);
    } else {
      clearInterval(this.playTimer);
    }
    this.render();
  }
  setSpeed(v) { this.speed = parseFloat(v); if (this.isPlaying) { clearInterval(this.playTimer); this.isPlaying = false; this.togglePlay(); } }
  seekBar(e, el) {
    const rect = el.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    this.goStep(Math.round(pct * (this.steps.length - 1)));
  }

  iGoTo(i) { this.intuitionStage = i; this.render(); }
  iStep(d) {
    this.intuitionStage = Math.max(0, Math.min(this.intuitionStage + d, INTUITION_STAGES.length - 1));
    this.render();
  }
  iToggle() {
    this.intuitionPlaying = !this.intuitionPlaying;
    if (this.intuitionPlaying) {
      this.intuitionTimer = setInterval(() => {
        if (this.intuitionStage >= INTUITION_STAGES.length - 1) {
          this.intuitionPlaying = false;
          clearInterval(this.intuitionTimer);
          this.render();
          return;
        }
        this.intuitionStage++;
        this.render();
      }, 3500);
    } else {
      clearInterval(this.intuitionTimer);
    }
    this.render();
  }

  toggleTheme() {
    this.theme = this.theme === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', this.theme);
    this.render();
  }

  setMode(m) {
    this.mode = m;
    clearInterval(this.playTimer);
    clearInterval(this.intuitionTimer);
    this.isPlaying = false;
    this.intuitionPlaying = false;
    this.render();
  }

  parseInput() {
    const val = document.getElementById('input-field')?.value;
    const g = parseGrid(val);
    if (!g) { alert('Invalid input. Expected JSON 2D array e.g. [[1,2],[3,4]]'); return; }
    this.inputVal = val;
    this.heights = g;
    this.steps = simulateBFS(g);
    this.currentStep = 0;
    this.render();
  }

  // ── DRAG RESIZE ────────────────────────────────────────────────
  bindDrag() {
    document.querySelectorAll('.resizer').forEach(el => {
      el.addEventListener('mousedown', (e) => {
        const idx = parseInt(el.dataset.idx);
        this.dragging = { idx, startX: e.clientX, startWidths: [...this.panelWidths] };
        el.classList.add('dragging');
        e.preventDefault();
      });
    });
    document.addEventListener('mousemove', (e) => {
      if (!this.dragging) return;
      const root = document.getElementById('panels-root');
      if (!root) return;
      const totalW = root.offsetWidth;
      const dx = ((e.clientX - this.dragging.startX) / totalW) * 100;
      const { idx, startWidths } = this.dragging;
      const newWidths = [...startWidths];
      newWidths[idx] = Math.max(15, startWidths[idx] + dx);
      newWidths[idx+1] = Math.max(15, startWidths[idx+1] - dx);
      this.panelWidths = newWidths;
      // Live update widths without full re-render
      const panels = document.querySelectorAll('.panels > .panel');
      panels.forEach((p, i) => { if (this.panelWidths[i] !== undefined) p.style.width = this.panelWidths[i] + '%'; });
    });
    document.addEventListener('mouseup', () => {
      if (this.dragging) {
        document.querySelectorAll('.resizer').forEach(el => el.classList.remove('dragging'));
        this.dragging = null;
      }
    });
  }

  // ── KEYS ───────────────────────────────────────────────────────
  bindKeys() {
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (e.code === 'Space') { e.preventDefault(); this.mode === 'execution' ? this.togglePlay() : this.iToggle(); }
      if (e.code === 'ArrowRight') { e.preventDefault(); this.mode === 'execution' ? this.stepFwd() : this.iStep(1); }
      if (e.code === 'ArrowLeft') { e.preventDefault(); this.mode === 'execution' ? this.stepBack() : this.iStep(-1); }
    });
  }
}

const app = new App();
</script>
</body>
</html>
