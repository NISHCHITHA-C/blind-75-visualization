<!DOCTYPE html>

<head>

<title>207. Course Schedule - Visualizer</title>
<style>

  .header-actions { display: flex; gap: 8px; align-items: center; }

  .thought-bubble {

  .key-insight {

  .complexity-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
  .complexity-table th { background: var(--bg-card); padding: 6px 10px; text-align: left; font-weight: 700; color: var(--text-muted); font-size: 11px; text-transform: uppercase; }

  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }

<body data-theme="dark">
<div id="app"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// PYTHON CODE (for display)
// ─────────────────────────────────────────────────────────────────────────────
const PYTHON_CODE = `from typing import List
from collections import defaultdict

class Solution:
    def canFinish(self, numCourses: int,
                  prerequisites: List[List[int]]) -> bool:

        # Build adjacency list
        adj = defaultdict(list)
        for course, prereq in prerequisites:
            adj[prereq].append(course)

        # 0=WHITE, 1=GRAY, 2=BLACK
        state = [0] * numCourses

        def has_cycle(v: int) -> bool:
            state[v] = 1             # Mark GRAY

            for neighbour in adj[v]:
                if state[neighbour] == 1:
                    return True      # Back-edge → cycle!
                if state[neighbour] == 0:
                    if has_cycle(neighbour):
                        return True  # Cycle deeper

            state[v] = 2             # Mark BLACK
            return False

        for course in range(numCourses):
            if state[course] == 0:
                if has_cycle(course):
                    return False

        return True`;

// ─────────────────────────────────────────────────────────────────────────────
// SYNTAX HIGHLIGHTER
// ─────────────────────────────────────────────────────────────────────────────
// Token-based Python highlighter — processes left-to-right, never double-processes.
// Each character of the input is consumed exactly once.
function highlightPython(rawLine) {
  const KEYWORDS = new Set([
    'False','None','True','and','as','assert','async','await',
    'break','class','continue','def','del','elif','else','except',
    'finally','for','from','global','if','import','in','is',
    'lambda','nonlocal','not','or','pass','raise','return',
    'try','while','with','yield'
  ]);
  const TYPES = new Set([
    'int','str','bool','float','list','dict','set','tuple',
    'List','Dict','Set','Tuple','Optional','Union','Any',
    'defaultdict','deque','Counter','OrderedDict'
  ]);

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function span(color, text, extra) {
    const style = `color:${color}` + (extra ? `;${extra}` : '');
    return `<span style="${style}">${escHtml(text)}</span>`;
  }

  const line = rawLine;
  let i = 0, out = '';

  while (i < line.length) {
    const ch = line[i];
    const rest = line.slice(i);

    // ── Comment ──────────────────────────────────────────────────────────
    if (ch === '#') {
      out += `<span style="color:var(--syn-comment);font-style:italic">${escHtml(rest)}</span>`;
      break;
    }

    // ── Triple-quoted string ──────────────────────────────────────────────
    if (rest.startsWith('"""') || rest.startsWith("'''")) {
      const q = rest.slice(0,3);
      const end = rest.indexOf(q, 3);
      if (end !== -1) {
        const tok = rest.slice(0, end + 3);
        out += span('var(--syn-string)', tok);
        i += tok.length; continue;
      }
    }

    // ── Single-quoted string ──────────────────────────────────────────────
    if (ch === '"' || ch === "'") {
      let j = i + 1;
      while (j < line.length && line[j] !== ch) {
        if (line[j] === '\\') j++; // skip escape
        j++;
      }
      const tok = line.slice(i, j + 1);
      out += span('var(--syn-string)', tok);
      i = j + 1; continue;
    }

    // ── Identifier / keyword / type ───────────────────────────────────────
    if (/[a-zA-Z_]/.test(ch)) {
      let j = i;
      while (j < line.length && /[\w]/.test(line[j])) j++;
      const word = line.slice(i, j);
      const nextCh = line[j];
      if (KEYWORDS.has(word)) {
        out += `<span style="color:var(--syn-keyword);font-weight:600">${escHtml(word)}</span>`;
      } else if (TYPES.has(word)) {
        out += span('var(--syn-type)', word);
      } else if (nextCh === '(') {
        // function call — consume the '(' too
        out += span('var(--syn-function)', word);
        out += escHtml('(');
        i = j + 1; continue;
      } else {
        out += escHtml(word);
      }
      i = j; continue;
    }

    // ── Number ────────────────────────────────────────────────────────────
    if (/[0-9]/.test(ch)) {
      let j = i;
      while (j < line.length && /[\d.]/.test(line[j])) j++;
      out += span('var(--syn-number)', line.slice(i, j));
      i = j; continue;
    }

    // ── Operator / punctuation ────────────────────────────────────────────
    if (/[=<>!+\-*/%&|^~@,.:;\[\]{}()]/.test(ch)) {
      out += escHtml(ch);
      i++; continue;
    }

    // ── Anything else (spaces etc.) ───────────────────────────────────────
    out += escHtml(ch);
    i++;
  }

  return out;
}

// ─────────────────────────────────────────────────────────────────────────────
// SIMULATION ENGINE
// ─────────────────────────────────────────────────────────────────────────────
function simulate(numCourses, prereqs) {
  const steps = [];
  const adj = {};
  for (let i = 0; i < numCourses; i++) adj[i] = [];
  for (const [course, prereq] of prereqs) adj[prereq].push(course);

  const state = new Array(numCourses).fill(0);
  let cycleEdge = null;

  function snap(line, desc, extra = {}) {
    steps.push({
      line,
      description: desc,
      state: [...state],
      adj: JSON.parse(JSON.stringify(adj)),
      numCourses,
      cycleEdge: cycleEdge ? {...cycleEdge} : null,
      activeNode: extra.node ?? null,
      activeNeighbour: extra.nbr ?? null,
      ...extra
    });
  }

  snap(9, 'Build adjacency list from prerequisites', {});
  snap(12, `Initialize state array: all ${numCourses} nodes are WHITE (0)`, {});

  let foundCycle = false;

  function dfs(v, depth = 0) {
    state[v] = 1;
    snap(16, `Mark node ${v} as GRAY — entering DFS`, { node: v });

    for (const nbr of adj[v]) {
      snap(18, `Check neighbour ${nbr} of node ${v}`, { node: v, nbr });
      if (state[nbr] === 1) {
        cycleEdge = { from: v, to: nbr };
        snap(19, `⚠️ Node ${nbr} is GRAY — back-edge found! Cycle detected!`, { node: v, nbr, isCycle: true });
        foundCycle = true;
        return true;
      }
      if (state[nbr] === 0) {
        snap(21, `Node ${nbr} is WHITE — recurse into it`, { node: v, nbr });
        if (dfs(nbr, depth + 1)) return true;
      } else {
        snap(18, `Node ${nbr} is BLACK — already safe, skip`, { node: v, nbr });
      }
    }
    state[v] = 2;
    snap(24, `Mark node ${v} as BLACK — fully explored, no cycle from here`, { node: v });
    return false;
  }

  snap(27, `Start outer loop: visit all WHITE nodes (handles disconnected graph)`, {});

  for (let course = 0; course < numCourses; course++) {
    if (state[course] === 0) {
      snap(28, `Node ${course} is WHITE — start DFS from here`, { node: course });
      if (dfs(course)) {
        snap(29, `Cycle detected! Return false — cannot finish all courses`, { isCycle: true });
        break;
      }
    } else {
      snap(27, `Node ${course} already processed (BLACK), skip`, { node: course });
    }
  }

  if (!foundCycle) {
    snap(31, `All nodes fully explored with no cycle → Return true — all courses can be finished! ✅`, {});
  }

  return steps;
}

// ─────────────────────────────────────────────────────────────────────────────
// GRAPH LAYOUT
// ─────────────────────────────────────────────────────────────────────────────
function layoutGraph(numCourses, adj) {
  const positions = {};
  const n = numCourses;

  if (n === 0) return positions;

  // Arrange in a circle
  const cx = 300, cy = 200, r = Math.min(140, 30 * n);
  for (let i = 0; i < n; i++) {
    const angle = (2 * Math.PI * i / n) - Math.PI / 2;
    positions[i] = {
      x: cx + r * Math.cos(angle),
      y: cy + r * Math.sin(angle)
    };
  }
  return positions;
}

function renderGraph(step) {
  const { state, adj, numCourses, cycleEdge, activeNode, activeNeighbour } = step;
  const pos = layoutGraph(numCourses, adj);

  const stateColor = ['var(--node-white)', 'var(--node-gray)', 'var(--node-black)'];
  const stateLabel = ['WHITE', 'GRAY', 'BLACK'];

  let edgesSVG = '';
  for (let v = 0; v < numCourses; v++) {
    for (const u of adj[v]) {
      const isCycleEdge = cycleEdge && cycleEdge.from === v && cycleEdge.to === u;
      const isActive = (v === activeNode && u === activeNeighbour) || (v === activeNeighbour && u === activeNode);
      const color = isCycleEdge ? 'var(--back-edge)' : isActive ? 'var(--accent)' : 'var(--edge-color)';
      const sw = isCycleEdge || isActive ? 2.5 : 1.5;

      // Arrow
      const x1 = pos[v].x, y1 = pos[v].y, x2 = pos[u].x, y2 = pos[u].y;
      const dx = x2 - x1, dy = y2 - y1;
      const len = Math.sqrt(dx*dx + dy*dy) || 1;
      const nr = 22;
      const ex = x2 - dx/len * nr, ey = y2 - dy/len * nr;
      const sx = x1 + dx/len * nr, sy = y1 + dy/len * nr;

      edgesSVG += `<line x1="${sx}" y1="${sy}" x2="${ex}" y2="${ey}" stroke="${color}" stroke-width="${sw}" marker-end="url(#arr${isCycleEdge ? 'Red' : isActive ? 'Blue' : 'Gray'})" opacity="${isCycleEdge || isActive ? 1 : 0.6}"/>`;
    }
  }

  let nodesSVG = '';
  for (let i = 0; i < numCourses; i++) {
    const { x, y } = pos[i];
    const isActive = i === activeNode;
    const isNbr = i === activeNeighbour;
    const fill = stateColor[state[i]];
    const sw = isActive ? 3 : isNbr ? 2.5 : 1.5;
    const stroke = isActive ? 'var(--accent)' : isNbr ? 'var(--accent2)' : 'var(--border)';
    const r = isActive ? 21 : 18;

    nodesSVG += `
      <circle cx="${x}" cy="${y}" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>
      <text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" fill="var(--node-text)" font-size="13" font-weight="700" font-family="system-ui">${i}</text>
      <text x="${x}" y="${y + r + 11}" text-anchor="middle" fill="var(--text-muted)" font-size="9" font-family="system-ui">${stateLabel[state[i]]}</text>`;
  }

  return `<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" style="max-height:100%;max-width:100%">
    <defs>
      <marker id="arrGray" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="var(--edge-color)" opacity="0.6"/>
      </marker>
      <marker id="arrBlue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="var(--accent)"/>
      </marker>
      <marker id="arrRed" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="var(--back-edge)"/>
      </marker>
    </defs>
    ${edgesSVG}
    ${nodesSVG}
  </svg>`;
}

The blocker is a <strong>cycle</strong>: if A requires B, B requires C, and C requires A — it's impossible. So the whole problem reduces to: <strong>does this directed graph contain a cycle?</strong>`,
    insight: "Course scheduling = cycle detection on a directed graph.",
    viz: 'example'
  },
  {
    title: "Why 3 States, Not 2?",
    thought: "A simple visited set isn't enough. I need to know if a node is 'currently on my stack' vs 'done forever'.",
    body: `Consider: A→C and B→C. A plain <code>visited</code> set marks C when DFS from A finishes. When DFS from B reaches C (already visited), a 2-state approach falsely cries "cycle!"<br><br>
The fix is 3 colours:<br>
• <code>WHITE (0)</code> — never seen<br>
• <code>GRAY (1)</code> — on the DFS call stack right now<br>
• <code>BLACK (2)</code> — fully processed, proven safe`,
    insight: "GRAY = 'currently exploring'. Reaching GRAY means a back-edge = real cycle.",
    viz: 'states'
  },
  {
    title: "The DFS Algorithm",
    thought: "Mark a node GRAY when I enter, BLACK when I leave. If I hit a GRAY node, I found a cycle — stop immediately.",

1. Mark node <code>GRAY</code> (entering)<br>

&nbsp;&nbsp;• If <code>WHITE</code> → recurse<br>
&nbsp;&nbsp;• If <code>BLACK</code> → safe, skip<br>
3. Mark node <code>BLACK</code> (leaving)`,

// ─────────────────────────────────────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────────────────────────────────────
class App {
  constructor() {
    this.theme = 'dark';
    this.mode = 'intuition';
    this.currentStep = 0;
    this.currentStage = 0;
    this.isPlaying = false;
    this.playTimer = null;
    this.speed = 1;
    this.inputValue = '4, [[1,0],[2,0],[3,1],[3,2]]';
    this.steps = [];
    this.numCourses = 4;
    this.prereqs = [[1,0],[2,0],[3,1],[3,2]];
    this.adj = {};
    this.buildAndSimulate();
    this.render();
    this.attachKeys();
  }

  parseInput(val) {
    try {
      const parts = val.split(',').map(s => s.trim());
      const n = parseInt(parts[0]);
      const rest = val.slice(val.indexOf(',')+1).trim();
      const arr = JSON.parse(rest);
      if (isNaN(n) || !Array.isArray(arr)) throw 0;
      return { n, arr };
    } catch {
      return null;
    }
  }

  buildAndSimulate() {
    const parsed = this.parseInput(this.inputValue);
    if (!parsed) return;
    this.numCourses = parsed.n;
    this.prereqs = parsed.arr;
    this.adj = {};
    for (let i = 0; i < this.numCourses; i++) this.adj[i] = [];
    for (const [c, p] of this.prereqs) { if (this.adj[p]) this.adj[p].push(c); }
    this.steps = simulate(this.numCourses, this.prereqs);
    this.currentStep = 0;
  }

  toggleTheme() {
    this.theme = this.theme === 'dark' ? 'light' : 'dark';
    document.body.setAttribute('data-theme', this.theme);
    this.render();
  }

  toggleMode(m) {
    this.pause();
    this.mode = m;
    this.render();
  }

  play() {
    if (this.mode === 'execution') {
      if (this.currentStep >= this.steps.length - 1) this.currentStep = 0;
      this.isPlaying = true;
      this.playTimer = setInterval(() => {
        if (this.currentStep < this.steps.length - 1) {
          this.currentStep++;
          this.renderExecution();
        } else {
          this.pause();
        }
      }, 1000 / this.speed);
    } else {
      if (this.currentStage >= INTUITION_STAGES.length - 1) this.currentStage = 0;
      this.isPlaying = true;
      this.playTimer = setInterval(() => {
        if (this.currentStage < INTUITION_STAGES.length - 1) {
          this.currentStage++;
          this.renderIntuitionStages();
          this.renderIntuitionVizPanel();
        } else {
          this.pause();
        }
      }, 3500 / this.speed);
    }
    this.updatePlayBtn();
  }

  pause() {
    this.isPlaying = false;
    clearInterval(this.playTimer);
    this.updatePlayBtn();
  }

  updatePlayBtn() {
    const btn = document.getElementById('playBtn');
    if (!btn) return;
    btn.innerHTML = this.isPlaying ? '⏸' : '▶';
    btn.className = 'btn-ctrl' + (this.isPlaying ? ' play' : '');
  }

  stepForward() {
    if (this.mode === 'execution') {
      if (this.currentStep < this.steps.length - 1) { this.currentStep++; this.renderExecution(); }
    } else {
      if (this.currentStage < INTUITION_STAGES.length - 1) { this.currentStage++; this.renderIntuitionStages(); this.renderIntuitionVizPanel(); }
    }
  }

  stepBack() {
    if (this.mode === 'execution') {
      if (this.currentStep > 0) { this.currentStep--; this.renderExecution(); }
    } else {
      if (this.currentStage > 0) { this.currentStage--; this.renderIntuitionStages(); this.renderIntuitionVizPanel(); }
    }
  }

  reset() {
    this.pause();
    if (this.mode === 'execution') { this.currentStep = 0; this.renderExecution(); }
    else { this.currentStage = 0; this.renderIntuitionStages(); this.renderIntuitionVizPanel(); }
  }

  attachKeys() {
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;
      if (e.code === 'Space') { e.preventDefault(); this.isPlaying ? this.pause() : this.play(); }
      else if (e.code === 'ArrowRight') { e.preventDefault(); this.stepForward(); }
      else if (e.code === 'ArrowLeft') { e.preventDefault(); this.stepBack(); }
    });
  }

  // ── PARTIAL RENDERS (avoid full re-render for perf) ──────────────────────
  renderExecution() {
    const step = this.steps[this.currentStep];
    if (!step) return;

    // Update code highlight
    document.querySelectorAll('.code-line').forEach((el, i) => {
      el.classList.toggle('active', i === step.line);
    });
    if (step.line != null) {
      const activeEl = document.querySelector(`.code-line[data-line="${step.line}"]`);
      if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });
    }

    // Update viz
    const vizArea = document.getElementById('vizSvgArea');
    if (vizArea) vizArea.innerHTML = renderGraph(step);

    // Update step log
    const log = document.getElementById('stepLog');
    if (log) log.innerHTML = this.buildStepLog(step);

    // Update counter
    const ctr = document.getElementById('stepCounter');
    if (ctr) ctr.textContent = `Step ${this.currentStep + 1} / ${this.steps.length}`;
  }

  renderIntuitionStages() {
    const cont = document.getElementById('intuitionStages');
    if (!cont) return;
    cont.innerHTML = INTUITION_STAGES.map((s, i) => {
      const cls = i === this.currentStage ? 'active' : i < this.currentStage ? 'past' : 'future';
      let tableHTML = '';
      if (s.table) {
        tableHTML = `<table class="complexity-table"><thead><tr><th>Metric</th><th>Bound</th><th>Reason</th></tr></thead><tbody>
          ${s.table.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}
        </tbody></table>`;
      }
      return `<div class="stage-card ${cls}">
        <div class="stage-num">Stage ${i+1}</div>
        <div class="stage-title">${s.title}</div>
        <div class="thought-bubble">💭 "${s.thought}"</div>
        <div class="stage-body">${s.body}${tableHTML}</div>
        <div class="key-insight"><strong>💡 Key Insight:</strong> ${s.insight}</div>
      </div>`;
    }).join('');

    const ctr = document.getElementById('intuitionCounter');
    if (ctr) ctr.textContent = `Stage ${this.currentStage + 1} / ${INTUITION_STAGES.length}`;
  }

  renderIntuitionVizPanel() {
    const el = document.getElementById('intuitionVizSvg');
    if (el) el.innerHTML = renderIntuitionViz(this.currentStage, this.numCourses, this.adj);
  }

  buildStepLog(step) {
    const lastStep = this.steps[this.steps.length - 1];
    const result = lastStep.description.includes('true') ? true : lastStep.description.includes('false') ? false : null;

    const vars = {
      'node': step.activeNode,
      'neighbour': step.activeNeighbour,
      'state': step.state.map((s,i) => `${i}:${['W','G','B'][s]}`).join(' '),
      'cycle_found': step.isCycle ? '⚠️ YES' : 'no'
    };
    if (step.cycleEdge) vars['back_edge'] = `${step.cycleEdge.from}→${step.cycleEdge.to}`;

    const varRows = Object.entries(vars).filter(([,v]) => v != null && v !== undefined)
      .map(([k,v]) => `<div class="var-row"><span class="var-name">${k}</span><span class="var-val">: ${v}</span></div>`).join('');

    const history = this.steps.slice(0, this.currentStep + 1).map((s, i) =>
      `<div class="history-item ${i === this.currentStep ? 'current' : ''}" onclick="app.jumpTo(${i})">${i+1}. ${s.description}</div>`
    ).join('');

    return `<div class="step-log">
      <div class="step-title">Step ${this.currentStep + 1} / ${this.steps.length}</div>
      <div class="step-desc">${step.description}</div>
      <div class="vars-section">
        <div class="vars-title">Variables</div>
        ${varRows}
      </div>
      <div class="history-title">History</div>
      ${history}
    </div>`;
  }

  jumpTo(i) {
    this.currentStep = i;
    this.renderExecution();
    setTimeout(() => {
      const el = document.querySelector(`#stepLog .history-item.current`);
      if (el) el.scrollIntoView({ block: 'nearest' });
    }, 50);
  }

  // ── FULL RENDER ──────────────────────────────────────────────────────────
  render() {
    const lastStep = this.steps[this.steps.length - 1] || {};
    const hasCycle = lastStep.description && lastStep.description.includes('false');
    const resultLabel = hasCycle ? 'false — cycle detected' : 'true — can finish';
    const resultCls = hasCycle ? 'result-false' : 'result-true';

    document.getElementById('app').innerHTML = `
      <div class="header">
        <div class="header-top">
          <span class="header-title">207. Course Schedule</span>
          <span class="header-badge">Medium · Graph · DFS</span>
          <div class="header-actions">
            <button class="btn-theme" onclick="app.toggleTheme()">${this.theme === 'dark' ? '☀ Light' : '🌙 Dark'}</button>
          </div>
        </div>
        <div class="header-top" style="gap:12px;flex-wrap:wrap">
          <div class="mode-toggle">
            <button class="mode-btn ${this.mode==='intuition'?'active':''}" onclick="app.toggleMode('intuition')">💡 Intuition</button>
            <button class="mode-btn ${this.mode==='execution'?'active':''}" onclick="app.toggleMode('execution')">▶ Execution</button>
          </div>
          ${this.mode==='execution' ? `
          <div class="input-row">
            <span class="input-label">Input:</span>
            <input class="input-field" id="inputField" value="${this.inputValue}" placeholder="n, [[a,b],...]"/>
            <button class="btn-run" onclick="app.runInput()">Run</button>
            <span class="result-banner ${resultCls}">${resultLabel}</span>
          </div>` : ''}
        </div>
      </div>
      <div class="main-content" id="mainContent">
        ${this.mode === 'execution' ? this.buildExecutionLayout() : this.buildIntuitionLayout()}
      </div>
    `;

    if (this.mode === 'execution') {
      this.renderExecution();
      this.setupResizers();
    } else {
      this.renderIntuitionStages();
      this.renderIntuitionVizPanel();
    }
  }

  buildExecutionLayout() {
    const codeLines = PYTHON_CODE.split('\n');
    const codeHTML = codeLines.map((line, i) => {
      return `<div class="code-line" data-line="${i}">
        <span class="line-num">${i+1}</span>
        <code class="line-code">${highlightPython(line)}</code>
      </div>`;
    }).join('');

    return `
      <div class="panel" id="codePanel" style="width:32%">
        <div class="panel-header">Code</div>
        <div class="panel-content">
          <div class="code-container"><pre>${codeHTML}</pre></div>
        </div>
      </div>
      <div class="resizer" id="res1"></div>
      <div class="panel" id="vizPanel" style="flex:1">
        <div class="panel-header">Graph Visualization</div>
        <div class="panel-content" style="overflow:hidden">
          <div class="viz-container">
            <div class="viz-svg-area" id="vizSvgArea"></div>
            <div class="legend">
              <div class="legend-item"><div class="legend-dot" style="background:var(--node-white)"></div>WHITE (unvisited)</div>
              <div class="legend-item"><div class="legend-dot" style="background:var(--node-gray)"></div>GRAY (on stack)</div>
              <div class="legend-item"><div class="legend-dot" style="background:var(--node-black)"></div>BLACK (safe)</div>
              <div class="legend-item"><div class="legend-dot" style="background:var(--back-edge)"></div>Back-edge</div>
            </div>
            <div class="viz-controls">
              <button class="btn-ctrl" onclick="app.reset()" title="Reset">⏮</button>
              <button class="btn-ctrl" onclick="app.stepBack()" title="Back">◀</button>
              <button class="btn-ctrl" id="playBtn" onclick="app.isPlaying?app.pause():app.play()">▶</button>
              <button class="btn-ctrl" onclick="app.stepForward()" title="Forward">▶▶</button>
              <span class="step-counter" id="stepCounter">Step 1 / ${this.steps.length}</span>
              <select class="speed-select" onchange="app.setSpeed(this.value)">
                <option value="0.5">0.5×</option>
                <option value="1" selected>1×</option>
                <option value="2">2×</option>
                <option value="4">4×</option>
              </select>
            </div>
          </div>
        </div>
      </div>
      <div class="resizer" id="res2"></div>
      <div class="panel" id="logPanel" style="width:22%">
        <div class="panel-header">Step Log</div>
        <div class="panel-content" id="stepLog"></div>
      </div>
    `;
  }

  buildIntuitionLayout() {
    return `<div class="intuition-layout">
      <div class="intuition-left">
        <div class="panel-header">Senior Engineer's Thought Process</div>
        <div class="intuition-content" id="intuitionStages"></div>
        <div class="intuition-controls">
          <button class="btn-ctrl" onclick="app.reset()">⏮</button>
          <button class="btn-ctrl" onclick="app.stepBack()">◀</button>
          <button class="btn-ctrl" id="playBtn" onclick="app.isPlaying?app.pause():app.play()">▶</button>
          <button class="btn-ctrl" onclick="app.stepForward()">▶▶</button>
          <span class="step-counter" id="intuitionCounter">Stage 1 / ${INTUITION_STAGES.length}</span>
        </div>
      </div>
      <div class="intuition-right">
        <div class="panel-header">Visual Explanation</div>
        <div class="intuition-viz">
          <div class="viz-svg-area" id="intuitionVizSvg"></div>
        </div>
      </div>
    </div>`;
  }

  setSpeed(v) {
    const wasPlaying = this.isPlaying;
    this.pause();
    this.speed = parseFloat(v);
    if (wasPlaying) this.play();
  }

  runInput() {
    const f = document.getElementById('inputField');
    if (f) this.inputValue = f.value;
    this.buildAndSimulate();
    this.render();
  }

  setupResizers() {
    const makeResizer = (resizerId, leftId, rightId) => {
      const r = document.getElementById(resizerId);
      const left = document.getElementById(leftId);
      const right = document.getElementById(rightId);
      if (!r || !left || !right) return;

      let startX, startLeft, startRight;
      r.addEventListener('mousedown', e => {
        startX = e.clientX;
        startLeft = left.offsetWidth;
        startRight = right.offsetWidth;
        r.classList.add('active');
        const onMove = (e) => {
          const dx = e.clientX - startX;
          left.style.width = Math.max(150, startLeft + dx) + 'px';
          left.style.flex = 'none';
          right.style.width = Math.max(150, startRight - dx) + 'px';
          right.style.flex = 'none';
        };
        const onUp = () => {
          r.classList.remove('active');
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
        e.preventDefault();
      });
    };
    makeResizer('res1', 'codePanel', 'vizPanel');
    makeResizer('res2', 'vizPanel', 'logPanel');
  }
}

const app = new App();
</script>
</body>
</html>
