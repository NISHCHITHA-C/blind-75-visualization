<body data-theme="dark">
<div class="app" id="app"></div>
<script>
// ─────────────────────────────────────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────────────────────────────────────

const PROBLEM_NUM = 133;
const PROBLEM_TITLE = "Clone Graph";

const PYTHON_CODE = `from typing import Optional
from collections import deque

# LeetCode-provided Node definition
class Node:
    def __init__(self, val=0, neighbors=None):
        self.val = val
        self.neighbors = neighbors or []


class Solution:
    def cloneGraph(
        self, node: Optional['Node']
    ) -> Optional['Node']:
        """
        Deep-clone undirected graph with DFS + visited map.
        Time: O(V+E)  Space: O(V)
        """
        if not node:
            return None

        visited: dict[Node, Node] = {}

        def dfs(curr: Node) -> Node:
            if curr in visited:
                return visited[curr]   # cycle guard

            clone = Node(curr.val)     # skeleton clone
            visited[curr] = clone      # register BEFORE recursing

            for neighbour in curr.neighbors:
                clone.neighbors.append(
                    dfs(neighbour)
                )

            return clone

        return dfs(node)


# ── BFS alternative (avoids recursion limit) ──────────
    def cloneGraphBFS(
        self, node: Optional['Node']
    ) -> Optional['Node']:
        if not node:
            return None

        visited = {node: Node(node.val)}
        queue = deque([node])

        while queue:
            curr = queue.popleft()
            for nb in curr.neighbors:
                if nb not in visited:
                    visited[nb] = Node(nb.val)
                    queue.append(nb)
                visited[curr].neighbors.append(
                    visited[nb]
                )

        return visited[node]
`;

// Line index → step mapping (0-based)
const LINE_DFS_CHECK   = 24;  // if curr in visited
const LINE_RETURN_VIS  = 25;  // return visited[curr]
const LINE_CLONE       = 27;  // clone = Node(curr.val)
const LINE_REGISTER    = 28;  // visited[curr] = clone
const LINE_FOR         = 30;  // for neighbour in ...
const LINE_APPEND      = 31;  // clone.neighbors.append(...)
const LINE_RETURN      = 34;  // return clone
const LINE_CALL        = 36;  // return dfs(node)

// ─────────────────────────────────────────────────────────────────────────────
// GRAPH BUILDER
// ─────────────────────────────────────────────────────────────────────────────

function buildGraph(adjList) {
  // adjList: [[2,4],[1,3],[2,4],[1,3]] (1-indexed)
  const nodes = adjList.map((_, i) => ({ id: i+1, val: i+1, neighbors: [] }));
  adjList.forEach((nbrs, i) => {
    nodes[i].neighbors = nbrs.map(n => nodes[n-1]);
  });
  return nodes[0] || null;
}

function parseAdjList(str) {
  try {
    const arr = JSON.parse(str.replace(/'/g, '"'));
    if (!Array.isArray(arr) || arr.length === 0) return null;
    return buildGraph(arr);
  } catch { return null; }
}

// Returns positions in a 600-wide logical space; renderGraphSVG scales y into two halves
function getNodePositions(nodeCount) {
  if (nodeCount === 4) {
    // Diamond layout — clear and readable
    return [ {x:300,y:60}, {x:500,y:200}, {x:300,y:340}, {x:100,y:200} ];
  }
  // Generic circular layout centred at (300, 200), radius 160
  const cx = 300, cy = 200, r = 150;
  return Array.from({ length: nodeCount }, (_, i) => ({
    x: Math.round(cx + r * Math.cos(2 * Math.PI * i / nodeCount - Math.PI / 2)),
    y: Math.round(cy + r * Math.sin(2 * Math.PI * i / nodeCount - Math.PI / 2)),
  }));
}

// ─────────────────────────────────────────────────────────────────────────────
// SIMULATION
// ─────────────────────────────────────────────────────────────────────────────

function simulate(rootNode, adjList) {
  const steps = [];
  const nodeList = [];

  function collectAll(n, seen=new Set()) {
    if (!n || seen.has(n.id)) return;
    seen.add(n.id);
    nodeList.push(n);
    n.neighbors.forEach(nb => collectAll(nb, seen));
  }
  collectAll(rootNode);
  const nodeCount = nodeList.length;

  const visitedMap = new Map();   // original id → cloned id
  const clonedEdges = [];         // {from, to} cloned ids

  function snap(line, desc, currId=null, extraVars={}) {
    steps.push({
      line,
      description: desc,
      currentNodeId: currId,
      visitedIds: [...visitedMap.keys()],
      clonedEdges: clonedEdges.map(e=>({...e})),
      vars: {
        visited: `{${[...visitedMap.entries()].map(([k,v])=>`node${k}→clone${v}`).join(', ')}}`,
        ...extraVars
      }
    });
  }

  snap(LINE_CALL, 'Start: call dfs(node 1)', 1, { node: 'node_1' });

  function dfs(node) {
    if (!node) return;
    const id = node.id;

    snap(LINE_DFS_CHECK, `Check: is node ${id} in visited?`, id, { curr: `node_${id}`, 'in visited': visitedMap.has(id) ? 'True → return clone' : 'False → proceed' });

    if (visitedMap.has(id)) {
      snap(LINE_RETURN_VIS, `Node ${id} already cloned — return clone${id} (cycle guard!)`, id, { curr: `node_${id}`, action: `return clone${id}` });
      return;
    }

    snap(LINE_CLONE, `Create clone${id} = Node(${id}) — skeleton (no neighbors yet)`, id, { curr: `node_${id}`, 'clone created': `Node(val=${id})` });
    visitedMap.set(id, id);

    snap(LINE_REGISTER, `Register: visited[node${id}] = clone${id} — BEFORE recursing (critical!)`, id, { curr: `node_${id}`, 'visited size': visitedMap.size });

    for (const nb of node.neighbors) {
      snap(LINE_FOR, `Loop neighbor: node${nb.id} of node${id}`, id, { curr: `node_${id}`, neighbour: `node_${nb.id}` });
      const prevSize = visitedMap.size;
      dfs(nb);
      clonedEdges.push({ from: id, to: nb.id });
      snap(LINE_APPEND, `Append clone${nb.id} to clone${id}.neighbors`, id, { curr: `node_${id}`, 'appended neighbor': `clone${nb.id}`, 'clone neighbors so far': node.neighbors.slice(0, node.neighbors.indexOf(nb)+1).map(n=>`clone${n.id}`).join(', ') });
    }

    snap(LINE_RETURN, `Return clone${id}`, id, { curr: `node_${id}`, returning: `clone${id}` });
  }

  dfs(rootNode);
  snap(LINE_CALL, '✅ Done! All nodes cloned. Return cloned graph root (clone1).', null, { result: 'clone1 (deep copy of original graph)' });

  return { steps, nodeCount, nodeList };
}

// ─────────────────────────────────────────────────────────────────────────────
// SYNTAX HIGHLIGHTING
// ─────────────────────────────────────────────────────────────────────────────

// ─── SYNTAX HIGHLIGHTER ──────────────────────────────────────────────────────
// Token-based: operates on raw string, never on already-injected HTML.
// Returns an HTML string. Uses hardcoded hex so inline styles always resolve.

const DARK_COLORS = {
  keyword:   '#ff79c6',
  builtin:   '#ff79c6',
  func:      '#50fa7b',
  string:    '#f1fa8c',
  comment:   '#6272a4',
  type:      '#8be9fd',
  number:    '#bd93f9',
  decorator: '#ffb86c',
  plain:     '#f8f8f2',
};
const LIGHT_COLORS = {
  keyword:   '#d73a49',
  builtin:   '#d73a49',
  func:      '#22863a',
  string:    '#e36209',
  comment:   '#6a737d',
  type:      '#005cc5',
  number:    '#6f42c1',
  decorator: '#e36209',
  plain:     '#24292e',
};

function getColors() {
  return state.theme === 'dark' ? DARK_COLORS : LIGHT_COLORS;
}

function span(color, text, extra) {
  const style = `color:${color}${extra ? ';' + extra : ''}`;
  return `<span style="${style}">${esc(text)}</span>`;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const KEYWORDS = new Set([
  'def','class','if','elif','else','while','for','return',
  'import','from','in','and','or','not','True','False','None',
  'is','lambda','pass','break','continue','with','as','try',
  'except','finally','raise','yield','async','await',
]);
const TYPES = new Set([
  'Optional','Node','dict','list','deque','int','str','bool','set','tuple','Any',
]);

// Tokenize a single line (raw string, no prior escaping)
function tokenizeLine(line) {
  const tokens = [];
  let i = 0;
  const n = line.length;

  while (i < n) {
    // Triple-quoted string (docstring) — just consume to end of line for per-line rendering
    if ((line[i] === '"' && line.slice(i,i+3) === '"""') ||
        (line[i] === "'" && line.slice(i,i+3) === "'''")) {
      let j = i + 3;
      const q = line.slice(i,i+3);
      while (j < n && line.slice(j,j+3) !== q) j++;
      if (j < n) j += 3;
      tokens.push({ type: 'string', val: line.slice(i,j) });
      i = j;
      continue;
    }
    // Single/double quoted string
    if (line[i] === '"' || line[i] === "'") {
      const q = line[i]; let j = i+1;
      while (j < n && line[j] !== q && line[j] !== '\n') {
        if (line[j] === '\\') j++;
        j++;
      }
      if (j < n) j++;
      tokens.push({ type: 'string', val: line.slice(i,j) });
      i = j;
      continue;
    }
    // Comment
    if (line[i] === '#') {
      tokens.push({ type: 'comment', val: line.slice(i) });
      break;
    }
    // Decorator
    if (line[i] === '@') {
      let j = i+1;
      while (j < n && /\w/.test(line[j])) j++;
      tokens.push({ type: 'decorator', val: line.slice(i,j) });
      i = j;
      continue;
    }
    // Number
    if (/\d/.test(line[i]) && (i===0 || !/\w/.test(line[i-1]))) {
      let j = i;
      while (j < n && /[\d._xXoObB]/.test(line[j])) j++;
      tokens.push({ type: 'number', val: line.slice(i,j) });
      i = j;
      continue;
    }
    // Word (keyword / type / function call / identifier)
    if (/[a-zA-Z_]/.test(line[i])) {
      let j = i;
      while (j < n && /\w/.test(line[j])) j++;
      const word = line.slice(i,j);
      // Check if followed by '('
      let k = j; while (k < n && line[k] === ' ') k++;
      const isCall = line[k] === '(';
      if (KEYWORDS.has(word)) {
        tokens.push({ type: 'keyword', val: word });
      } else if (TYPES.has(word)) {
        tokens.push({ type: 'type', val: word });
      } else if (isCall) {
        tokens.push({ type: 'func', val: word });
      } else {
        tokens.push({ type: 'plain', val: word });
      }
      i = j;
      continue;
    }
    // Anything else: punctuation, operators, spaces
    tokens.push({ type: 'plain', val: line[i] });
    i++;
  }
  return tokens;
}

function highlightPython(line) {
  if (line === '') return '&nbsp;';
  const C = getColors();

  // Handle lines that are purely docstring continuation (no token start)
  // Heuristic: if trimmed line is just '"""' or "'''" treat as string
  const trimmed = line.trim();
  if (trimmed === '"""' || trimmed === "'''" || trimmed === '"""' ) {
    return span(C.string, line, 'font-style:italic');
  }

  const tokens = tokenizeLine(line);
  let out = '';

  for (const tok of tokens) {
    switch (tok.type) {
      case 'keyword':   out += span(C.keyword, tok.val, 'font-weight:600'); break;
      case 'func':      out += span(C.func,    tok.val); break;
      case 'type':      out += span(C.type,    tok.val); break;
      case 'string':    out += span(C.string,  tok.val, 'font-style:italic'); break;
      case 'comment':   out += span(C.comment, tok.val, 'font-style:italic'); break;
      case 'number':    out += span(C.number,  tok.val); break;
      case 'decorator': out += span(C.decorator, tok.val); break;
      default:          out += esc(tok.val); break;
    }
  }
  return out;
}

// ─────────────────────────────────────────────────────────────────────────────
// APP STATE
// ─────────────────────────────────────────────────────────────────────────────

function initSimulation() {
  try {
    const root = parseAdjList(state.inputValue);
    if (!root) return;
    const { steps, nodeCount, nodeList } = simulate(root, state.adjList);
    state.steps = steps;
    state.nodeCount = nodeCount;
    state.nodeList = nodeList;
    state.currentStep = 0;
  } catch(e) { console.error(e); }
}

// ─────────────────────────────────────────────────────────────────────────────
// GRAPH SVG RENDERING
// ─────────────────────────────────────────────────────────────────────────────

function renderGraphSVG(step, adj) {
  if (!adj || !Array.isArray(adj) || adj.length === 0) {
    return '<svg viewBox="0 0 600 520" width="100%" height="100%"><text x="300" y="260" text-anchor="middle" fill="#6b7280" font-family="sans-serif">No graph data</text></svg>';
  }
  const n = adj.length;
  const rawPos = getNodePositions(n);

  // Scale positions to fit two half-graphs in the SVG (top = original, bottom = clone)
  // rawPos are in ~[50,500] range for x, [50,470] for y. Compress y into 0-200, then offset.
  const minY = Math.min(...rawPos.map(p=>p.y));
  const maxY = Math.max(...rawPos.map(p=>p.y));
  const rangeY = maxY - minY || 1;

  function scalePos(raw, yOffset) {
    return {
      x: raw.x,
      y: ((raw.y - minY) / rangeY) * 160 + yOffset
    };
  }

  const topPos = rawPos.map(p => scalePos(p, 55));   // original graph y: 55–215
  const botPos = rawPos.map(p => scalePos(p, 295));  // cloned graph  y: 295–455

  const visited    = step ? new Set(step.visitedIds) : new Set();
  const clonedEdges = step ? (step.clonedEdges || []) : [];
  const currId     = step ? step.currentNodeId : null;

  // Helper: safe position lookup (returns null if out of bounds)
  function tp(id) { return (id >= 1 && id <= n) ? topPos[id-1] : null; }
  function bp(id) { return (id >= 1 && id <= n) ? botPos[id-1] : null; }

  let svg = `<svg viewBox="0 0 600 520" width="100%" height="100%" style="display:block">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <text x="300" y="22" text-anchor="middle" font-size="12" font-family="sans-serif" font-weight="600" fill="#6b7280" letter-spacing="1">ORIGINAL GRAPH</text>
  <text x="300" y="272" text-anchor="middle" font-size="12" font-family="sans-serif" font-weight="600" fill="#34d399" letter-spacing="1">CLONED GRAPH</text>
  <line x1="20" y1="248" x2="580" y2="248" stroke="#2d3f55" stroke-width="1" stroke-dasharray="4,4"/>`;

  // ── ORIGINAL: edges ──────────────────────────────────────────────────────
  adj.forEach((nbrs, i) => {
    nbrs.forEach(nbId => {
      if (nbId - 1 > i) {                        // draw each edge once
        const a = topPos[i], b = tp(nbId);
        if (!a || !b) return;
        svg += `<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="#374151" stroke-width="2"/>`;
      }
    });
  });

  // ── ORIGINAL: nodes ──────────────────────────────────────────────────────
  adj.forEach((_, i) => {
    const id = i + 1;
    const p  = topPos[i];
    if (!p) return;
    const isCurr    = currId === id;
    const isVisited = visited.has(id);
    const fill   = isCurr ? '#1d4ed8' : isVisited ? '#065f46' : '#374151';
    const stroke = isCurr ? '#60a5fa' : isVisited ? '#34d399' : '#4b5563';
    const sw     = isCurr ? 3 : 2;
    svg += `<circle cx="${p.x}" cy="${p.y}" r="22" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"${isCurr ? ' filter="url(#glow)"' : ''}/>`;
    svg += `<text x="${p.x}" y="${p.y}" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#f8f8f2" font-family="sans-serif">${id}</text>`;
    if (isCurr) svg += `<text x="${p.x}" y="${p.y - 30}" text-anchor="middle" font-size="11" fill="#60a5fa" font-family="sans-serif">curr</text>`;
  });

  // ── CLONED: edges (only those registered so far in this step) ────────────
  const drawnCloned = new Set();
  clonedEdges.forEach(({from, to}) => {
    if (from < 1 || from > n || to < 1 || to > n) return;  // bounds guard
    const key = [Math.min(from, to), Math.max(from, to)].join('-');
    if (drawnCloned.has(key)) return;
    drawnCloned.add(key);
    const a = bp(from), b = bp(to);
    if (!a || !b) return;
    svg += `<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="#065f46" stroke-width="2" stroke-dasharray="5,3"/>`;
  });

  // ── CLONED: nodes ─────────────────────────────────────────────────────────
  adj.forEach((_, i) => {
    const id = i + 1;
    const p  = botPos[i];
    if (!p) return;
    const isCloned = visited.has(id);
    const fill   = isCloned ? '#065f46' : '#1e293b';
    const stroke = isCloned ? '#34d399' : '#334155';
    svg += `<circle cx="${p.x}" cy="${p.y}" r="22" fill="${fill}" stroke="${stroke}" stroke-width="2"/>`;
    svg += `<text x="${p.x}" y="${p.y}" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="${isCloned ? '#6ee7b7' : '#475569'}" font-family="sans-serif">${isCloned ? id : '?'}</text>`;
    if (isCloned) svg += `<text x="${p.x}" y="${p.y - 30}" text-anchor="middle" font-size="10" fill="#34d399" font-family="sans-serif">clone${id}</text>`;
  });

  svg += `</svg>`;
  return svg;
}

    <div class="legend">
      <span class="legend-item"><span class="legend-dot" style="background:#374151;border:1px solid #4b5563"></span> Unvisited</span>
      <span class="legend-item"><span class="legend-dot" style="background:#065f46;border:1px solid #34d399"></span> Cloned</span>
      <span class="legend-item"><span class="legend-dot" style="background:#1d4ed8;border:1px solid #60a5fa"></span> Current</span>
    </div>
    <div class="graph-wrap">
      <div class="graph-svg-wrap">${graphHTML}</div>
      <div class="graph-bottom">
        <button class="ctrl-btn" onclick="resetSteps()" title="Reset">↺</button>
        <button class="ctrl-btn" onclick="stepBack()" title="Step Back">◀</button>
        <button class="ctrl-btn play" onclick="togglePlay()" title="Play/Pause">
          ${state.isPlaying ? '⏸' : '▶'}
        </button>
        <button class="ctrl-btn" onclick="stepForward()" title="Step Forward">▶</button>
        <select class="speed-sel" onchange="setSpeed(this.value)">
          <option value="0.5" ${state.speed===0.5?'selected':''}>0.5×</option>
          <option value="1" ${state.speed===1?'selected':''}>1×</option>
          <option value="2" ${state.speed===2?'selected':''}>2×</option>
          <option value="4" ${state.speed===4?'selected':''}>4×</option>
        </select>
        <span class="step-counter">Step ${state.currentStep+1} / ${state.steps.length}</span>
      </div>
    </div>
  </div>
  <div class="divider" id="div2"></div>
  <div class="panel" id="pLog" style="width:${state.panelWidths[2]}%;min-width:160px">
    <div class="panel-header">Step Log</div>
    <div class="panel-body" id="stepLogBody">
      <div class="step-log">${logHTML}</div>
    </div>
  </div>`;
}

function buildStepLog(step) {
  if (!step) return '<div style="padding:14px;color:var(--text-muted);font-size:13px">Press ▶ to start</div>';
  const vars = step.vars || {};
  const history = state.steps.slice(0, state.currentStep+1);
  return `
    <div class="step-num">Step ${state.currentStep+1} of ${state.steps.length}</div>
    <div class="step-desc">${step.description}</div>
    <div class="vars-title">Variables</div>
    ${Object.entries(vars).map(([k,v])=>`
      <div class="var-row">
        <span class="var-name">${k}</span>
        <span style="color:var(--text-muted)">:</span>
        <span class="var-val">${typeof v==='object'?JSON.stringify(v):String(v)}</span>
      </div>`).join('')}
    <div class="history-title">History</div>
    ${history.map((s,i)=>`
      <div class="history-item${i===state.currentStep?' current':''}" onclick="jumpToStep(${i})">
        ${i+1}. ${s.description.length>45?s.description.slice(0,45)+'…':s.description}
      </div>`).join('')}`;
}

function buildIntuitionHTML() {
  const stages = INTUITION_STAGES;
  const curr = state.intuitionStage;

  const stagesHTML = stages.map((s, i) => {
    const cls = i===curr ? 'active' : i<curr ? 'past' : 'future';
    return `<div class="stage-item ${cls}">
      <div class="stage-header">
        <div class="stage-num">${i+1}</div>
        <div class="stage-title">${s.title}</div>
      </div>
      ${s.thought ? `<div class="thought-bubble">💭 "${s.thought}"</div>` : ''}
      <div class="stage-content">${s.content.replace(/\n/g,'<br>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/<code>/g,'<code style="font-family:var(--font-mono);background:var(--bg-secondary);padding:1px 5px;border-radius:3px;font-size:12px">').replace(/<\/code>/g,'</code>')}</div>
      <div class="key-insight"><strong>💡 Key Insight:</strong> ${s.insight}</div>
    </div>`;
  }).join('');

  const vizHTML = renderIntuitionViz(curr);

  return `
  <div style="display:flex;flex-direction:column;width:100%;height:100%;overflow:hidden">
    <div style="display:flex;flex:1;overflow:hidden">
      <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
        <div class="panel-header">Senior Engineer's Thought Process</div>
        <div style="flex:1;overflow:auto;background:var(--bg-panel);padding:16px" id="intuitionLeft">
          ${stagesHTML}
        </div>
      </div>
      <div style="flex:0 0 42%;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden">
        <div class="panel-header">Visual Explanation</div>
        <div style="flex:1;overflow:auto;background:var(--bg-panel-header);padding:16px">
          ${vizHTML}
        </div>
      </div>
    </div>
    <div class="intuition-controls">
      <button class="ctrl-btn" onclick="intuitionReset()">↺</button>
      <button class="ctrl-btn" onclick="intuitionPrev()">◀</button>
      <button class="ctrl-btn play" onclick="intuitionTogglePlay()">${state.intuitionPlaying?'⏸':'▶'}</button>
      <button class="ctrl-btn" onclick="intuitionNext()">▶</button>
      <span class="stage-progress">Stage ${curr+1} of ${stages.length}</span>
    </div>
  </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// CONTROLS
// ─────────────────────────────────────────────────────────────────────────────

function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  document.body.dataset.theme = state.theme;
  render();
}

function setMode(m) {
  stopPlay();
  stopIntuitionPlay();
  state.mode = m;
  render();
}

function parseInput() {
  const v = document.getElementById('adjInput')?.value || state.inputValue;
  state.inputValue = v;
  try {
    state.adjList = JSON.parse(v.replace(/'/g,'"'));
  } catch { return; }
  initSimulation();
  render();
}

function resetSteps() { stopPlay(); state.currentStep = 0; partialRender(); }
function stepBack() { stopPlay(); if (state.currentStep > 0) { state.currentStep--; partialRender(); } }
function stepForward() { stopPlay(); if (state.currentStep < state.steps.length-1) { state.currentStep++; partialRender(); } else stopPlay(); }
function jumpToStep(i) { state.currentStep = i; partialRender(); }

function togglePlay() {
  state.isPlaying ? stopPlay() : startPlay();
}
function startPlay() {
  state.isPlaying = true;
  partialRender();
  state.playTimer = setInterval(() => {
    if (state.currentStep < state.steps.length - 1) {
      state.currentStep++;
      partialRender();
    } else {
      stopPlay();
    }
  }, 1000 / state.speed);
}
function stopPlay() {
  state.isPlaying = false;
  clearInterval(state.playTimer);
}
function setSpeed(v) { state.speed = parseFloat(v); if (state.isPlaying) { stopPlay(); startPlay(); } }

// Intuition controls
function intuitionReset() { stopIntuitionPlay(); state.intuitionStage = 0; render(); }
function intuitionPrev() { stopIntuitionPlay(); if (state.intuitionStage > 0) { state.intuitionStage--; render(); } }
function intuitionNext() { stopIntuitionPlay(); if (state.intuitionStage < INTUITION_STAGES.length-1) { state.intuitionStage++; render(); } }
function intuitionTogglePlay() { state.intuitionPlaying ? stopIntuitionPlay() : startIntuitionPlay(); }
function startIntuitionPlay() {
  state.intuitionPlaying = true;
  render();
  state.intuitionTimer = setInterval(() => {
    if (state.intuitionStage < INTUITION_STAGES.length-1) {
      state.intuitionStage++;
      render();
    } else { stopIntuitionPlay(); }
  }, 4000);
}
function stopIntuitionPlay() { state.intuitionPlaying = false; clearInterval(state.intuitionTimer); }

// ─────────────────────────────────────────────────────────────────────────────
// PARTIAL RE-RENDER (execution mode only — no full DOM rebuild)
// ─────────────────────────────────────────────────────────────────────────────

function partialRender() {
  if (state.mode !== 'execution') { render(); return; }
  const step = state.steps[state.currentStep] || null;
  const activeLine = step ? step.line : -1;

  // Update code line highlights
  document.querySelectorAll('.code-line').forEach((el, i) => {
    el.classList.toggle('active', i === activeLine);
  });
  // Scroll active line into view
  const activeEl = document.querySelector('.code-line.active');
  if (activeEl) activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

  // Update graph SVG
  const svgWrap = document.querySelector('.graph-svg-wrap');
  if (svgWrap) svgWrap.innerHTML = renderGraphSVG(step, state.adjList);

  // Update play button
  const playBtn = document.querySelector('.ctrl-btn.play');
  if (playBtn) playBtn.textContent = state.isPlaying ? '⏸' : '▶';

  // Update step counter
  const counter = document.querySelector('.step-counter');
  if (counter) counter.textContent = `Step ${state.currentStep+1} / ${state.steps.length}`;

  // Update log
  const logBody = document.getElementById('stepLogBody');
  if (logBody) {
    logBody.innerHTML = `<div class="step-log">${buildStepLog(step)}</div>`;
    // Auto-scroll current history item into view
    const curr = logBody.querySelector('.history-item.current');
    if (curr) curr.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// PANEL RESIZING
// ─────────────────────────────────────────────────────────────────────────────

function attachEvents() {
  // Keyboard
  document.removeEventListener('keydown', handleKey);
  document.addEventListener('keydown', handleKey);

  // Divider drag
  ['div1','div2'].forEach((id, di) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      const panels = ['pCode','pViz','pLog'].map(p=>document.getElementById(p)).filter(Boolean);
      if (panels.length < 3) return;
      const startX = e.clientX;
      const startWidths = panels.map(p => p.getBoundingClientRect().width);
      const totalW = startWidths.reduce((a,b)=>a+b,0);
      el.classList.add('dragging');

      const onMove = e2 => {
        const dx = e2.clientX - startX;
        const pct = (dx / totalW) * 100;
        if (di === 0) {
          const w0 = Math.max(15, Math.min(55, (startWidths[0]/totalW*100) + pct));
          state.panelWidths[0] = w0;
          panels[0].style.width = w0 + '%';
        } else {
          const w2 = Math.max(12, Math.min(40, (startWidths[2]/totalW*100) - pct));
          state.panelWidths[2] = w2;
          panels[2].style.width = w2 + '%';
        }
      };
      const onUp = () => {
        el.classList.remove('dragging');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

function handleKey(e) {
  if (e.target.tagName === 'INPUT') return;
  if (state.mode === 'execution') {
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    if (e.code === 'ArrowRight') { e.preventDefault(); stepForward(); }
    if (e.code === 'ArrowLeft') { e.preventDefault(); stepBack(); }
  } else {
    if (e.code === 'Space') { e.preventDefault(); intuitionTogglePlay(); }
    if (e.code === 'ArrowRight') { e.preventDefault(); intuitionNext(); }
    if (e.code === 'ArrowLeft') { e.preventDefault(); intuitionPrev(); }
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────────────────

initSimulation();
render();
</script>
</body>
</html>
