<div id="main"></div>

<script>
/* ═══════════════════════════════════════════════════
   SYNTAX HIGHLIGHTER
═══════════════════════════════════════════════════ */
function highlightPython(line) {
  // Use DOM for safe escaping
  const tmp = document.createElement('div');
  tmp.textContent = line;
  let safe = tmp.innerHTML;

  // Comments (process first)
  if (safe.trim().startsWith('#')) {
    return `<span class="tok-cmt">${safe}</span>`;
  }

  // Strings (triple then single/double)
  safe = safe.replace(/&quot;&quot;&quot;([\s\S]*?)&quot;&quot;&quot;/g, m => `<span class="tok-str">${m}</span>`);
  safe = safe.replace(/&#39;&#39;&#39;([\s\S]*?)&#39;&#39;&#39;/g, m => `<span class="tok-str">${m}</span>`);
  safe = safe.replace(/((?:&quot;|&#39;)(?:(?!(?:&quot;|&#39;)).)*(?:&quot;|&#39;))/g, m => `<span class="tok-str">${m}</span>`);

  // Inline comments
  safe = safe.replace(/(#[^<]*)$/, m => `<span class="tok-cmt">${m}</span>`);

  // Type annotations
  safe = safe.replace(/\b(List|Optional|Dict|Tuple|Set|int|str|bool|float|None)\b/g, '<span class="tok-type">$1</span>');

  // Keywords
  const kws = ['class','def','return','if','elif','else','for','while','in','and','or','not',
                'True','False','None','import','from','as','break','continue','pass','lambda','yield','with'];
  kws.forEach(k => {
    safe = safe.replace(new RegExp(`(?<![\\w\\-])${k}(?![\\w\\-])`, 'g'), `<span class="tok-kw">${k}</span>`);
  });

  // Function names after def
  safe = safe.replace(/(<span class="tok-kw">def<\/span>\s+)(\w+)/g, (_, d, fn) => `${d}<span class="tok-fn">${fn}</span>`);

  // Built-in calls
  safe = safe.replace(/\b(range|len|append|pop|copy|sort|sorted|print|enumerate|zip|map|filter|sum|min|max)\b(?=\s*\()/g,
    '<span class="tok-fn">$1</span>');

  // Numbers
  safe = safe.replace(/\b(\d+)\b/g, '<span class="tok-num">$1</span>');

  // Operators
  safe = safe.replace(/\b(self)\b/g, '<span class="tok-type">self</span>');

  return safe;
}

/* ═══════════════════════════════════════════════════
   THE SOLUTION CODE (for display)
═══════════════════════════════════════════════════ */
const CODE = `class Solution:
    def combinationSum(self, candidates: List[int], target: int) -> List[List[int]]:
        results = []
        candidates.sort()  # Sort to enable early termination
        
        def backtrack(start: int, current: List[int], remaining: int) -> None:
            if remaining == 0:
                results.append(current.copy())
                return
            
            for i in range(start, len(candidates)):
                candidate = candidates[i]
                if candidate > remaining:  # Prune: sorted, so all further too large
                    break
                current.append(candidate)
                backtrack(i, current, remaining - candidate)  # i allows reuse
                current.pop()
        
        backtrack(0, [], target)
        return results`;

const CODE_LINES = CODE.split('\n');

/* ═══════════════════════════════════════════════════
   STEP SIMULATOR
═══════════════════════════════════════════════════ */
let STEPS = [];

function simulate(candidates, target) {
  const steps = [];
  const results = [];
  const sorted = [...candidates].sort((a,b)=>a-b);
  let stepId = 0;

  function snap(line, desc, extra={}) {
    steps.push({
      id: stepId++,
      line,
      description: desc,
      results: results.map(r=>[...r]),
      ...extra
    });
  }

  snap(3, `Initialize results=[], sort candidates → [${sorted.join(', ')}]`, {
    current: [], remaining: target, start: 0,
    vars: { candidates: JSON.stringify(sorted), results: '[]', target }
  });

  function backtrack(start, current, remaining, depth=0) {
    snap(7, `Check: remaining == ${remaining}? ${remaining===0?'YES → found solution!':'No, keep going'}`, {
      current: [...current], remaining, start, depth,
      vars: { remaining, current: JSON.stringify(current), start, depth }
    });

    if (remaining === 0) {
      results.push([...current]);
      snap(8, `✅ Found combination! [${current.join(', ')}] → add to results`, {
        current: [...current], remaining, start, depth, found: true,
        vars: { 'results (updated)': JSON.stringify(results.map(r=>[...r])), combination: JSON.stringify([...current]) }
      });
      return;
    }

    for (let i = start; i < sorted.length; i++) {
      const candidate = sorted[i];
      snap(11, `Loop i=${i}: candidate = ${candidate}`, {
        current: [...current], remaining, start, depth, loopI: i,
        vars: { i, candidate, remaining, current: JSON.stringify(current) }
      });

      if (candidate > remaining) {
        snap(12, `🔴 Prune! ${candidate} > ${remaining} → break (all further candidates also too large)`, {
          current: [...current], remaining, start, depth, pruned: true, loopI: i,
          vars: { candidate, remaining, action: 'BREAK - prune branch' }
        });
        break;
      }

      current.push(candidate);
      snap(13, `Push ${candidate} → current = [${current.join(', ')}]`, {
        current: [...current], remaining, start, depth, loopI: i,
        vars: { candidate, current: JSON.stringify([...current]), remaining }
      });

      snap(14, `Recurse: backtrack(i=${i}, current=[${current.join(', ')}], remaining=${remaining-candidate})`, {
        current: [...current], remaining: remaining - candidate, start: i, depth: depth+1, loopI: i,
        vars: { 'new remaining': remaining-candidate, 'allow reuse?': 'Yes (i not i+1)', depth: depth+1 }
      });
      backtrack(i, current, remaining - candidate, depth + 1);

      current.pop();
      snap(15, `Pop → backtrack: current = [${current.join(', ')}]`, {
        current: [...current], remaining, start, depth, loopI: i,
        vars: { current: JSON.stringify([...current]), action: 'backtrack to try next candidate' }
      });
    }
  }

  snap(18, `Call backtrack(start=0, current=[], remaining=${target})`, {
    current: [], remaining: target, start: 0, depth: 0,
    vars: { start: 0, current: '[]', remaining: target }
  });
  backtrack(0, [], target);
  snap(19, `Return results: ${JSON.stringify(results)}`, {
    current: [], remaining: 0, start: 0, depth: 0, done: true,
    vars: { results: JSON.stringify(results), count: results.length }
  });

  return steps;
}

/* ═══════════════════════════════════════════════════
   BACKTRACK TREE for visualization
═══════════════════════════════════════════════════ */
function buildTree(candidates, target) {
  const sorted = [...candidates].sort((a,b)=>a-b);
  let nodeId = 0;

  function build(start, current, remaining, depth) {
    const id = nodeId++;
    const node = { id, current: [...current], remaining, depth, children: [], pruned: false, found: remaining===0 };
    if (remaining === 0) return node;
    if (depth > 5) return node; // limit visual depth

    for (let i = start; i < sorted.length; i++) {
      const c = sorted[i];
      if (c > remaining) { node.pruned = true; break; }
      current.push(c);
      node.children.push(build(i, current, remaining - c, depth + 1));
      current.pop();
    }
    return node;
  }

  return build(0, [], target, 0);
}

/* ═══════════════════════════════════════════════════
   SVG TREE RENDERER
═══════════════════════════════════════════════════ */
function renderTreeSVG(tree, activeStep) {
  const NODE_R = 22;
  const H_GAP = 48;
  const V_GAP = 62;

  // Calculate subtree widths
  function calcWidth(node) {
    if (!node.children.length) return 1;
    const sum = node.children.reduce((a, c) => a + calcWidth(c), 0);
    node._width = Math.max(1, sum);
    return node._width;
  }
  calcWidth(tree);

  const nodes = [];
  const edges = [];

  function layout(node, cx, cy) {
    node._x = cx;
    node._y = cy;
    nodes.push(node);

    const totalW = (node.children.reduce((a,c)=>a+(c._width||1),0)-1) * H_GAP;
    let ox = cx - totalW / 2;

    node.children.forEach(child => {
      const childCX = ox + ((child._width||1)-1)*H_GAP/2;
      edges.push({ x1: cx, y1: cy, x2: childCX, y2: cy + V_GAP, found: child.found, pruned: child.pruned });
      layout(child, childCX, cy + V_GAP);
      ox += (child._width||1) * H_GAP;
    });
  }

  const treeWidth = (tree._width || 1) * H_GAP;
  const W = Math.max(500, treeWidth + 60);
  const depths = new Set(nodes.map(n=>n.depth));
  const H = Math.max(200, (Math.max(...[...depths])+1) * V_GAP + 60);

  // Layout pass
  layout(tree, W/2, 36);

  // Find active node from step
  let activeCurrentStr = null;
  if (activeStep) {
    activeCurrentStr = JSON.stringify(activeStep.current);
  }

  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-height:340px">`;
  svg += `<defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0,6 3,0 6" fill="#4b5563"/>
    </marker>
  </defs>`;

  // Edges
  edges.forEach(e => {
    const color = e.found ? '#10b981' : e.pruned ? '#ef4444' : '#4b5563';
    svg += `<line x1="${e.x1}" y1="${e.y1}" x2="${e.x2}" y2="${e.y2}" stroke="${color}" stroke-width="1.5" stroke-dasharray="${e.pruned?'4,3':'none'}" opacity="0.6"/>`;
  });

  // Nodes
  nodes.forEach(n => {
    const isActive = activeCurrentStr && JSON.stringify(n.current) === activeCurrentStr;
    const fill = n.found ? '#10b981' : n.pruned ? '#991b1b' : isActive ? '#3b82f6' : '#374151';
    const stroke = isActive ? '#fbbf24' : n.found ? '#34d399' : '#4b5563';
    const sw = isActive ? 3 : 1.5;
    const label = n.current.length ? `[${n.current.join(',')}]` : '[]';
    const rem = `r=${n.remaining}`;

    svg += `<g>
      <ellipse cx="${n._x}" cy="${n._y}" rx="${NODE_R+4}" ry="${NODE_R-4}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>
      <text x="${n._x}" y="${n._y-3}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="9" font-family="monospace">${label}</text>
      <text x="${n._x}" y="${n._y+7}" text-anchor="middle" dominant-baseline="middle" fill="${n.found?'#d1fae5':'#9ca3af'}" font-size="8" font-family="monospace">${rem}</text>
    </g>`;
  });

  svg += `</svg>`;
  return svg;
}

          <ellipse cx="230" cy="80" rx="22" ry="12" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
          <text x="230" y="81" text-anchor="middle" fill="#fca5a5" font-size="9" font-family="monospace">6✗</text>
          <ellipse cx="280" cy="80" rx="22" ry="12" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
          <text x="280" y="81" text-anchor="middle" fill="#fca5a5" font-size="9" font-family="monospace">7✗</text>
          <text x="255" y="100" text-anchor="middle" fill="#ef4444" font-size="8">PRUNED by sort+break</text>
        </svg>
      </div>`;

    case 'code_flow': return `
      <div class="viz-card">
        <h3>Choose → Recurse → Unchoose</h3>
        <div style="font-family:var(--font-mono);font-size:12.5px;line-height:2;color:var(--text-secondary)">
          <span style="color:#ff79c6">for</span> i <span style="color:#ff79c6">in</span> <span style="color:#50fa7b">range</span>(start, <span style="color:#50fa7b">len</span>(candidates)):<br>
          &nbsp;&nbsp;<span style="color:#8be9fd">candidate</span> = candidates[i]<br>
          &nbsp;&nbsp;<span style="color:#ff79c6">if</span> candidate &gt; remaining: <span style="color:#ff79c6">break</span><br>
          &nbsp;&nbsp;current.<span style="color:#50fa7b">append</span>(candidate) <span style="color:#6272a4"># ← CHOOSE</span><br>
          &nbsp;&nbsp;<span style="color:#50fa7b">backtrack</span>(i, current, remaining-candidate) <span style="color:#6272a4"># ← EXPLORE</span><br>
          &nbsp;&nbsp;current.<span style="color:#50fa7b">pop</span>() <span style="color:#6272a4"># ← UNCHOOSE (backtrack)</span>
        </div>
      </div>
      <div class="viz-card">
        <h3>Call Stack Example</h3>
        <div style="font-size:12px;color:var(--text-secondary);font-family:var(--font-mono);line-height:2">
          backtrack(0, [], 7)<br>
          &nbsp;→ backtrack(0, [2], 5)<br>
          &nbsp;&nbsp;→ backtrack(0, [2,2], 3)<br>
          &nbsp;&nbsp;&nbsp;→ backtrack(0, [2,2,2], 1) ← prune 3>1, break<br>
          &nbsp;&nbsp;&nbsp;→ backtrack(1, [2,2,3], 0) ← <span style="color:#10b981">FOUND! [2,2,3]</span><br>
          &nbsp;&nbsp;pop 2 → try 3...<br>
          &nbsp;&nbsp;&nbsp;→ backtrack(1, [2,3], 2) ← prune 3>2... wait 6>2, break
        </div>
      </div>`;

    case 'complexity': return `
      <div class="viz-card">
        <h3>Complexity</h3>
        <div class="complexity-row">
          <div class="complexity-pill"><div class="label">Time</div><div class="value">O(N^(T/M))</div></div>
          <div class="complexity-pill"><div class="label">Space</div><div class="value">O(T/M)</div></div>
        </div>
        <div style="font-size:12px;color:var(--text-secondary);margin-top:12px;line-height:1.8">
          N = number of candidates<br>
          T = target value<br>
          M = minimum candidate value<br><br>
          The recursion tree has depth ≤ T/M and branching factor ≤ N.
        </div>
      </div>
      <div class="viz-card">
        <h3>Example: [2,3,6,7], target=7</h3>
        <div style="font-size:12px;color:var(--text-secondary);line-height:2">
          Max depth = 7/2 = 3-4 levels<br>
          Branching = up to 4 (candidates)<br>
          But pruning cuts most branches!<br>
          <span style="color:#10b981">In practice: much fewer than 4^4 = 256 nodes</span>
        </div>
      </div>`;

    case 'final': return `
      <div class="viz-card">
        <h3>Complete Decision Tree for [2,3,6,7], target=7</h3>
        ${renderTreeSVG(buildTree([2,3,6,7], 7), null)}
        <div style="font-size:11.5px;color:var(--text-secondary);margin-top:8px">
          🟢 Green nodes = found solutions &nbsp; 🔴 Red dashes = pruned branches
        </div>
      </div>
      <div class="viz-card">
        <h3>Solutions</h3>
        <div class="result-chips">
          <span class="chip">[2,2,3]</span>
          <span class="chip">[7]</span>
        </div>
      </div>
      <div class="viz-card">
        <h3>Concepts Demonstrated</h3>
        <div style="font-size:12.5px;line-height:2;color:var(--text-secondary)">
          🔁 Backtracking (choose/recurse/unchoose)<br>
          ✂️ Pruning (sort + break)<br>
          🚫 Duplicate avoidance (start index)<br>
          ♻️ Unlimited reuse (i not i+1)<br>
          📋 Collecting all solutions (results array)
        </div>
      </div>`;

    default: return '<div class="viz-card"><h3>Visualization</h3><div style="color:var(--text-secondary)">See left panel</div></div>';
  }
}

/* ═══════════════════════════════════════════════════
   PANEL RESIZING
═══════════════════════════════════════════════════ */
function setupDividers() {
  ['div1','div2'].forEach((id, idx) => {
    const el = document.getElementById(id);
    if (!el) return;
    let dragging = false;
    el.addEventListener('mousedown', e => { dragging = true; e.preventDefault(); });
    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const main = document.getElementById('main');
      const rect = main.getBoundingClientRect();
      const total = rect.width;
      const panels = main.querySelectorAll('.panel');
      if (idx === 0) {
        let p0 = ((e.clientX - rect.left) / total) * 100;
        p0 = Math.max(15, Math.min(50, p0));
        const rest = 100 - p0 - state.pw[2];
        state.pw[0] = p0;
        state.pw[1] = Math.max(20, rest);
      } else {
        let p2 = ((rect.right - e.clientX) / total) * 100;
        p2 = Math.max(15, Math.min(40, p2));
        const rest = 100 - state.pw[0] - p2;
        state.pw[2] = p2;
        state.pw[1] = Math.max(20, rest);
      }
      panels[0].style.width = state.pw[0]+'%';
      panels[1].style.width = state.pw[1]+'%';
      panels[2].style.width = state.pw[2]+'%';
    });
    document.addEventListener('mouseup', () => { dragging = false; });
  });
}

function scrollLogToStep() {
  setTimeout(()=>{
    const lb = document.getElementById('log-body');
    if (!lb) return;
    const items = lb.querySelectorAll('.history-item.current');
    if (items.length) items[0].scrollIntoView({ block:'nearest', behavior:'smooth' });
  }, 50);
}

/* ═══════════════════════════════════════════════════
   ACTIONS
═══════════════════════════════════════════════════ */
function setMode(m) {
  clearTimers();
  state.mode = m;
  document.getElementById('mode-intuition').classList.toggle('active', m==='intuition');
  document.getElementById('mode-execution').classList.toggle('active', m==='execution');
  if (m === 'execution' && !state.steps.length) {
    runSim();
  }
  render();
}

function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  document.body.setAttribute('data-theme', state.theme);
  document.getElementById('theme-btn').textContent = state.theme === 'dark' ? '☀️ Light' : '🌙 Dark';
}

function runWithInput() {
  try {
    state.candidates = JSON.parse(document.getElementById('inp-candidates').value);
    state.target = parseInt(document.getElementById('inp-target').value);
  } catch(e) { alert('Invalid input format'); return; }
  runSim();
  render();
}

function runSim() {
  clearTimers();
  state.steps = simulate(state.candidates, state.target);
  state.tree = buildTree(state.candidates, state.target);
  state.currentStep = 0;
  state.isPlaying = false;
}

function togglePlay() {
  state.isPlaying ? pause() : play();
}

function play() {
  if (state.currentStep >= state.steps.length - 1) { state.currentStep = 0; }
  state.isPlaying = true;
  clearInterval(state.playTimer);
  state.playTimer = setInterval(() => {
    if (state.currentStep >= state.steps.length - 1) {
      pause(); return;
    }
    state.currentStep++;
    render();
    scrollLogToStep();
  }, 800 / state.speed);
  render();
}

function pause() {
  state.isPlaying = false;
  clearInterval(state.playTimer);
  render();
}

function stepFwd() {
  if (state.currentStep < state.steps.length - 1) {
    state.currentStep++;
    render();
    scrollLogToStep();
  }
}

function stepBack() {
  if (state.currentStep > 0) {
    state.currentStep--;
    render();
  }
}

function resetStep() {
  pause();
  state.currentStep = 0;
  render();
}

function skipEnd() {
  pause();
  state.currentStep = state.steps.length - 1;
  render();
}

function gotoStep(i) {
  state.currentStep = i;
  render();
}

function setSpeed(v) {
  state.speed = parseFloat(v);
  if (state.isPlaying) { pause(); play(); }
}

/* Intuition controls */
function nextStage() {
  if (state.intuitionStage < INTUITION_STAGES.length - 1) {
    state.intuitionStage++;
    render();
    scrollToActiveStage();
  }
}

function prevStage() {
  if (state.intuitionStage > 0) {
    state.intuitionStage--;
    render();
    scrollToActiveStage();
  }
}

function toggleIntuitionPlay() {
  state.intuitionPlaying ? stopIntuitionPlay() : startIntuitionPlay();
}

function startIntuitionPlay() {
  state.intuitionPlaying = true;
  clearInterval(state.intuitionTimer);
  state.intuitionTimer = setInterval(() => {
    if (state.intuitionStage >= INTUITION_STAGES.length - 1) {
      stopIntuitionPlay(); return;
    }
    state.intuitionStage++;
    render();
    scrollToActiveStage();
  }, 4000);
  render();
}

function stopIntuitionPlay() {
  state.intuitionPlaying = false;
  clearInterval(state.intuitionTimer);
  render();
}

function scrollToActiveStage() {
  setTimeout(()=>{
    const el = document.getElementById(`istage${state.intuitionStage}`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
}

function clearTimers() {
  clearInterval(state.playTimer);
  clearInterval(state.intuitionTimer);
  state.isPlaying = false;
  state.intuitionPlaying = false;
}

/* ═══════════════════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault();
    state.mode === 'execution' ? togglePlay() : toggleIntuitionPlay(); }
  else if (e.code === 'ArrowRight') { e.preventDefault();
    state.mode === 'execution' ? stepFwd() : nextStage(); }
  else if (e.code === 'ArrowLeft') { e.preventDefault();
    state.mode === 'execution' ? stepBack() : prevStage(); }
  else if (e.code === 'Home') { e.preventDefault(); resetStep(); }
  else if (e.code === 'End') { e.preventDefault(); skipEnd(); }
});

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
state.pw = [30, 50, 20]; // panel widths %
runSim();
render();
</script>
