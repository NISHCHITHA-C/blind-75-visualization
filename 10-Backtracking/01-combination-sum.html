<body data-theme="dark">

<div id="header">
  <div class="header-row1">
    <div class="problem-title"><span>39.</span> Combination Sum</div>
    <div class="header-btns">
      <button class="btn" id="theme-btn" onclick="toggleTheme()">☀️ Light</button>
    </div>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="mode-intuition" onclick="setMode('intuition')">💡 Intuition &amp; Thought Process</button>
    <button class="mode-btn" id="mode-execution" onclick="setMode('execution')">▶️ Step-by-Step Execution</button>
  </div>
  <div class="input-row" id="exec-input-row" style="display:none">
    <label>candidates:</label>
    <input id="inp-candidates" value="[2,3,6,7]" />
    <label>target:</label>
    <input id="inp-target" value="7" style="width:70px" />
    <button class="btn" onclick="runWithInput()">▶ Run</button>
  </div>
</div>

<div id="main"></div>

<script>
/* ═══════════════════════════════════════════════════
   SYNTAX HIGHLIGHTER
═══════════════════════════════════════════════════ */
function highlightPython(line) {
  const tmp = document.createElement('div');
  tmp.textContent = line;
  let safe = tmp.innerHTML;

  if (safe.trim().startsWith('#')) {
    return `<span class="tok-cmt">${safe}</span>`;
  }

  // Strings (triple then single/double) — must run before keyword scan
  safe = safe.replace(/(&quot;&quot;&quot;)([\s\S]*?)(&quot;&quot;&quot;)/g, (m) => `<span class="tok-str">${m}</span>`);
  safe = safe.replace(/(&#39;&#39;&#39;)([\s\S]*?)(&#39;&#39;&#39;)/g, (m) => `<span class="tok-str">${m}</span>`);
  // Single/double quoted strings (non-greedy, no newline)
  safe = safe.replace(/(&quot;[^&]*?&quot;|&#39;[^&]*?&#39;)/g, (m) => `<span class="tok-str">${m}</span>`);

  // Inline comments (after string scan)
  safe = safe.replace(/(#(?:[^<]*)$)/gm, (m) => `<span class="tok-cmt">${m}</span>`);

  // Bracket/type annotations — before keyword scan to avoid re-wrapping
  safe = safe.replace(/\b(List|Optional|Dict|Tuple|Set|int|str|bool|float)\b(?![^<]*<\/span>)/g,
    '<span class="tok-type">$1</span>');

  // Keywords
  const kws = ['class','def','return','if','elif','else','for','while','in','and','or','not',
                'True','False','None','import','from','as','break','continue','pass','lambda','yield','with'];
  kws.forEach(k => {
    const re = new RegExp(`(?<![\\w\\-<"/])${k}(?![\\w\\-])(?![^<]*<\\/span>)`, 'g');
    safe = safe.replace(re, `<span class="tok-kw">${k}</span>`);
  });

  // Function names after def
  safe = safe.replace(/(<span class="tok-kw">def<\/span>\s+)(\w+)/g,
    (_, d, fn) => `${d}<span class="tok-fn">${fn}</span>`);

  // Built-in calls
  safe = safe.replace(/\b(range|len|append|pop|copy|sort|sorted|print|enumerate|zip|map|filter|sum|min|max)\b(?=\s*\()/g,
    '<span class="tok-fn">$1</span>');

  // Numbers (not inside existing spans)
  safe = safe.replace(/(?<!["\w<])(\b\d+\b)(?![^<]*<\/span>)/g, '<span class="tok-num">$1</span>');

  // self
  safe = safe.replace(/\b(self)\b/g, '<span class="tok-type">self</span>');

  return safe;
}

/* ═══════════════════════════════════════════════════
   SOLUTION CODE
═══════════════════════════════════════════════════ */
const CODE = `class Solution:
    def combinationSum(self, candidates: List[int], target: int) -> List[List[int]]:
        results = []
        candidates.sort()  # Sort to enable early termination
        
        def backtrack(start: int, current: List[int], remaining: int) -> None:
            if remaining == 0:
                results.append(current.copy())
                return
            
            for i in range(start, len(candidates)):
                candidate = candidates[i]
                if candidate > remaining:  # Prune: sorted, so all further too large
                    break
                current.append(candidate)
                backtrack(i, current, remaining - candidate)  # i allows reuse
                current.pop()
        
        backtrack(0, [], target)
        return results`;

const CODE_LINES = CODE.split('\n');

/* ═══════════════════════════════════════════════════
   STEP SIMULATOR
═══════════════════════════════════════════════════ */
function simulate(candidates, target) {
  const steps = [];
  const results = [];
  const sorted = [...candidates].sort((a,b)=>a-b);
  let stepId = 0;

  function snap(line, desc, extra={}) {
    steps.push({ id: stepId++, line, description: desc, results: results.map(r=>[...r]), ...extra });
  }

  snap(3, `Initialize results=[], sort candidates → [${sorted.join(', ')}]`, {
    current: [], remaining: target, start: 0,
    vars: { candidates: JSON.stringify(sorted), results: '[]', target }
  });

  function backtrack(start, current, remaining, depth=0) {
    snap(7, `Check: remaining == ${remaining}? ${remaining===0?'YES → found solution!':'No, keep going'}`, {
      current: [...current], remaining, start, depth,
      vars: { remaining, current: JSON.stringify(current), start, depth }
    });

    if (remaining === 0) {
      results.push([...current]);
      snap(8, `✅ Found combination! [${current.join(', ')}] → add to results`, {
        current: [...current], remaining, start, depth, found: true,
        vars: { 'results (updated)': JSON.stringify(results.map(r=>[...r])), combination: JSON.stringify([...current]) }
      });
      return;
    }

    for (let i = start; i < sorted.length; i++) {
      const candidate = sorted[i];
      snap(11, `Loop i=${i}: candidate = ${candidate}`, {
        current: [...current], remaining, start, depth, loopI: i,
        vars: { i, candidate, remaining, current: JSON.stringify(current) }
      });

      if (candidate > remaining) {
        snap(12, `🔴 Prune! ${candidate} > ${remaining} → break (all further too large)`, {
          current: [...current], remaining, start, depth, pruned: true, loopI: i,
          vars: { candidate, remaining, action: 'BREAK - prune branch' }
        });
        break;
      }

      current.push(candidate);
      snap(13, `Push ${candidate} → current = [${current.join(', ')}]`, {
        current: [...current], remaining, start, depth, loopI: i,
        vars: { candidate, current: JSON.stringify([...current]), remaining }
      });

      snap(14, `Recurse: backtrack(i=${i}, current=[${current.join(', ')}], remaining=${remaining-candidate})`, {
        current: [...current], remaining: remaining - candidate, start: i, depth: depth+1, loopI: i,
        vars: { 'new remaining': remaining-candidate, 'allow reuse?': 'Yes (i not i+1)', depth: depth+1 }
      });
      backtrack(i, current, remaining - candidate, depth + 1);

      current.pop();
      snap(15, `Pop → backtrack: current = [${current.join(', ')}]`, {
        current: [...current], remaining, start, depth, loopI: i,
        vars: { current: JSON.stringify([...current]), action: 'backtrack to try next candidate' }
      });
    }
  }

  snap(18, `Call backtrack(start=0, current=[], remaining=${target})`, {
    current: [], remaining: target, start: 0, depth: 0,
    vars: { start: 0, current: '[]', remaining: target }
  });
  backtrack(0, [], target);
  snap(19, `Return results: ${JSON.stringify(results)}`, {
    current: [], remaining: 0, start: 0, depth: 0, done: true,
    vars: { results: JSON.stringify(results), count: results.length }
  });

  return steps;
}

/* ═══════════════════════════════════════════════════
   TREE BUILDER
═══════════════════════════════════════════════════ */
function buildTree(candidates, target) {
  const sorted = [...candidates].sort((a,b)=>a-b);
  let nodeId = 0;

  function build(start, current, remaining, depth) {
    const id = nodeId++;
    const node = {
      id, current: [...current], remaining, depth,
      children: [], pruned: false, found: remaining === 0,
      _width: 1
    };
    if (remaining === 0 || depth >= 6) return node;

    let childrenAdded = 0;
    for (let i = start; i < sorted.length; i++) {
      const c = sorted[i];
      if (c > remaining) { node.pruned = true; break; }
      current.push(c);
      const child = build(i, current, remaining - c, depth + 1);
      node.children.push(child);
      current.pop();
      childrenAdded++;
    }
    return node;
  }

  const tree = build(0, [], target, 0);
  computeWidths(tree);
  return tree;
}

function computeWidths(node) {
  if (!node.children.length) { node._width = 1; return 1; }
  let w = 0;
  node.children.forEach(c => { w += computeWidths(c); });
  node._width = Math.max(1, w);
  return node._width;
}

/* ═══════════════════════════════════════════════════
   SVG TREE RENDERER — now returns {svg, width, height}
═══════════════════════════════════════════════════ */
function renderTreeSVG(tree, activeStep) {
  const H_GAP = 72;   // horizontal gap per unit width
  const V_GAP = 72;   // vertical gap between levels
  const NODE_RX = 30; // ellipse rx
  const NODE_RY = 16; // ellipse ry
  const PAD = 20;     // padding around tree

  const allNodes = [];
  const allEdges = [];

  function layout(node, cx, cy) {
    node._x = cx;
    node._y = cy;
    allNodes.push(node);

    let ox = cx - ((node._width - 1) * H_GAP) / 2;
    node.children.forEach(child => {
      const childCX = ox + ((child._width - 1) * H_GAP) / 2;
      allEdges.push({
        x1: cx, y1: cy + NODE_RY,
        x2: childCX, y2: cy + V_GAP - NODE_RY,
        found: child.found, pruned: child.pruned
      });
      layout(child, childCX, cy + V_GAP);
      ox += child._width * H_GAP;
    });
  }

  layout(tree, (tree._width * H_GAP) / 2, PAD + NODE_RY);

  // Compute bounding box
  let minX = Infinity, maxX = -Infinity, maxY = -Infinity;
  allNodes.forEach(n => {
    minX = Math.min(minX, n._x - NODE_RX - PAD);
    maxX = Math.max(maxX, n._x + NODE_RX + PAD);
    maxY = Math.max(maxY, n._y + NODE_RY + PAD);
  });

  const W = Math.max(400, maxX - minX);
  const H = Math.max(200, maxY);
  const offsetX = -minX;

  // Active node matching
  let activeCurrentStr = activeStep ? JSON.stringify(activeStep.current) : null;

  let svgParts = [
    `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" style="display:block">`,
    `<defs>
      <marker id="arr" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
        <polygon points="0 0,6 2.5,0 5" fill="#4b5563"/>
      </marker>
    </defs>`
  ];

  // Edges
  allEdges.forEach(e => {
    const color = e.found ? '#10b981' : e.pruned ? '#ef4444' : '#4b5563';
    const dash = e.pruned ? '5,4' : 'none';
    svgParts.push(
      `<line x1="${e.x1+offsetX}" y1="${e.y1}" x2="${e.x2+offsetX}" y2="${e.y2}"
        stroke="${color}" stroke-width="1.5" stroke-dasharray="${dash}" opacity="0.7"/>`
    );
  });

  // Nodes
  allNodes.forEach(n => {
    const isActive = activeCurrentStr && JSON.stringify(n.current) === activeCurrentStr;
    const fill = n.found ? '#064e3b' : n.pruned ? '#450a0a' : isActive ? '#1e3a5f' : '#1f2937';
    const stroke = isActive ? '#fbbf24' : n.found ? '#10b981' : n.pruned ? '#ef4444' : '#4b5563';
    const sw = isActive ? 2.5 : 1.5;
    const cx = n._x + offsetX;

    const label = n.current.length ? `[${n.current.join(',')}]` : '[]';
    const rem = `r=${n.remaining}`;
    const labelColor = n.found ? '#6ee7b7' : n.pruned ? '#fca5a5' : '#e5e7eb';

    svgParts.push(`
      <ellipse cx="${cx}" cy="${n._y}" rx="${NODE_RX}" ry="${NODE_RY}"
        fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>
      <text x="${cx}" y="${n._y - 4}" text-anchor="middle" dominant-baseline="middle"
        fill="${labelColor}" font-size="9.5" font-family="monospace" font-weight="600">${label}</text>
      <text x="${cx}" y="${n._y + 8}" text-anchor="middle" dominant-baseline="middle"
        fill="${n.found ? '#34d399' : '#9ca3af'}" font-size="8.5" font-family="monospace">${rem}</text>
    `);

    if (n.found) {
      svgParts.push(`<text x="${cx + NODE_RX + 4}" y="${n._y}" dominant-baseline="middle"
        fill="#10b981" font-size="11">✓</text>`);
    }
  });

  svgParts.push('</svg>');
  return { svg: svgParts.join(''), width: W, height: H };
}

        </div>
      </div>
      <div class="viz-card">
        <h3>The i vs i+1 Choice</h3>
        <div class="approach-box approach-good">
          <strong>backtrack(i, ...)</strong> — allows reuse of current element ✓
        </div>
        <div class="approach-box approach-bad">
          <strong>backtrack(i+1, ...)</strong> — would prevent reuse (wrong here)
        </div>
      </div>`;

    case 'pruning': return `
      <div class="viz-card">
        <h3>Without Sorting — Must Check All</h3>
        <div class="pruning-demo">
          candidates = [3, 7, 2, 6], target = 5<br>
          i=0: 3 ≤ 5 ✓ recurse<br>
          i=1: 7 > 5 → <span style="color:#ef4444">continue</span> (must check i=2!)<br>
          i=2: 2 ≤ 5 ✓ recurse<br>
          i=3: 6 > 5 → continue<br>
          <span style="color:#ef4444">No early exit possible</span>
        </div>
      </div>
      <div class="viz-card">
        <h3>With Sorting — Break Early</h3>
        <div class="pruning-demo">
          candidates = [2, 3, 6, 7], target = 5<br>
          i=0: 2 ≤ 5 ✓ recurse<br>
          i=1: 3 ≤ 5 ✓ recurse<br>
          i=2: 6 > 5 → <span class="keep">BREAK</span> (7 also > 5, skip all!)<br>
          <span style="color:#10b981">Entire right portion pruned instantly</span>
        </div>
      </div>
      <div class="viz-card">
        <h3>Pruned vs Explored</h3>
        <svg viewBox="0 0 300 110" width="300" height="110" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="150" cy="22" rx="34" ry="15" fill="#1f2937" stroke="#60a5fa" stroke-width="1.5"/>
          <text x="150" y="23" text-anchor="middle" fill="#e5e7eb" font-size="9" font-family="monospace">[] r=5</text>
          <line x1="150" y1="37" x2="50" y2="72" stroke="#10b981" stroke-width="1.5"/>
          <line x1="150" y1="37" x2="130" y2="72" stroke="#10b981" stroke-width="1.5"/>
          <line x1="150" y1="37" x2="210" y2="72" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>
          <line x1="150" y1="37" x2="270" y2="72" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>
          <ellipse cx="50" cy="84" rx="28" ry="14" fill="#1f2937" stroke="#10b981" stroke-width="1.5"/>
          <text x="50" y="85" text-anchor="middle" fill="#6ee7b7" font-size="9" font-family="monospace">2 ✓</text>
          <ellipse cx="130" cy="84" rx="28" ry="14" fill="#1f2937" stroke="#10b981" stroke-width="1.5"/>
          <text x="130" y="85" text-anchor="middle" fill="#6ee7b7" font-size="9" font-family="monospace">3 ✓</text>
          <ellipse cx="210" cy="84" rx="28" ry="14" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
          <text x="210" y="85" text-anchor="middle" fill="#fca5a5" font-size="9" font-family="monospace">6 ✗</text>
          <ellipse cx="270" cy="84" rx="28" ry="14" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
          <text x="270" y="85" text-anchor="middle" fill="#fca5a5" font-size="9" font-family="monospace">7 ✗</text>
          <text x="240" y="106" text-anchor="middle" fill="#ef4444" font-size="8.5">PRUNED by sort+break</text>
        </svg>
      </div>`;

    case 'code_flow': return `
      <div class="viz-card">
        <h3>Choose → Recurse → Unchoose</h3>
        <div style="font-family:var(--font-mono);font-size:12.5px;line-height:2.1;color:var(--text-secondary)">
          <span class="tok-kw">for</span> i <span class="tok-kw">in</span> <span class="tok-fn">range</span>(start, <span class="tok-fn">len</span>(candidates)):<br>
          &nbsp;&nbsp;candidate = candidates[i]<br>
          &nbsp;&nbsp;<span class="tok-kw">if</span> candidate &gt; remaining: <span class="tok-kw">break</span><br>
          &nbsp;&nbsp;current.<span class="tok-fn">append</span>(candidate) <span class="tok-cmt"># CHOOSE</span><br>
          &nbsp;&nbsp;<span class="tok-fn">backtrack</span>(i, current, remaining-candidate) <span class="tok-cmt"># EXPLORE</span><br>
          &nbsp;&nbsp;current.<span class="tok-fn">pop</span>() <span class="tok-cmt"># UNCHOOSE ← backtrack!</span>
        </div>
      </div>
      <div class="viz-card">
        <h3>Call Stack Example (target=7)</h3>
        <div style="font-size:12px;color:var(--text-secondary);font-family:var(--font-mono);line-height:2">
          backtrack(0, [], 7)<br>
          &nbsp;→ backtrack(0, [2], 5)<br>
          &nbsp;&nbsp;→ backtrack(0, [2,2], 3)<br>
          &nbsp;&nbsp;&nbsp;→ backtrack(0, [2,2,2], 1) ← 3&gt;1 break<br>
          &nbsp;&nbsp;&nbsp;→ backtrack(1, [2,2,3], 0) ← <span style="color:#10b981">FOUND!</span><br>
          &nbsp;&nbsp;← pop 2 → try 3...<br>
          &nbsp;&nbsp;&nbsp;→ backtrack(1, [2,3], 2) ← 6&gt;2 break
        </div>
      </div>`;

    case 'complexity': return `
      <div class="viz-card">
        <h3>Complexity</h3>
        <div class="complexity-row">
          <div class="complexity-pill"><div class="label">Time</div><div class="value">O(N^(T/M))</div></div>
          <div class="complexity-pill"><div class="label">Space</div><div class="value">O(T/M)</div></div>
        </div>
        <div style="font-size:12px;color:var(--text-secondary);margin-top:12px;line-height:1.8">
          N = number of candidates<br>
          T = target value<br>
          M = minimum candidate value<br><br>
          Recursion tree depth ≤ T/M, branching factor ≤ N.
        </div>
      </div>
      <div class="viz-card">
        <h3>Example: [2,3,6,7], target=7</h3>
        <div style="font-size:12px;color:var(--text-secondary);line-height:2">
          Max depth = 7/2 = 3–4 levels<br>
          Branching = up to 4 candidates<br>
          Pruning eliminates most branches early<br>
          <span style="color:#10b981">In practice: far fewer than 4⁴ = 256 nodes</span>
        </div>
      </div>`;

    case 'final': {
      const { svg, width, height } = renderTreeSVG(buildTree([2,3,6,7], 7), null);
      return `
        <div class="viz-card">
          <h3>Complete Decision Tree for [2,3,6,7], target=7</h3>
          <div class="tree-demo-scroll" style="max-height:280px;overflow:auto">
            ${svg}
          </div>
          <div style="font-size:11.5px;color:var(--text-secondary);margin-top:8px">
            🟢 Green = found &nbsp;|&nbsp; 🔴 Red dashed = pruned &nbsp;|&nbsp; Scroll to see full tree
          </div>
        </div>
        <div class="viz-card">
          <h3>Solutions Found</h3>
          <div class="result-chips">
            <span class="chip">[2,2,3]</span>
            <span class="chip">[7]</span>
          </div>
        </div>
        <div class="viz-card">
          <h3>Concepts Demonstrated</h3>
          <div style="font-size:12.5px;line-height:2;color:var(--text-secondary)">
            🔁 Backtracking (choose/recurse/unchoose)<br>
            ✂️ Pruning (sort + break)<br>
            🚫 Duplicate avoidance (start index)<br>
            ♻️ Unlimited reuse (i not i+1)<br>
            📋 Collecting all solutions (results array)
          </div>
        </div>`;
    }

    default:
      return '<div class="viz-card"><h3>Visualization</h3><div style="color:var(--text-secondary)">See left panel</div></div>';
  }
}

/* ═══════════════════════════════════════════════════
   PANEL RESIZING
═══════════════════════════════════════════════════ */
function setupDividers() {
  ['div1','div2'].forEach((id, idx) => {
    const el = document.getElementById(id);
    if (!el) return;
    let dragging = false;

    el.addEventListener('mousedown', e => {
      dragging = true;
      el.classList.add('dragging');
      e.preventDefault();
    });

    const onMove = e => {
      if (!dragging) return;
      const main = document.getElementById('main');
      const rect = main.getBoundingClientRect();
      const total = rect.width;
      const panels = main.querySelectorAll('.panel');
      if (!panels[0] || !panels[1] || !panels[2]) return;

      if (idx === 0) {
        let p0 = ((e.clientX - rect.left) / total) * 100;
        p0 = Math.max(15, Math.min(55, p0));
        state.pw[0] = p0;
        state.pw[1] = Math.max(15, 100 - p0 - state.pw[2]);
      } else {
        let p2 = ((rect.right - e.clientX) / total) * 100;
        p2 = Math.max(12, Math.min(40, p2));
        state.pw[2] = p2;
        state.pw[1] = Math.max(15, 100 - state.pw[0] - p2);
      }
      panels[0].style.width = state.pw[0] + '%';
      panels[1].style.width = state.pw[1] + '%';
      panels[2].style.width = state.pw[2] + '%';
    };

    const onUp = () => {
      if (dragging) {
        dragging = false;
        el.classList.remove('dragging');
      }
    };

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

function scrollLogToStep() {
  setTimeout(() => {
    const lb = document.getElementById('log-body');
    if (!lb) return;
    const item = lb.querySelector('.history-item.current');
    if (item) item.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }, 60);
}

/* ═══════════════════════════════════════════════════
   ACTIONS
═══════════════════════════════════════════════════ */
function setMode(m) {
  clearTimers();
  state.mode = m;
  document.getElementById('mode-intuition').classList.toggle('active', m === 'intuition');
  document.getElementById('mode-execution').classList.toggle('active', m === 'execution');
  if (m === 'execution' && !state.steps.length) runSim();
  render();
}

function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  document.body.setAttribute('data-theme', state.theme);
  document.getElementById('theme-btn').textContent = state.theme === 'dark' ? '☀️ Light' : '🌙 Dark';
}

function runWithInput() {
  try {
    state.candidates = JSON.parse(document.getElementById('inp-candidates').value);
    state.target = parseInt(document.getElementById('inp-target').value);
    if (!Array.isArray(state.candidates)) throw new Error();
  } catch(e) { alert('Invalid input. Use format: [2,3,6,7]'); return; }
  runSim();
  render();
}

function runSim() {
  clearTimers();
  state.steps = simulate(state.candidates, state.target);
  state.tree = buildTree(state.candidates, state.target);
  state.currentStep = 0;
  state.isPlaying = false;
}

function togglePlay() { state.isPlaying ? pause() : play(); }

function play() {
  if (state.currentStep >= state.steps.length - 1) state.currentStep = 0;
  state.isPlaying = true;
  clearInterval(state.playTimer);
  state.playTimer = setInterval(() => {
    if (state.currentStep >= state.steps.length - 1) { pause(); return; }
    state.currentStep++;
    render();
    scrollLogToStep();
  }, 800 / state.speed);
  render();
}

function pause() {
  state.isPlaying = false;
  clearInterval(state.playTimer);
  render();
}

function stepFwd() {
  if (state.currentStep < state.steps.length - 1) { state.currentStep++; render(); scrollLogToStep(); }
}
function stepBack() {
  if (state.currentStep > 0) { state.currentStep--; render(); }
}
function resetStep() { pause(); state.currentStep = 0; render(); }
function skipEnd() { pause(); state.currentStep = state.steps.length - 1; render(); }
function gotoStep(i) { state.currentStep = i; render(); }
function setSpeed(v) { state.speed = parseFloat(v); if (state.isPlaying) { pause(); play(); } }

/* Intuition controls */
function nextStage() {
  if (state.intuitionStage < INTUITION_STAGES.length - 1) {
    state.intuitionStage++;
    render();
    setTimeout(() => {
      const el = document.getElementById(`istage${state.intuitionStage}`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  }
}

function prevStage() {
  if (state.intuitionStage > 0) {
    state.intuitionStage--;
    render();
    setTimeout(() => {
      const el = document.getElementById(`istage${state.intuitionStage}`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  }
}

function toggleIntuitionPlay() { state.intuitionPlaying ? stopIntuitionPlay() : startIntuitionPlay(); }

function startIntuitionPlay() {
  state.intuitionPlaying = true;
  clearInterval(state.intuitionTimer);
  state.intuitionTimer = setInterval(() => {
    if (state.intuitionStage >= INTUITION_STAGES.length - 1) { stopIntuitionPlay(); return; }
    state.intuitionStage++;
    render();
    setTimeout(() => {
      const el = document.getElementById(`istage${state.intuitionStage}`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  }, 4000);
  render();
}

function stopIntuitionPlay() {
  state.intuitionPlaying = false;
  clearInterval(state.intuitionTimer);
  render();
}

function clearTimers() {
  clearInterval(state.playTimer);
  clearInterval(state.intuitionTimer);
  state.isPlaying = false;
  state.intuitionPlaying = false;
}

/* ═══════════════════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Space') { e.preventDefault(); state.mode === 'execution' ? togglePlay() : toggleIntuitionPlay(); }
  else if (e.code === 'ArrowRight') { e.preventDefault(); state.mode === 'execution' ? stepFwd() : nextStage(); }
  else if (e.code === 'ArrowLeft') { e.preventDefault(); state.mode === 'execution' ? stepBack() : prevStage(); }
  else if (e.code === 'Home') { e.preventDefault(); resetStep(); }
  else if (e.code === 'End') { e.preventDefault(); skipEnd(); }
});

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
runSim();
render();
</script>
